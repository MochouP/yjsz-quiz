{id:346,ch:2,type:'multi',q:'钢梁安装要点，说法正确的是（）',opts:['钢梁整体安装完毕测量其位置、标高和预拱度','焊接顺序宜为纵向从跨中向两端','焊接横向从两侧向中线对称进行','施拧顺序为从板束刚度大、缝隙大处开始','由外向中央拧紧，并应在当天终拧完毕'],ans:[1,3],exp:'(7)钢梁安装过程中，每完成一节段应测量其位置、标高和预拱度，不符合要求应及时校正。 (8)钢梁杆件工地焊缝连接，应按设计顺序进行。无设计顺序时，焊接顺序宜为纵向从跨中向两端、横向从中线向两侧对称进行。 施拧顺序为从板束刚度大、缝隙大处开始，由中央向 外拧紧，并应在当天终拧完毕。施拧时，不得采用冲击拧紧和间断拧紧。'},
{id:347,ch:2,type:'single',q:'钢-混凝土组合梁施工要点，说法错误的是（）',opts:['混凝土桥面结构应全断面连续浇筑','顺桥向应自跨中开始向支点处交汇，或由一端开始浇筑','横桥向应先由中间开始向两侧扩展','混凝土桥面板上施工后，另做砂浆找平层'],ans:3,exp:'正确答案为D。混凝土桥面板上施工后，另做砂浆找平层。详见教材对应章节。'},
{id:348,ch:2,type:'multi',q:'钢-混结合梁，施工支架设计验算应考虑的荷载有（ ）。',opts:['钢梁拼接荷载','混凝土结构荷载','施工荷载','风雪荷载','保温设施荷载'],ans:[0,1,2],exp:'正确答案为A、B、C。钢梁拼接荷载、混凝土结构荷载、施工荷载。详见教材对应章节。'},
{id:349,ch:2,type:'multi',q:'拱架种类按材料分为（）',opts:['木拱架','钢拱架','混凝土拱架','竹木混合拱架','钢木组合拱架'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。木拱架、钢拱架、竹木混合拱架、钢木组合拱架。详见教材对应章节。'},
{id:350,ch:2,type:'single',q:'在拱架上浇筑混凝土拱圈,说法错误的是（）',opts:['跨径小于16m的拱圈混凝土，按拱圈全宽从两端拱脚向拱顶对称、连续浇筑','跨径大于或等于16m的拱圈或拱肋，宜分段浇筑','分段浇筑钢筋混凝土拱圈时，纵向采用通长钢筋','间隔槽，宽度宜为0.5～1m'],ans:2,exp:'正确答案为C。分段浇筑钢筋混凝土拱圈时，纵向采用通长钢筋。详见教材对应章节。'},
{id:351,ch:2,type:'multi',q:'装配式桁架拱安装，正确的是（）',opts:['装配式桁架拱可采用卧式预制拱片','大跨径桁式组合拱，应设置拱顶湿接头','湿接头混凝土，和构件混凝土强度等级一致','湿接头混凝土，宜为缓凝混凝土','安装过程中应采用全站仪，对拱肋、拱圈的挠度和等项目进行观测'],ans:[0,1,4],exp:'(1)装配式桁架拱、刚构拱采用卧式预制拱片时，为防止拱片在起吊过程中产生扭折，起吊时必须将全片水平吊起后，再悬空翻身竖立。在拱片悬空翻身整个过程中，各吊点受力应均匀，并始终保持在同一平面内，不得扭转。 (2)大跨径桁式组合拱，拱顶湿接头混凝土，宜采用较构件混凝土强度等级高一级的早强混凝土。'},
{id:352,ch:2,type:'single',q:'钢管混凝土拱施工流程正确的是（）',opts:['拱肋加工→拱肋安装→钢管混凝土压注→吊杆安装→桥面系施工','钢管混凝土压注→拱肋加工→拱肋安装→吊杆安装→桥面系施工','拱肋加工→拱肋安装→吊杆安装→钢管混凝土压注→桥面系施工','拱肋加工→拱肋安装→钢管混凝土压注→桥面系施工→吊杆安装'],ans:0,exp:'1)工艺流程 系梁(加劲梁)施工→钢管拱肋加工、预拼装→拱肋安装、合龙→钢管混凝土压注→ 吊杆安装→桥面系施工。'},
{id:353,ch:2,type:'multi',q:'在钢管拱肋上应设置（）',opts:['混凝土压注孔','倒流截止阀','排水孔','扣点','吊点节点板'],ans:[0,1,3,4],exp:'在钢管拱肋上应设置混凝土压注孔、倒流截止阀、排气孔及扣点、吊点节点板'},
{id:354,ch:2,type:'multi',q:'斜拉桥组成包括（）',opts:['索塔','钢索','主梁','主缆','鞍座'],ans:[0,1,2],exp:'正确答案为A、B、C。索塔、钢索、主梁。详见教材对应章节。'},
{id:355,ch:2,type:'multi',q:'悬索桥主要由（）等部分组成',opts:['主缆','锚碇','鞍座','吊索','主梁'],ans:[0,1,2,3],exp:'主要由主缆、加劲梁、主塔、鞍座、锚碇、吊索等部分组成'},
{id:356,ch:2,type:'single',q:'（ ）是连系加劲梁和主缆的纽带',opts:['主塔','主缆','锚碇','吊索'],ans:3,exp:'主缆是结构体系中的主要承重构件；通过塔顶索鞍悬挂在主塔上并锚固于两端锚固体中的柔性承重构件。 主塔是悬索桥抵抗竖向荷载的主要承重构件；支承主缆的重要构件。 加劲梁是悬索桥承受风荷载和其他横向水平力的主要构件，防止桥面发生过大的挠曲变形和扭曲变形，主要承受弯曲内力。 锚碇是锚固主缆的结构，它将主缆中的拉力传递给地基。'},
{id:357,ch:2,type:'single',q:'桥面防水中，基层要求错误的是（）',opts:['基层混凝土强度应达到设计强度的80%以上，方可进行防水层施工','采用防水卷材时，基层混凝土表面的粗糙度应为1.5～2.0mm','防水材料为卷材及聚氨酯涂料时，基层混凝土的含水率应大于4%','基层混凝土表面粗糙度处理宜采用抛丸打磨'],ans:2,exp:'正确答案为C。防水材料为卷材及聚氨酯涂料时，基层混凝土的含水率应大于4%。详见教材对应章节。'},
{id:358,ch:2,type:'single',q:'关于桥梁卷材防水层铺设的说法，正确的是（ ）。',opts:['卷材铺设应先大面积展开，再进行节点、转角等局部处理','铺设防水卷材时，环境气温和卷材温度应高于0℃','任何区域的卷材不得多于3层，搭接接头应错开500mm以上','卷材展开方向应与车辆运行方向垂直'],ans:2,exp:'正确答案为C。任何区域的卷材不得多于3层，搭接接头应错开500mm以上。详见教材对应章节。'},
{id:359,ch:2,type:'multi',q:'关于防水卷材铺设施工技术，正确的有（ ）。',opts:['热熔法施工时，应防止烧熔胎体','热熔法搭接缝部位应将热熔的改性沥青挤压溢出，溢出宽度约20mm','采用热熔胶法时，搭接部位的接缝应涂满热熔胶并辊压牢固','铺设自粘性防水卷材时，可不撕除底面隔离纸直接铺贴','卷材储运保管应按规范规定执行'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。热熔法施工时，应防止烧熔胎体、热熔法搭接缝部位应将热熔的改性沥青挤压溢出，溢出宽度约20mm、采用热熔胶法时，搭接部位的接缝应涂满热熔胶并辊压牢固、卷材储运保管应按规范规定执行。详见教材对应章节。'},
{id:360,ch:2,type:'multi',q:'关于桥面防水涂料施工技术，正确的有（ ）。',opts:['风力大于或等于5级时严禁施工','聚合物改性沥青热熔型防水涂料施工环境气温不宜低于-10℃','防水涂料宜多遍涂布，待前一遍干燥成膜后方可涂布后一遍','胎体增强材料应顺桥面行车方向铺贴，自最高处开始向低处铺贴','采用两层胎体增强材料时，搭接缝应错开，间距不应小于幅宽的1/2'],ans:[0,1,2],exp:'正确答案为A、B、C。风力大于或等于5级时严禁施工、聚合物改性沥青热熔型防水涂料施工环境气温不宜低于-10℃、防水涂料宜多遍涂布，待前一遍干燥成膜后方可涂布后一遍。详见教材对应章节。'},
{id:361,ch:2,type:'single',q:'城市快速路、主干路桥梁桥面铺装大多数采用 沥青混凝土，一般为（）层',opts:['一','两','三','四'],ans:1,exp:'次干路上的特大桥、大桥，桥面铺装大多数采用沥青混凝土，一般为两层。'},
{id:362,ch:2,type:'multi',q:'桥面铺装，上层为细粒式沥青混凝土具有（）',opts:['抗滑','耐磨','密实稳定','传力','承重'],ans:[0,1,2],exp:'下层为中粒式沥青混凝土，具有传力、承重作用'},
{id:363,ch:2,type:'multi',q:'桥面铺装水泥混凝土整平层，起到（）作用',opts:['保护桥面板','调整桥面标高','平整并借以敷设桥面防水层的作用','提高承载力','传力荷载作用'],ans:[0,1,2],exp:'正确答案为A、B、C。保护桥面板、调整桥面标高、平整并借以敷设桥面防水层的作用。详见教材对应章节。'},
{id:364,ch:2,type:'single',q:'关于桥梁伸缩装置的说法，正确的是（ ）。',opts:['伸缩装置仅需在平行于桥梁轴线方向自由伸缩','设置伸缩缝处，栏杆与桥面铺装均应断开','伸缩装置只需满足车辆通行要求，无需考虑防水','伸缩缝仅设置在两梁端之间，梁端与桥台之间无需设置'],ans:1,exp:'正确答案为B。设置伸缩缝处，栏杆与桥面铺装均应断开。详见教材对应章节。'},
{id:365,ch:2,type:'multi',q:'关于桥梁伸缩装置性能要求，正确的有（ ）。',opts:['伸缩装置应适应桥梁纵、横两向变形','当伸缩装置产生显著横向错位时，应确定平面转角要求','当伸缩装置产生显著竖向错位时，应确定竖向转角要求','伸缩装置应进行变形性能检测','伸缩装置防水性能应符合注满水12h无渗漏的要求答案：BCD'],ans:[1,2,3],exp:'正确答案为B、C、D。当伸缩装置产生显著横向错位时，应确定平面转角要求、当伸缩装置产生显著竖向错位时，应确定竖向转角要求、伸缩装置应进行变形性能检测。详见教材对应章节。'},
{id:366,ch:2,type:'single',q:'伸缩装置上桥安装前，按照安装时的气温调整安装时的定位值，并应由（  ）检查签字后方可用专用卡具将其固定。',opts:['项目负责人','技术负责人','安装负责人','质量负责人'],ans:2,exp:'正确答案为C。安装负责人。详见教材对应章节。'},
{id:367,ch:2,type:'single',q:'关于桥梁伸缩装置施工安装的说法，正确的是（ ）。',opts:['伸缩装置安装时的定位值应按设计图纸固定，无需考虑安装时气温','伸缩装置吊装就位前，预留槽内混凝土应凿毛并清扫干净','伸缩装置中心线与桥梁中心线允许有适当偏差','伸缩装置两侧预留槽混凝土初凝后即可开放交通'],ans:1,exp:'正确答案为B。伸缩装置吊装就位前，预留槽内混凝土应凿毛并清扫干净。详见教材对应章节。'},
{id:368,ch:2,type:'multi',q:'关于桥梁伸缩装置施工安装技术，正确的有（ ）。',opts:['安装前应核对预埋锚固钢筋的规格、数量及位置','安装前应按安装时气温调整定位值，并用专用卡具固定','吊装时应按厂家标明的吊点位置起吊','伸缩装置锚固钢筋与桥梁预埋钢筋应采用绑扎连接','浇筑预留槽混凝土前，用泡沫塑料填塞伸缩缝间隙'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。安装前应核对预埋锚固钢筋的规格、数量及位置、安装前应按安装时气温调整定位值，并用专用卡具固定、吊装时应按厂家标明的吊点位置起吊、浇筑预留槽混凝土前，用泡沫塑料填塞伸缩缝间隙。详见教材对应章节。'},
{id:369,ch:2,type:'multi',q:'关于桥梁防护设施施工技术要求，下列说法正确的有（ ）',opts:['栏杆线形应流畅平顺，伸缩缝应与主梁伸缩缝对应','预制构件安装时可采用M15水泥砂浆','金属栏杆焊接后应及时除锈防腐','防护网宜在桥面铺装前安装','防撞墩应与桥面预埋件连接牢固'],ans:[0,2,4],exp:'B选项错误，应采用M20砂浆； D选项错误，防护网应在铺装后安装。'},
{id:370,ch:2,type:'single',q:'关于桥梁隔声障安装的说法，正确的是（ ）。',opts:['隔声障加工模数宜由桥梁全长而定','隔声障在伸缩缝部位应断开，不得连续安装','隔声障安装可在6级大风天气下进行','安装时应在伸缩缝一侧端部设置控制点，依序安装'],ans:3,exp:'正确答案为D。安装时应在伸缩缝一侧端部设置控制点，依序安装。详见教材对应章节。'},
{id:371,ch:2,type:'multi',q:'用作人行通道或车行道的涵洞有（）',opts:['小型断面涵洞','管涵','箱涵','盖板涵','拱形涵'],ans:[2,3,4],exp:'正确答案为C、D、E。箱涵、盖板涵、拱形涵。详见教材对应章节。'},
{id:372,ch:2,type:'single',q:'管涵施工过程中，应设置沉降缝的位置是（  ）A.管节接缝处',opts:['顶部弧形处','管座处','出水口处'],ans:0,exp:'正确答案为A。顶部弧形处。详见教材对应章节。'},
{id:373,ch:2,type:'single',q:'箱涵顶进施工流程中，顶进设备安装的紧后工艺流程是（  ）。',opts:['既有线加固','箱涵试顶','吃土顶进','监控量测'],ans:0,exp:'箱涵顶进工艺流程：现场调查→工程降水→工作坑开挖→后背制作→滑板制作→铺设润滑隔离层→箱涵制作→顶进设备安装→既有线加固→箱涵试顶进→吃土顶进→监控量测→箱体就位→拆除加固设施→拆除后背及顶进设备→工作坑恢复。'},
{id:374,ch:2,type:'single',q:'钢桩制作说法错误的是（  ）。',opts:['严禁露天场地制作钢桩','气割加工周围10m范围内不得堆放易燃易爆物品','操作者必须经专业培训，持证上岗','不得将数层钢板叠在一起剪切和冲裁'],ans:0,exp:'正确答案为A。严禁露天场地制作钢桩。详见教材对应章节。'},
{id:375,ch:2,type:'multi',q:'沉入桩的吊运、堆放正确的是（  ）。',opts:['吊装应由具有吊装施工经验的信号工主持','吊装作业必须由施工技术人员指挥','混凝土桩支点应与吊点在一条竖直线上','钢桩堆放层数不得超过4层','预制混凝土桩起吊时的强度应符合设计要求，设计无要求时，混凝土应不小于设计强度的75%'],ans:[2,4],exp:'①吊装应由具有吊装施工经验的施工技术人员主持。吊装作业必须由信号工指挥。 ② 预制混凝土桩起吊时的强度应符合设计要求，设计无要求时，混凝土应不小于设计强度的75%。 ③ 桩的吊点位置应符合设计或施工组织设计要求。 ④ 桩的堆放场地应平整、坚实、不积水。混凝土桩支点应与吊点在一条竖直线上，堆放时应上下对准，堆放层数不宜超过4层。钢桩堆放支点应布置合理，防止变形，并 应采取防滚动措施，堆放层数不得超过3层。'},
{id:376,ch:2,type:'multi',q:'跨径较大的箱涵加固措施有（  ）。',opts:['调轨梁','轨束梁','横梁加盖','纵横梁加固','工字轨束梁'],ans:[2,3,4],exp:'小型箱涵，可采用调轨梁或轨束梁的加固法。 大型箱涵，可用横梁加盖、纵横梁加固、工字轨束梁或钢板脱壳法'},
{id:377,ch:2,type:'multi',q:'大体积承台混凝土施工时，应采取（  ）等措施优化混凝土配合比。',opts:['优先采用水化热较高的水泥','充分利用混凝土的中后期强度，尽可能提高水泥用量','增大含泥量大','控制好混凝土坍落度，不宜大于180mm','选用合适的缓凝、减水等外加剂'],ans:[3,4],exp:'如果含泥量大的话，不仅会增加混凝土的收缩，而且会引起混凝土抗拉强度的降低，对混凝土抗裂不利'},
{id:378,ch:2,type:'single',q:'关于桥梁砌体砌筑施工的说法，正确的是（ ）。',opts:['砌筑用石料应干燥洁净，不得提前湿润','砌筑墩台镶面石应从直线部分开始，按顺序排列','砌体勾缝应在砌筑施工完成并经检验合格后进行','勾缝施工应按从下至上的顺序进行'],ans:2,exp:'正确答案为C。砌体勾缝应在砌筑施工完成并经检验合格后进行。详见教材对应章节。'},
{id:379,ch:2,type:'multi',q:'关于桥梁支座安装施工技术，正确的有（ ）。',opts:['支座垫石混凝土的强度必须符合设计要求','支座安装后不得偏斜、脱空、不均匀受力','活动支座滑移面上的聚四氟乙烯滑板和不锈钢板可有轻微划痕','支座就位后，垫石和支座上的纵横向中心十字线应对准','调整支座顶面高程时，应采用钢垫片支垫，空隙用环氧树脂砂浆填充密实'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。支座垫石混凝土的强度必须符合设计要求、支座安装后不得偏斜、脱空、不均匀受力、支座就位后，垫石和支座上的纵横向中心十字线应对准、调整支座顶面高程时，应采用钢垫片支垫，空隙用环氧树脂砂浆填充密实。详见教材对应章节。'},
{id:380,ch:3,type:'single',q:'在城市软弱围岩地层中，采用浅埋暗挖法施工时，下列（ ）措施是控制地表沉降的关键？',opts:['采用大型挖掘机快速开挖','按照“管超前、严注浆、短开挖、强支护、快封闭、勤量测”的方针施工','增加爆破作业频率以提高效率','采用敞口放坡明挖法减少支护'],ans:1,exp:'正确答案为B。按照“管超前、严注浆、短开挖、强支护、快封闭、勤量测”的方针施工。详见教材对应章节。'},
{id:381,ch:3,type:'multi',q:'TBM法作业过程包括（）',opts:['岩石破碎','出渣','支护','钻孔','爆破'],ans:[0,1,2],exp:'正确答案为A、B、C。岩石破碎、出渣、支护。详见教材对应章节。'},
{id:382,ch:3,type:'multi',q:'关于城市隧道施工方法，下列描述正确的有（ ）。',opts:['明挖法为埋深较浅、地质条件较差的首选方法','盾构法适用于各种水文地质条件，包括软土、硬岩及地下水丰富的土层','TBM法适用于全断面岩石隧道掘进，具有连续作业、机械化程度高的特点','钻爆法仅适用于无地下水且围岩稳定的隧道施工','浅埋暗挖法初期支护通常采用钢筋格栅和喷射混凝土'],ans:[1,2,4],exp:'A错误：明挖法适用于埋深较浅、场地开阔的工程，但地质条件较差时需加强支护，并非首选。 D错误：钻爆法可通过降水等措施用于有地下水的地层。'},
{id:383,ch:3,type:'single',q:'在浅埋暗挖法施工中，关于初期支护的主要作用，下列描述正确的是（ ）。',opts:['主要用于装饰隧道内表面，提高美观性','加固围岩，控制围岩变形，防止松动失稳','仅用于支撑模板台车，方便二次衬砌施工','替代防水层，防止地下水渗入隧道'],ans:1,exp:'正确答案为B。加固围岩，控制围岩变形，防止松动失稳。详见教材对应章节。'},
{id:384,ch:3,type:'multi',q:'关于浅埋暗挖法隧道施工的复合式衬砌结构，下列说法正确的有（ ）。',opts:['初期支护通常由钢格栅、喷射混凝土等组成，需与围岩密贴','二次衬砌施工应在初期支护变形完全停止后进行','防水层应设置在初期支护与二次衬砌之间','超前支护可采用管棚或小导管注浆加固地层','二次衬砌模板一般采用移动式模板台车，以提高施工效率'],ans:[0,2,3,4],exp:'B错误：二次衬砌应在初期支护变形基本稳定（而非完全停止）且防水验收合格后进行。'},
{id:385,ch:3,type:'multi',q:'城市隧道结构由（）四部分组成',opts:['围岩','支护','洞门','附属设施','车站'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。围岩、支护、洞门、附属设施。详见教材对应章节。'},
{id:386,ch:3,type:'multi',q:'复合式衬砌结构包括（）',opts:['初期支护','防水层','二次衬砌','预支护','预加固'],ans:[0,1,2],exp:'正确答案为A、B、C。初期支护、防水层、二次衬砌。详见教材对应章节。'},
{id:387,ch:3,type:'multi',q:'地铁车站结构横断面，下列说法正确的是（）',opts:['矩形','卵形','拱形','圆形','椭圆形'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。矩形、拱形、圆形、椭圆形。详见教材对应章节。'},
{id:388,ch:3,type:'single',q:'关于地铁车站的组成，下列说法正确的是（ ）。',opts:['车站主体包括站台和站厅，不包括设备用房','出入口及通道的主要功能是提供列车停靠和检修','通风道及地面通风亭的作用是维持车站空气质量','冷却塔属于车站主体的一部分'],ans:2,exp:'A错误：车站主体包括站台、站厅、设备用房和生活用房。 B错误：出入口及通道是供乘客进出车站的建筑设施，而非列车停靠或检修。 D错误：冷却塔属于附属建筑物，而非车站主体。'},
{id:389,ch:3,type:'multi',q:'关于地铁车站的功能分区，下列说法正确的有（ ）。',opts:['站台是供乘客候车、上下车的场所','通风道及风亭属于车站主体的一部分','设备用房主要用于设置运营设备和办理运营业务','出入口及通道包括人行天桥，供乘客进出车站','冷却塔通常设置在车站主体内部'],ans:[0,2,3],exp:'B错误：通风道及风亭属于附属建筑物，而非车站主体。 E错误：冷却塔属于附属建筑物，通常设置在地面，而非车站主体内部。'},
{id:390,ch:3,type:'single',q:'交通不能中断且必须确保一定交通流量的情况下，可选用（）施工',opts:['浅埋暗挖','盾构法','盖挖法','明挖法'],ans:2,exp:'正确答案为C。盖挖法。详见教材对应章节。'},
{id:391,ch:3,type:'multi',q:'关于地铁施工方法的选择，说法正确的是（）',opts:['明挖法施工速度快且造价较低，适合场地开阔、建筑物稀少的区域','盖挖法适用于城市交通繁忙且不能中断的地段','浅埋暗挖法对地层适应性较弱，仅适用于地质条件良好的区域','浅埋暗挖法适用于地面建筑物密集、对地面沉降要求严格的地区','盾构法在所有地质条件下都是最优的地铁施工方案'],ans:[0,1,3],exp:'C错误：浅埋暗挖法对地层适应性较强而非较弱； E错误：盾构法并非在所有地质条件下都是最优方案，需根据具体情况选择。'},
{id:392,ch:3,type:'single',q:'关于盖挖顺作法的施工特点，说法正确的是（ ）。',opts:['施工过程中完全不需要临时路面结构','围护结构只能采用地下连续墙','主体结构施工顺序是从下至上施作底板、边墙和顶板','可以使用大型机械进行土方开挖'],ans:2,exp:'A错误：盖挖顺作法需要设置临时路面结构维持交通； B错误：围护结构可根据条件选择灌注桩或地下连续墙； D错误：受盖板限制无法使用大型机械。'},
{id:393,ch:3,type:'multi',q:'关于盖挖顺作法的施工技术要点，下列描述正确的有（ ）。',opts:['临时路面一般由型钢纵、横梁和路面板组成','在饱和软弱地层中，地下连续墙是首选的围护结构','围护结构常作为主体结构边墙的一部分或全部','施工过程中可以完全避免对地面交通的影响','土方开挖需采用特殊的小型、高效机具'],ans:[0,1,2,4],exp:'D错误：施工仍会对交通造成一定影响，只是通过临时路面减小影响'},
{id:394,ch:3,type:'multi',q:'关于联络通道，下列说法错误的（  ）',opts:['两条单线区间隧道应设联络通道','相邻两个联络通道之间的距离不应大于500m','联络通道内应设并列反向开启的甲级防火门','联络通道长度一般为10m','在区间线路最低点处设置废水泵房(集水井)'],ans:[1,3],exp:'相邻两个联络通道之间的距离不应大于600m 联络通道长度一般为5～9m'},
{id:395,ch:3,type:'multi',q:'关于集水明排，下列说法正确的是（  ）',opts:['当基坑、沟槽开挖较浅，涌水量不大时采用','集水明排法应用不是很广泛，主要是小基坑','是最简单、经济的方法','必须在基坑、沟槽的两侧设置排水明沟','每隔30～50m设置集水井'],ans:[0,2],exp:'正确答案为A、C。当基坑、沟槽开挖较浅，涌水量不大时采用、是最简单、经济的方法。详见教材对应章节。'},
{id:396,ch:3,type:'multi',q:'降水深度18m，可选择（  ）方法',opts:['真空井点','喷射井点','管井','电渗井','辐射井'],ans:[1,2,4],exp:'正确答案为B、C、E。喷射井点、管井、辐射井。详见教材对应章节。'},
{id:397,ch:3,type:'single',q:'土质类别淤泥质黏土，可采用（ ）降水方法。',opts:['真空井点','喷射井点','管井','电渗井'],ans:3,exp:'正确答案为D。电渗井。详见教材对应章节。'},
{id:398,ch:3,type:'multi',q:'隔水帷幕按布置方式分为（  ）',opts:['悬挂式竖向隔水帷幕','落底式竖向隔水帷幕','水平向隔水帷幕','独立式隔水帷幕','嵌入式隔水帷幕'],ans:[0,1,2],exp:'正确答案为A、B、C。悬挂式竖向隔水帷幕、落底式竖向隔水帷幕、水平向隔水帷幕。详见教材对应章节。'},
{id:399,ch:3,type:'multi',q:'隔水帷幕按施工方法可采用（  ）。',opts:['水泥土搅拌桩隔水帷幕','地下连续墙隔水帷幕','咬合式排桩隔水帷幕','钻孔灌注桩隔水帷幕','钢板桩隔水帷幕'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。水泥土搅拌桩隔水帷幕、地下连续墙隔水帷幕、咬合式排桩隔水帷幕、钢板桩隔水帷幕。详见教材对应章节。'},
{id:400,ch:3,type:'multi',q:'地连墙隔水帷幕，说法正确的（  ）。',opts:['适用于除岩溶外的各类岩土','施工技术简单易行','造价高','泥浆不易造成现场污染','安全性差'],ans:[0,2],exp:'正确答案为A、C。适用于除岩溶外的各类岩土、造价高。详见教材对应章节。'},
{id:401,ch:3,type:'multi',q:'地下水回灌宜采用（  ）方法',opts:['管井回灌','大口井回灌','重力回灌','真空回灌','压力回灌'],ans:[0,1],exp:'地下水回灌方式包括重力回灌、真空回灌、压力回灌'},
{id:402,ch:3,type:'multi',q:'地下水回灌的技术要求，下列描述正确的有（ ）',opts:['降水工程影响周边环境安全时可进行回灌','回灌首选同层地下水回灌','非同层回灌时水质不应低于目标含水层水质','回灌必须采取防止恶化地下水水质的措施','回灌水源水质必须达到饮用水标准才能进行回灌'],ans:[0,1,2,3],exp:'E错误：只有与饮用地下水联系紧密时才需达到饮用水标准；'},
{id:403,ch:3,type:'single',q:'降水系统布设，说法正确的（  ）。',opts:['面状降水工程，降水井点宜沿降水区域周边呈封闭状均匀布置，距开挖上口边线不宜小于1m','线状、条状降水工程，降水井宜采用单排或双排布置，降水井与基坑边缘齐平','在运土通道出口两侧应减少降水井','当降水区域远离补给边界，地下水流速较小时，降水井点宜加密布置'],ans:0,exp:'1)降水系统布设 (1)降水系统平面布置应根据工程的平面形状、场地条件及建筑条件确定，并应 符合下列要求： ① 面状降水工程，降水井点宜沿降水区域周边呈封闭状均匀布置，距开挖上口边线不宜小于1m。 ② 线状、条状降水工程，降水井宜采用单排或双排布置，两端应外延布置降水井，外延长度为条状或线状降水井点围合区域宽度的1～2倍。 ③ 降水井点围合区域宽度大于单井降水影响半径或采用隔水帷幕的工程，应在围合区域内增设降水井或疏干井。 ④ 在运土通道出口两侧应增设降水井。 ⑤ 当降水区域远离补给边界，地下水流速较小时，降水井点宜等间距布置，当邻近补给边界，地下水流速较大时，在地下水补给方向的降水井点间距可适当减小。 ⑥ 对于多层含水层降水宜分层布置降水井点，当确定上层含水层地下水不会造成 下层含水层地下水污染时，可利用一个井点降低多层地下水水位。'},
{id:404,ch:3,type:'multi',q:'关于集水明排说法正确的是（  ）',opts:['明沟宜布置在拟建工程基础边0.3m以外','沟边缘离开边坡坡脚应不小于0.4m','明沟的底面应比挖土面低0.3～0.4m','集水井底面应比沟底面低0.5m以上','明沟的坡度不宜小于3%'],ans:[2,3],exp:'(1)明沟宜布置在拟建工程基础边0.5m以外， 沟边缘离开边坡坡脚应不小于0.3m。 明沟的底面应比挖土面低0.3～0.4m， 集水井底面应比沟底面低0.5m以上，并随基坑的 挖深而加深，以保持水流畅通。 明沟的坡度不宜小于0.3%,沟底应采取防渗措施。'},
{id:405,ch:3,type:'multi',q:'真空井点布设，说法正确的（  ）。',opts:['降水深度不超过6.0m时宜采用单级真空井点','降水深度大于6.0m，采用多级真空井点降水','多级井点上下级高差宜取6.0m','井点间距宜为0.8～2.0m, 距开挖上口线的距离不应小于1.0m','降水区域四角位置井点宜加密'],ans:[0,3,4],exp:'① 当真空井点孔口至设计降水水位的深度不超过6.0m时宜采用单级真空井点；当大于6.0m且场地条件允许时，可采用多级真空井点降水，多级井点上下级高差宜取4.0～5.0m。 ③ 井点间距宜为0.8～2.0m, 距开挖上口线的距离不应小于1.0m; 集水总管宜沿抽水水流方向布设，坡度宜为0.25%～0.5%。 ④降水区域四角位置井点宜加密。'},
{id:406,ch:3,type:'multi',q:'关于水平或倾斜井点的适用条件，下列描述正确的有（ ）。',opts:['适用于降水区域场地狭小的情况','适用于涵洞工程施工降水','适用于地下暗挖工程降水','适用于水下降水工程','适用于所有类型的地下水降水工程'],ans:[0,1,2,3],exp:'⑤ 降水区域场地狭小或遇有涵洞工程、地下暗挖工程、水下降水工程时，可布设 水平、倾斜井点。'},
{id:407,ch:3,type:'multi',q:'压力注浆法帷幕,说法错误的是（  ）。',opts:['注浆宜按隔一孔或多孔的顺序进行','地下水流速较大时，应从水头高的一端开始注浆','渗透系数变化较小的地层，应先注浆封顶，后自上而下注浆','浆液宜采用普通硅酸盐水泥','对先序注浆孔采取定压注浆，对后续注浆孔采取定量注浆'],ans:[2,4],exp:'(2)对渗透系数变化较小的地层，应先注浆封顶，后自下而上注浆，防止浆液上冒； 对渗透系数随深度加深而增大的地层，则应自下而上注浆；对互层地层，应先对渗透系数或孔隙率大的地层注浆。 (3)注浆用水pH值不得小于4,浆液宜采用普通硅酸盐水泥，可掺入速凝剂、防析水剂、水玻璃等进行多液注浆。 (4)采用定量、定压结合方式注浆，对先序注浆孔采取定量注浆，对后续注浆孔 采取定压注浆。 (5)双液注浆时应使用单向阀的浆液混合器，严禁采用三通阀门；注浆结束时应先停水玻璃浆液泵，后停水泥浆液泵。'},
{id:408,ch:3,type:'multi',q:'井点系统的平面布置包括（  ）。',opts:['环形','U形','L形','单排','双排'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。环形、U形、单排、双排。详见教材对应章节。'},
{id:409,ch:3,type:'single',q:'管井施工下列要求错误的是（  ）。',opts:['管井施工可根据地层条件选用冲击钻成孔','井管宜高出地表200mm以上','单井完成后应及时洗井，洗井后应安装水泵进行单井试抽','单井、排水管网安装完成后，方可投入正式降水运行'],ans:3,exp:'单井、排水管网安装完成后应及时进行联网试运行，试运行合格后方可投入正式降水运行。'},
{id:410,ch:3,type:'multi',q:'地下水控制工程，监测包括（ ）。',opts:['地下水位监测','出水量','含砂量监测','水温监测','水质监测'],ans:[0,1,2,4],exp:'监测主要包括：地下水位监测、出水量和含砂量监测、水质监测、变形监测、巡视检查等内容。'},
{id:411,ch:3,type:'single',q:'关于基坑放坡，说法错误的是（）',opts:['边坡土体中剪应力小于土体的抗剪强度时，边坡就会失稳坍塌','放坡设计与施工时应考虑雨水的不利影响','应优先采取坡率法控制边坡的高度和坡度','边坡可分为一级放坡和分级放坡两种形式'],ans:0,exp:'当基坑边坡土体中的剪应力大于土体的抗剪强度时，边坡就会失稳坍塌'},
{id:412,ch:3,type:'multi',q:'关于分级放坡，说法错误的是（）',opts:['宜设置分级过渡平台','分级过渡平台的宽度应根据土(岩)质条件、放坡高度及施工场地条件确定','过渡平台的宽度，岩石边坡不宜小于0.5m','过渡平台的宽度，土质边坡不宜小于0.8m','上级放坡坡度宜缓于下级放坡坡度'],ans:[3,4],exp:'土质边坡不宜小于1.0m'},
{id:413,ch:3,type:'multi',q:'当边坡有失稳迹象时，有效措施包括（ ）。',opts:['停止降水','削坡','坡顶加载','坡脚压载','土体置换'],ans:[1,3],exp:'采取削坡、坡顶卸荷、坡脚压载或其他有效措施'},
{id:414,ch:3,type:'multi',q:'放坡开挖对坡脚、坡面常用的防护措施有（ ）。',opts:['叠放砂包或土袋','水泥砂浆或细石混凝土抹面','施作围护结构','锚杆喷射混凝土护面','土工织物覆盖坡面'],ans:[0,1,3,4],exp:'还有挂网喷浆或混凝土、塑料膜覆盖坡面'},
{id:415,ch:3,type:'single',q:'坡高小于5m的坚硬黏性土，坡率允许值是（ ）。',opts:['1:0.35～1:0.50','1:0.50～1:0.75','1:0.75～1:1.00','1:1.00～1:1.25'],ans:2,exp:'正确答案为C。1:0.75～1:1.00。详见教材对应章节。'},
{id:416,ch:3,type:'single',q:'土钉墙支护，说法错误的是（）',opts:['土钉墙是一种经济、简便、施工快速、无须大型施工设备的基坑支护形式','适应于地下水位以上或降水的非软土基坑','基坑潜在滑动面内有建筑物、重要地下管线时，不可采用土钉墙','基坑较深、土的抗剪强度较低时，宜取较大坡比'],ans:3,exp:'正确答案为D。基坑较深、土的抗剪强度较低时，宜取较大坡比。详见教材对应章节。'},
{id:417,ch:3,type:'multi',q:'成孔注浆型钢筋土钉构造，下列错误的有（ ）。',opts:['成孔直径宜取70～120mm','土钉钢筋直径宜取16～32mm','应沿土钉全长设置对中定位支架','土钉孔注浆材料必须采用水泥浆','土钉孔注浆材料水泥浆，其强度不宜低于15MPa'],ans:[3,4],exp:'(2)成孔注浆型钢筋土钉的构造应符合下列要求 ①成孔直径宜取70～120mm。 ②土钉钢筋直径宜取16～32mm。 ③应沿土钉全长设置对中定位支架，其间距宜取 1.5～2.5m, 土钉钢筋保护层厚度不宜小于20mm。 ④土钉孔注浆材料可采用水泥浆或水泥砂浆，其强度不宜低于20MPa。'},
{id:418,ch:3,type:'multi',q:'用预应力锚杆复合土钉墙时，说法错误的是（）',opts:['宜采用钢绞线锚杆','预应力锚杆应设置自由段','自由段长度不应超过土钉墙坡体的潜在滑动面','锚杆与喷射混凝土面层之间设置冠梁连接','注浆时将注浆管插至孔底并由孔底注浆'],ans:[2,3],exp:'(3)采用预应力锚杆复合土钉墙时，预应力锚杆符合下列要求 ①宜采用钢绞线锚杆。 ②预应力锚杆应设置自由段，自由段长度应超过土钉墙坡体的潜在滑动面。 ③锚杆与喷射混凝土面层之间设置腰梁连接，腰梁与喷射混凝土面层应紧密接触。 ④注浆时将注浆管插至孔底并由孔底注浆，且注浆管端部至孔底的距离不宜大于200mm; 注浆及拔管时，注浆管出浆口应始终埋入注浆液面内，应在新鲜浆液从孔口溢出后停止注浆；注浆后，当浆液液面下降时，应进行补浆。'},
{id:419,ch:3,type:'multi',q:'关于地铁车站长条形基坑纵向放坡的施工要求，下列说法正确的是（ ）',opts:['纵向边坡是动态变化的，施工中容易被忽视','纵向边坡坍塌可能导致基坑整体失稳','软土地区降雨会使土坡安全系数显著降低','边坡越陡，坑外地表差异沉降越小','对于需要保护的邻近管线或建筑，应减缓该处坡度'],ans:[0,1,2,4],exp:'D错误：应为"边坡越缓，沉降曲线越平缓"'},
{id:420,ch:3,type:'single',q:'关于预制混凝土板桩的特点，下列错误的是（ ）',opts:['施工对机械要求较高','桩间接缝效果较差','存在挤土现象','不适合大深度基坑'],ans:1,exp:'桩间采用槽榫接合方式，接缝效果较好。'},
{id:421,ch:3,type:'single',q:'关于钢板桩的特点，下列（ ）正确的是',opts:['刚度大，变形小，适合单独使用','施工过程完全无噪声污染','在软弱土层中需与多道支撑结合使用','使用过程中无需考虑防水问题'],ans:2,exp:'A错误：刚度小，变形大； B错误：施工噪声较大； D错误：如有漏水现象，需增加防水措施。'},
{id:422,ch:3,type:'multi',q:'关于SMW工法桩的技术特点，说法正确的是（ ）',opts:['桩体结构强度较高','具有良好的防水止水性能','型钢构件可回收利用','特别适合在坚硬岩层中使用','在软土地层应用时需注意控制变形'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。桩体结构强度较高、具有良好的防水止水性能、型钢构件可回收利用、在软土地层应用时需注意控制变形。详见教材对应章节。'},
{id:423,ch:3,type:'multi',q:'关于SMW工法桩，说法正确的有（  ）。',opts:['一种劲性复合围护结构','软弱的土中，水泥用量宜适当减少','在砂性土中搅拌桩施工宜外加膨润土','单根型钢中焊接接头不宜超过一个','焊接接头的位置应避免设在支撑位置'],ans:[0,2,4],exp:'在填土、淤泥质土等特别软弱的土中以及在较硬的砂性土、砂砾土中，钻进速度较慢时，水泥用量宜适当提高。在砂性土中搅拌桩施工宜外加膨润土。'},
{id:424,ch:3,type:'multi',q:'下列符合围护结构咬合桩的是（）',opts:['配筋率较低','受力整体性好','施工灵活','需有防水措施相配合','不能做止水帷幕'],ans:[0,1,2],exp:'正确答案为A、B、C。配筋率较低、受力整体性好、施工灵活。详见教材对应章节。'},
{id:425,ch:3,type:'multi',q:'常用钢筋混凝土板桩截面的形式有（）',opts:['矩形','T形','工字形','口字形','H形'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。矩形、T形、工字形、口字形。详见教材对应章节。'},
{id:426,ch:3,type:'multi',q:'下列地铁基坑围护结构中，止水性好的有（  ）。',opts:['拉森钢板桩','SMW工法桩','灌注桩','地下连续墙','水泥土搅拌桩挡墙'],ans:[0,1,3,4],exp:'选项A：钢板桩强度高，桩与桩之间的连接紧密，隔水效果好。板桩的形式有多种，拉森型是最常用的； 选项B：SMW工法桩强度大，止水性好； 选项C：灌注桩需降水或和止水措施配合使用； 选项D：地下连续墙强度大，变位小，隔水性好，同时可兼作主体结构的一部分； 选项E：水泥土搅拌桩挡墙无支撑，墙体止水性好，造价低'},
{id:427,ch:3,type:'single',q:'地下连续墙作业，泥浆的作用（  ）',opts:['控制挖槽精度','提高导墙承载力','保证槽壁的稳定','阻挡水土压力'],ans:2,exp:'正确答案为C。保证槽壁的稳定。详见教材对应章节。'},
{id:428,ch:3,type:'multi',q:'地连墙作业，泥浆（  ）性能指标进行检验',opts:['相对密度','黏度','含砂率','pH值','胶体率'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。相对密度、黏度、含砂率、pH值。详见教材对应章节。'},
{id:429,ch:3,type:'multi',q:'地下连续墙作为主体地下结构外墙，且需要形成整体墙体时，地下连续墙的槽段接头宜采用（  ）',opts:['一字形穿孔钢板接头','十字形穿孔钢板接头','圆形锁口管接头','工字形钢接头','钢筋承插式接头'],ans:[0,1,4],exp:'正确答案为A、B、E。一字形穿孔钢板接头、十字形穿孔钢板接头、钢筋承插式接头。详见教材对应章节。'},
{id:430,ch:3,type:'multi',q:'下列地铁基坑围护结构中，刚度大的有（  ）。',opts:['钢板桩','板式钢管桩','灌注桩','地下连续墙','SMW工法桩'],ans:[2,3],exp:'正确答案为C、D。灌注桩、地下连续墙。详见教材对应章节。'},
{id:431,ch:3,type:'single',q:'地连墙导墙的主要作用，下列不正确的是（ ）',opts:['作为挖槽机械轨道的支承结构','维持槽内泥浆液面高于地下水位1m','永久承担地下连续墙的土压力荷载','作为测量挖槽精度和标高的基准'],ans:2,exp:'导墙是临时结构，不永久承担土压力；'},
{id:432,ch:3,type:'multi',q:'地连墙导墙的功能，下列正确的是（ ）',opts:['必须建在坚实的地基上','需要具备挡土和基准功能','要能够存蓄泥浆并稳定液面','一般采用预制混凝土结构','需满足挖槽机械的施工要求'],ans:[0,1,2,4],exp:'一般为现浇钢筋混凝土结构'},
{id:433,ch:3,type:'single',q:'现浇钢筋混凝土支撑特点的说法，正确的是（ ）。',opts:['混凝土支撑刚度小，变形大，适用于变形控制要求低的基坑','混凝土支撑浇筑后无需养护，可立即进行下一步开挖','混凝土支撑施工工期长，拆除较困难','混凝土支撑在软土地区无需对被动区进行加固处理'],ans:2,exp:'正确答案为C。混凝土支撑施工工期长，拆除较困难。详见教材对应章节。'},
{id:434,ch:3,type:'multi',q:'现浇钢筋混凝土支撑的特点是（  ）。',opts:['刚度大，变形小','混凝土硬化后强度安全，可靠性强','可周转使用','施工工期短','拆除方便'],ans:[0,1],exp:'正确答案为A、B。刚度大，变形小、混凝土硬化后强度安全，可靠性强。详见教材对应章节。'},
{id:435,ch:3,type:'multi',q:'钢结构支撑体系，平面布置有（  ）',opts:['水平撑','斜撑','对撑','井字撑','角撑'],ans:[2,3,4],exp:'正确答案为C、D、E。对撑、井字撑、角撑。详见教材对应章节。'},
{id:436,ch:3,type:'single',q:'水泥土搅拌法地基加固适用于（  ）。',opts:['障碍物较多的杂填土','欠固结的淤泥质土','饱和黏性土','密实的砂类土'],ans:2,exp:'水泥土搅拌法适用于加固淤泥、淤泥质土、素填土、黏性土（软塑和可塑）、粉土（稍密、中密）、粉细砂（稍密、中密）、中粗砂（松散、稍密）、饱和黄土等土层，不适用于含有大孤石或障碍物较多且不易清除的杂填土、欠固结的淤泥和淤泥质土、硬塑及坚硬的黏性土、密实的砂类土，以及地下水影响成桩质量的土层。'},
{id:437,ch:3,type:'multi',q:'内支撑体系的施工，正确的有（  ）',opts:['内支撑结构的施工与拆除顺序应与设计一致','必须坚持先开挖后支撑的原则','围檩与围护结构之间紧密接触，不得留有缝隙','钢支撑应按设计要求施加预压力','预加压力出现损失时，应拆除重新施加预压力'],ans:[0,2,3],exp:'正确答案为A、C、D。内支撑结构的施工与拆除顺序应与设计一致、围檩与围护结构之间紧密接触，不得留有缝隙、钢支撑应按设计要求施加预压力。详见教材对应章节。'},
{id:438,ch:3,type:'multi',q:'基坑内加固的目的主要是（  ）。',opts:['提升土体的强度和土体的侧向抗力','减少围护结构承受的主动土压力','减少围护结构位移','防止坑底土体隆起破坏','防止坑底土体渗流破坏'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。提升土体的强度和土体的侧向抗力、减少围护结构位移、防止坑底土体隆起破坏、防止坑底土体渗流破坏。详见教材对应章节。'},
{id:439,ch:3,type:'multi',q:'下列（）异常情况时，应立即停止开挖',opts:['支护结构的内力超过其设计值','围护结构或止水帷幕出现渗漏','基坑出现流土、管涌现象','围护结构发生异常声响','周围环境复杂'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。支护结构的内力超过其设计值、围护结构或止水帷幕出现渗漏、基坑出现流土、管涌现象、围护结构发生异常声响。详见教材对应章节。'},
{id:440,ch:3,type:'single',q:'关于地铁车站长条形基坑的开挖原则，下列描述正确的是（ ）',opts:['应遵循"由下而上、先开挖后支撑"的原则','兼作盾构始发井时应从中间向两端开挖','必须遵循"分段分层、由上而下、先支撑后开挖"的原则','端头井土方应平行于斜撑方向一次性开挖完成'],ans:2,exp:'A错误：与正确原则完全相反； B错误：应从两端或一端向中间开挖； D错误：应垂直于斜撑方向分层分段开挖。'},
{id:441,ch:3,type:'single',q:'基坑变形特征不包括（  ）。',opts:['土体变形','水位下降','围护结构水平变形','地表沉降'],ans:1,exp:'正确答案为B。水位下降。详见教材对应章节。'},
{id:442,ch:3,type:'single',q:'下图属于哪种加固形式（  ）',opts:['墩式加固','裙边加固','抽条加固','格栅式加固'],ans:3,exp:'正确答案为D。格栅式加固。详见教材对应章节。'},
{id:443,ch:3,type:'multi',q:'基坑的土方开挖方法包括（ ）',opts:['表层土方开挖','浅层土方开挖','深层土方开挖','全断面开挖','台阶法开挖'],ans:[1,2],exp:'正确答案为B、C。浅层土方开挖、深层土方开挖。详见教材对应章节。'},
{id:444,ch:3,type:'multi',q:'造成围护结构竖向变位的原因有（  ）。',opts:['因清孔不净有沉渣','未设支撑','开挖卸荷','围护结构下方有顶管穿越','围护结构下方有盾构穿越'],ans:[0,3,4],exp:'正确答案为A、D、E。因清孔不净有沉渣、围护结构下方有顶管穿越、围护结构下方有盾构穿越。详见教材对应章节。'},
{id:445,ch:3,type:'single',q:'适用于较浅基坑的加固处理法（  ）。',opts:['水泥土搅拌','高压喷射注浆','对地基掺入一定量的固化剂','换填材料'],ans:3,exp:'正确答案为D。换填材料。详见教材对应章节。'},
{id:446,ch:3,type:'multi',q:'地基加固采用注浆法，外加剂通常有（  ）。',opts:['固化剂','催化剂','速凝剂','缓凝剂','膨胀剂'],ans:[0,1,2,3],exp:'注浆法所用的浆液是由主剂(原材料)、溶剂(水或其他溶剂)及各种外加剂混合而成。通常所提的注浆材料是指浆液中所用的主剂。外加剂可根据在浆液中起的作用，分为固化剂、催化剂、速凝剂、缓凝剂和悬浮剂等。注浆材料有很多，其中，水泥 浆是以水泥为主的浆液，适用于岩土加固，是常用的浆液。'},
{id:447,ch:3,type:'multi',q:'适用于深基坑的加固处理法（  ）。',opts:['水泥土搅拌','高压喷射注浆','对地基掺入一定量的固化剂','换填材料','注浆'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。水泥土搅拌、高压喷射注浆、对地基掺入一定量的固化剂、注浆。详见教材对应章节。'},
{id:448,ch:3,type:'multi',q:'关于压密注浆，说法正确的是（  ）。',opts:['常用于中砂地基','黏土地基中若有适宜的排水条件也可采用','可用于非饱和的土体','只靠一般静压力难以使浆液注入土的孔隙的地层','地基土的渗透系数k<10-⁴cm/s'],ans:[0,1,2],exp:'正确答案为A、B、C。常用于中砂地基、黏土地基中若有适宜的排水条件也可采用、可用于非饱和的土体。详见教材对应章节。'},
{id:449,ch:3,type:'multi',q:'水泥土搅拌法加固形式包括（  ）。',opts:['柱状','壁状','格栅状','块状','扇状'],ans:[0,1,2,3],exp:'③ 水泥土搅拌法加固软土技术具有其独特优点： 最大限度地利用了原土；搅拌时无振动、无噪声和无污染，可在密集建筑群中进行施工，对周围原有建筑物及地下管线影响很小；根据上部结构的需要，可灵活地采用柱状、壁状、格栅状和块状等加固形式；与钢筋混凝土桩基相比，可节约钢材并降低造价。'},
{id:450,ch:3,type:'multi',q:'高压喷射基本形状有（  ）。',opts:['格栅状','块状','圆柱状','壁状','扇状'],ans:[2,3,4],exp:'正确答案为C、D、E。圆柱状、壁状、扇状。详见教材对应章节。'},

{id:483,ch:4,type:'single',q:'在污水中，主要针对水中悬浮物质的常用处理方法是（  ）。',opts:['一级处理','二级处理','三级处理','深度处理'],ans:0,exp:'4．1．3污水处理工艺 污水中有机物浓度 生物化学需氧量（BOD5）、化学需氧量（COD）、 总需氧量（TOD）、总有机碳（TOC）来表示。 污水处理根据原理分为 ①物理处理法（筛滤截留、重力分离、离心分离）； ②化学处理法（主要方式有中和、混凝、电解、氧化还原、汽提、萃取、吸附、离子交换和电渗析） ③生物化学处理法（活性污泥法、生物膜法）； 根据处理程度分为 一级处理：针对水中悬浮物质； 二级处理：去除污水中呈胶体和溶解状态的有机污染物质； 深度处理：进一步处理难降解的有机物以及可导致水体富营养化的氮、磷等可溶性无机物等。'},

{id:491,ch:4,type:'single',q:'关于场站工程地基处理方法，下列描述正确的是（ ）',opts:['水泥土搅拌桩属于换填垫层法','振冲碎石桩属于复合地基处理方法','旋喷桩不属于复合地基','注浆加固法不能用于复合地基处理'],ans:1,exp:'复合地基包括：振冲碎石桩和沉管砂石桩复合地基、水泥土搅拌桩复合地基、旋喷桩复合地基、灰土挤密桩和土挤密桩复合地基、夯实水泥土桩复合地基、水泥粉煤灰碎石桩复合地基、柱锤冲扩桩复合地基、多桩型复合地基等。'},
{id:492,ch:4,type:'single',q:'关于地基处理施工方案的内容要求，下列说法正确的是（ ）',opts:['复合地基施工方案不包含承载力检测要求','普通地基处理方案必须包含成桩工艺','施工参数是地基处理施工方案的必备内容','复合地基施工方案可不考虑材料配合比'],ans:2,exp:'地基处理的施工方案一般包括：地基处理方式的选择，材料、配合比，施工工艺和顺序，施工参数，施工机具，地基强度及承载力检验方法；口诀：采访残疾沛公强撑 地基基础为复合地基的，施工方案一般包括：成桩工艺，材料、配合比，施工参数，施工机具，承载力检测要求。'},
{id:493,ch:4,type:'single',q:'关于复合地基施工要求，下列说法正确的是（ ）',opts:['水泥土搅拌桩停浆面应低于设计桩顶标高','高压旋喷桩施工可不考虑相邻桩位间距','振冲桩施工需控制填料用量和振密电流','灰土挤密桩成孔预留覆盖土层厚度统一为0.5m'],ans:2,exp:'A选项错误，停浆面应高于设计桩顶300～500mm； B选项错误，高压旋喷桩需控制相邻桩位间距； D选项错误，预留厚度因成孔方式不同而不同，成桩预留覆盖土层厚度：沉管(锤击、振动)成孔宜为0.50～0.70m，冲击成孔宜为1.20～1.50m。'},
{id:494,ch:4,type:'multi',q:'关于高压旋喷桩施工技术，正确的有（ ）。',opts:['应控制水泥用量、压力、相邻桩位间距','应控制提升速度和旋转速度','应合理安排成桩施工顺序，并详细记录成孔情况','复喷措施仅用于扩大加固范围','复喷措施仅用于提高强度'],ans:[0,1,2],exp:'正确答案为A、B、C。应控制水泥用量、压力、相邻桩位间距、应控制提升速度和旋转速度、应合理安排成桩施工顺序，并详细记录成孔情况。详见教材对应章节。'},
{id:495,ch:4,type:'multi',q:'关于复合地基施工控制要点，下列符合规范要求的有（ ）',opts:['水泥粉煤灰碎石桩成桩顶标高宜高于设计标高500mm以上','砂桩施工需控制灌砂量和标高','高压旋喷桩可采用单喷法提高施工效率','灰土挤密桩应控制填料含水量','水泥土搅拌桩可不控制搅拌次数'],ans:[0,1,3],exp:'C选项错误，需采用复喷措施； E选项错误，需控制搅拌次数。'},
{id:496,ch:4,type:'multi',q:'工艺管线中给水排水管道越来越多采用（）PE管、球墨铸铁管等新型管材',opts:['水流性能好','抗腐蚀性高','造价低','抗地层变位性好','抗压能力强'],ans:[0,1,3],exp:'正确答案为A、B、D。水流性能好、抗腐蚀性高、抗地层变位性好。详见教材对应章节。'},
{id:497,ch:4,type:'single',q:'水处理构筑物中圆柱形混凝土池体结构，下列说法正确的是（）',opts:['池壁高度大(5～8m)时宜采用整体现浇施工','支模方法有：满堂支模法及滑升模板法','满堂支模法，模板与支架用量小','滑升模板法，宜在池壁高度不小于8m时采用'],ans:1,exp:'水处理构筑物中圆柱形混凝土池体结构，当池壁高度大(12～18m) 时宜采用整体现浇施工； 支模方法有：满堂支模法及滑升模板法，前者模板与支架用量大，后者宜在池壁高度不小于15m时采用。'},
{id:498,ch:4,type:'single',q:'整体式现浇钢筋混凝土池体结构施工流程中，底板浇筑的紧后工序是（  ）。',opts:['顶板浇筑','防水层施工','池壁及顶板支撑柱浇筑','功能性试验'],ans:2,exp:'正确答案为C。池壁及顶板支撑柱浇筑。详见教材对应章节。'},
{id:499,ch:4,type:'multi',q:'根据对污染物的去除途径不同，给水预处理方法可分为（  ）。',opts:['活性炭吸附法','吸附法','氧化法','臭氧氧化法','膜滤法'],ans:[1,2],exp:'提高饮用水水质还有预处理和深度处理工艺 预处理 氧化法 化学氧化法 ①氯气预氧化 ②高锰酸钾氧化 ③紫外光氧化 ④臭氧氧化 生物氧化法 生物膜法 吸附法 粉末活性炭吸附 黏土吸附 深度处理 ①活性炭吸附法；②臭氧氧化法； ③膜滤法（超滤、纳滤）；④光催化氧化法；'},
{id:500,ch:4,type:'single',q:'无粘结预应力封锚混凝土强度等级不得低于相应结构混凝土强度等级，且不得低于（  ）。',opts:['C40','C30','C35','C50'],ans:0,exp:'正确答案为A。C40。详见教材对应章节。'},
{id:501,ch:4,type:'single',q:'厂站工程混凝土分层浇筑厚度控制要求，正确的是（ ）',opts:['使用插入式振动器时，分层厚度不得超过振动器作用部分长度的1.5倍','采用平板振动器时，混凝土分层厚度不得超过300mm','附着式振动器的分层厚度需通过试验确定','预留孔洞周边混凝土可直接用振动器振捣无需人工辅助'],ans:2,exp:'A选项错误，应为1.25倍； B选项错误，平板振动器分层厚度≤200mm； D选项错误，预留孔洞周边需辅以人工插捣。'},
{id:502,ch:4,type:'single',q:'关于单元组合现浇混凝土水池施工，下列说法正确的是（ ）',opts:['圆形水池底板单元间应采用橡胶止水带接缝','矩形水池后浇缝带应在浇筑后28天内完成灌注','壁板单元间应采用聚氯乙烯胶泥嵌缝','后浇缝带混凝土强度应比单元混凝土高一个等级'],ans:3,exp:'正确答案为D。后浇缝带混凝土强度应比单元混凝土高一个等级。详见教材对应章节。'},
{id:503,ch:4,type:'multi',q:'关于大型水池单元组合施工技术要求，说法正确的是（ ）。',opts:['圆形水池宜采用厚扇形底板单元和倒T形壁板单元组合','矩形水池单元间钢筋必须切断以保证变形缝功能','后浇缝带可采用掺UEA的补偿收缩混凝土','后浇缝带灌注后养护时间不应少于14天','单元组合结构可有效防止池体渗漏'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。圆形水池宜采用厚扇形底板单元和倒T形壁板单元组合、后浇缝带可采用掺UEA的补偿收缩混凝土、后浇缝带灌注后养护时间不应少于14天、单元组合结构可有效防止池体渗漏。详见教材对应章节。'},
{id:504,ch:4,type:'single',q:'关于膨胀加强带的说法，正确的是（ ）。',opts:['膨胀加强带仅能采用后浇式一种形式','连续式膨胀加强带是指带内混凝土与两侧混凝土同时浇筑','膨胀加强带部位的混凝土强度等级可与两侧混凝土相同','间歇式膨胀加强带两侧均为施工缝'],ans:1,exp:'正确答案为B。连续式膨胀加强带是指带内混凝土与两侧混凝土同时浇筑。详见教材对应章节。'},
{id:505,ch:4,type:'multi',q:'关于膨胀加强带分类与技术要求，正确的有（ ）。',opts:['膨胀加强带可分为连续式、间歇式和后浇式','连续式膨胀加强带可大大缩短工期','后浇式膨胀加强带与常规后浇带浇筑方式相同','膨胀加强带部位补偿收缩混凝土强度等级应比两侧提高一个等级','间歇式膨胀加强带两侧均与相邻混凝土同时浇筑'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。膨胀加强带可分为连续式、间歇式和后浇式、连续式膨胀加强带可大大缩短工期、后浇式膨胀加强带与常规后浇带浇筑方式相同、膨胀加强带部位补偿收缩混凝土强度等级应比两侧提高一个等级。详见教材对应章节。'},
{id:506,ch:4,type:'single',q:'关于水池模板穿墙螺栓施工要求，下列说法正确的是（ ）',opts:['止水环宜采用圆形设计','螺栓拆卸后应留有40-50mm深的锥形槽','螺栓孔可用普通砂浆封堵','穿墙螺栓必须采用一次性不可拆卸型式'],ans:1,exp:'正确答案为B。螺栓拆卸后应留有40-50mm深的锥形槽。详见教材对应章节。'},
{id:507,ch:4,type:'multi',q:'关于水池模板施工技术要求，下列符合规范的有（ ）',opts:['跨度≥4m的梁板模板应按设计要求起拱','池壁模板可先安装一侧再绑钢筋','分层安装模板时每层层高不宜超过2m','预埋件安装前应清除铁锈和油污','操作窗口水平净距不宜超过1.5m'],ans:[0,1,3,4],exp:'对跨度不小于4m的现浇钢筋混凝土梁、板，其模板应按设计要求起拱；设计无具体要求时， 起拱高度宜为跨度的1/1000-3/1000。 池壁模板可先安装一侧，绑完钢筋后，分层安装另一侧模板，或采用一次安装到 顶而分层预留操作窗口的施工方法。分层安装模板，每层层高不宜超过1.5m; 分层留置的窗口其层高不宜超过3m, 水平净距不宜超过1.5m。'},
{id:508,ch:4,type:'multi',q:'关于无粘结预应力筋施工技术要求，下列符合规范的有（ ）',opts:['上下相邻两环锚固位置应错开一个锚固肋','每段预应力筋计算长度应考虑锚固肋宽度','可在混凝土浇筑后安装预应力筋','预应力筋允许有少量死弯','张拉段数量取锚固肋数量的一半'],ans:[0,1,4],exp:'正确答案为A、B、E。上下相邻两环锚固位置应错开一个锚固肋、每段预应力筋计算长度应考虑锚固肋宽度、张拉段数量取锚固肋数量的一半。详见教材对应章节。'},
{id:509,ch:4,type:'multi',q:'关于预应力筋封锚施工技术要求，下列符合要求的有（ ）',opts:['凸出式锚固端锚具保护层厚度≥50mm','外露预应力筋保护层厚度可适当减少至30mm','封锚混凝土不低于结构混凝土强度等级','封锚混凝土强度等级不得低于C40','封锚可采用低强度砂浆替代混凝土'],ans:[0,3],exp:'正确答案为A、D。凸出式锚固端锚具保护层厚度≥50mm、封锚混凝土强度等级不得低于C40。详见教材对应章节。'},
{id:510,ch:4,type:'single',q:'关于止水带安装要求，下列说法正确的是（ ）',opts:['塑料止水带接头可采用叠接方式连接','金属止水带搭接长度不得小于30mm','止水带中心线应与变形缝中心线对正','可在止水带上适当穿孔固定位置'],ans:2,exp:'正确答案为C。止水带中心线应与变形缝中心线对正。详见教材对应章节。'},
{id:511,ch:4,type:'multi',q:'关于水池施工缝设置技术要求，下列正确的有（ ）',opts:['底板与池壁连接有腋角时，施工缝可留在腋角上方','池壁与顶板连接有腋角时，施工缝可留在腋角下部','地下水位高于底板8m时宜设置3mm厚止水钢板','池壁施工缝必须设置遇水膨胀止水条','变形缝处可按缝分仓浇筑'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。底板与池壁连接有腋角时，施工缝可留在腋角上方、池壁与顶板连接有腋角时，施工缝可留在腋角下部、地下水位高于底板8m时宜设置3mm厚止水钢板、变形缝处可按缝分仓浇筑。详见教材对应章节。'},
{id:512,ch:4,type:'single',q:'满水试验标准说法错误的是（  ）。',opts:['水池渗水量计算，按池壁（不含内隔墙）和池底的浸湿面积计算','钢筋混凝士结构水池不得超过2L/（㎡·d）','砌体结构水池不得超过3L/（㎡·d）','测定的渗水量符合标准时，须连续测定三次以上'],ans:3,exp:'正确答案为D。测定的渗水量符合标准时，须连续测定三次以上。详见教材对应章节。'},
{id:513,ch:4,type:'multi',q:'水池满水试验中，池内注水的要求有（  ）。',opts:['对大、中型池体，可先注水至池壁底部施工缝以上，检查底板抗渗质量','向池内注水宜分3次进行，每次注水高度为设计水深的1/3','相邻两次注水的间隔时间不应小于24h','注水时水位上升速度不宜超过2m/d','注水至设计水位12h后，测读水位测针的初读数'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。对大、中型池体，可先注水至池壁底部施工缝以上，检查底板抗渗质量、向池内注水宜分3次进行，每次注水高度为设计水深的1/3、相邻两次注水的间隔时间不应小于24h、注水时水位上升速度不宜超过2m/d。详见教材对应章节。'},
{id:514,ch:4,type:'single',q:'联合试运行，下列说法正确的是（）',opts:['联合试运转应带负荷运行，试运转持续时间不应小于48h','连续试运行期间，开机、停机不少于2次','处理设备及泵房机组联合试运行时间，一般不少于6h','单机试车，一般空车试运行不少于2h'],ans:2,exp:'6)联合试运行 (1)联合试运转应带负荷运行，试运转持续时间不应小于72h，设备应运行正常、性能指标符合设计文件的要求。 (2)连续试运行期间，开机、停机不少于3次。 (3)处理设备及泵房机组联合试运行时间，一般不少于6h。 D选项与本题无关'},
{id:515,ch:5,type:'multi',q:'给排水管道的管材中，柔性管道有（   ）。',opts:['球墨铸铁管','钢管','钢筋混凝土管','UPVC管','PE管'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。球墨铸铁管、钢管、UPVC管、PE管。详见教材对应章节。'},
{id:516,ch:5,type:'single',q:'关于压力管道施工流程，下列说法正确的是（ ）',opts:['管道安装应在检查井砌筑完成后进行','功能性试验应在全部回填完成后进行','压力管道管节回填夯实应在功能性试验前完成','沟槽开挖后可直接进行管道基础施工'],ans:2,exp:'正确答案为C。压力管道管节回填夯实应在功能性试验前完成。详见教材对应章节。'},
{id:517,ch:5,type:'multi',q:'下列属于排水管道施工流程的有（ ）。',opts:['沟槽开挖','管道基础','管道安装','检查井砌筑','压力试验'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。沟槽开挖、管道基础、管道安装、检查井砌筑。详见教材对应章节。'},
{id:518,ch:5,type:'multi',q:'钢筋混凝土成品管，沟槽底部的开挖宽度受（ ）影响。',opts:['管外径','管道一侧的工作面宽度','管道一侧的支撑厚度','一侧模板厚度','沟槽坡度'],ans:[0,1],exp:'B=D。+2×(b₁+b₂+b₃) 式中B—管道沟槽底部的开挖宽度(mm); D—管外径(mm); b₁—管道一侧的工作面宽度(mm)； b₂—有支撑要求时，管道一侧的支撑厚度，可取150～200mm； b₃—现场浇筑混凝土或钢筋混凝土管渠一侧模板厚度(mm)。'},
{id:519,ch:5,type:'multi',q:'管道一侧的工作面宽度受下列（  ）因素影响。',opts:['管道种类','管道的外径','槽底宽度','坡度','一侧支撑厚度'],ans:[0,1],exp:'正确答案为A、B。管道种类、管道的外径。详见教材对应章节。'},
{id:520,ch:5,type:'single',q:'外径1000mm，柔性接口混凝土类管道工作面宽度（  ）。',opts:['300','400','500','600'],ans:1,exp:'管道的外径D0（mm） 管道一侧的工作面宽度b1（mm） 混凝土类管道 金属类管道 化学建材管道 D0≤500 刚性接口 400 300 柔性接口 300 500<D0≤1000 刚性接口 500 400 柔性接口 400 1000<D0≤1500 刚性接口 600 500 柔性接口 500 1500<D0≤3000 刚性接口 800～1000 700 柔性接口 600'},
{id:521,ch:5,type:'single',q:'开挖深度4m，沟槽边坡坡顶无荷载时的最陡坡度（高：宽）为1：1的是（）。',opts:['老黄土','中密碎石类土','粉质黏土','中密砂土'],ans:3,exp:'正确答案为D。中密砂土。详见教材对应章节。'},
{id:522,ch:5,type:'single',q:'相同条件下放坡开挖沟槽，可采用最陡边坡的土层是（  ）。',opts:['经井点降水后的软土','中密砂土','黏土','硬塑粉土'],ans:2,exp:'正确答案为C。黏土。详见教材对应章节。'},
{id:523,ch:5,type:'multi',q:'沟槽分层开挖及深度说法正确的是（  ）。',opts:['人工开挖沟槽的槽深超过5m时应分层开挖','每层的深度不超过2m','层间留台宽度：放坡开槽时不应小于0.5m','层间留台宽度：直槽时不应小于1.0m','安装井点设备时不应小于1.5m'],ans:[1,4],exp:'1)分层开挖及深度 (1)人工开挖沟槽的槽深超过3m时应分层开挖，每层的深度不超过2m。 (2)人工开挖多层沟槽的层间留台宽度：放坡开槽时不应小于0.8m；直槽时不应小于0.5m；安装井点设备时不应小于1.5m。 (3)采用机械挖槽时，沟槽分层的深度按机械性能确定。'},
{id:524,ch:5,type:'single',q:'关于沟槽开挖施工要求，下列说法正确的是（ ）',opts:['机械开挖应直接挖至设计标高以保证效率','槽底受水浸泡时宜采用水泥稳定碎石回填','槽底为杂填土时应全部挖除并处理','开挖深度2.5m且附近有管线时可不做支护方案'],ans:2,exp:'正确答案为C。槽底为杂填土时应全部挖除并处理。详见教材对应章节。'},
{id:525,ch:5,type:'multi',q:'沟槽开挖要求说法正确的是（  ）。',opts:['槽底原状地基土不得扰动','机械分层开挖至槽底后验收','槽底局部扰动时，宜采用天然级配砂砾石回填','槽底土层为杂填土、腐蚀性土时，应加水泥、石灰进行改良','开挖深度4m，经专家论证签字后实施'],ans:[0,2],exp:'(1)槽底原状地基土不得扰动，机械开挖时槽底预留200～300mm土层，由人工开挖至设计高程，整平。 (2)槽底不得受水浸泡或受冻，槽底局部扰动或受水浸泡时，宜采用天然级配砂砾石或石灰土回填；槽底扰动土层为湿陷性黄土时，应按设计要求进行地基处理。 (3)槽底土层为杂填土、腐蚀性土时，应全部挖除并按设计要求进行地基处理。 (6)开挖深度大于等于3m或者小于3m但槽边附近有构筑物、管道、杆线时由施工单位申报开挖支护方案经专家论证签字后实施，必要时由构筑物、管道、杆线产权单位认可后实施。'},
{id:526,ch:5,type:'single',q:'拉森钢板桩支护，施工工艺桩孔回填的紧前工作是（  ）。',opts:['施作管道基础','拉森钢板桩拔除','沟槽回填和支撑体系拆除','管道安装'],ans:1,exp:'测量→拉森钢板桩打设→沟槽开挖和支撑安装→施作管道基础→管道安装→沟槽回填和支撑体系拆除→拉森钢板桩拔除→桩孔回填。'},
{id:527,ch:5,type:'multi',q:'管道基础主要包括（  ）。',opts:['钢结构基础','软土基础','原状土地基','混凝土基础','砂石基础'],ans:[2,3,4],exp:'正确答案为C、D、E。原状土地基、混凝土基础、砂石基础。详见教材对应章节。'},
{id:528,ch:5,type:'single',q:'开槽管道工程施工中，排水不良造成地基土扰动，扰动深度在100mm以内，宜填（  ）进行地基处理。',opts:['块石','天然级配砂石','砾石','卵石'],ans:1,exp:'此题考核地基处理。排水不良造成地基土扰动时，扰动深度在100mm以内，宜填天然级配砂石或砂砾处理；扰动深度在300mm以内，但下部坚硬时，宜填卵石或块石，并用砾石填充空隙找平表面。'},
{id:529,ch:5,type:'multi',q:'原状地基为岩石或坚硬土层时，管道下方应铺设砂垫层，其厚度依据（）',opts:['管道种类','管外径','管内径','壁厚','接口方式'],ans:[0,1],exp:'正确答案为A、B。管道种类、管外径。详见教材对应章节。'},
{id:530,ch:5,type:'single',q:'检查井施工要点错误的是（）',opts:['现浇钢筋混凝土检查井的混凝土基础应与管道基础同时浇筑','排水管道接入检查井，管口外缘应与井内壁平齐','为防止渗水，在排水检查井底部墙体与水泥混凝土基础连接处，可做倒角','现浇钢筋混凝土结构井室浇筑完成后安装踏步'],ans:3,exp:'正确答案为D。现浇钢筋混凝土结构井室浇筑完成后安装踏步。详见教材对应章节。'},
{id:531,ch:5,type:'single',q:'沟槽回填要求错误的是（）',opts:['压力管道水压试验前，除接口外，管道两侧及管顶以上回填高度不应小于0.5m','水压试验合格后，应及时回填沟槽的其余部分','无压管道在闭水或闭气试验前，应全部回填完毕','部分城市要求第三方CCTV或QV检测合格'],ans:2,exp:'(1)压力管道水压试验前，除接口外，管道两侧及管顶以上回填高度不应小于0.5m。水压试验合格后，应及时回填沟槽的其余部分；无压管道在闭水或闭气试验前，除接口外可回填至胸腔，并应在试验合格后及时回填其余部分；部分城市要求第三方CCTV或QV检测合格、管道测绘完成后方可回填。'},
{id:532,ch:5,type:'single',q:'关于管道的变形率，说法正确的是（）',opts:['钢筋混凝土管道不做变形率检测','柔性管道回填至设计高程时，应在48h内测量并记录管道变形率','钢管或球墨铸铁管道变形率应不超过3%','化学建材管道变形率应不超过5%'],ans:0,exp:'(5)柔性管道回填至设计高程时，应在12～24h内测量并记录管道变形率，管道变形率应符合设计要求；当设计无要求时，钢管或球墨铸铁管道变形率应不超过2%，化学建材管道变形率应不超过3%；当超过时，需采取处理措施。'},
{id:533,ch:5,type:'single',q:'施工速度快、成本较低的不开槽管道施工方法是（   ）。',opts:['盾构法','夯管法','定向钻法','浅埋暗挖法'],ans:1,exp:'正确答案为B。夯管法。详见教材对应章节。'},
{id:534,ch:5,type:'multi',q:'不开槽管道施工方法中，适用于给水排水管道及综合管道的方法包括（   ）。',opts:['盾构法','夯管法','浅埋暗挖法','水平定向钻法','密闭式顶管法'],ans:[0,2,4],exp:'正确答案为A、C、E。盾构法、浅埋暗挖法、密闭式顶管法。详见教材对应章节。'},
{id:535,ch:5,type:'single',q:'用于穿越地面障碍的给水排水主管道工程，无降水条件且直径在3000mm以上的不开槽管道施工方法是（  ）。',opts:['盾构法','定向钻','夯管','浅埋暗挖法'],ans:0,exp:'正确答案为A。盾构法。详见教材对应章节。'},
{id:536,ch:5,type:'single',q:'非开挖施工直径800mm的混凝土污水管道，应该采用（  ）施工方法。',opts:['盾构','浅埋暗挖','密闭式顶管','夯管'],ans:2,exp:'正确答案为C。密闭式顶管。详见教材对应章节。'},
{id:537,ch:5,type:'multi',q:'管道顶进前检查内容有（ ）。',opts:['设备全部试运转','设备在轨道坡度高程','洞口密封情况','制定开封堵措施','初始顶进的参数'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。设备全部试运转、设备在轨道坡度高程、洞口密封情况、制定开封堵措施。详见教材对应章节。'},
{id:538,ch:5,type:'multi',q:'工作井、接收井常用的施工方法有（ ）。',opts:['盾构法','倒挂井壁法','明挖法','顶管法','沉井法'],ans:[1,2,4],exp:'正确答案为B、C、E。倒挂井壁法、明挖法、沉井法。详见教材对应章节。'},
{id:539,ch:5,type:'single',q:'关于沉井的说法，错误的有（ ）。',opts:['混凝土应对称、均匀、水平连续分层浇筑','混凝土强度应达到设计强度等级75%后，方可拆除模板或浇筑后节混凝土','下沉施工仅为排水下沉','沉井封底分为干封底和水下封底'],ans:2,exp:'正确答案为C。下沉施工仅为排水下沉。详见教材对应章节。'},
{id:540,ch:5,type:'multi',q:'管道顶进过程中，应遵循的原则（ ）。',opts:['勤测量','勤纠偏','微纠偏','低速','低压'],ans:[0,1,2],exp:'正确答案为A、B、C。勤测量、勤纠偏、微纠偏。详见教材对应章节。'},
{id:541,ch:5,type:'multi',q:'管道顶进水平轴线和高程测量符合（ ）要求',opts:['出顶进工作井进入土层时，每顶进300mm，测量不应少于一次','正常顶进时，每顶进500mm，测量不应少于一次','进入接收工作井前30m应增加测量','进入接收工作井前30m，每顶进100mm, 测量不应少于一次','纠偏量较大或频繁纠偏时应增加测量次'],ans:[0,2,4],exp:'③管道水平轴线和高程测量符合下列要求： a.出顶进工作井进入土层时，每顶进300mm,测量不应少于一次；正常顶进时,每顶进1000mm, 测量不应少于一次。 b.进入接收工作井前30m应增加测量，每顶进300mm, 测量不应少于一次。 c.全段顶完后，应在每个管节接口处测量其水平轴线和高程；有错口时，应测出相对高差。 d.纠偏量较大或频繁纠偏时应增加测量次数。'},
{id:542,ch:5,type:'multi',q:'必须经严密性试验合格后方可投入运行的给排水管道有（   ）。',opts:['污水、雨污水合流管道','流沙地区的雨水管道','膨胀土地区的雨水管道','湿陷土地区的雨水管道','地质条件良好地区的雨水管道'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。污水、雨污水合流管道、流沙地区的雨水管道、膨胀土地区的雨水管道、湿陷土地区的雨水管道。详见教材对应章节。'},
{id:543,ch:5,type:'single',q:'关于给水管道压力试验说法错误的是（   ）。',opts:['试验管段所有敞口应封闭，不得有渗漏水现象','试验前应清除管内杂物','试验段内不得用闸阀做堵板','试验段内消火栓安装完毕'],ans:3,exp:'试验段内不得含有消火栓、水锤消除器、安全阀等附件。'},
{id:544,ch:5,type:'single',q:'给水管道的功能性试验分为（   ）。',opts:['强度试验和严密性试验','预试验和主试验','闭水试验和闭气试验','满水试验和严密性试验'],ans:1,exp:'正确答案为B。预试验和主试验。详见教材对应章节。'},
{id:545,ch:5,type:'single',q:'排水管道功能性试验时，试验段的划分应符合的要求中不正确的是（  ）。',opts:['闭水试验管段应按井距分隔，抽样选取，带井试验','当管道采用两种（或两种以上）管材时，可按管材分别进行水压试验','无压力管道的闭水试验若条件允许可一次试验不超过5个连续井段','无压力管道内径大于700mm时，可按井段数量抽样选取1／3进行闭水试验'],ans:1,exp:'正确答案为B。当管道采用两种（或两种以上）管材时，可按管材分别进行水压试验。详见教材对应章节。'},
{id:546,ch:5,type:'single',q:'污水井设计水头高程2.000，管顶内壁高程1.500，井顶高程3.000，试验水头高程（）',opts:['4.000','3.500','3.000','1.000'],ans:2,exp:'正确答案为C。3.000。详见教材对应章节。'},
{id:547,ch:5,type:'single',q:'压力管道水压试验进行实际渗水量测定时，宜采用（  ）进行。',opts:['注水法','内衬法','分区检测法','内渗法'],ans:0,exp:'正确答案为A。注水法。详见教材对应章节。'},
{id:548,ch:5,type:'single',q:'通过用户管道引入口的总阀门将燃气引向室内，并分配到每个燃气用具的是（  ）。',opts:['分配管道','用户引入管道','室内燃气管道','车间燃气管道'],ans:2,exp:'（1）输气管道：从气源向储配站或天然气门站向高压调压站或大型工业企业输气的管道。 （2）分配管道：在供气地区将燃气分配给工业企业用户、商业用户和居民用户，分配管道包括街区和庭院的分配管道。 （3）用户引入管：将燃气从分配管道引到用户室内管道引入口处的总阀门。 （4）室内燃气管道：通过用户管道引入口的总阀门将燃气引向室内，并分配到每个燃具。'},
{id:549,ch:5,type:'multi',q:'城市燃气输配管道分为（  ）。',opts:['输气管道','分配管道','用户引入管','炉前燃气管道','室内燃气管'],ans:[1,2,4],exp:'根据用 途分 长距离输气管道 干管及支管的末端连接城市或大型工业企业，作为供应区的气源点 城市燃气管道 分配管道 用户引入管 室内燃气管道 工业企业燃气管道 根据敷设方式分 埋地燃气管道 城市中常采用直埋或地沟方式敷设 架空燃气管道 根据输气压力分类'},
{id:550,ch:5,type:'single',q:'燃气管道输气压力为0.6MPa，则其为（  ）燃气管道。',opts:['低压','中压A','次高压B','次高压A'],ans:2,exp:'正确答案为C。次高压B。详见教材对应章节。'},
{id:551,ch:5,type:'single',q:'水平定向钻作业，下列说法错误的是（ ）。',opts:['穿越施工过程中，泥浆宜循环使用','入土点设置接纳泥浆涌出的泥浆池或泥浆罐','水平定向钻机的选用根据计算的最大回拖力确定','钻机最大回拖力不宜小于计算值的两倍'],ans:1,exp:'穿越施工过程中，泥浆宜循环使用。在出土点设置接纳泥浆涌出的泥浆池或泥浆罐。施工完成后，使用槽车将废浆清运至环保部门指定的地点排放。'},
{id:552,ch:5,type:'single',q:'夯管施工作业，下列说法错误的是（ ）。',opts:['夯进的管道应为钢管','燃气管道铺设中，夯进管道不宜作为钢套管使用','夯管长度一般不超过80m','在卵石层、杂填土层中夯进，地层中最大卵砾石粒径不得超过0.5倍的夯进管外径'],ans:1,exp:'夯管施工是利用特殊的设备，将钢管沿着设计路线夯进的施工方法。夯进的管道应为钢管，在燃气管道铺设中，夯进管道一般作为钢套管使用。夯管长度一般不超过80m。在卵石层、杂填土层中夯进，地层中最大卵砾石粒径或最大块状物的尺寸不得超过0.5倍的夯进管外径。'},
{id:553,ch:5,type:'multi',q:'夯进施工要点，下列说法错误的是（ ）。',opts:['开始夯进时应先进行试夯','试夯长度宜为3～5m','夯进前进行排土作业','排土方式不得采用机械方式','大口径管道可采用气压、水压方法'],ans:[2,3,4],exp:'④ 夯管完成后进行排土作业，排土方式采用人工结合机械方式；小口径管道可采用气压、水压方法；排土完成后应进行余土、残土的清理。'},
{id:554,ch:5,type:'multi',q:'地下燃气管道穿过（  ）时应将燃气管道敷设在套管内。',opts:['排水管','热力管沟','隧道','建筑物和大型构筑物','加气站'],ans:[0,1,2],exp:'正确答案为A、B、C。排水管、热力管沟、隧道。详见教材对应章节。'},
{id:555,ch:5,type:'single',q:'燃气管道穿越铁路时应加套管，套管内径应比燃气管道外径大（  ）以上。',opts:['50mm','70mm','100mm','150mm'],ans:2,exp:'正确答案为C。100mm。详见教材对应章节。'},
{id:556,ch:5,type:'multi',q:'关于燃气管道穿越铁路时设置套管的说法，正确的是（  ）。',opts:['必须采用钢筋混凝土管','套管内径比燃气管外径大100mm以上','管道宜垂直与铁路布置','套管两端与燃气管的间隙应采用柔性的防腐、防水材料密封','套管埋设深度，铁路轨底至套管顶不应小于1.2m'],ans:[1,2,3],exp:'套管埋设的深度应符合铁路管理部门的要求；宜采用钢管或钢筋混凝土管；内径应比燃气管道外径大100mm以上；两端与燃气管的间隙应采用柔性防腐、防水材料密封，其一端应装设检漏管；端部距路堤坡脚外的距离不应小于2.0m。'},
{id:557,ch:5,type:'single',q:'燃气管道利用道路桥梁跨越河流时，其技术要求错误的有（  ）。',opts:['燃气管道输送压力可为0.2MPa','必须为加厚的无缝钢管','燃气管道在桥梁上的部分要提高防腐等级','燃气管道在桥梁上的部分应设置必要的补偿和减振措施'],ans:1,exp:'正确答案为B。必须为加厚的无缝钢管。详见教材对应章节。'},
{id:558,ch:5,type:'multi',q:'燃气管道穿越河底时，应符合下列要求（  ）。',opts:['燃气管宜采用钢管','通航河流，覆土厚度应满足疏浚和投锚深度要求','埋设管道位置的河流两岸上游应设立标志','燃气管道对接安装引起的误差为3°时，设置弯管','低压燃气管道的弯管应考虑盲板力'],ans:[0,1],exp:'b.燃气管道至河床的覆土厚度应根据水流冲刷条件及规划河床标高确定，对于通航河流，还应满足疏浚和投锚深度要求。 c.稳管措施应根据计算确定。 d.在埋设燃气管道位置的河流两岸上、下游应设立标志。 e.燃气管道对接安装引起的误差不得大于3°,否则应设置弯管；次高压燃气管道的弯管应考虑盲板力。'},
{id:559,ch:5,type:'multi',q:'燃气管网对口焊接的基本要求错误的是（）',opts:['可采用对口器固定，不得强力对口','焊接前打坡口','两管道纵向焊缝错开，间距应不小于50mm弧长','对口完成后应立即进行打底焊','定位焊前拆除对口器，进行焊口编号，对好的口必须当天焊完'],ans:[2,3,4],exp:'④ 对口时将两管道纵向焊缝(螺旋焊缝)相互错开，间距应不小于100mm弧长。 ⑤ 对口完成后应立即进行定位焊，定位焊的焊条应与管口焊接焊条材质相同，定位焊的厚度与坡口第一层焊接厚度相近，但不应超过管壁厚度的70%,焊缝根部必须焊透，定位焊应均匀、对称，总长度不应小于焊道总长度的50%。钢管的纵向焊缝(螺 旋焊缝)端部不得进行定位焊。'},
{id:560,ch:5,type:'single',q:'钢管防腐的做法错误的是（ ）。',opts:['现场无损检测完成后补口防腐','焊口防腐后应用电火花检漏仪检查','焊口除锈可用喷砂除锈的方法，除锈后及时防腐','防腐层表层固化2h后进行电火花仪检测'],ans:0,exp:'现场无损检测完成及分段强度试验后进行补口防腐'},
{id:561,ch:5,type:'multi',q:'聚乙烯燃气管道优点包括（ ）。',opts:['重量轻','耐腐蚀','阻力小','承压能力高','抗破坏能力强'],ans:[0,1,2],exp:'正确答案为A、B、C。重量轻、耐腐蚀、阻力小。详见教材对应章节。'},
{id:562,ch:5,type:'multi',q:'聚乙烯管材贮存说法正确的是（ ）。',opts:['遵照“先进后出” 的原则','可与油类或化学品混合存放','直管可采用梯形堆放','两侧加支撑保护的矩形堆放时，堆放高度不宜超过1.5m','生产到使用期间，管材存放时间超过4年不可使用'],ans:[2,3],exp:'a.管材、管件和阀门应按不同类型、规格和尺寸分别存放，并应遵照“先进先出” 的原则。 c.管材、管件和阀门应远离热源，严禁与油类或化学品混合存放。 f.从生产到使用期间，管材存放时间超过4年、密封包装的管件存放时间超过6年，应对其抽样检验，性能符合要求方可使用。'},
{id:563,ch:5,type:'multi',q:'聚乙烯管道应采用电熔连接范围有（ ）。',opts:['PE80与PE80','熔体质量流动速率差值大于等于0.5g/10min','焊接端部标准尺寸比为SDR17.6','公称外径小于90mm','壁厚小于6mm'],ans:[1,3,4],exp:'③不同级别(PE80 与PE100) 、 熔体质量流动速率差值大于等于0.5g/10min(190℃, 5kg)、 焊接端部标准尺寸比(SDR) 不同、 公称外径小于90mm 或壁厚小于6mm的聚乙烯管材、管件和阀门，应采用电熔连接。'},
{id:564,ch:5,type:'multi',q:'热熔对接连接，说法正确的有（ ）。',opts:['管道应在同一轴线上','错边量不应大于壁厚的20%，且不得大于2mm','接头冷却应采用自然冷却','保压冷却期间，为保证连接质量可施加外力','保压冷却期间，不得拆开夹具'],ans:[0,2,4],exp:'管道应在同一轴线上，错边量不应大于壁厚的10%。 接头冷却应采用自然冷却。在保压冷却期间，不得拆开夹具，不得移动连接件或 在连接件上施加任何外力。'},
{id:565,ch:5,type:'multi',q:'法兰连接，说法正确的有（ ）。',opts:['两法兰盘上螺孔应对中','法兰面应相互垂直','螺栓规格应一致，螺母对称至于两侧','不得强力组装','法兰盘在静置8～10h后，应二次紧固'],ans:[0,3,4],exp:'两法兰盘上螺孔应对中，法兰面应相互平行，螺栓孔与螺栓直径应配套，螺栓规格应一致，螺母应在同一侧；紧固法兰盘上的螺栓应按对称顺序分次均匀紧固，不得强力组装；螺栓拧紧后宜伸出螺母1～3倍螺距。法兰盘在静置8～10h后，应二次紧固。'},
{id:566,ch:5,type:'single',q:'燃气管道回填，(Ⅱ)区压实度为（ ）。',opts:['不应小于85%','不应小于90%','不应小于95%','不应小于96%'],ans:1,exp:'对 （I）区部位采用中、粗砂或细土分层回填， 每层厚度应为100～200mm，压实度不应小于90%。 对（Ⅱ）区部位采用符合要求的原土或中、粗砂回填， 压实度不应小于90%。 对（Ⅲ）区部位，采用原土分层回填，压实度应符合相应地面对压实度的要求。'},
{id:567,ch:5,type:'single',q:'聚乙烯燃气管道从下至上依次是（  ）。',opts:['示踪线→警示带→保护板→地面标志','示踪线→保护板→警示带→地面标志','保护板→示踪线→警示带→地面标志','保护板→警示带→示踪线→地面标志'],ans:1,exp:'正确答案为B。示踪线→保护板→警示带→地面标志。详见教材对应章节。'},
{id:568,ch:5,type:'single',q:'按燃气流动方向，安装在管道最高点和每个阀门之前的附属设备是（  ）。',opts:['放散管','排水器','补偿器','绝缘接头'],ans:0,exp:'正确答案为A。放散管。详见教材对应章节。'},
{id:569,ch:5,type:'single',q:'关于燃气管道阀门，说法错误的是（  ）。',opts:['阀体上有标志，箭头所指方向即介质的流向','阀门手轮不得向下，避免仰脸操作','阀门手轮宜位于齐胸高度，以便启阀','减压阀可倾斜安装在水平管道上'],ans:3,exp:'减压阀要求直立地安装在水平管道上，不得倾斜；安全阀也应垂直安装'},
{id:570,ch:5,type:'multi',q:'城镇燃气管网工程施工中，当阀门与管道以（  ）方式连接时，阀门应在关闭状态下安装。',opts:['承插','焊接','热熔','法兰','螺纹'],ans:[3,4],exp:'正确答案为D、E。法兰、螺纹。详见教材对应章节。'},
{id:571,ch:5,type:'single',q:'为保证管网的安全与操作方便，地下燃气管道上的阀门一般都设置在（  ）。',opts:['阀门井底','阀门井内','地面上','距阀门井墙较远处'],ans:1,exp:'放散管保证管网的安全与操作方便，地下燃气管道上的阀门一般都设置在阀门井内。阀门井应坚固、耐久，有良好的防水性能，并保证检修时有必要的空间。考虑到人员的安全，井筒不宜过深。'},
{id:572,ch:5,type:'multi',q:'管道吹扫应符合下列要求（  ）。',opts:['应由管道厂家负责组织吹扫工作','按庭院管、支管、主管的顺序进行吹扫','阀门已安装完毕','吹扫出口前严禁站人','吹扫介质宜采用压缩空气，严禁采用氧气和可燃性气体'],ans:[3,4],exp:'(2)管道安装检验合格后，应由施工单位负责组织吹扫工作，并应在吹扫前编制吹扫方案。 (3)应按主管、支管、庭院管的顺序进行吹扫，吹扫出的脏物不得进入已吹扫合格的管道。 (4)吹扫管段内的调压器、阀门、孔板、过滤网、燃气表等设备不参与吹扫，待吹扫合格后再安装复位。'},
{id:573,ch:5,type:'multi',q:'燃气管道严密性试验需具备的条件有（  ）。',opts:['管道安装检验合格','吹扫合格设备复位','强度试验合格','管线全线回填后','其他试验完成后'],ans:[2,3],exp:'严密性试验应在强度试验合格后进行，且管线全线应回填，以减少管内温度变化对试验的影响。'},
{id:574,ch:5,type:'single',q:'聚乙烯管(SDR17.6)，强度试验压力为（  ）。',opts:['设计输气压力的1.5倍','设计输气压力的1.5倍且不小于0.4MPa','设计输气压力的1.25倍且不小于0.4MPa','设计输气压力的1.5倍且不小于0.2MPa'],ans:3,exp:'正确答案为D。设计输气压力的1.5倍且不小于0.2MPa。详见教材对应章节。'},
{id:575,ch:5,type:'single',q:'直接按热媒分类的热力管网是（  ）。',opts:['热水热网','一级管网','地沟管网','闭式管网'],ans:0,exp:'正确答案为A。热水热网。详见教材对应章节。'},
{id:576,ch:5,type:'multi',q:'关于管道安装与焊接的说法，正确的是（  ）。',opts:['管道端部可做十字形焊缝','焊口不得置于建（构）筑物等的墙壁中','管道支架处不得有环形焊缝','应先安装检查室，再安装主线，最后安装支线','管道两相邻环形焊缝中心之间的距离应大于钢管外径，且不得小于150mm'],ans:[1,2,4],exp:'钢管对口时，纵向焊缝之间应相互错开100mm弧长以上，管道任何位置不得有十字形焊缝。 管道安装顺序：一般情况下，应先安装主线，再安装检查室，最后安装支线。'},
{id:577,ch:5,type:'single',q:'钢管对口错边量允许偏差受（  ）影响。',opts:['管材','管道外径','管道壁厚','管道内径'],ans:2,exp:'正确答案为C。管道壁厚。详见教材对应章节。'},
{id:578,ch:5,type:'multi',q:'预制直埋管道安装施工要点，正确的是（  ）。',opts:['接头保温在管道安装完毕后进行','接头的外护层安装完成，全部进行气密性检验','气密性检验采用涂上肥皂水的方法检查','气密性检验压力0.02MP，保压时间不应少于2min','直埋保温水管在穿套管前应完成接头保温施工'],ans:[1,2,3,4],exp:'a.直埋管接头保温应在管道安装完毕及强度试验合格后进行。 b.接头保温施工前，应将接头钢管表面、两侧保温端面和搭接段外壳表面的水分、油污、杂质和端面保护层去除干净。 c.接头保温的结构、保温材料的材质及厚度应与预制直埋保温管相同。 d.接头外护层安装完成后，必须全部进行气密性检验并应合格。气密性检验的压力为0.02MPa，保压时间不应少于2min，压力稳定后用肥皂水仔细检查密封处，无气泡为合格。'},
{id:579,ch:5,type:'single',q:'直埋蒸汽管道安装工程中，工作管的现场接口焊接应采用氩弧焊打底，焊缝应进行100%的（  ）检查。',opts:['渗透','磁粉','超声波','射线'],ans:3,exp:'正确答案为D。射线。详见教材对应章节。'},
{id:580,ch:5,type:'multi',q:'热力管道保温材料进场，应根据标准规定现场按批抽样检测材料的（  ）。',opts:['抗剪强度','导热系数','保温层密度','透气性','厚度'],ans:[1,2,4],exp:'保温材料进场对品种、规格、外观等进行检查验收，从进场的每批材料中，任选1-2组试样进行导热系数、保温层密度、厚度和吸水（质量含水、憎水）率等测定。'},
{id:581,ch:5,type:'multi',q:'固定支架主要用于固定管道，均匀分配补偿器之间管道的伸缩量，保证补偿器正常工作，多设置在（  ）。',opts:['阀门井旁','凝水缸旁','放散管旁','补偿器旁','附件旁'],ans:[3,4],exp:'正确答案为D、E。补偿器旁、附件旁。详见教材对应章节。'},
{id:582,ch:5,type:'multi',q:'悬吊支架可分为（  ）等几种形式。',opts:['弹簧吊架','普通刚性吊架','滑动支架','导向支架','滚动支架'],ans:[0,1],exp:'正确答案为A、B。弹簧吊架、普通刚性吊架。详见教材对应章节。'},
{id:583,ch:5,type:'single',q:'支架、吊架安装说法错误的是（）',opts:['位置应正确，标高和坡度应符合设计要求','管道支架支撑面 的标高可采用加设金属垫板的方式进行调整','金属垫板不得大于三层','金属垫板与预埋钢板或钢结构进行焊接'],ans:2,exp:'正确答案为C。金属垫板不得大于三层。详见教材对应章节。'},
{id:584,ch:5,type:'single',q:'相连两法兰端面应保持平行，偏差不大于法兰外径的1.5%，且不得大于（  ）。',opts:['1mm','1.5mm','2mm','2.5mm'],ans:2,exp:'两个法兰连接端面应保持平行，偏差不大于法兰外径的1.5%，且不得大于2mm；不得采用加偏垫、多层垫或加强力拧紧法兰一侧螺栓的方法来消除法兰接口端面的偏差。'},
{id:585,ch:5,type:'single',q:'阀门的主要作用不包括（）',opts:['启闭管路','调节被输送介质流向','调节被输送介质压力','调节被输送介质温度'],ans:3,exp:'正确答案为D。调节被输送介质温度。详见教材对应章节。'},
{id:586,ch:5,type:'single',q:'焊接蝶阀的安装错误的是（  ）。',opts:['阀板的轴应安装在水平方向上','轴与水平面的最大夹角不应大于60°','不得垂直安装','安装焊接前阀板打开'],ans:3,exp:'a.阀板的轴应安装在水平方向上，轴与水平面的最大夹角不应大于60°,不得垂直安装。b.安装焊接前应关闭阀板，并应采取保护措施。'},
{id:587,ch:5,type:'single',q:'下列（ ）适用于三向位移的热力管道',opts:['方形补偿器','球形补偿器','套筒式补偿器','波纹管补偿器'],ans:1,exp:'正确答案为B。球形补偿器。详见教材对应章节。'},
{id:588,ch:5,type:'single',q:'价格低廉，占据空间大的补偿器是（  ）。',opts:['球形补偿器','方形补偿器','套管补偿器','波纹管补偿器'],ans:1,exp:'正确答案为B。方形补偿器。详见教材对应章节。'},
{id:589,ch:5,type:'multi',q:'换热站交接验收，参加单位有（）',opts:['土建施工单位','工艺安装单位','监理单位','设计单位','建设单位'],ans:[0,1,2],exp:'正确答案为A、B、C。土建施工单位、工艺安装单位、监理单位。详见教材对应章节。'},
{id:590,ch:5,type:'multi',q:'关于城镇供热管网试验的说法，正确的是（  ）。',opts:['强度试验压力为1.25倍PN，且不低于0.6MPa','严密性试验压力为1.15倍PN，且不得低于0.6MPa','强度试验目的是试验管道本身与安装焊口的强度','严密性试验是在各管段强度试验合格且应该是管道安装内容施焊工序全部完成后进行','严密性试验长度与强度试验长度一致'],ans:[2,3],exp:'正确答案为C、D。强度试验目的是试验管道本身与安装焊口的强度、严密性试验是在各管段强度试验合格且应该是管道安装内容施焊工序全部完成后进行。详见教材对应章节。'},
{id:591,ch:5,type:'multi',q:'关于起重设备或垂直运输系统说法正确的（  ）。',opts:['起重设备必须经过起重荷载计算','起重作业前应试吊','吊离地面500mm左右时，应检查重物捆扎情况','起吊时工作井内严禁站人','当吊运重物下井距作业面底部小于1000mm时，操作人员方可近前工作'],ans:[0,1,3],exp:'③ 起重作业前应试吊，吊离地面100mm左右时，应检查重物捆扎情况和制动性能，确认安全后方可起吊；起吊时工作井内严禁站人，当吊运重物下井距作业面底部小于500mm时，操作人员方可近前工作。'},
{id:592,ch:5,type:'multi',q:'沟槽回填主要控制项目（  ）。',opts:['回填材料','柔性管道的变形率','刚性管道的外径','有功能性试验要求的管道试验合格','回填土压实度'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。回填材料、柔性管道的变形率、有功能性试验要求的管道试验合格、回填土压实度。详见教材对应章节。'},
{id:593,ch:5,type:'single',q:'柔性管道回填时间宜在一昼夜中（  ）气温时段。',opts:['平均','最高','最低','管材要求的'],ans:2,exp:'正确答案为C。最低。详见教材对应章节。'},
{id:594,ch:5,type:'single',q:'柔性管道回填施工质量控制错误的是（ ）。',opts:['管道主体安装检验合格后，沟槽应及时回填，但需留出未检验的安装接口','管道中心标高以下回填时应采取防止管道上浮、位移的措施','管内径大于800mm柔性管道，回填施工时应在管内采取预变形措施','管基基础支承角范围采用黏土填充并捣固密实'],ans:3,exp:'正确答案为D。管基基础支承角范围采用黏土填充并捣固密实。详见教材对应章节。'},
{id:595,ch:5,type:'single',q:'关于水平定向钻导向孔钻进施工的说法，正确的是（ ）。',opts:['导向孔钻进时发现偏差应立即大幅度纠正，以确保快速复位','入土段和出土段直线钻进长度宜控制在10m左右','随钻测量顶角、方位角等参数，用于计算钻头空间位置并指导纠偏','每钻进两根钻杆应进行一次导向探测'],ans:2,exp:'A错误，应采用小角度逐步纠偏，不可大幅度急纠；B错误，直线长度宜控制在20m左右； D错误，应为每进一根钻杆进行探测。'},
{id:596,ch:5,type:'multi',q:'关于水平定向钻导向孔钻进施工技术，正确的有（ ）。',opts:['导向孔施工的关键是钻孔轨迹的监测和控制','发现偏差时应采用小角度逐步纠偏','钻孔轨迹偏差不得大于终孔直径','第一根钻杆入土钻进时应采取轻压快转方式','曲线段和有相邻管线段应减少导向探测频率'],ans:[0,1,2],exp:'正确答案为A、B、C。导向孔施工的关键是钻孔轨迹的监测和控制、发现偏差时应采用小角度逐步纠偏、钻孔轨迹偏差不得大于终孔直径。详见教材对应章节。'},
{id:597,ch:5,type:'multi',q:'关于水平定向钻扩孔、清孔施工技术，正确的有（ ）。',opts:['扩孔目的是将孔径扩大至能容纳生产管线的要求','扩孔可一次完成或分多次完成','硬土层和岩层可使用牙轮扩孔钻头','管线铺设前应进行一次或多次清孔','分次扩孔时每次回扩的级差宜控制在150～200mm'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。扩孔目的是将孔径扩大至能容纳生产管线的要求、扩孔可一次完成或分多次完成、硬土层和岩层可使用牙轮扩孔钻头、管线铺设前应进行一次或多次清孔。详见教材对应章节。'},
{id:598,ch:5,type:'single',q:'水平定向钻管线铺设施工的说法，正确的是（ ）。',opts:['回拖管道应从入土点向出土点连续进行','回拖过程中应采用匀速慢拉的方法，严禁硬拉硬拖','发送装置仅可采用水力发送沟一种形式','管道进入设计位置后，钻孔与管道之间的空隙无需填充'],ans:1,exp:'正确答案为B。回拖过程中应采用匀速慢拉的方法，严禁硬拉硬拖。详见教材对应章节。'},
{id:599,ch:5,type:'single',q:'关于燃气管道聚乙烯管热熔连接接头检验的说法，正确的是（ ）。',opts:['热熔连接接头完成后，仅需对10%的接头进行卷边对称性检验','开挖敷设时，应不少于15%的接头进行卷边切除检验','水平定向钻非开挖施工时，应不少于15%的接头进行卷边切除检验','卷边切除检验仅适用于钢制管道，不适用于聚乙烯管'],ans:1,exp:'正确答案为B。开挖敷设时，应不少于15%的接头进行卷边切除检验。详见教材对应章节。'},
{id:600,ch:6,type:'multi',q:'综合管廊附属设施包括（  ）。',opts:['消防系统','通风系统','供电系统','照明系统','给水系统'],ans:[0,1,2,3],exp:'综合管廊附属设施包括消防系统、通风系统、供电系统、照明系统、监控与报警 系统、排水系统、标识系统等。'},
{id:601,ch:6,type:'multi',q:'综合管廊缓解了直埋管线存在的（ ）问题。',opts:['检修及敷设管线需不断破挖路面','各管线分属不同部门管理，信息不畅，重复建设','直埋管线与土壤接触，易造成管线腐蚀、损坏','电力线缆占地大，影响城市规划及市容','设计不合理，影响城市规划及市容'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。检修及敷设管线需不断破挖路面、各管线分属不同部门管理，信息不畅，重复建设、直埋管线与土壤接触，易造成管线腐蚀、损坏、电力线缆占地大，影响城市规划及市容。详见教材对应章节。'},
{id:602,ch:6,type:'multi',q:'综合管廊入廊范围涵盖了（ ）。',opts:['给水管线','污水管线','再生水管线','热力管线','工业管线'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。给水管线、污水管线、再生水管线、热力管线。详见教材对应章节。'},
{id:603,ch:6,type:'single',q:'天然气管道应在（  ）室内敷设。',opts:['独立舱','双舱','同舱','浅埋沟道'],ans:0,exp:'正确答案为A。独立舱。详见教材对应章节。'},
{id:604,ch:6,type:'single',q:'热力管道采用蒸汽介质时应在（  ）室内敷设。',opts:['独立舱','双舱','同舱','浅埋沟道'],ans:0,exp:'正确答案为A。独立舱。详见教材对应章节。'},
{id:605,ch:6,type:'single',q:'对于城市管廊说法正确的是（  ）。',opts:['天燃气管道可与其他管线共舱室','热力管道采用蒸汽介质时应在独立舱室内敷设','热力管道可以与电力电缆同仓敷设','给水管道与热力管道同侧布置时，给水管道宜布置在热力管道上方'],ans:1,exp:'正确答案为B。热力管道采用蒸汽介质时应在独立舱室内敷设。详见教材对应章节。'},
{id:606,ch:6,type:'single',q:'关于综合管廊布置的说法，正确的是（  ）。',opts:['干线综合管廊通常放在人行道下','支线综合管廊用于容纳城市配给工程管线，采用单舱或双舱方式建设','进入综合管廊的排水管道应采取合流制','污水采用管道排水方式，宜设置在综合管廊顶部'],ans:1,exp:'正确答案为B。支线综合管廊用于容纳城市配给工程管线，采用单舱或双舱方式建设。详见教材对应章节。'},
{id:607,ch:6,type:'multi',q:'圆形断面管廊的说法，正确的是（  ）。',opts:['结构受力不利','材料用量较少','成本增加','圆形断面布置管道不方便','空间利用率高'],ans:[1,3],exp:'圆形钢筋混凝土预制构件制作工艺成熟，生产方便，结构受力有利，材料用量较少，成本低廉。缺点是圆形断面布置管道不方便，空间利用率低。若在管廊内布置相同数量管线，圆管的直径需加大，增加了工程成本和地下空间断面的占用率。'},
{id:608,ch:6,type:'single',q:'关于干线综合管廊作用及设置的说法.正确的是（  ）。',opts:['用于容纳城市配给工程管线','采用单舱或双舱方式建设','宜设置在机动车道、道路绿化带下面','宜设置在道路绿化带、人行道或非机动车道下'],ans:2,exp:'正确答案为C。宜设置在机动车道、道路绿化带下面。详见教材对应章节。'},
{id:609,ch:6,type:'multi',q:'综合管廊分为（  ）。',opts:['干线综合管廊','支线综合管廊','缆线综合管廊','节点综合管廊','分支综合管廊'],ans:[0,1,2],exp:'正确答案为A、B、C。干线综合管廊、支线综合管廊、缆线综合管廊。详见教材对应章节。'},
{id:610,ch:6,type:'multi',q:'综合管廊附属设施包括( )，排水系统，标识系统等。',opts:['供电与照明系统','监控与报警系统','消防系统','通风系统','人员进出门禁系统'],ans:[0,1,2,3],exp:'综合管廊附属设施包括消防系统、通风系统、供电系统、照明系统、监控与报警系统、排水系统、标识系统等。'},
{id:611,ch:6,type:'multi',q:'综合管廊施工方法包括（  ）',opts:['明挖法现浇','明挖法预制拼装','盾构法','TBM法','钻爆法'],ans:[0,1,2],exp:'正确答案为A、B、C。明挖法现浇、明挖法预制拼装、盾构法。详见教材对应章节。'},
{id:612,ch:6,type:'single',q:'浅埋暗挖法施工综合管廊，错误的是（  ）。',opts:['管廊浅埋暗挖法施工应无水作业','暗挖管廊通风设备宜安装在管廊外部','宜结合永久结构设置工作竖井','管廊开挖应预留变形量，不得欠挖'],ans:1,exp:'暗挖管廊通风设备宜安装在管廊内部'},
{id:613,ch:6,type:'multi',q:'综合管廊施工方法沉降小的包括（  ）。',opts:['明挖法现浇','明挖法预制拼装','顶管法','盾构法','浅埋暗挖法'],ans:[0,1],exp:'正确答案为A、B。明挖法现浇、明挖法预制拼装。详见教材对应章节。'},
{id:614,ch:6,type:'single',q:'综合管廊建设期间的档案资料应由（  ）负责收集、整理、归档。维护期间，应由综合管廊（  ）负责收集、整理、归档。',opts:['建设单位，日常管理单位','施工单位，建设单位','建设单位，管线单位','建设单位，建设单位'],ans:0,exp:'正确答案为A。建设单位，日常管理单位。详见教材对应章节。'},
{id:615,ch:7,type:'single',q:'垃圾填埋场施工时，HDPE膜不能在（  ）季施工。',opts:['春','夏','秋','冬'],ans:3,exp:'HDPE膜冬期严禁铺设'},
{id:616,ch:7,type:'single',q:'生活垃圾填埋场应设在当地（  ）季节主导风向的（  ）风向。',opts:['春；下','秋；上','夏；下','冬；上'],ans:2,exp:'生活垃圾填埋场应设在当地夏季主导风向的下风向'},
{id:617,ch:7,type:'multi',q:'单层防渗结构包括（）',opts:['渗沥液收集导排系统','防渗层','基础层','渗沥液检测层','次防渗层'],ans:[0,1,2],exp:'防渗系统结构可分为单层防渗系统结构和双层防渗系统结构。 单层防渗系统基本结构应包括渗沥液收集导排系统、防渗层及上下保护层和基础层。 双层防渗系统基本结构应包括渗沥液导排系统、主防渗层及上下保护层、渗沥液检测层、次防渗层及上下保护层和基础层。应根据需要设置地下水导排系统和反滤层。'},
{id:618,ch:7,type:'multi',q:'关于生活垃圾卫生填埋场HDPE膜的施工要求，正确的有（  ）。',opts:['铺设应一次展开到位','应为膜尺寸变化留出伸缩量','应对膜下保护层采取防、排水措施','应防止膜受风力影响破坏','膜应全部展开后统一焊接'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。铺设应一次展开到位、应为膜尺寸变化留出伸缩量、应对膜下保护层采取防、排水措施、应防止膜受风力影响破坏。详见教材对应章节。'},
{id:619,ch:7,type:'multi',q:'泥质防水层施工质量检验项目包括（  ）试验。',opts:['压实度','密封','化学稳定性','渗水','厚度'],ans:[0,3],exp:'正确答案为A、D。压实度、渗水。详见教材对应章节。'},
{id:620,ch:7,type:'single',q:'关于GCL垫质量控制要点说法错误的是（  ）。',opts:['釆用顺坡搭接，即采用上压下的搭接方式','应避免出现品形分布，尽量采用十字搭接','遇有雨雪天气应停止施工','摊铺时应拉平GCL垫，确保无褶皱、无悬空现象'],ans:1,exp:'正确答案为B。应避免出现品形分布，尽量采用十字搭接。详见教材对应章节。'},
{id:621,ch:7,type:'multi',q:'HDPE膜采用单缝挤压焊接形成的焊缝，其非破坏性检测方法主要有（  ）。',opts:['气压检测法','真空检测法','电火花检测法','剥离检测法','剪切检测法'],ans:[1,2],exp:'非破坏性检测技术： 1）气压检测：双缝热熔 2）真空检测：单缝挤压 3）电火花检测：单缝挤压 破坏性测试： 分别做5个剪切试验和5个剥离试验'},
{id:622,ch:7,type:'multi',q:'生活垃圾填埋场不得建在下列地区（  ）。',opts:['地下水集中供水水源地及补给区，水源保护区','洪泛区和泄洪道','尚未开采的地下蕴矿区','荒漠地区','珍贵动植物保护区和国家、地方自然保护区'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。地下水集中供水水源地及补给区，水源保护区、洪泛区和泄洪道、尚未开采的地下蕴矿区、珍贵动植物保护区和国家、地方自然保护区。详见教材对应章节。'},
{id:623,ch:7,type:'multi',q:'HDPE膜试验性焊接测试结果包括（）',opts:['剪切试验','剥离试验','撕裂强度','抗剪强度','抗拉强度'],ans:[2,3],exp:'正确答案为C、D。撕裂强度、抗剪强度。详见教材对应章节。'},
{id:624,ch:11,type:'multi',q:'烟气在线监测指标至少包括烟气中（）',opts:['二氧化碳','颗粒物','二氧化硫','氮氧化物','氯化氢'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。颗粒物、二氧化硫、氮氧化物、氯化氢。详见教材对应章节。'},
{id:625,ch:8,type:'single',q:'下列不属于海绵城市储存与调节设施的是（  ）',opts:['湿塘','调节池','渗透塘','蓄水池'],ans:2,exp:'正确答案为C。渗透塘。详见教材对应章节。'},
{id:626,ch:8,type:'multi',q:'下列各项中，属于海绵城市建设技术设施类型的是（  ）。',opts:['渗透设施','存储与调节设施','传输设施','储能灌溉设施','截污净化设施'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。渗透设施、存储与调节设施、传输设施、截污净化设施。详见教材对应章节。'},
{id:627,ch:8,type:'multi',q:'常用的渗透设施主要包括有（  ）',opts:['透水铺装','下沉式绿地','湿塘','渗透塘','生物滞留设施'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。透水铺装、下沉式绿地、渗透塘、生物滞留设施。详见教材对应章节。'},
{id:628,ch:8,type:'multi',q:'市政工程中常用的截污净化设施有（  ）',opts:['植被缓冲带','初期雨水弃流设施','植草沟','人工土壤渗滤设施','调节池'],ans:[0,1,3],exp:'正确答案为A、B、D。植被缓冲带、初期雨水弃流设施、人工土壤渗滤设施。详见教材对应章节。'},
{id:629,ch:8,type:'single',q:'下沉式绿地下沉深度根据土壤渗透性能确定，一般为（  ）mm',opts:['100-200','150-250','200-300','500'],ans:0,exp:'下沉式绿地应低于周边铺砌地面或道路，下沉深度根据土壤渗透性能确定，一般为100--200mm'},
{id:630,ch:8,type:'single',q:'城市雨水管渠系统较难改造时，选择存储与调节设施，可选用（  ）',opts:['调节池','雨水湿地','调节塘','地下式蓄水池'],ans:0,exp:'有绿化、道路喷洒、景观补水等雨水回用需求的小区、城市绿地等，宜根据雨水回用用途及用量设置蓄水池。蓄水池宜采用露天的景观水池或水体，在用地紧张时可采用地下式蓄水池。 建筑与小区、城市绿地等具有一定空间条件的区域，宜设置调节塘。城市雨水管渠系统较难改造时，可采用调节池。'},
{id:631,ch:8,type:'single',q:'在水体有自然净化需求的区域，选择存储与调节设施时，宜设置（  ）。',opts:['湿塘','雨水湿地','调节塘','地下式蓄水池'],ans:1,exp:'建筑与小区、城市道路、城市绿地、滨水带等区域内的地势较低的地带或水体有自然净化需求的区域，宜设置雨水湿地。'},
{id:632,ch:8,type:'multi',q:'小型车的停车场进行透水铺装时可采用（  ）。',opts:['植草砖','透水混凝土','鹅卵石','透水沥青','碎拼'],ans:[0,1,3],exp:'渗透设施选择 透水铺装 场合 透水砖、透水混凝土、透水沥青 道路人行道、人行广场、建筑小区人行道等荷载较小的区域 植草砖、透水混凝土、透水沥青 小型车的停车场 鹅卵石、碎石、碎拼、踏步石 园林绿地 下沉式绿地 道路、广场、其他硬化铺装区及周边绿地 渗透塘 汇水面积大于1公顷、地势较低'},
{id:633,ch:8,type:'multi',q:'宜采用渗透塘作为渗透设施的条件是（  ）',opts:['汇水面积大于一公顷','水深达0.5米','年降水量超400mm','地势较低的低洼地带','不便于铺设透水砖区域'],ans:[0,3],exp:'汇水面积大于1公顷、地势较低的低洼地带等具有一定空间条件的区域，宜采用渗透塘。'},
{id:634,ch:8,type:'single',q:'透水路面自上而下通常是设置（  ）。',opts:['透水面层、透水找平层、透水垫层','透水面层、透水基层、透水垫层','透水面层、透水找平层、透水基层','透水面层，透水基层、透水找平层'],ans:2,exp:'正确答案为C。透水面层、透水找平层、透水基层。详见教材对应章节。'},
{id:635,ch:8,type:'single',q:'下沉式绿地施工，以下说法正确的一项是（  ）',opts:['地下水位较高的地区，应在绿地高处设置出流口','道路红线内外绿地的高程一般高于路面并与道路景观相结合','绿地内表层土壤入渗能力不够时，可另设置渗透设施','应尽量采用本地的、耐淹、耐旱、耐污种类的植物，宜采用木本植物'],ans:2,exp:'A选项错误；在地下水位较高的地区，应在绿地低洼处设置出流口 B选项错误；道路红线内外绿地的高程一般低于路面并与道路景观相结合 D选项错误；应尽量采用本地的、耐淹、耐旱、耐污种类的植物，宜采用草本植物'},
{id:636,ch:8,type:'multi',q:'构成市政工程”海绵体”的主要技术可以归纳为（  ）。',opts:['雨水渗透技术','雨水存储与调节技术','雨水传输技术','雨水回灌与区域输送技术','雨水截污与净化技术'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。雨水渗透技术、雨水存储与调节技术、雨水传输技术、雨水截污与净化技术。详见教材对应章节。'},
{id:637,ch:8,type:'multi',q:'生物滞留设施可以分为（  ）。',opts:['简易型生物滞留设施','多用途型生物滞留设施','全天候型生物滞留设施','复杂型生物滞留设施','增强型生物滞留设施'],ans:[0,3],exp:'生物滞留设施分为简易型生物滞留设施和复杂型生物滞留设施，由植物层、土壤层、过滤层（或排水层）、蓄水层构成。按应用位置不同又称作雨水花园、生物滞留带、高位花坛、生态树池等。'},
{id:638,ch:8,type:'multi',q:'为了去除大颗粒污染物并减缓流速，渗透塘应采用的预处理设施主要有（  ）。',opts:['沉砂池','弃流','前置塘','巴氏槽','三角堰'],ans:[0,2],exp:'渗透塘前应设置沉砂池、前置塘等预处理设施，去除大颗粒的污染物并减缓流速；降雪后应采取弃流、排盐等措施防止融雪剂侵害植物。'},
{id:639,ch:8,type:'multi',q:'蓄水池具有雨水储存功能，同时也具有消减峰值流量的作用，它的构造形式主要有（  ）。',opts:['钢筋混凝土构造','砖、石砌筑构造','钢板拼接式','塑料蓄水模块拼装式','筏板式'],ans:[0,1,3],exp:'蓄水池指具有雨水储存功能的集蓄利用设施，同时也具有消减峰值流量的作用主要包括钢筋混凝土蓄水池，砖、石砌筑蓄水池及塑料蓄水模块拼装式蓄水池，用地紧张的城市大多采用地下封闭式蓄水池。'},
{id:640,ch:8,type:'single',q:'渗透管渠具有渗透雨水，下列不属于渗透管渠组成材料的是（  ）。',opts:['穿孔塑料管','无砂混凝土管','砾石','无缝钢管'],ans:3,exp:'渗透管渠指具有渗透功能的雨水管渠，可采用穿孔塑料管、无砂混凝土管和砾（碎）石等材料组合而成。'},
{id:641,ch:8,type:'multi',q:'植草沟一般可以分为（  ）。',opts:['传输型','接收型','干式','湿式','潮式'],ans:[0,2,3],exp:'植草沟草种应耐旱、耐淹。植草沟一般分为传输型、干式、湿式植草沟。'},
{id:642,ch:8,type:'multi',q:'下列植被缓冲带说法正确的是（ ）。',opts:['植物缓冲带为坡度较大的植被区','植被缓冲带坡度一般为2%～6%','坡度大于8%时需根据实际情况另外设置消能设施','植被缓冲带适用于道路等不透水面周边','植物选择根系发达，长势强的耐盐、耐旱、耐水湿的乡土植物品种'],ans:[1,3,4],exp:'植物缓冲带为坡度较缓的植被区，经植被拦截及土壤下渗作用减缓地表径流流速，并去除径流中的部分污染物。 (1)植被缓冲带前应设置碎石消能，植被缓冲带坡度一般为2%～6%,宽度一般不宜小于2m,当坡度大于6%时需根据实际情况另外设置消能设施。 (2)植被缓冲带适用于道路等不透水面周边，可作为生物滞留设施等低影响开发设施的预处理，也可作为城市水系的滨水绿化带。 (3)植被缓冲带断面形式、土质、植被材料应符合设计要求。 (4)植物应选择根系发达，长势强的耐盐、耐旱、耐水湿的乡土植物品种。'},
{id:643,ch:8,type:'multi',q:'人工土壤渗滤体由（  ）等材料组成。',opts:['石英石','矿石','活性炭','塑料膜','营养物质'],ans:[0,1,2,4],exp:'渗滤体由石英砂、少量矿石和活性炭及营养物质等材料组成，不得含有草根、树叶、塑料袋等有机杂物及垃圾。'},
{id:644,ch:8,type:'single',q:'下列初期雨水弃流设施说法错误的是（ ）。',opts:['初期雨水弃流装置宜采用人工控制方式','雨水弃流排入污水管道','初期径流弃流池，雨水进水口应按设计要求设置格栅','格栅的设置应便于清理，且不得影响雨水进水口通水能力'],ans:0,exp:'宜采用自动控制方式 第九章城市基础设施更新工程'},
{id:645,ch:9,type:'multi',q:'下列沥青路面病害包括（  ）。',opts:['拱胀及错台','壅包','车辙','沉陷、翻浆','裂缝'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。壅包、车辙、沉陷、翻浆、裂缝。详见教材对应章节。'},
{id:646,ch:8,type:'single',q:'路面出现缝宽为8mm的裂缝，且缝内较潮湿，则该缝隙应采用（  ）封缝。',opts:['道路石油沥青','乳化沥青','煤沥青','改性沥青'],ans:1,exp:'缝宽在10mm及以内的，应采用专用灌缝材料或热沥青灌缝，缝内潮湿时应采用乳化沥青灌缝。'},
{id:647,ch:9,type:'multi',q:'旧路罩面包括（  ）',opts:['微表处工艺','(含砂)雾封层','碎石封层','薄层热拌沥青混凝土','水泥混凝土'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。微表处工艺、(含砂)雾封层、碎石封层、薄层热拌沥青混凝土。详见教材对应章节。'},
{id:648,ch:9,type:'single',q:'用于微表处的沥青是（  ）。',opts:['乳化沥青','改性乳化沥青','石油沥青','煤沥青'],ans:1,exp:'微表处采用机械设备将改性乳化沥青、粗细集料、填料、水和添加剂等按照设计配合比拌合成稀浆混合料并摊铺到原路面上的薄层。'},
{id:649,ch:9,type:'single',q:'微表处施工，下列不符合要求的是（  ）。',opts:['常温施工可采用半幅施工，施工期间不中断行车','摊铺速度1.5～3.0km/h','不需碾压成型','不需要安排试验段'],ans:3,exp:'c.常温施工可采用半幅施工，施工期间不中断行车。 d.采用专用摊铺机具摊铺稀浆混合料，摊铺速度1.5～3.0km/h。 e.不需碾压成型，摊铺找平后必须立即进行初期养护，禁止一切车辆和行人通行。 f.通常，气温25～30℃时养护30min 满足设计要求后，即可开放交通。 g.微表处理施工前应安排试验段，长度不小于200m,以便确定施工参数。'},
{id:650,ch:9,type:'single',q:'有关雾封层施工技术要求，以下正确的是（  ）',opts:['施工时路面温度应大于10℃','环境湿度宜大于或等于80%','雨天进行雾封层施工时，应加大沥青喷洒量','雾封层干涸后即可开放交通'],ans:3,exp:'A选项说法错误；雾封层施工时路面温度应大于或等于15℃ B选项说法错误；环境湿度宜小于或等于80% C选项说法错误；雨天不得进行雾封层施工'},
{id:651,ch:9,type:'multi',q:'混凝土路板边和板角修补，以下正确的是（  ）',opts:['板边存在轻度剥落时，快速路和主干路的养护不得采用沥青混合料修补','宜采用早强补偿收缩混凝土','凿除破损部分时，原有钢筋应剔除','凿除破损部分时，没有钢筋时应植入钢筋','新旧板面间应涂刷界面剂'],ans:[0,1,3,4],exp:'应保留原有钢筋'},
{id:652,ch:9,type:'single',q:'面板脱空、唧浆处理，不符合要求的是（  ）',opts:['检测路面板的脱空可采用弯沉仪','检测路面板的脱空可采用探地雷达','当板边实测弯沉值在0.20～1.00mm时，应钻孔注浆处理','当板边实测弯沉值大于1.00mm，应采用适当材料修补'],ans:3,exp:'当板边实测弯沉值大于1.00mm或整块水泥混凝土面板破碎时，应拆除原有破损混凝土面板，重新铺筑。'},
{id:653,ch:9,type:'multi',q:'有关旧水泥混凝土路开挖式基底处理方法，以下说法有误的是（  ）。',opts:['该处理方法工艺简单，修复彻底','对交通影响较小','适用于车流量较少的路段','处理过程中需要重新浇筑混凝土','处理过程中需要进行注浆地基处理'],ans:[1,4],exp:'B选项，开挖式基底处理对交通影响较大 E选项，进行注浆地基处理是非开挖基底处理'},
{id:654,ch:9,type:'multi',q:'用于裂缝防治的玻纤网和土工织物需要满足的技术要求主要有（  ）。',opts:['抗拉强度','网孔尺寸','单位面积质量','透水率','最大负荷延伸率'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。抗拉强度、网孔尺寸、单位面积质量、最大负荷延伸率。详见教材对应章节。'},
{id:655,ch:9,type:'multi',q:'沥青路面再生包括（  ）。',opts:['厂拌热再生','厂拌温再生','现场热再生','现场温再生','现场冷再生'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。厂拌热再生、厂拌温再生、现场热再生、现场冷再生。详见教材对应章节。'},
{id:656,ch:9,type:'multi',q:'现场热再生工序包括（  ）。',opts:['加热','铣刨','耙松','破碎','筛分'],ans:[0,1,2],exp:'DE为厂拌热再生'},
{id:657,ch:9,type:'single',q:'对城市桥梁的一般性损坏进行修理属于（  ）',opts:['保养小修','中修工程','大修工程','加固工程'],ans:1,exp:'正确答案为B。中修工程。详见教材对应章节。'},
{id:658,ch:9,type:'single',q:'对桥梁结构采取补强、修复、调整内力属于（  ）',opts:['保养小修','中修工程','大修工程','加固工程'],ans:3,exp:'桥梁的养护 保养小修 对管辖范围内的城市桥梁进行日常维护和小修作业。 中修工程 对城市桥梁的一般性损坏进行修理，恢复原有技术水平和标准的工程。 大修工程 对城市桥梁的较大的损坏进行综合治理，全面恢复到原有技术水平和标准的工程及对桥梁结构维修改造的。 加固工程 对桥梁结构采取补强、修复、调整内力等措施，从而满足结构承载力及设计要求的工程。 改扩建工程 不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提高其运行能力的工程。'},
{id:659,ch:9,type:'multi',q:'桥梁扩建必须与（  ）同步完成。',opts:['路基','路面拼接','互通','附属设施改造','伸缩装置'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。路基、路面拼接、互通、附属设施改造。详见教材对应章节。'},
{id:660,ch:9,type:'multi',q:'新、旧桥梁的上部结构连接方式有（  ）。',opts:['湿接头连接','匹配胶','伸缩装置连接','植筋连接','湿接缝连接'],ans:[3,4],exp:'正确答案为D、E。植筋连接、湿接缝连接。详见教材对应章节。'},
{id:661,ch:9,type:'multi',q:'下列可用铰接连接的是（  ）。',opts:['钢筋混凝土实心板桥','预应力混凝土空心板桥','新、旧板梁之间的拼接','预应力混凝土T形梁','连续箱梁桥'],ans:[0,1,2,4],exp:'根据桥梁上部结构不同类型一般采用以下的拼接连接方式： (1)钢筋混凝土实心板和预应力混凝土空心板桥，新、旧板梁之间的拼接宜采用铰接或近似于铰接连接。 (2)预应力混凝土T形梁或组合T形梁桥，新、旧T形梁之间的拼接宜采用刚性连接。 (3)连续箱梁桥，新、旧箱梁之间的拼接宜采用铰接连接。'},
{id:662,ch:10,type:'multi',q:'城市管道现场检测，检测手段包括（  ）等方法及仪器设备。',opts:['超声检测','声呐','传统检查','管道潜望镜','水准仪'],ans:[0,1,2,3],exp:'管道现场检测可采用电视检测（CCTV）、声呐与超声检测、管道潜望镜检测和传统检查方法，必要时可组合采用多种方法。'},
{id:663,ch:9,type:'multi',q:'电视检测(CCTV)说法正确的是（ ） 。',opts:['主要用于管道内水位较低状态下的检测','管内水位不宜大于管道直径的50%','能够全面检查管道的结构和功能状况','应用不是很广泛','适用于直径50～2000mm的管道检测'],ans:[0,2,4],exp:'电视检测(CCTV)也称为闭路电视检测，摄像机固定在自行或电动拖车上，摄像机和拖车的动力由地面主控制台通过电缆提供，并传输图像和控制信号。主要用于管道内水位较低状态下的检测，管内水位不宜大于管道直径的20%。该设备能够全面检查 管道的结构和功能状况，对管道破损、龟裂、堵塞、树根侵入等现象进行检测和记录，应用广泛，适用于直径50～2000mm的管道检测。'},

const CHAPTERS = [{id:1,name:'城镇道路工程'},{id:2,name:'城市桥梁工程'},{id:3,name:'城市隧道工程与轨道交通'},{id:4,name:'给水排水厂站工程'},{id:5,name:'城市管道工程'},{id:6,name:'城市综合管廊工程'},{id:7,name:'垃圾处理工程'},{id:8,name:'海绵城市建设'},{id:9,name:'城市基础设施更新工程'},{id:10,name:'施工测量'},{id:11,name:'施工监测'},{id:12,name:'相关法规'},{id:13,name:'相关标准'},{id:14,name:'项目管理实务'}];

let state = {
  APP_VERSION:'v2.0-dong (642题)',
  settings: {showAnswer: true, shuffleOpts: false, examTime: 30, practiceCount: 25},
  progress: {},
  wrongIds: []
};

function loadState(){
  try{
    const s = localStorage.getItem('yjsz_state');
    if(s) Object.assign(state, JSON.parse(s));
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem('yjsz_state', JSON.stringify(state));}catch(e){}
}

function checkUpdate(){
  const status = document.getElementById('updateStatus');
  status.innerHTML = '📲 请对我说 <strong>"小艺，更新题库"</strong><br><span style="font-size:12px;color:var(--text2)">我会把最新版本发到你的手机上</span>';
  status.style.color = 'var(--text2)';
}

function shuffleArray(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getQuestionsByChapter(chId, count){
  let pool = QUESTIONS.filter(q => q.ch === chId);
  shuffleArray(pool);
  return pool.slice(0, Math.min(count||50, pool.length));
}

function getRandomQuestions(count){
  let pool = [...QUESTIONS];
  shuffleArray(pool);
  return pool.slice(0, Math.min(count||25, pool.length));
}

function getWrongQuestions(){
  let pool = QUESTIONS.filter(q => state.wrongIds.includes(q.id));
  shuffleArray(pool);
  return pool;
}

let quiz = {questions:[], current:0, answers:[], mode:'practice', timer:null, timeLeft:0};

function startRandom(){
  const pc = state.settings.practiceCount || 25;
  const qs = getRandomQuestions(pc);
  if(!qs.length) return showToast('题库为空');
  startQuiz(qs, 'practice', '🎲 随机练习（'+pc+'题）');
}

function startWrongOnly(){
  const qs = getWrongQuestions();
  if(!qs.length) return showToast('暂无错题');
  startQuiz(qs, 'wrong', '📕 错题重练（'+qs.length+'题）');
}

function startByChapter(chId){
  if(chId === -1){document.getElementById('chapterGrid').scrollIntoView({behavior:'smooth'});return;}
  const qs = getQuestionsByChapter(chId, 50);
  if(!qs.length) return showToast('该章节暂无题目');
  const chName = CHAPTERS.find(c=>c.id===chId)?.name||'';
  startQuiz(qs, 'practice', '📚 '+chName+'（'+qs.length+'题）');
}

function startExam(){
  const qs = getRandomQuestions(30);
  if(!qs.length) return showToast('题库为空');
  startQuiz(qs, 'exam', '⏱️ 模拟考试（30题）');
  quiz.timeLeft = state.settings.examTime * 60;
  startTimer();
}

function startQuiz(qs, mode, title){
  quiz.questions = qs;
  quiz.current = 0;
  quiz.mode = mode;
  quiz.answers = qs.map(() => -1);
  document.getElementById('practiceTitle').textContent = title;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-practice').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  renderQuestion();
}

function renderQuestion(){
  const qs = quiz.questions;
  const idx = quiz.current;
  if(idx >= qs.length){finishQuiz();return;}
  const q = qs[idx];
  const total = qs.length;
  document.getElementById('progressInfo').textContent = (idx+1)+'/'+total + (quiz.mode==='exam'&&quiz.timer?' | '+Math.floor(quiz.timeLeft/60)+':'+(quiz.timeLeft%60<10?'0':'')+quiz.timeLeft%60:'');
  document.getElementById('progressFill').style.width = ((idx+1)/total*100)+'%';
  const area = document.getElementById('questionArea');
  const typeLabel = q.type==='single'?'单选题':'多选题';
  const chName = CHAPTERS.find(c=>c.id===q.ch)?.name||'';
  const tags = ['A','B','C','D','E','F'];
  let ans = quiz.answers[idx];
  const isSingle = q.type === 'single';
  let selected = isSingle ? (ans===-1?[]:[ans]) : (Array.isArray(ans)?ans:[]);
  let html = '<div class="q-card"><div class="q-meta"><span class="q-num">第'+(idx+1)+'题</span><span class="q-type">'+typeLabel+' · '+chName+'</span></div><div class="q-text">'+q.q+'</div><div class="options">';
  q.opts.forEach((opt,i)=>{
    const sel = selected.includes(i)?' selected':'';
    html += '<div class="option'+sel+'" data-idx="'+i+'" onclick="selectOpt('+i+')"><div class="tag">'+tags[i]+'</div><div class="text">'+opt+'</div></div>';
  });
  html += '</div>';
  html += '<div class="q-actions"><button class="btn-primary" onclick="confirmAnswer()">'+((quiz.mode==='exam')?'确认答案':'提交')+'</button><button class="btn-outline" onclick="skipQuestion()">跳过</button></div>';
  if(idx>0) html += '<div style="text-align:center;margin-top:10px"><button class="btn-outline" onclick="prevQuestion()" style="flex:none;padding:8px 20px;font-size:13px">← 上一题</button></div>';
  area.innerHTML = html;
}

function selectOpt(i){
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  if(q.type==='single'){
    quiz.answers[idx] = i;
  } else {
    let cur = Array.isArray(quiz.answers[idx])?[...quiz.answers[idx]]:[];
    if(cur.includes(i)) cur = cur.filter(x=>x!==i);
    else cur.push(i);
    quiz.answers[idx] = cur;
  }
  renderQuestion();
}

function getCorrectAnswer(q){return q.ans;}

function formatAnswer(q){
  if(q.type==='single') return 'ABCDEF'[q.ans];
  if(Array.isArray(q.ans)) return q.ans.map(a=>'ABCDEF'[a]).join('');
  return '';
}

function arraysEqual(a,b){
  if(!a||!b||a.length!==b.length) return false;
  return [...a].sort().join()===[...b].sort().join();
}

function confirmAnswer(){
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  const ans = quiz.answers[idx];
  const correct = getCorrectAnswer(q);
  const isSingle = q.type==='single';
  let isCorrect;
  if(isSingle){
    if(ans===-1) return showToast('请先选择一个选项');
    isCorrect = ans===correct;
  } else {
    if(!Array.isArray(ans)||!ans.length) return showToast('请选择至少一个选项');
    isCorrect = arraysEqual(ans,correct);
  }
  if(!state.progress[q.id]) state.progress[q.id]={correct:0,wrongCount:0,answered:0};
  state.progress[q.id].answered++;
  if(isCorrect) state.progress[q.id].correct++;
  else {
    state.progress[q.id].wrongCount++;
    if(!state.wrongIds.includes(q.id)) state.wrongIds.unshift(q.id);
    else {state.wrongIds=state.wrongIds.filter(x=>x!==q.id);state.wrongIds.unshift(q.id);}
  }
  saveState();
  
  const area = document.querySelector('#questionArea .options');
  if(area){
    area.querySelectorAll('.option').forEach(el=>{
      el.classList.add('disabled');
      const oi=parseInt(el.dataset.idx);
      if(isSingle){if(oi===correct)el.classList.add('correct');else if(oi===ans&&ans!==correct)el.classList.add('wrong');}
      else{if(correct.includes(oi))el.classList.add('correct');else if(Array.isArray(ans)&&ans.includes(oi))el.classList.add('wrong');}
    });
  }
  
  const fb = document.createElement('div');
  fb.className='feedback show '+(isCorrect?'correct':'wrong');
  const expText = q.exp ? '<div style="margin-top:8px;padding:10px 12px;background:#fff3e0;border-radius:8px;font-size:13px;line-height:1.7;border-left:3px solid #ff9800"><div style="font-weight:600;color:#e65100;margin-bottom:4px">📖 解析</div>'+q.exp+'</div>' : '';
  fb.innerHTML='<div class="fb-title">'+(isCorrect?'✅ 回答正确':'❌ 回答错误')+'</div><div style="margin-bottom:6px">正确答案：'+formatAnswer(q)+'</div>'+expText;
  document.querySelector('.q-card .q-actions').before(fb);
  document.querySelector('.q-actions').innerHTML='<button class="btn-primary" onclick="nextQuestion()" style="flex:1">下一题 →</button>';
}

function nextQuestion(){quiz.current++;renderQuestion();}
function prevQuestion(){if(quiz.current>0)quiz.current--;renderQuestion();}
function skipQuestion(){quiz.current++;renderQuestion();}

function finishQuiz(){
  const total=quiz.questions.length;
  let correct=0;
  quiz.questions.forEach((q,i)=>{const a=quiz.answers[i];if(a===-1)return;if(q.type==='single'?a===getCorrectAnswer(q):arraysEqual(a,getCorrectAnswer(q)))correct++;});
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('questionArea').innerHTML='<div class="q-card" style="text-align:center;padding:30px"><div style="font-size:36px;margin-bottom:12px">'+(pct>=80?'🎉':pct>=60?'💪':'📚')+'</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">练习完成！</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px">共 '+total+' 题</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px">答对 '+correct+' 题</div><div style="font-size:28px;font-weight:800;color:'+(pct>=80?'var(--success)':pct>=60?'#e37400':'var(--danger)')+'">'+pct+'%</div><div style="margin-top:20px;display:flex;gap:10px;justify-content:center"><button class="btn-primary" onclick="backToHome()" style="padding:12px 24px">返回首页</button><button class="btn-outline" onclick="startWrongOnly()" style="padding:12px 24px">错题重练</button></div></div>';
  stopTimer();
}

function backToHome(){
  stopTimer();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-home').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="home"]').classList.add('active');
  updateStats();
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    const name=this.dataset.tab;
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    if(name==='home')updateStats();
    if(name==='wrong')renderWrongList();
  });
});

function startTimer(){
  stopTimer();
  quiz.timer=setInterval(()=>{
    quiz.timeLeft--;
    if(quiz.timeLeft<=0){stopTimer();showToast('⏰ 时间到！');finishQuiz();return;}
    renderQuestion();
  },1000);
}
function stopTimer(){if(quiz.timer){clearInterval(quiz.timer);quiz.timer=null;}}

function renderWrongList(){
  const list=document.getElementById('wrongList');
  const empty=document.getElementById('wrongEmpty');
  if(!state.wrongIds.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  let html='<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text2)">共 '+state.wrongIds.length+' 道错题</span><button onclick="startWrongOnly()" style="padding:8px 16px;font-size:13px;border-radius:8px;border:none;color:#fff;background:var(--primary);cursor:pointer">开始重练</button></div>';
  state.wrongIds.forEach(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    if(!q)return;
    const ch=CHAPTERS.find(c=>c.id===q.ch);
    html+='<div class="wrong-item" onclick="startQuiz([QUESTIONS.find(x=>x.id==='+id+')],\'wrong\',\'📕 错题回顾\')"><div class="ch">📖 '+(ch?ch.name:'')+' · '+(q.type==='single'?'单选':'多选')+'</div><div class="q">'+q.q+'</div><span class="tag-w">❌ 答错'+(state.progress[q.id]?.wrongCount||1)+'次</span></div>';
  });
  list.innerHTML=html;
}

function updateStats(){
  const total=QUESTIONS.length;
  const done=Object.keys(state.progress).length;
  let correctCount=0,totalAttempts=0;
  Object.values(state.progress).forEach(p=>{correctCount+=p.correct;totalAttempts+=p.answered;});
  const rate=totalAttempts>0?Math.round(correctCount/totalAttempts*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statRate').textContent=rate+'%';
  document.getElementById('statWrong').textContent=state.wrongIds.length;
}

function renderChapterGrid(){
  const grid=document.getElementById('chapterGrid');
  let html='';
  CHAPTERS.forEach(ch=>{
    const cnt=QUESTIONS.filter(q=>q.ch===ch.id).length;
    html+='<div class="chapter-btn" onclick="startByChapter('+ch.id+')"><div><div class="name">第'+ch.id+'章 '+ch.name+'</div><div class="count">'+cnt+'题</div></div><span class="arrow">→</span></div>';
  });
  grid.innerHTML=html;
}

function toggleSetting(key){
  state.settings[key]=!state.settings[key];
  document.getElementById('toggle'+key.charAt(0).toUpperCase()+key.slice(1)).classList.toggle('on',state.settings[key]);
  saveState();
}

function adjExamTime(delta){
  let t=state.settings.examTime+delta;
  if(t<10)t=10;if(t>120)t=120;
  state.settings.examTime=t;
  document.getElementById('examTimeDisplay').textContent=t;
  saveState();
}

function adjPracticeCount(delta){
  let t=(state.settings.practiceCount||25)+delta;
  if(t<5)t=5;if(t>90)t=90;
  state.settings.practiceCount=t;
  document.getElementById('practiceCountSetting').textContent=t;
  document.getElementById('practiceCountDisplay').textContent=t;
  saveState();
}

function clearAllProgress(){
  if(!confirm('确定清除所有练习进度和错题记录吗？'))return;
  state.progress={};state.wrongIds=[];
  saveState();updateStats();renderWrongList();showToast('已清除所有进度');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadState();
document.getElementById('toggleShowAnswer').classList.toggle('on', state.settings.showAnswer);
document.getElementById('toggleShuffleOpts').classList.toggle('on', state.settings.shuffleOpts);
document.getElementById('examTimeDisplay').textContent = state.settings.examTime;
document.getElementById('practiceCountSetting').textContent = state.settings.practiceCount || 25;
document.getElementById('practiceCountDisplay').textContent = state.settings.practiceCount || 25;
document.getElementById('versionDisplay').textContent = state.APP_VERSION;
updateStats();
renderChapterGrid();
</script>
</body>
</html>
