<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>一建市政题库（董老师题库）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1a73e8;--primary-light:#e8f0fe;--success:#34a853;--danger:#ea4335;--warning:#fbbc04;--bg:#f5f7fa;--card:#fff;--text:#202124;--text2:#5f6368;--border:#dadce0;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:12px 12px 80px}
.header{display:flex;align-items:center;gap:12px;padding:12px 0;margin-bottom:8px}
.header h1{font-size:20px;font-weight:700;flex:1}
.header .badge{background:var(--primary);color:#fff;font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:.2s;border:none;background:none}
.tab.active{background:var(--primary);color:#fff;font-weight:600}
.tab:not(.active):active{background:#e8e8e8}
.panel{display:none}
.panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .num{font-size:28px;font-weight:800;color:var(--primary)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.green .num{color:var(--success)}
.stat-card.orange .num{color:#e37400}
.stat-card.red .num{color:var(--danger)}
.chapter-grid{display:grid;gap:8px}
.chapter-btn{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;transition:.2s;display:flex;align-items:center;justify-content:space-between}
.chapter-btn:active{border-color:var(--primary);background:var(--primary-light)}
.chapter-btn .name{font-size:14px;font-weight:500}
.chapter-btn .count{font-size:12px;color:var(--text2)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.qa-btn{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:none;font-size:14px;font-weight:600;color:var(--text);transition:.2s}
.qa-btn:active{transform:scale(.97);background:var(--primary-light)}
.qa-btn .icon{font-size:24px;display:block;margin-bottom:6px}
.q-card{background:var(--card);border-radius:var(--radius);padding:20px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.q-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.q-text{font-size:16px;line-height:1.7;margin-bottom:14px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:.2s;background:#fff;font-size:14px;line-height:1.5}
.option:active{transform:scale(.98)}
.option .tag{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);font-weight:700;font-size:13px;color:var(--text2)}
.option .text{flex:1;padding-top:2px}
.option.selected{border-color:var(--primary);background:var(--primary-light)}
.option.selected .tag{background:var(--primary);color:#fff}
.option.correct{border-color:var(--success);background:#e6f4ea}
.option.correct .tag{background:var(--success);color:#fff}
.option.wrong{border-color:var(--danger);background:#fce8e6}
.option.wrong .tag{background:var(--danger);color:#fff}
.option.disabled{cursor:default;pointer-events:none}
.feedback{margin-top:14px;padding:14px;border-radius:10px;font-size:14px;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.correct{background:#e6f4ea;border-left:4px solid var(--success)}
.feedback.wrong{background:#fce8e6;border-left:4px solid var(--danger)}
.q-actions{display:flex;gap:10px;margin-top:14px}
.q-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.q-actions button:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--text2);border:2px solid var(--border)!important}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;color:var(--text)}
.top-bar .title{font-size:16px;font-weight:600;flex:1}
.top-bar .info{font-size:13px;color:var(--text2)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.wrong-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.wrong-item .ch{font-size:12px;color:var(--text2);margin-bottom:4px}
.wrong-item .q{font-size:14px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wrong-item .tag-w{display:inline-block;background:#fce8e6;color:var(--danger);font-size:11px;padding:1px 8px;border-radius:4px;margin-top:4px}
.setting-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);padding:14px 16px;border-radius:var(--radius);margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.setting-row .label{font-size:14px}
.setting-row .hint{font-size:12px;color:var(--text2);margin-top:2px}
.toggle{position:relative;width:48px;height:28px;background:var(--border);border-radius:14px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .knob{left:23px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;z-index:100;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:400px){.q-text{font-size:15px}.option{font-size:13px;padding:10px 12px}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>📗 一建市政题库</h1>
    <span class="badge" id="totalBadge">董老师题库</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home">🏠 首页</button>
    <button class="tab" data-tab="practice">📝 练习</button>
    <button class="tab" data-tab="wrong">❌ 错题</button>
    <button class="tab" data-tab="settings">⚙️ 设置</button>
  </div>

  <div class="panel active" id="panel-home">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总题数</div></div>
      <div class="stat-card green"><div class="num" id="statDone">0</div><div class="label">已练习</div></div>
      <div class="stat-card orange"><div class="num" id="statRate">0%</div><div class="label">正确率</div></div>
      <div class="stat-card red"><div class="num" id="statWrong">0</div><div class="label">错题数</div></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">快速开始</div>
    <div class="quick-actions">
      <button class="qa-btn" onclick="startRandom()"><span class="icon">🎲</span>随机 <span id="practiceCountDisplay">25</span> 题</button>
      <button class="qa-btn" onclick="startWrongOnly()"><span class="icon">📕</span>错题重练</button>
      <button class="qa-btn" onclick="startExam()"><span class="icon">⏱️</span>模拟考试</button>
      <button class="qa-btn" onclick="startByChapter(-1)"><span class="icon">📚</span>章节选择</button>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin:16px 0 8px">选择章节练习</div>
    <div class="chapter-grid" id="chapterGrid"></div>
  </div>

  <div class="panel" id="panel-practice">
    <div class="top-bar">
      <button class="back-btn" onclick="backToHome()">←</button>
      <div class="title" id="practiceTitle">练习模式</div>
      <div class="info" id="progressInfo">1/25</div>
    </div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div id="questionArea"></div>
  </div>

  <div class="panel" id="panel-wrong">
    <div id="wrongList"></div>
    <div id="wrongEmpty" class="empty" style="display:none"><div class="icon">🎉</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">没有错题</div><div style="font-size:13px;color:var(--text2)">继续保持！</div></div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="setting-row">
      <div><div class="label">📖 显示解析</div><div class="hint">答题后立即显示答案解析</div></div>
      <div class="toggle on" id="toggleShowAnswer" onclick="toggleSetting('showAnswer')"><div class="knob"></div></div>
    </div>
    <div class="setting-row">
      <div><div class="label">🔀 选项随机</div><div class="hint">每题选项随机排序</div></div>
      <div class="toggle" id="toggleShuffleOpts" onclick="toggleSetting('shuffleOpts')"><div class="knob"></div></div>
    </div>
    <div class="setting-row">
      <div><div class="label">⏱️ 模拟考试时长</div><div class="hint">模拟考试限时（分钟）</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="adjExamTime(-5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">−</button>
        <span id="examTimeDisplay" style="font-size:16px;font-weight:600;min-width:32px;text-align:center">30</span>
        <button onclick="adjExamTime(5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">+</button>
      </div>
    </div>
    <div class="setting-row">
      <div><div class="label">🎲 随机练习题数</div><div class="hint">每次随机练习的题目数量（5~90题）</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="adjPracticeCount(-5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">−</button>
        <span id="practiceCountSetting" style="font-size:16px;font-weight:600;min-width:32px;text-align:center">25</span>
        <button onclick="adjPracticeCount(5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">+</button>
      </div>
    </div>

    <div id="updatePanel" style="margin-top:20px;padding:16px;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:600">📦 版本更新</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">当前版本：<span id="versionDisplay">v1.0.0-dong</span></div>
        </div>
        <button id="checkUpdateBtn" onclick="checkUpdate()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:500;cursor:pointer">🔄 检查更新</button>
      </div>
      <div id="updateStatus" style="font-size:13px;min-height:20px"></div>
    </div>

    <div style="margin-top:16px">
      <button onclick="clearAllProgress()" style="width:100%;padding:12px;border-radius:10px;border:2px solid var(--danger);background:#fff;color:var(--danger);font-size:14px;font-weight:600;cursor:pointer">🗑️ 清除所有进度</button>
    </div>
    <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--text2);line-height:1.8">
      依据：董老师章节选择习题班<br>
      题目来源：董老师章节练习题<br>
      第1章：城镇道路工程 | 第2章：城市桥梁工程
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script>
const QUESTIONS = [{id:1,ch:1,type:'single',q:'主干路沥青路面使用年限（）。',opts:['10','15','20','30'],ans:1,exp:'教材规定：主干路沥青路面设计使用年限为15年，水泥混凝土路面为30年。根据教材表1.1-1，主干路沥青路面为15年，而10年为支路沥青路面，20年为支路或次干路混凝土路面，30年为主干路或快速路混凝土路面。'},{id:2,ch:1,type:'single',q:'次干路混凝土路面使用年限（）。',opts:['10','15','20','30'],ans:2,exp:'教材规定：次干路水泥混凝土路面设计使用年限为20年。根据教材表1.1-1，次干路沥青路面为15年，水泥混凝土路面为20年。A选项10年为支路或砌块路面的年限，15年为主干路沥青路面或次干路沥青路面年限，30年为快速路或主干路混凝土路面年限。'},{id:3,ch:1,type:'multi',q:'沥青贯入式与沥青表面处治路面适合于（  ）。',opts:['各交通等级道路','支路','停车场','广场','步行街'],ans:[1,2],exp:'正确答案为B、C。支路；停车场\n\n📖 教材依据（第1章）：(2)根据路面材料可分为沥青路面、水泥混凝土路面和砌块路面。沥青路面又分为沥青?昆凝土、沥青贯人式和沥青表面处治路面，沥青混凝土适用于各交通等级道路;沥青贯入式与沥青表面处治路面适用于支路、停车场。水泥混凝土路面又分为普通混凝土、钢筋1昆凝土、连续配筋混凝土与钢纤维混凝土路面，适用于各交通等级道路。砌块路面又可分为石材、预制混凝土砌块等路面，适用于支路、广场、停车场、人行道与步行街。\n\n教材规定：沥青贯入式与沥青表面处治路面适用于支路、停车场。A选项"各交通等级道路"对应的是沥青混凝土路面而非贯入式与表面处治。C选项"广场"、D选项"步行街"属于砌块路面的适用范围。'},{id:4,ch:1,type:'single',q:'下列路面材料中只适合支路的是（  ）。',opts:['沥青混合料','钢筋混凝土','水泥混凝土','砌块路面'],ans:3,exp:'沥青混合料适用于各交通等级道路沥青贯入式与沥青表面处治路面适用于支路、停车场。水泥混凝土路面结构类型包括普通混凝土、钢筋混凝土、连续配筋混凝土与钢纤维混凝土，适用于各交通等级道路。砌块路面适用于支路、广场、停车场、人行道与步行街。'},{id:5,ch:1,type:'single',q:'关于城市道路功能的描述中，符合主干路主要特点的是（ ）',opts:['完全为交通功能服务，解决城市大容量、长距离、快速交通','以交通功能为主，连接城市各主要分区，构成道路网主要骨架','为区域交通集散服务，兼有服务功能，与主干路组成干路网','连接次干路与居住小区等内部道路，以服务功能为主'],ans:1,exp:'正确答案为B。以交通功能为主，连接城市各主要分区，构成道路网主要骨架\n\n📖 教材依据（第1章）：四个等级。快速路，又称城市快速路，完全为交通功能服务，是解决城市大容量、长距离、快速交通的主要道路。2第才篇市政公用工程技术主干路以交通功能为主，为连接城市各主要分区的干路，是城市道路网的主要骨架。机动车道侧分带非机动车道人行道中带分侧分带机道车动非行人车动道机道h\\l!道路中心线日;2lφ;燃气φ雨水污水图1.1-1道路标准横断面图道路中心线路缘石(侧石)AC-13细粒式沥青混凝土中央分隔带AC-20C中粒式沥青混凝土AC-25C粗粒式沥青混凝土沥青封层、透层路缘石(平石)回填种植土防水土工布……\n\n教材规定：主干路以交通功能为主，为连接城市各主要分区的干路，是城市道路网的主要骨架。A选项描述的是快速路的特点（完全为交通功能服务），C选项是次干路的特点，D选项是支路的特点。'},{id:6,ch:1,type:'multi',q:'下列关于城市道路分类与功能的表述中，正确的有（ ）',opts:['快速路完全为交通功能服务，主要解决大容量、长距离、快速交通','主干路以交通功能为主，是连接城市各主要分区的干路','次干路兼有服务功能，与主干路共同组成城市干路网','支路以服务功能为主，直接连接居住小区与快速路','次干路是城市道路网的主要骨架，承担最长距离的交通'],ans:[0,1,2],exp:'教材规定：快速路完全为交通功能服务，主干路以交通功能为主，次干路兼有服务功能并与主干路组成干路网。D错误：支路连接次干路与居住小区等内部道路，并非直接连接快速路。E错误：次干路是区域性交通干道，承担最长距离交通的是快速路。'},{id:7,ch:1,type:'single',q:'关于城市快速路的特点，下列说法正确的是（ ）',opts:['主要服务于短距离通勤交通','允许非机动车和行人通行','完全为交通功能服务，解决大容量、长距离、快速交通','是城市区域性的交通干道'],ans:2,exp:'正确答案为C。完全为交通功能服务，解决大容量、长距离、快速交通\n\n📖 教材依据（第1章）：在充分考虑道路在城市道路网中的地位、交通功能及对沿线服务功能的基础上，将城镇道路分为快速路、主干路、次干路与支路四个等级。快速路，又称城市快速路，完全为交通功能服务，是解决城市大容量、长距离、快速交通的主要道路。2第才篇市政公用工程技术主干路以交通功能为主，为连接城市各主要分区的干路，是城市道路网的主要骨架。\n\n根据题干描述，快速路完全为交通功能服务，解决大容量、长距离、快速交通，因此C正确。A错误，快速路不是短距离道路；B错误，快速路一般禁止非机动车和行人；D错误，区域性交通干道是次干路的特点。'},{id:8,ch:1,type:'multi',q:'关于城市主干路和次干路的区别，下列说法正确的有（ ）',opts:['主干路以交通功能为主，次干路兼有服务功能','主干路是城市道路网的主要骨架，次干路是区域交通集散道路','主干路和次干路均允许设置大量路边停车位','主干路通常比次干路设计车速更高','次干路主要连接快速路，主干路主要连接支路'],ans:[0,1,3],exp:'A正确，主干路以交通功能为主，次干路兼有服务功能。B正确，主干路是城市主要骨架，次干路是区域性集散道路。C错误，主干路一般不允许大量路边停车。D正确，主干路设计车速通常高于次干路。E错误，次干路连接主干路和支路，而非快速路。'},{id:9,ch:1,type:'single',q:'支路在城市道路网中的主要功能是（ ）',opts:['承担长距离快速交通','连接次干路与居住区、工业区等内部道路','作为城市主要交通骨架','解决大容量交通需求'],ans:1,exp:'支路的主要功能是连接次干路与居住区、工业区等内部道路，以服务功能为主，因此B正确。A、D是快速路的特点；C是主干路的特点。'},{id:10,ch:1,type:'multi',q:'根据道路使用功能划分，可分为（）',opts:['机动车道','非机动车道','人行道','水泥混凝土路面','沥青类路面'],ans:[0,1,2],exp:'正确答案为A、B、C。机动车道；非机动车道；人行道\n\n📖 教材依据（第1章）：块路面又可分为石材、预制混凝土砌块等路面，适用于支路、广场、停车场、人行道与步行街。(3)根据路面力学性能可分为柔性路面和刚性路面。(4)根据道路使用功能可分为机动车道、非机动车道、人行道(见图1.1-1、图1.1-2)。2.城镇道路分级《城市道路工程设计规范}CJJ37-2012在充分考虑道路在城市道路网中的地位、交通功能及对沿线服务功能的基础上，将城镇道路分为快速路、主干路、次干路与支路四个等级。\n\n教材规定：根据道路使用功能可分为机动车道、非机动车道、人行道。D选项"水泥混凝土路面"和E选项"沥青类路面"属于按路面材料分类，而非按使用功能分类。'},{id:11,ch:1,type:'multi',q:'道路路面的基本结构层一般为（）',opts:['面层','基层','垫层','路基','路堤'],ans:[0,1,2],exp:'正确答案为A、B、C。面层；基层；垫层\n\n📖 教材依据（第1章）：)。上(表)面层中西层(根据设计要求增加)下(底)面层上基层下基层垫层(根据设计要求增加)路基图1.1-3道路结构断面图道路路面的基本结构层一般为面层、基层、垫层(有设计要求时基层下加垫层)三个主要层次。当路面各层的厚度较大时，面层可分为上(表)面层、中面层和下(底)面层，基层分为上基层、下基层等。面层直接承受汽车车轮的作用并直接受阳光、雨雪、冰冻等温度和湿度及其变化的作用，应具有足够的结构强度、高温稳定性、低温抗裂性以及抗疲劳、抗水损害能力;为保证交通安全和舒适性，面层还应有足够的抗滑能力及良……\n\n教材规定：道路路面的基本结构层一般为面层、基层和垫层。D选项"路基"和E选项"路堤"属于路基结构部分，而非路面结构层。'},{id:12,ch:1,type:'single',q:'关于路面垫层的作用，下列说法错误的是（ ）。',opts:['改善土基的湿度和温度状况','保证面层和基层的强度稳定性及抗冻胀能力','直接承受汽车车轮的剪切与磨耗作用','扩散由基层传来的荷载应力，减小土基变形'],ans:2,exp:'正确答案为C。直接承受汽车车轮的剪切与磨耗作用\n\n📖 教材依据（城镇道路工程）：路路面的基本结构层一般为面层、基层、垫层(有设计要求时基层下加垫层)三个主要层次。当路面各层的厚度较大时，面层可分为上(表)面层、中面层和下(底)面层，基层分为上基层、下基层等。面层直接承受汽车车轮的作用并直接受阳光、雨雪、冰冻等温度和湿度及其变化的作用，应具有足够的结构强度、高温稳定性、低温抗裂性以及抗疲劳、抗水损害能力;为保证交通安全和舒适性，面层还应有足够的抗滑能力及良好的平整度。'},{id:13,ch:1,type:'multi',q:'关于路面面层应具有的性能要求，正确的包括（ ）。',opts:['足够的结构强度','良好的高温稳定性','足够的抗滑能力','良好的平整度','主要起承重作用并具有水稳定性'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。足够的结构强度；良好的高温稳定性；足够的抗滑能力；良好的平整度\n\n📖 教材依据（第1章）：分为上(表)面层、中面层和下(底)面层，基层分为上基层、下基层等。面层直接承受汽车车轮的作用并直接受阳光、雨雪、冰冻等温度和湿度及其变化的作用，应具有足够的结构强度、高温稳定性、低温抗裂性以及抗疲劳、抗水损害能力;为保证交通安全和舒适性，面层还应有足够的抗滑能力及良好的平整度。基层主要起承重作用，应具有足够的强度和扩散荷载的能力并具有足够的水稳定性。\n\nE选项描述的是基层的主要作用。'},{id:14,ch:1,type:'multi',q:'基层性能的主要指标，以下说法正确的有：',opts:['基层应满足结构强度和扩散荷载的能力','基层需具备水稳性和抗冻性','不透水性是基层的重要性能要求','排水基层下应设置不透水底基层','底基层顶面必须铺设防水土工织物'],ans:[0,1,2],exp:'正确答案为A、B、C。基层应满足结构强度和扩散荷载的能力；基层需具备水稳性和抗冻性；不透水性是基层的重要性能要求\n\n📖 教材依据（第1章）：构强度、高温稳定性、低温抗裂性以及抗疲劳、抗水损害能力;为保证交通安全和舒适性，面层还应有足够的抗滑能力及良好的平整度。基层主要起承重作用，应具有足够的强度和扩散荷载的能力并具有足够的水稳定性。垫层的主要作用为改善土基的湿度和温度状况，保证面层和基层的强度稳定性和抗冻胀能力，扩散由基层传来的荷载应力，以减小土基所产生的变形。\n\nE选项中“必须”说法过于绝对，底基层顶面宜铺设沥青封层或防水土工织物'},{id:15,ch:1,type:'multi',q:'对垫层性能要求的主要指标包括（  ）。',opts:['高温抗车辙','承载能力','扩散荷载','水稳性','压实度'],ans:[1,2,3],exp:'教材规定：垫层应具有一定的强度和良好的水稳定性，主要作用为改善土基温湿度、保证面层基层强度、扩散荷载应力。垫层性能指标包括承载能力、扩散荷载和水稳性。A选项"高温抗车辙"是面层指标，E选项"压实度"是施工控制指标而非性能指标。'},{id:16,ch:1,type:'single',q:'水泥混凝土面层的性能，以下说法错误的是（ ）',opts:['应具有足够的强度和耐久性','表面应满足抗滑、耐磨、平整的要求','需具备良好的透水性以利于排水','抗冻性是耐久性的重要指标之一'],ans:2,exp:'正确答案为C。需具备良好的透水性以利于排水\n\n📖 教材依据（第1章）：合料的压实度不够，在次年气温较高时，经车轮反复碾压，形成车辙。1.41.4.1挡土墙施工挡土墙结构形式及分类才.挡土墙类型在城市道路桥梁工程中常见的挡土墙有现浇钢筋i昆凝土结构挡土墙、装配式钢筋1昆凝土结构挡土墙、砌体结构挡土墙、锚杆式挡土墙和加筋土挡土墙。按照挡土墙结构形式及结构特点，可分为重力式、衡重式、悬臂式、扶壁式、柱板式、锚杆式、自立式、加筋土等不同挡土墙。\n\n水泥混凝土面层要求不透水，透水性并非其性能要求，故C错误。'},{id:17,ch:1,type:'single',q:'沥青混合料面层的使用指标不包括（ ）',opts:['承载能力和平整度','温度稳定性和透水性','水稳定性和抗滑能力','抗压强度和弹性模量'],ans:3,exp:'正确答案为D。抗压强度和弹性模量\n\n📖 教材依据（第1章）：收规范~CJJ1-2008规定:热拌沥青海合料路面应待摊铺层自然降温至表面温度低于50"C后，方可开放交通。2)改性沥青混合料面层施工改性沥青混合料面层的工艺流程可参照普通沥青混合料路面，改性沥青混合料的运输、摊铺、压实与成型、接缝除满足普通沥青混合料摊铺要求外，还应做到:(1)运输运料车卸料必须倒净，如有粘在车厢板上的剩料，必须及时清除，防止硬结。\n\n沥青混合料面层使用指标未提及抗压强度和弹性模量，D为结构设计参数，非使用指标。'},{id:18,ch:1,type:'multi',q:'路基是路面结构以下的部分，包括（  ）。',opts:['路床','路堑','基层','垫层','路堤'],ans:[0,1,4],exp:'教材规定：路基断面形式有路堤（路基顶面高于原地面的填方路基）、路堑（全部由地面开挖出的路基）以及半填半挖路基。路床是路基的一部分。C选项"基层"和D选项"垫层"属于路面结构层，不属于路基范围。'},{id:19,ch:1,type:'single',q:'路床是路基的一部分，指路面结构层以下（ ）范围内的部分。',opts:['30cm','50cm','80cm','150cm'],ans:2,exp:'教材规定：路床是路基的一部分，指路面结构层以下80cm范围内的部分。30cm和50cm均偏小，150cm则偏大，路床仅为路基顶面以下80cm深度范围。'},{id:20,ch:1,type:'single',q:'上路堤是指路面结构层以下（ ）的填方路基。',opts:['0～30cm','30～80cm','30～80cm','80～150cm'],ans:3,exp:'正确答案为D。80～150cm\n\n📖 教材依据（第1章）：能力D级400kN及以上等级的可调式防沉降检查井盖，井盖可插入井座深度宜为150mm。(2)检查井井室周边应做好防沉降处理，可在道路结构层以下设置钢筋混凝土承载板。(3)井盖座的底标高应根据路面厚度、井盖可调高度确定，对于沥青混合料下、中面层需临时开放交通的，应综合考虑临时开放交通、完工状况的井盖可调范围。\n\n教材规定：上路堤是指路面结构层以下80～150cm的填方路基。0～30cm和30～80cm属于路床范围（路床厚80cm，分上路床0～30cm和下路床30～80cm）。'},{id:21,ch:1,type:'single',q:'关于高液限黏土、高液限粉土及含有机质细粒土作为路基填料的要求，下列说法正确的是（ ）。',opts:['可直接用作路基填料，无需特殊处理','须掺加石灰或水泥等结合料进行改善','仅适用于地下水位较低的路段','仅能用于填筑路基底层'],ans:1,exp:'正确答案为B。须掺加石灰或水泥等结合料进行改善\n\n📖 教材依据（第1章）：程技术2.路基填料的要求高液限站土、高液限粉土及含有机质的细粒土，不适于做路基填料。因条件限制而必须采用上述土做填料时，应掺加石灰或水泥等结合料进行改善。地下水位高时，宜提高路基顶面标高。在设计标高受限制，未能达到中温状态的路基临界高度时，应选用粗粒士或低剂量石灰或水泥稳定细粒土做路基填料，同时应采取在边沟下设置排水渗沟等降低地下水位的措施。\n\n教材规定：高液限黏土、高液限粉土及含有机质的细粒土，不适于做路基填料。因条件限制而必须采用上述土做填料时，应掺加石灰或水泥等结合料进行改善。A选项"可直接使用"错误，C和D选项不准确。'},{id:22,ch:1,type:'multi',q:'在地下水位较高的路段进行路基填筑时，可采取的措施包括（ ）。',opts:['提高路基顶面标高','选用粗粒土作为填料','采用低剂量石灰稳定细粒土','在边沟下设置排水渗沟','直接使用高液限黏土填筑'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。提高路基顶面标高；选用粗粒土作为填料；采用低剂量石灰稳定细粒土；在边沟下设置排水渗沟\n\n📖 教材依据（第1章）：位置球形补偿器示意图b.直管段设置补偿器的最大距离和补偿器弯头的弯曲半径应符合设计要求。在靠近补偿器的两端，应设置导向支架保证运行时管道沿轴线方向自由伸缩。c.当安装时的环境温度低于补偿零点(设计的最高温度与最低温度差值的1/2)时，应对补偿器进行预拉伸，拉伸的具体数值应符合设计文件的要求。经过预拉伸的补偿器，在安装及保温过程中应采取措施保证预拉伸不被释放。\n\n地下水位高时，宜提高路基顶面标高；若设计标高受限，应选用粗粒土或低剂量石灰稳定细粒土，并采取排水渗沟等措施。高液限黏土不宜直接使用，故E错误。'},{id:23,ch:1,type:'single',q:'关于岩石或填石路基顶面整平层的设置，下列说法错误的是（ ）。',opts:['整平层可采用未筛分碎石和石屑','整平层厚度一般为100～150mm','必须采用高剂量水泥稳定粒料','整平层用于调整路基顶面的平整度'],ans:2,exp:'规范要求整平层可采用未筛分碎石、石屑或低剂量水泥稳定粒料，而非高剂量，故C错误。高液限黏土、高液限粉土及含有机质的细粒土，不适于做路基填料。因条件限制而必须采用上述土做填料时，应掺加石灰或水泥等结合料进行改善。岩石或填石路基顶面应铺设整平层。整平层可采用未筛分碎石和石屑或低剂量水泥稳定粒料，其厚度视路基顶面不平整程度而定，一般为100～150mm。'},{id:24,ch:1,type:'multi',q:'对路基性能要求的主要指标不包括（  ）。',opts:['整体稳定性','承载能力','变形量控制','透水性','压实度'],ans:[1,3,4],exp:'正确答案为B、D、E。承载能力；透水性；压实度\n\n📖 教材依据（第1章）：有重要影响。路基应稳定、密实、均质，为路面结构提供均匀的支承，即路基在环境和荷载作用下不产生不均匀变形。(2)性能主要指标:路基整体稳定性和变形量控制。第1章城镇道路工程1.1.25道路路面结构特征1.沥青路面结构组成特点1)路面结构组成路面结构自下至上由垫层、基层、面层组成(见图1.1-3)。(1)垫层垫层是介于基层和路基之间的层位，主要设置在温度和湿度状况不良的路段上，以改善路面结构的使用性能。\n\n教材规定：路基性能主要指标包括路基整体稳定性和变形量控制。A选项"整体稳定性"和C选项"变形量控制"是核心指标。B选项"承载能力"、D选项"透水性"、E选项"压实度"均不属于路基性能要求的主要指标。'},{id:25,ch:1,type:'single',q:'关于垫层在道路结构中的作用，说法错误的是（）',opts:['主要设置在温度和湿度状况不良的路段','在季节性冰冻地区可减轻冻胀和翻浆病害','垫层应选用黏性土以提高水稳性','可改善路面结构的使用性能'],ans:2,exp:'正确答案为C。垫层应选用黏性土以提高水稳性\n\n📖 教材依据（第1章）：沥青路面结构组成特点1)路面结构组成路面结构自下至上由垫层、基层、面层组成(见图1.1-3)。(1)垫层垫层是介于基层和路基之间的层位，主要设置在温度和湿度状况不良的路段上，以改善路面结构的使用性能。在季节性冰冻地区路面结构厚度小于最小防冻厚度要求时，设置防冻垫层可以使路面结构免除或减轻冻胀和翻浆病害。\n\n根据规范要求，垫层宜采用砂、砂砾等颗粒材料，而非黏性土，故C选项错误。'},{id:26,ch:1,type:'multi',q:'下列（ ）路段应按设计要求设置垫层',opts:['季节性冰冻地区的干燥路段','季节性冰冻地区的中湿或潮湿路段','地下水位高、排水不良的路基','水文地质条件良好的土质路堑','路床土处于潮湿或过湿状态的土质路堑'],ans:[1,2,4],exp:'正确答案为B、C、E。季节性冰冻地区的中湿或潮湿路段；地下水位高、排水不良的路基；路床土处于潮湿或过湿状态的土质路堑\n\n📖 教材依据（第1章）：青路面又分为沥青?昆凝土、沥青贯人式和沥青表面处治路面，沥青混凝土适用于各交通等级道路;沥青贯入式与沥青表面处治路面适用于支路、停车场。水泥混凝土路面又分为普通混凝土、钢筋1昆凝土、连续配筋混凝土与钢纤维混凝土路面，适用于各交通等级道路。砌块路面又可分为石材、预制混凝土砌块等路面，适用于支路、广场、停车场、人行道与步行街。\n\n季节性冰冻地区的中湿或潮湿路段（B）、地下水位高排水不良的路基（C）、以及路床土潮湿或过湿的土质路堑（E）需要设置垫层。'},{id:27,ch:1,type:'single',q:'关于垫层材料的选用要求，下列说法正确的是：',opts:['垫层材料中小于0.075mm的颗粒含量不应大于3%','垫层宜采用粉质黏土以增强隔水性能','垫层材料中小于0.075mm的颗粒含量不应大于5%','垫层必须采用级配碎石材料'],ans:2,exp:'正确答案为C。垫层材料中小于0.075mm的颗粒含量不应大于5%\n\n📖 教材依据（第1章）：。进行水密试验的水压不应小于孔内水深1.5倍的压力。才22第1篇市政公用工程技术④隔水栓应认真细致制作，其直径和椭圆度应符合使用要求。⑤完成第二次清孔后，应立即开始灌注1昆凝土，若因故推迟灌注1昆凝土，应重新进行清孔，否则，\'可能造成孔内泥浆悬浮的砂粒下沉而使孔底沉渣过厚，并导致隔水栓无法正常工作而发生堵管事故。\n\n规范明确规定垫层材料中小于0.075mm的颗粒含量不应大于5%，故C选项正确。'},{id:28,ch:1,type:'multi',q:'以下（ ）路段按设计要求设置垫层。',opts:['季节性冰冻地区的干燥路段','地下水位高、排水不良，路基处于潮湿或过湿状态的路段','水文地质条件不良的土质路堑，路床土处于潮湿或过湿状态的路段','地下水位高、排水不良，路基处于干燥状态的路段','水文地质条件不良的土质路堑，路床土处于干燥状态的路段'],ans:[1,2],exp:'正确答案为B、C。地下水位高、排水不良，路基处于潮湿或过湿状态的路段；水文地质条件不良的土质路堑，路床土处于潮湿或过湿状态的路段\n\n📖 教材依据（第1章）：良的路段上，以改善路面结构的使用性能。在季节性冰冻地区路面结构厚度小于最小防冻厚度要求时，设置防冻垫层可以使路面结构免除或减轻冻胀和翻浆病害。以下路段按设计要求设置垫层:①季节性冰冻地区的中湿或潮湿路段。②地下水位高、排水不良，路基处于潮湿或过湿状态的路段。③水文地质条件不良的土质路童，路床土处于潮湿或过湿状态的路段。\n\n(1)季节性冰冻地区的中湿或潮湿路段。(2)地下水位高、排水不良，路基处于潮湿或过湿状态的路段。(3)水文地质条件不良的土质路堑，路床土处于潮湿或过湿状态的路段。'},{id:29,ch:1,type:'single',q:'关于基层材料选用的说法，正确的是（ ）',opts:['石灰稳定类材料可用于特重交通的上基层','级配砾石可用于次干路的上基层，最大粒径应≤37.5mm','热拌沥青碎石适用于中轻交通道路的基层','水泥稳定土类基层属于柔性基层'],ans:1,exp:'A错在石灰类不用于特重交通上基层；C错在沥青碎石用于重交通以上；D错在水稳类属于半刚性基层。② 应根据道路交通等级和路基抗冲刷能力来选择基层材料。在冰冻、多雨潮湿地 区，石灰粉煤灰稳定类材料宜用于特重、重交通的下基层。石灰稳定类材料宜用于各类 交通等级的下基层以及中、轻交通的基层。热拌沥青碎石宜用于重交通及以上道路的基 层；级配碎石可用于中、轻交通道路的下基层及轻交通道路的基层；级配砾石可用于轻 交通道路的下基层。'},{id:30,ch:1,type:'multi',q:'关于半刚性基层施工技术要求，正确的有（ ）',opts:['工业废渣应性能稳定、无风化','石灰粉煤灰稳定类宜用于特重交通的下基层','级配砂砾含泥量应≤砂质量的15%','水泥稳定碎石适用于轴载重的道路','钢渣稳定土类基层属于柔性基层'],ans:[0,1,3],exp:'正确答案为A、B、D。工业废渣应性能稳定、无风化；石灰粉煤灰稳定类宜用于特重交通的下基层；水泥稳定碎石适用于轴载重的道路\n\n📖 教材依据（第1章）：济综合分析的基础上确定梁、板架设方法，常用的方法有起重机架梁法、跨墩门式起重机架梁法和穿巷式架桥机架梁法。2.装配式梁(板)的预制、场内移运和存放施工技术要求1)构件预制施工技术要求先张法梁(板)预制流程:施工准备→张拉台座施工→穿预应力筋、调整初应力→张拉预应力筋→钢筋骨架制作→安装芯模、立侧模→浇筑混凝土→混凝土养护→拆模→放松预应力筋→场内移运、存放。\n\nC错在含泥量应≤10%；E错在钢渣稳定类属于半刚性基层。ABD均符合原文表述，特别注意B选项"宜用于"的规范用语。'},{id:31,ch:1,type:'multi',q:'下列关于热拌沥青混合料，说法正确的是（  ）。',opts:['按空隙率大小将沥青混合料分为连续配、间断级配两大类','AC型混合料以及SMA均属于密级配混合料','热拌沥青碎石(AM)是一种半开级配混合料','OGFC排水沥青混合料是一种半开级配沥青混合料'],ans:[1,2],exp:'热拌沥青混合料，按空隙率大小将沥青混合料分为密级配、半开级配、开级配三大类。\n\n✅ B正确——AC型混合料以及骨架型混合料SMA均属于密级配混合料（教材原文）。\n✅ C正确——热拌沥青碎石(AM)是一种半开级配混合料，空隙率8%～15%。\n❌ A错误——空隙率分类应为密级配、半开级配、开级配，而非连续/间断级配。\n❌ D错误——OGFC排水沥青混合料是一种开级配（空隙率18%～23%），不是半开级配。'},{id:32,ch:1,type:'single',q:'关于沥青表面处治面层，说法错误的是（  ）',opts:['起防水层的作用','起磨耗层的作用','起防冻层的作用','起改善碎(砾)石路面的作用'],ans:2,exp:'教材规定：沥青表面处治面层主要起防水层、磨耗层、防滑层或改善碎(砾)石路面的作用。C选项"起防冻层的作用"错误，防冻是垫层的作用，非沥青表面处治面层的功能。'},{id:33,ch:1,type:'multi',q:'下列关于沥青路面类型及适用范围，说法正确的是（  ）。',opts:['热拌沥青混合料适用各种等级道路的面层','温拌沥青混合料适用于次干路和支路','冷拌沥青混合料适用于支路及以下道路的面层、支路的表面层','沥青贯入式面层适用于城市次干路以下道路面层','沥青表面处治面层适用于支路及停车场'],ans:[0,2,3,4],exp:'教材规定：热拌沥青混合料适用各种等级道路的面层；冷拌沥青混合料适用于支路及其以下道路的面层、支路的表面层；沥青贯入式面层适用于城市次干路以下道路面层；沥青表面处治面层适用于支路及停车场。B选项错误：温拌沥青混合料适用范围与热拌相同，适用于各等级道路。'},{id:34,ch:1,type:'multi',q:'基层的性能指标包括（  ）。',opts:['应满足结构强度','扩散荷载的能力','水稳性','抗冻性','透水性好'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。应满足结构强度；扩散荷载的能力；水稳性；抗冻性\n\n📖 教材依据（第1章）：③防冻垫层和排水垫层宜采用砂、砂砾等颗粒材料。半刚性垫层宜采用低剂量水泥、石灰等无机结合稳定粒料或土类材料。(2)基层性能主要指标①应满足结构强度、扩散荷载的能力以及水稳性和抗冻性的要求。②不透水性好。底基层顶面宜铺设沥青封层或防水土工织物;为防止地下渗水影响路基，排水基层下应设置由水泥稳定粒料或密级配粒料组成的不透水底基层O(3)面层路面使用指标具体指标包括承载能力、平整度、温度稳定性、透水性、水稳定性、抗滑能力、噪声量。\n\n教材规定：基层性能主要指标包括：应满足结构强度、扩散荷载的能力以及水稳性和抗冻性。E选项"透水性好"错误，基层应具有足够的不透水性或对排水基层有专门要求，并非透水性好。'},{id:35,ch:1,type:'multi',q:'沥青混合料面层的性能指标包括（  ）。',opts:['承载能力','透水性','平整度','水稳定性','温度稳定性'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。承载能力；平整度；水稳定性；温度稳定性\n\n📖 教材依据（第1章）：收规范~CJJ1-2008规定:热拌沥青海合料路面应待摊铺层自然降温至表面温度低于50"C后，方可开放交通。2)改性沥青混合料面层施工改性沥青混合料面层的工艺流程可参照普通沥青混合料路面，改性沥青混合料的运输、摊铺、压实与成型、接缝除满足普通沥青混合料摊铺要求外，还应做到:(1)运输运料车卸料必须倒净，如有粘在车厢板上的剩料，必须及时清除，防止硬结。\n\n教材规定：沥青混合料面层使用指标包括承载能力、平整度、温度稳定性、抗滑能力、水稳定性。B选项"透水性"不是沥青混合料面层的性能指标，面层应具备不透水性防止水分下渗。'},{id:36,ch:1,type:'multi',q:'关于降噪排水路面的特点，下列说法正确的有（ ）。',opts:['上面层采用OGFC沥青混合料，具有排水降噪功能','中、下面层采用密级配沥青混合料，保证结构强度','适用于所有等级的城市道路','能显著减少城市交通噪声','仅适用于非机动车道'],ans:[0,1,3],exp:'A、B正确，符合降噪排水路面的结构特点。C错误，降噪排水路面通常用于城市主干路、快速路等交通量较大的道路，并非所有道路。D正确，OGFC路面能有效降低轮胎噪声。E错误，降噪排水路面适用于机动车道，而非仅非机动车道。'},{id:37,ch:1,type:'single',q:'降噪排水路面的主要功能不包括（ ）。',opts:['提高路面抗滑性能','减少雨天水雾，提高行车安全性','降低城市交通噪声','提高路面的承载能力'],ans:3,exp:'降噪排水路面的核心功能是排水和降噪（A、B、C均符合），而承载能力主要由中、下面层的密级配沥青混合料保证，并非降噪排水路面的特有功能，故D不属于其主要功能。'},{id:38,ch:1,type:'multi',q:'关于水泥混凝土路面基层材料选用原则，下列说法正确的有（ ）',opts:['特重交通宜选用贫混凝土或沥青混凝土','重交通道路宜选用水泥稳定粒料','中、轻交通道路只能使用级配粒料','湿润多雨地区的繁重交通路段宜采用排水基层','所有交通等级道路均可使用石灰稳定土'],ans:[0,1,3],exp:'正确答案为A、B、D。特重交通宜选用贫混凝土或沥青混凝土；重交通道路宜选用水泥稳定粒料；湿润多雨地区的繁重交通路段宜采用排水基层\n\n📖 教材依据（第1章）：层产生的不利影响;为混凝土面层提供稳定而坚实的基础，并改善接缝的荷载传递能力。②基层材料的选用原则:根据道路交通等级和路基抗冲刷能力来选择基层材料。特重交通宜选用贫混凝土、碾压混凝土或沥青混凝土;重交通道路宜选用水泥稳定粒料或沥青稳定碎石;中、轻交通道路宜选择水泥或石灰粉煤灰稳定粒料或级配粒料。湿润和多雨地区，繁重交通路段宜采用排水基层。\n\nC选项"只能使用"表述绝对化错误；E选项石灰稳定土不适用于所有交通等级道路。'},{id:39,ch:1,type:'single',q:'基层的宽度应根据混凝土面层施工方式的不同，比混凝土面层每侧至少宽出300mm、500mm或650mm，与上述宽出宽度相对应的施工方式为（  ）。',opts:['小型机具施工，轨模式摊铺机施工，滑模式摊铺机施工','轨模式摊铺机施工，滑模式摊铺机施工，小型机具施工','滑模式摊铺机施工，小型机具施工，轨模式摊铺机施工','轨模式摊铺机施工，小型机具施工，滑模式摊铺机施工'],ans:0,exp:'教材规定：基层的宽度应根据混凝土面层施工方式的不同，比混凝土面层每侧至少宽出：小型机具施工时300mm，轨模式摊铺机施工时500mm，滑模式摊铺机施工时650mm。因此对应关系为：300mm→小型机具，500mm→轨式，650mm→滑式。'},{id:40,ch:1,type:'single',q:'水泥混凝土路面工程中，特重交通基层宜选用材料中，不包括（  ）',opts:['贫混凝土','碾压混凝土','沥青混凝土','素混凝土'],ans:3,exp:'正确答案为D。素混凝土\n\n📖 教材依据（第1章）：道钢支撑，铺设临时路面系统临时路面系统临时路面系统钢支撑围护结构围护结构第三步·开挖基坑，随开挖随架设钢支撑第四步:铺设底板素混凝土垫层，敷设防7.)(层，(基坑开挖至支撑中线下O.5m处时，必须施作底板结构架设钢支撑).至基坑底设计标高处图3.1-8盖挖顺作法施工流程『第3章城市隧道工程与城市轨道交通工程第五步:拆除第四道钢支撑，敷设侧墙防水层，第六步:拆除第三、第二道钢支撑，敷设侧墙施作侧墙和中楼板结构防水层，施作侧墙及顶板结构141---回.......第七步:拆除临时路面系统，回填恢复路……\n\n教材规定：特重交通道路宜选用贫混凝土、碾压混凝土或沥青混凝土基层。D选项"素混凝土"即普通混凝土不在特重交通基层推荐选用范围内，贫混凝土和碾压混凝土均属于低水泥用量的特配混凝土，不同于普通素混凝土。'},{id:41,ch:1,type:'single',q:'水泥混凝土路面工程中，基层材料的选用原则，以下说法错误的是（  ）',opts:['特重交通道路宜选用碾压混凝土或沥青混凝土','重交通道路宜选用水泥稳定粒料','中等交通道路宜选择沥青稳定碎石','轻交通道路宜选择石灰粉煤灰稳定粒料或级配粒料'],ans:2,exp:'教材规定：特重交通宜选用贫混凝土、碾压混凝土或沥青混凝土（A正确）；重交通宜选用水泥稳定粒料（B正确）；轻交通宜选择石灰粉煤灰稳定粒料或级配粒料（D正确）。C选项错误：中等交通宜选择水泥稳定粒料或石灰粉煤灰稳定粒料，而非沥青稳定碎石。'},{id:42,ch:1,type:'single',q:'基层施工时，在湿润和多雨地区宜采用（  ）。',opts:['排水基层','不排水基层','湿润基层','底基层'],ans:0,exp:'正确答案为A。排水基层\n\n📖 教材依据（第1章）：性能主要指标①应满足结构强度、扩散荷载的能力以及水稳性和抗冻性的要求。②不透水性好。底基层顶面宜铺设沥青封层或防水土工织物;为防止地下渗水影响路基，排水基层下应设置由水泥稳定粒料或密级配粒料组成的不透水底基层O(3)面层路面使用指标具体指标包括承载能力、平整度、温度稳定性、透水性、水稳定性、抗滑能力、噪声量。\n\n教材规定：在湿润和多雨地区，宜采用排水基层。排水基层可有效排除渗入路面结构内的水分，防止水损害。B选项"不排水基层"、C选项"湿润基层"、D选项"底基层"均不符合规范要求。'},{id:43,ch:1,type:'single',q:'在温度和湿度状况不良的环境下，城市水泥混凝土道路应设置垫层，以改善路面结构的使用性能。以下关于垫层说法错误的是(  )',opts:['防冻垫层宜采用砂、砂砾等颗粒材料','排水垫层宜采用砂、砂砾等颗粒材料','半刚性垫层宜采用砂、砂砾等颗粒材料','半刚性垫层宜采用无机结合料稳定粒料'],ans:2,exp:'正确答案为C。半刚性垫层宜采用砂、砂砾等颗粒材料\n\n📖 教材依据（第1章）：排水垫层应与边缘排水系统相连接，厚度宜大于150mm，宽度不宜小于基层底面的宽度。③防冻垫层和排水垫层宜采用砂、砂砾等颗粒材料。半刚性垫层宜采用低剂量水泥、石灰等无机结合稳定粒料或土类材料。(2)基层性能主要指标①应满足结构强度、扩散荷载的能力以及水稳性和抗冻性的要求。②不透水性好。底基层顶面宜铺设沥青封层或防水土工织物;为防止地下渗水影响路基，排水基层下应设置由水泥稳定粒料或密级配粒料组成的不透水底基层O(3)面层路面使用指标具体指标包括承载能力、平整度、温度稳定性、透水性、水稳定性、抗滑能力……\n\n教材规定：防冻垫层和排水垫层宜采用砂、砂砾等颗粒材料；半刚性垫层宜采用无机结合料稳定粒料。C选项错误：半刚性垫层应采用无机结合料稳定粒料，而非砂、砂砾等颗粒材料。砂、砂砾属于柔性材料，不具半刚性特征。'},{id:44,ch:1,type:'multi',q:'关于水泥混凝土道路基层的作用，下列说法正确的是（  ）',opts:['防止或减轻由于唧泥产生板底脱空和错台等病害','减少路基不均冻胀','减少体积变形对混凝土面层产生的不利影响','改善接缝的传荷能力','调节路基可能产生的不均匀沉降'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。防止或减轻由于唧泥产生板底脱空和错台等病害；减少路基不均冻胀；减少体积变形对混凝土面层产生的不利影响；改善接缝的传荷能力\n\n📖 教材依据（第1章）：台座或多段联线台座，每联宜多于5段，各端面要啃合密贴，不得随意修补。⑤大跨径主梁施工时伞，应缩短双向长悬臂持续时间，尽快使一侧固定，以减少风振时不利影响，必要时应采取临时抗风措施。⑥为防止合龙梁段施工出现的裂缝，在梁上下底板或两肋的端部预埋临时连接钢构件，或设置临时纵向预应力索，或用千斤顶调节合龙口的应力及合龙口长度，并应不间断地观测合龙前数日的昼夜环境温度场变化与合龙高程及合龙口长度变化的关系，确定适宜的合龙时间和合龙程序。\n\nE错误，垫层可调节路基可能产生的不均匀沉降'},{id:45,ch:1,type:'single',q:'关于排水基层下设置不透水底基层的说法，正确的是（ ）。',opts:['底基层应采用透水性良好的开级配粒料','底基层顶面宜铺设沥青封层或防水土工织物','底基层的主要作用是承受车轮荷载的直接磨耗','底基层应设置在面层与排水基层之间'],ans:1,exp:'教材规定：排水基层下应设置不透水底基层，底基层可采用水泥稳定粒料或密级配粒料，底基层顶面宜铺设沥青封层或防水土工织物。B选项正确。A选项"开级配粒料"透水性强，不符合不透水要求。C选项底基层不直接承受车轮磨耗。D选项底基层在排水基层之下而非之上。'},{id:46,ch:1,type:'multi',q:'为有效防止下渗水影响路基，在排水基层下设置不透水底基层时，正确的构造与材料要求包括（ ）。',opts:['底基层可采用水泥稳定粒料','底基层可采用密级配粒料','底基层顶面宜铺设沥青封层','底基层顶面宜铺设防水土工织物','底基层应采用开级配大孔隙沥青混合料'],ans:[0,1,2,3],exp:'教材规定：排水基层下应设置不透水底基层，底基层可采用水泥稳定粒料（A）或密级配粒料（B），底基层顶面宜铺设沥青封层（C）或防水土工织物（D）。E选项错误：开级配大孔隙沥青混合料透水性强，不宜用作不透水底基层。'},{id:47,ch:1,type:'multi',q:'面层混凝土板常分为普通（素）混凝土板、（  ）和钢筋混凝土板等。',opts:['聚合物混凝土板','高强混凝土板','连续配筋混凝土板','高性能混凝土板','预应力混凝土板'],ans:[2,4],exp:'正确答案为C、E。连续配筋混凝土板；预应力混凝土板\n\n📖 教材依据（第1章）：使用缓凝剂延长凝结时间后，本表数值可增加O.25~O.5h。2)混凝土面板施工(1)模板安装①模板应与混凝土摊铺机械相匹配。模板高度应为混凝土板设计厚度。②宜使用钢模板，钢模板应顺直、平整，每1m设置1处支撑装置。如采用木模板，应质地坚实，变形小，无腐朽、扭曲、裂纹，且用前须浸泡，木模板直线部分板厚不宜小于50mm，每O.8~lm设1处支撑装置;弯道部分板厚宜为15~30mm，每O.5~O.8m设1处支撑装置，模板与混凝土接触面及模板顶面应刨光。\n\n此题考核水泥混凝土面层。面层混凝土板分为普通（素）混凝土板、连续配筋混凝土板、预应力混凝土板和钢筋混凝土板等。目前我国较多采用普通（素）混凝土板。'},{id:48,ch:1,type:'multi',q:'水泥混凝土面层性能包括（  ）。',opts:['强度','耐久性','抗滑','耐磨','扩散荷载'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。强度；耐久性；抗滑；耐磨\n\n📖 教材依据（第1章）：度、高温稳定性、低温抗裂性以及抗疲劳、抗水损害能力;为保证交通安全和舒适性，面层还应有足够的抗滑能力及良好的平整度。基层主要起承重作用，应具有足够的强度和扩散荷载的能力并具有足够的水稳定性。垫层的主要作用为改善土基的湿度和温度状况，保证面层和基层的强度稳定性和抗冻胀能力，扩散由基层传来的荷载应力，以减小土基所产生的变形。\n\n水泥混凝土面层应具有足够的强度、耐久性(抗冻性),表面应抗滑、耐磨、平整。'},{id:49,ch:1,type:'single',q:'快速路、主干路的横向缩缝应加设（  ）。',opts:['连接杆','传力杆','拉力杆','伸缩杆'],ans:1,exp:'正确答案为B。传力杆\n\n📖 教材依据（第1章）：时，应设置带拉杆的假缝形式的纵向缩缝，纵缝应与线路中线平行。横向接缝可分为横向缩缝、胀缝和横向施工缝。横向施工缝尽可能选在缩缝或胀缝处。快速路、主干路的横向缩缝应加设传力杆;在邻近桥梁或其他固定构筑物处、板厚改变处、小半径平曲线等处，应设置胀缝。8第1篇市政公用工程技术④对于特重及重交通等级的混凝土路面，横向胀缝、缩缝均设置传力杆。\n\n教材规定：快速路、主干路的横向缩缝应加设传力杆。传力杆的作用是保证缩缝上下缝壁能有效传递荷载，防止错台病害。连接杆用于纵向施工缝，拉力杆和伸缩杆非规范术语。'},{id:50,ch:1,type:'multi',q:'水泥混凝土路面的纵向接缝是根据(  )设置的。',opts:['路基宽度','路面宽度','施工铺筑宽度','单幅可变宽度','全幅可变宽度'],ans:[1,2],exp:'教材规定：纵向接缝是根据路面宽度和施工铺筑宽度设置的。当一次铺筑宽度小于路面宽度时设纵向施工缝；当一次铺筑宽度大于4.5m时设纵向缩缝。A选项"路基宽度"、D选项"单幅可变宽度"、E选项"全幅可变宽度"均非设置依据。'},{id:51,ch:1,type:'single',q:'关于混凝土路面纵向接缝，说法正确的是（ ）。',opts:['根据路面长度和施工铺筑宽度设置','一次铺筑宽度大于路面宽度时，应设置带拉杆的平缝形式的纵向施工缝','一次铺筑宽度小于4.5m时，应设置带拉杆的假缝形式的纵向缩缝','纵缝应与线路中线平行'],ans:3,exp:'正确答案为D。纵缝应与线路中线平行\n\n📖 教材依据（第1章）：施工铺筑宽度设置。一次铺筑宽度小于路面宽度时，应设置带拉杆的平缝形式的纵向施工缝。一次铺筑宽度大于4.5m时，应设置带拉杆的假缝形式的纵向缩缝，纵缝应与线路中线平行。横向接缝可分为横向缩缝、胀缝和横向施工缝。横向施工缝尽可能选在缩缝或胀缝处。快速路、主干路的横向缩缝应加设传力杆;在邻近桥梁或其他固定构筑物处、板厚改变处、小半径平曲线等处，应设置胀缝。\n\n纵向接缝根据路面宽度和施工铺筑宽度设置。一次铺筑宽度小于路面宽度时，应设置带拉杆的平缝形式的纵向施工缝。一次铺筑宽度大于4.5m时，应设置带拉杆的 假缝形式的纵向缩缝，纵缝应与线路中线平行。'},{id:52,ch:1,type:'single',q:'关于水泥混凝土路面横向接缝设置，下列说法错误的是（ ）',opts:['快速路横向胀缝应加设传力杆','横向施工缝应避开缩缝和胀缝位置','板厚改变处应设置胀缝','小半径平曲线处应设置胀缝'],ans:1,exp:'正确答案为B。横向施工缝应避开缩缝和胀缝位置\n\n📖 教材依据（第1章）：假缝形式的纵向缩缝，纵缝应与线路中线平行。横向接缝可分为横向缩缝、胀缝和横向施工缝。横向施工缝尽可能选在缩缝或胀缝处。快速路、主干路的横向缩缝应加设传力杆;在邻近桥梁或其他固定构筑物处、板厚改变处、小半径平曲线等处，应设置胀缝。8第1篇市政公用工程技术④对于特重及重交通等级的混凝土路面，横向胀缝、缩缝均设置传力杆。\n\n规范要求横向施工缝尽可能选在缩缝或胀缝处，故B选项错误。其他选项均符合规范要求。'},{id:53,ch:1,type:'multi',q:'下列（ ）情况下水泥混凝土路面应设置传力杆',opts:['特重交通等级的横向缩缝','主干路的横向胀缝','轻交通道路的横向缩缝','自由边处的胀缝','承受繁重交通的施工缝'],ans:[0,1,3,4],exp:'根据规范，特重及重交通等级的横向胀缝、缩缝均设置传力杆，自由边处和繁重交通的胀缝、施工缝也应设置。轻交通道路的横向缩缝可不设传力杆。 54关于水泥混凝土路面与沥青路面相接的处理，正确的是（ ） A. 应设置长度不少于2m的过渡段 B. 过渡段路面应采用平顺衔接 C. 应采用两种路面呈阶梯状叠合布置 D. 只需在混凝土路面端部设置胀缝'},{id:54,ch:1,type:'multi',q:'对于特重及重交通等级的混凝土路面,下列哪些(  )设置配筋补强。',opts:['自由边处','承受繁重交通的缩缝','小于90°的面层角隅','下穿市政管线路段','雨水口和地下设施的检查井周围'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。自由边处；小于90°的面层角隅；下穿市政管线路段；雨水口和地下设施的检查井周围\n\n📖 教材依据（第1章）：快速路、主干路的横向缩缝应加设传力杆;在邻近桥梁或其他固定构筑物处、板厚改变处、小半径平曲线等处，应设置胀缝。8第1篇市政公用工程技术④对于特重及重交通等级的混凝土路面，横向胀缝、缩缝均设置传力杆。在自由边处，承受繁重交通的胀缝、施工缝，小于90。的面层角隅，下穿市政管线路段，以及雨水口和地下设施的检查井周围，应配筋补强。\n\n教材规定：面层角隅（小于90°）及自由边处应设置配筋补强；下穿市政管线路段和雨水口、检查井周围应设置配筋补强。B选项"承受繁重交通的缩缝"设置的是传力杆而非配筋补强。'},{id:55,ch:1,type:'multi',q:'为提高砌块路面抗滑性能，加工材料可采用下列（ ）方法',opts:['刻槽','压槽','拉槽','拉毛','打磨'],ans:[0,1,2],exp:'正确答案为A、B、C。刻槽；压槽；拉槽\n\n📖 教材依据（第1章）：的弱点，防止在车载和自然因素作用下发生开裂、破坏，最大限度提升其耐久性，延长使用年限。⑤抗滑构造一一一混凝土面层应具有较大的粗糙度，即应具备较高的抗滑性能，以提升行车的安全性。因此可采用刻槽、压槽、拉槽或拉毛等方法形成一定的构造深虔百⑥1昆凝土路面与沥青路面相接时设置长度不少于3m的过技段，过渡段路面应采用两种路面呈阶梯状叠合布置。\n\n教材规定：砌块路面为提高抗滑性能，加工材料可采用刻槽、压槽、拉槽等方法。D选项"拉毛"、E选项"打磨"不是规范规定的抗滑加工方法，拉毛通常用于混凝土路面而非砌块路面。'},{id:56,ch:1,type:'multi',q:'下列（ ）材料，可用于胀缝填料。',opts:['硅酮类','聚氨酯类','聚氯乙烯胶泥类','树脂类','水泥浆'],ans:[0,1,2,3],exp:'胀缝板宜用厚20mm, 水稳定性好，具有一定柔性的板材制作，且应经防腐处理。填缝材料宜用硅酮类、聚氨酯类、树脂类、橡胶沥青类、聚氯乙烯胶泥类、改性沥青类填缝材料，并宜加入耐老化剂。（口诀：竖向铝盖挺规矩）'},{id:57,ch:1,type:'single',q:'下列关于地下水的描述错误的是（）',opts:['根据地下水的埋藏条件又可将地下水分为上层滞水、潜水、承压水','上层滞水分布范围有限，存在于地下两个隔水层之间','潜水分布广，与道路等市政公用工程关系密切','承压水具有一定的水头高度'],ans:1,exp:'教材规定：按埋藏条件地下水分为上层滞水、潜水和承压水。B选项描述错误：上层滞水存在于地表以下、第一个隔水层之上，而非"存在于地下两个隔水层之间"——那是承压水的特征。上层滞水分布范围有限，补给区与分布区一致。'},{id:58,ch:1,type:'multi',q:'水与土体相互作用，可以使土体的强度和稳定性降低，导致路基或地下构筑物周围土体软化，并可能产生（）等危害。',opts:['滑坡','沉陷','潜蚀','爆管','翻浆'],ans:[0,1,2,4],exp:'教材规定：水与土体相互作用，可使土体强度降低，导致路基或地下构筑物周围土体软化，并可能产生滑坡（A）、沉陷（B）、潜蚀（C）、翻浆（E）等危害。D选项"爆管"是指管道因内部压力爆裂，不属于水与土体相互作用导致的危害。'},{id:59,ch:1,type:'single',q:'坚土的坚实系数为（  ）。',opts:['0.5～0.6','0.6～0.8','0.8～1.0','1.0～1.5'],ans:2,exp:'1)一类土，松软土；坚实系数为 0.5～0.6。2)二类土，普通土；坚实系数为0.6～0.8。 3)三类土，坚土；坚实系数为0.8～1.0。4)四类土，砂砾坚土；1.0～1.5。五类土是软石，六类土是次坚石，七类土是坚石，八类土是特坚石。'},{id:60,ch:1,type:'single',q:'土中水的质量与干土粒质量之比，称为（  ）。',opts:['天然密度','孔隙率','含水率','孔隙比'],ans:2,exp:'正确答案为C。含水率\n\n📖 教材依据（第1章）：5。5)五类土~八类土五类土是软石，六类土是次坚石，七类土是坚石，八类土是特坚石。2.常用路基土的主要性能参数1)含水率ω土中水的质量与干土粒质量之比。2)天然密度ρ土的单位体积的质量。3)孔隙比θ土的孔隙体积与土粒体积之比。4)孔隙率n土的孔隙体积与土的体积之比。5)塑限ωp土由可塑状态转为半固体状态时的界限含水率为塑性下限，称为塑性界限，简称塑限。\n\n此题考核常用路基土的主要性能参数。含水率ω：土中水的质量与干土粒质量之比。 （故选择C）。孔隙率n：土的孔隙体积与土的体积之比。孔隙比e：土的孔隙体积与土粒体积之比。天然密度ρ：土的单位体积的质量。'},{id:61,ch:1,type:'single',q:'关于土的液性指数I，下列说法正确的是：',opts:['当I=0.8时，土体处于硬塑状态','液性指数计算公式为I=(W-Wp)/Ip','I≥1.0表示土体处于软塑状态','当I<0时，土体处于流塑状态'],ans:1,exp:'A错误，0.5≤I<1.0为软塑状态；C错误，I≥1.0为流塑状态；D错误，I<0为坚硬、半坚硬状态。B选项正确表述了液性指数计算公式。2．常用路基土的主要性能参数 1）含水率ω；2）天然密度p3）孔隙比e；4）孔隙率n5）塑限ωp土由可塑状态转为半固体状态时的界限含水量为塑性下限，称为塑性界限，简称塑限。6）液限ωl土由可塑状态转为流体状态时的界限含水量为液性上限，称为液性界限，简称液限。7）塑性指数 土的液限与塑限之差值，Ip= ωl - ωp8）液性指数Il土的天然含水率与塑限之差值对塑性指数之比值，Il=（ω- ωp ）/Ip，Il可用以判别土的软硬程度；Il＜0坚硬、半坚硬状态， 0≤Il＜0.5 硬塑状态，0.5≤Il＜1.0 软塑状态，Il≥1.0 流塑状态。'},{id:62,ch:1,type:'multi',q:'关于土的液性指数I及其工程意义，正确的有（ ）',opts:['液性指数是判别黏性土软硬程度的指标','I=0.3时，土体处于硬塑状态','软塑状态的土体范围是0≤I<0.5','流塑状态的土体不宜直接作为地基持力层','计算液性指数需要用到土的塑限和液限指标'],ans:[0,1,3],exp:'C错误，软塑状态应为0.5≤I<1.0；E错误，计算需要塑限和塑性指数；其他选项均正确。'},{id:63,ch:1,type:'multi',q:'不良土质路基按路基处理的作用机理，大致分为（ ）。',opts:['土质改良','土的置换','土的夯实','土的排水','土的补强'],ans:[0,1,4],exp:'正确答案为A、B、E。土质改良；土的置换；土的补强\n\n📖 教材依据（第1章）：钢筋不得有锈蚀、裂纹、断伤和刻痕等缺陷。传力杆(拉杆)、滑动套材质、规格应符合规定。(6)胀缝板宜用厚20mm，水稳定性好，具有一定柔性的板材制作，且应经防腐处理。填缝材料宜用硅酣类、聚氨醋类、树脂类、橡胶沥青类、聚氯乙烯胶泥类、改性沥青类填缝材料，并宜加入耐老化剂。3.砌块路面结构组成特点才)砌块路面结构的组成包括垫层、基层、面层。\n\n教材规定：按路基处理的作用机理，大致分为土质改良、土的置换、土的补强三类。C选项"土的夯实"和D选项"土的排水"属于土质改良的具体方法，而非作用机理分类。'},{id:64,ch:1,type:'multi',q:'路基采用振冲、挤密的处理方法包括（ ）',opts:['灰土挤密桩、','砂砾桩、','碎石桩、','石灰桩、','CFG桩'],ans:[0,1,2,3],exp:'振冲 、挤密包括：振冲挤密、灰土挤密桩、砂桩、砂砾桩、碎石桩、石灰桩、爆破挤密、强夯置换。 口诀：振、灰、砂、砂、碎、石、爆、强 振冲置换及拌入包括：振冲置换、深层搅拌、高压喷射注浆、石灰桩、CFG桩。 口诀：深、圳、石、膏、C'},{id:65,ch:1,type:'multi',q:'下列地基处理方法中，属于振冲置换及拌入类的有（ ）。',opts:['振冲置换','深层搅拌','砂桩','高压喷射注浆','CFG桩'],ans:[0,1,3,4],exp:'教材规定：振冲置换及拌入包括振冲置换、深层搅拌、高压喷射注浆、石灰桩、CFG桩。C选项"砂桩"属于振冲、挤密类方法而非置换及拌入类。口诀：深、圳、石、膏、C（深层搅拌、振冲置换、石灰桩、高压喷射注浆、CFG桩）。'},{id:66,ch:1,type:'multi',q:'城镇道路路基工程的施工特点，描述正确的有（ ）。',opts:['工程施工处于露天作业，受天气等自然条件影响大','施工区域内的专业类型和结构物多，管线纵横交错','专业及社会间配合工作多，干扰多，易导致施工方案变化多','所有路基工程均面临巨大的交通压力和对既有构筑物的保护问题','人工配合土方作业时，为提升效率，可由机械操作员兼岗指挥'],ans:[0,1,2],exp:'教材规定：城镇道路路基工程施工处于露天作业，受自然条件影响大；专业类型和结构物多，管线纵横交错；专业及社会配合工作多，干扰多，易导致施工方案变化。D选项"所有路基工程均面临巨大交通压力"表述绝对化；E选项由机械操作员兼岗指挥违反安全规定。'},{id:67,ch:1,type:'multi',q:'城镇道路路基工程包括（）',opts:['涵洞','挡土墙','排水边沟','垫层土方','急流槽'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。涵洞；挡土墙；排水边沟；急流槽\n\n📖 教材依据（第1章）：筑物等保护要求高。(2)路基施工以机械作业为主，人工配合为辅;人工配合土方作业时，必须设专人指挥;采用流水或分段平行作业方式。2)施工项目城镇道路路基工程包括路基(路床、路堤)的土(石)方、相关的项目有涵洞、挡土墙、路肩、边坡防护、排水边沟、急流槽、各类管线等。3)基本流程(1)准备工作①按照交通管理部门批准的交通导行方案设置围挡，导行临时交通。\n\n路基工程包括路基(路床、路堤)的土(石)方、相关的项目有涵洞、挡土墙、路肩、边坡防护、排水边沟、急流槽、各类管线等'},{id:68,ch:1,type:'multi',q:'路基施工前，应根据工程地质勘察报告，对路基土进行（）试验。',opts:['压实度','液限','塑限','标准击实','CBR'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。液限；塑限；标准击实；CBR\n\n📖 教材依据（第1章）：使用。(10)路基填筑时，每层最大压实厚度不宜大于300mm，顶面最后一层压实厚度应不小于100mm。2)挖土路基(1)路基施工前，应将现况地面上积水排除、疏干，将树根坑、坟坑、井穴等部位进行技术处理。(2)根据测量中线和边桩开挖。(3)挖土时应自上向下分层开挖，严禁掏洞开挖。机械开挖时，必须避开构筑物、管线，在距管道边1m范围内应采用人工开挖;在距直埋缆线2m范围内必须采用人工开挖。\n\n施工前，应根据工程地质勘察报告，对路基土进行天然含水量、液限、塑限、标准击实、CBR试验，必要时应做颗粒分析、有机质含量、易溶盐含量、冻胀和膨胀量等试验。'},{id:69,ch:1,type:'single',q:'关于路基施工准备工作的说法，错误的是（ ）',opts:['交通导行方案需经交通管理部门批准后实施','技术安全交底应由项目经理向施工人员讲解','测量控制点应进行闭合加密，建立控制网','施工前需补钉转角桩和路两侧外边桩'],ans:1,exp:'正确答案为B。技术安全交底应由项目经理向施工人员讲解\n\n📖 教材依据（第1章）：包括路基(路床、路堤)的土(石)方、相关的项目有涵洞、挡土墙、路肩、边坡防护、排水边沟、急流槽、各类管线等。3)基本流程(1)准备工作①按照交通管理部门批准的交通导行方案设置围挡，导行临时交通。②开工前，施工项目技术负责人应依据获准的施工方案向施工人员进行技术安全交底，强调工程难点、技术要点、安全措施。\n\n规范要求技术安全交底应由施工项目技术负责人进行，而非项目经理，故B选项错误。其他选项均符合规范要求。'},{id:70,ch:1,type:'multi',q:'路基施工准备阶段必须完成的工作包括（ ）',opts:['按批准方案设置围挡和导行临时交通','项目总工向施工人员进行技术交底','对测量控制点进行闭合复核','建立施工测量控制网','办理工程质量监督手续'],ans:[0,1,2,3],exp:'E选项"办理工程质量监督手续"属于开工前建设单位的工作，不属于施工单位的施工准备内容。其他选项均符合规范要求。'},{id:71,ch:1,type:'single',q:'在路基施工测量中，不属于施工准备阶段测量工作的是（ ）',opts:['对已知控制点进行闭合加密','恢复道路中线','进行横断面测量','补钉转角桩'],ans:2,exp:'正确答案为C。进行横断面测量\n\n📖 教材依据（第1章）：目技术负责人应依据获准的施工方案向施工人员进行技术安全交底，强调工程难点、技术要点、安全措施。使作业人员掌握要点，明确责任。③对已知的测量控制点进行闭合加密，建立测量控制网，再进行施工控制桩放线测量，恢复中线，补钉转角桩、路两侧外边桩等。④施工前，应根据工程地质勘察报告，对路基土进行天然含水率、液限、塑限、标准击实、CBR试验，必要时应做颗粒分析、有机质含量、易溶盐含量、冻膨胀和膨胀量等试验。\n\n横断面测量属于施工过程中的测量工作，不属于施工准备阶段的测量工作。 A、B、D均为施工准备阶段的测量工作。'},{id:72,ch:1,type:'single',q:'关于路基填筑施工要求的说法，正确的是（ ）',opts:['不同性质的填料可以混合填筑在同一层','透水性小的土类填筑横坡宜为2%～3%','液限大于50%的土可直接用于路基填筑','路基每层最大压实厚度不宜大于300mm'],ans:3,exp:'正确答案为D。路基每层最大压实厚度不宜大于300mm\n\n📖 教材依据（第1章）：理的压路机组合方式，根据摊铺完成的沥青混合料温度情况严格控制初压、复压、终压(包括成型)时第1篇24市政公用工程技术机。压实层最大厚度不宜大于100mm各层压实度及平整度应符合要求。b.压路机应以慢而均匀的速度碾压，且符合规范要求(见表1.3-2)。c.碾压温度应根据沥青和热拌沥青混合料种类、压路机、气温、层厚等因素经试压确定。\n\nA选项错误，规范要求不同填料应分层填筑；B选项错误，透水性小的土类横坡应为4%； C选项错误，液限大于50%的土需处理合格后才能使用； D选项符合规范要求。'},{id:73,ch:1,type:'multi',q:'关于路基填筑施工，下列要求正确的有（ ）',opts:['高边坡施工应制定专项施工方案','一般土质填筑横坡宜为2%～3%','塑性指数大于26的土可直接使用','顶面最后一层压实厚度应不小于80mm','含水率超标的土必须处理后使用'],ans:[0,1,4],exp:'正确答案为A、B、E。高边坡施工应制定专项施工方案；一般土质填筑横坡宜为2%～3%；含水率超标的土必须处理后使用\n\n📖 教材依据（第1章）：高度应按设计标高增加预沉量值。填土至最后一层时，应按设计断面，高程控制填土厚度并及时碾压修整。(7)性质不同的填料应分类、分层填筑、压实;路基高边坡施工应制定专项施工方案。(8)路基填筑宜做成双向横坡，一般土质填筑横坡宜为2%~3%，透水性小的土类填筑横坡宜为4%。(9)液限大于50%、塑性指数大于26的土，以及含水率超标的土，不能直接使用，必须采取技术措施处理，经检查合格后方可使用。\n\nC选项错误，塑性指数大于26的土需处理； D选项错误，最后一层厚度应不小于100mm； 其他选项均符合规范要求。'},{id:74,ch:1,type:'multi',q:'挖方路基施工时，应做到（  ）。',opts:['根据测量中线和边桩开挖','挖土时应自上向下分层开挖，严禁掏洞开挖','在距管道边2m范围内应采用人工开挖','距直埋缆线1m范围内必须采用人工开挖','挖方段不得超挖，应留有200-300mm人工开挖到设计标高。'],ans:[0,1],exp:'教材规定：挖方路基应根据测量中线和边桩开挖（A正确）；挖土应自上向下分层开挖，严禁掏洞开挖（B正确）。C选项中管道边2m范围应为1m范围；D选项中直埋缆线1m范围应为2m范围；E选项中应留有200～300mm人工开挖但这是路基填筑要求而非挖方要求。'},{id:75,ch:1,type:'single',q:'城市快速路，最小填料强度(CBR)值错误的是（）',opts:['路床顶面以下深度0～30cm，6%','路床顶面以下深度30～80cm，5%','路床顶面以下深度80～150cm，4%','路床顶面以下深度＞150cm，3%'],ans:0,exp:'教材规定：城市快速路、主干路路床顶面以下深度0～30cm时CBR应不小于8%，而非6%。A选项"6%"错误，正确数值为8%。30～80cm为5%，80～150cm为4%，＞150cm为3%（该行数据正确）。'},{id:76,ch:1,type:'multi',q:'土基压实应做试验段，以取得（  ）等施工参数。',opts:['碾压遍数','碾压机具组合','摊铺长度','路基预沉量值','每层虚铺厚度'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。碾压遍数；碾压机具组合；路基预沉量值；每层虚铺厚度\n\n📖 教材依据（第1章）：含水率与塑限之差值对塑性指数之比值，λ=(ω一ωp)/ιι可用以判别土的软硬程度;IL<0坚硬、半坚硬状态，0::三IL软塑状态，λ二~1.0流塑状态。<0.5硬塑状态，0.5三三ι<1.04第1篇12市政公用工程技术3.不良土质路基处理才)不良土质路基处理的分类按路基处理的作用机理，大致分为:土质改良、土的置换、土的补强三类。\n\n教材规定：土基压实应做试验段，以取得碾压遍数、碾压机具组合、路基预沉量值和每层虚铺厚度等施工参数。C选项"摊铺长度"不是试验段需要取得的参数，摊铺长度根据施工组织确定即可。'},{id:77,ch:1,type:'multi',q:'路基压实，说法正确的是（）。',opts:['分为静压和振动压实两种','土质路基压实原则：“先轻后重、先静后振、先低后高、先慢后快，轮迹重叠”','压路机最快速度不宜超过6km/h','碾压应从路基边缘向中央进行，压路机轮外缘距路基边应保持安全距离','碾压不到的部位应采用小型夯压机夯实，防止漏夯，要求夯击面积重叠1/4～1/3'],ans:[0,1,3,4],exp:'教材规定：路基压实分为静压和振动压实两种（A正确）。压实原则：先轻后重、先静后振、先低后高、先慢后快、轮迹重叠（B正确）。碾压应从路基边缘向中央进行（D正确）。夯击面积重叠1/4～1/3（E正确）。C选项错误：压路机最快速度不宜超过4km/h，而非6km/h。'},{id:78,ch:1,type:'single',q:'下列关于无机结合料稳定基层特点的描述中，错误的是（ ）。',opts:['结构较密实，孔隙率较小','透水性较大，利于路面排水','水稳性较好，适宜于机械化施工','通常采用水泥、石灰及工业废渣等稳定材料'],ans:1,exp:'教材规定：无机结合料稳定基层结构较密实、孔隙率较小、透水性较小（而非较大），水稳性较好，适宜机械化施工。B选项"透水性较大，利于路面排水"错误，半刚性基层透水性小，有利于阻止水分下渗路基。A、C、D选项均正确。'},{id:79,ch:1,type:'single',q:'二灰稳定土的（  ）优于石灰稳定土。',opts:['水稳性','抗冻性','板体性','早强性'],ans:1,exp:'教材规定：二灰稳定土有良好的力学性能、板体性和水稳性，但其抗冻性能明显优于石灰稳定土。二灰稳定土中粉煤灰与石灰的火山灰反应使其抗冻性显著提高。水稳性、板体性虽然也较好，但"抗冻性"是二灰稳定土相比石灰稳定土最突出的优势。'},{id:80,ch:1,type:'single',q:'石灰土只能用作（  ）。',opts:['高级路面的底基层','次高级路面的基层','高等级路面的基层','柔性路面的基层'],ans:0,exp:'此题考核石灰稳定土类基层相关内容。石灰稳定土的干缩和温缩特性均十分明显，且都会导致裂缝。与水泥土一样，由于其收缩裂缝严重，强度未充分形成时表面会遇水软化，并容易产生唧浆冲刷等损坏，石灰土已被严格禁止用于高级路面的基层，只能用作高级路面的底基层。'},{id:81,ch:1,type:'single',q:'关于水泥稳定细粒土（水泥土）的说法，正确的是（ ）。',opts:['水泥土的干缩系数小于水泥稳定粒料，不易产生收缩裂缝','水泥土强度未充分形成时表面遇水会软化，导致沥青面层龟裂','水泥土抗冲刷能力强，可用于高速公路基层','水泥土温缩系数小，适合严寒地区路面基层'],ans:1,exp:'教材规定：水泥稳定细粒土（水泥土）的干缩系数和温缩系数均大于水泥稳定粒料，易产生收缩裂缝。水泥土强度未充分形成时表面遇水会软化，导致沥青面层龟裂（B正确）。水泥土抗冲刷能力差，严禁用于高速及一级公路基层，故C、D错误。'},{id:82,ch:1,type:'multi',q:'级配砂砾基层施工的说法，正确的有（  ）。',opts:['碾压后应适量洒水，保持砂砾湿润，但不应导致层下翻浆','碾压中对存在过碾压现象的部位，应重新碾压','控制碾压速度，碾压至轮迹不大于5mm,','基层压实后至面层施工前适量洒水。','未铺装上层前不得开放交通'],ans:[2,3,4],exp:'① 碾压前和碾压中应适量洒水，保持砂砾湿润，但不应导致层下翻浆。② 碾压中对存在过碾压现象的部位，应进行换填处理。级配碎石及级配碎砾石视压实碎石的缝隙情况撒布嵌缝料。③ 控制碾压速度，碾压至轮迹不大于5mm, 表面平整、坚实。基层压实后至面层 施工前适量洒水。④ 未铺装上层前不得开放交通。'},{id:83,ch:1,type:'single',q:'关于二灰稳定土的说法，正确的是（  ）。',opts:['抗冻性能比石灰稳定土低','粉煤灰用量越多早期强度越高','收缩性大于水泥稳定土和石灰稳定土','被禁止用于高等级路面的基层'],ans:3,exp:'教材规定：二灰稳定土的收缩性小于水泥稳定土和石灰稳定土（C错误）。二灰稳定土被禁止用于高等级路面的基层，只能用作底基层（D正确）。二灰稳定土抗冻性优于石灰稳定土（A错误），粉煤灰用量越多早期强度越低（B错误）。'},{id:84,ch:1,type:'single',q:'水泥稳定土类基层施工，错误的是（  ）。',opts:['材料自搅拌至摊铺碾压成型，不应超过3h。','宜在春末和气温较高季节施工，施工气温应不低于10℃','在有冰冻的地区应在第一次重冰冻到来之前的','运输中应采取防止水分蒸发和防扬尘措施'],ans:1,exp:'教材规定：水泥稳定土材料自搅拌至摊铺碾压成型不应超过3h（A正确）。宜在春末和气温较高季节施工，施工气温应不低于5℃，而非10℃（B错误）。有冰冻地区应在第一次重冰冻到来之前的0.5～1个月前完成（C选项完整）。运输中应采取防水分蒸发和防扬尘措施（D正确）。'},{id:85,ch:1,type:'single',q:'在常温状态下，二灰混合料基层的养护时间至少应为（  ）。',opts:['3d','7d','14d','28d'],ans:1,exp:'正确答案为B。7d\n\n📖 教材依据（第1章）：弯折角度不应小于1350弯钩平直部分的长度，一般结构不宜小于箍筋直径的5倍，有抗震要求的结构不得小于箍筋直径的10倍。(5)钢筋宜在常温状态下弯制，不宜加热。钢筋宜从中部开始逐步向两端弯制，弯钩应一次弯成。(6)钢筋加工过程中，应采取防止油渍、泥浆等物污染和防止受损伤的措施。(7)在钢筋加工时采用BIM建模技术，可在整体工程建模后，生成钢筋翻样料单，用于钢筋加工，提高加工效率和准确性。\n\n教材规定：二灰混合料基层应在潮湿状态下养护，常温下养护时间不宜少于7d。3d时间太短，14d和28d虽然更安全但不是规范规定的最少天数。7d是规范明确的最小养护时间要求。'},{id:86,ch:1,type:'multi',q:'关于二灰混合料拌合、运输和施工的说法，正确的有（  ）。',opts:['宜采用强制式拌和机拌合','运输时，应采取遮盖封闭措施防止水分损失和遗撒','可以用薄层贴补法进行找平','碾压时采用先重型、后轻型压路机碾压','应在潮湿状态下养护，常温下不宜少于7d'],ans:[0,1,4],exp:'教材规定：二灰混合料宜采用强制式拌和机拌合（A正确）；运输时应遮盖封闭防水分损失和遗撒（B正确）；应在潮湿状态下养护，常温下不宜少于7d（E正确）。C错误：严禁用薄层贴补法进行找平。D错误：碾压时应采用先轻型后重型压路机。'},{id:87,ch:1,type:'multi',q:'土工合成材料可置于岩土或其他工程结构内部、表面或各结构层之间，具有（  ）、隔离等功能。',opts:['加筋','防护','过滤','排水','衬垫'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。加筋；防护；过滤；排水\n\n📖 教材依据（第1章）：型工程材料的总称。(1)分类土工合成材料可分为土工织物、土工膜、土工复合材料和土工特种材料等类型。(2)功能与作用①士工合成材料可设置于岩土或其他工程结构内部、表面或各结构层之间，具有加筋、防护、过滤、排水、隔离等功能。②当工程中使用土工合成材料兼有其他功能且要考虑这些功能的作用时，还需进第1章城镇道路工程19行相应项目的校核设计。\n\n教材规定：土工合成材料可置于岩土或其他工程结构内部、表面或各结构层之间，具有加筋、防护、过滤、排水、隔离等功能。E选项"衬垫"不是土工合成材料的功能分类，衬垫属于防渗材料。'},{id:88,ch:1,type:'single',q:'关于台背路基填土加筋的说法，正确的是（ ）。',opts:['加筋的主要目的是提高路面的抗滑性能','加筋台背适宜的高度为5.0～10.0m','加筋材料宜选用土工膜或防水土工织物','台背填料宜采用高液限黏土，以保证水稳定性'],ans:1,exp:'教材规定：台背路基填土加筋宜采用土工网或土工格栅，加筋台背适宜的高度为5.0～10.0m（B正确）。A错误：加筋主要目的是提升路堤稳定性而非抗滑。C错误：加筋材料应选用土工网或土工格栅，而非土工膜。D错误：台背填料宜采用透水性材料，不能用高液限黏土。'},{id:89,ch:1,type:'multi',q:'关于垫隔土工布加固地基施工，正确的是（ ）。',opts:['在整平好的下承层上按路堤底宽全断面铺设','铺设土工聚合物，在路堤每边留足够的锚固长度','当采用搭接法连接，搭接长度宜为0.3～0.9m','采用缝接法时，粘结宽度不小于30mm,','上下层接缝应交替错开，错开长度不小于0.5m'],ans:[0,1,2,4],exp:'② 施工： a.在整平好的下承层上按路堤底宽全断面铺设，摊平时拉直平顺，紧贴下承层，不 得出现扭曲、折皱、重叠。在斜坡上摊铺时，应保持一定松紧度(可用U 形钉控制)。 b.铺设土工聚合物，应在路堤每边留足够的锚固长度，回折覆盖在压实的填料 面上。 c.为保证土工合成材料的整体性，当采用搭接法连接，搭接长度宜为0.3～0.9m; 采用缝接法时，粘结宽度不小于50mm, 粘结强度不低于土工合成材料的抗拉强度。 d.现场施工中，一方面注意土工合成材料破损时必须立即修补好，另一方面上下 层接缝应交替错开，错开长度不小于0.5m。'},{id:90,ch:1,type:'single',q:'关于透层施工要求的说法，错误的是（ ）',opts:['透层油应在基层表面稍变干燥但未硬化时喷洒','透层油宜采用渗透性好的液体沥青或乳化沥青','透层油洒布后应立即开放交通以加快挥发','透层油洒布后应封闭交通直至养护期满'],ans:2,exp:'规范要求透层油洒布后应封闭交通，故C选项错误。'},{id:91,ch:1,type:'multi',q:'关于沥青路面透层、粘层、封层的施工要求，正确的有（ ）',opts:['粘层油宜在摊铺面层当天洒布','封层集料应质地坚硬、耐磨、洁净','气温低于5℃时不应喷洒粘层油','透层油喷洒后养护时间应根据试验确定','风力超过4级时应停止喷洒封层油'],ans:[0,1,3],exp:'正确答案为A、B、D。粘层油宜在摊铺面层当天洒布；封层集料应质地坚硬、耐磨、洁净；透层油喷洒后养护时间应根据试验确定\n\n📖 教材依据（第1章）：沥青层与水泥混凝土路面之间的粘结而洒布的沥青材料薄层。帖层油宜采用快裂或中裂乳化沥青、改性乳化沥青，也可采用快凝或中凝液体石油沥青作粘层油。粘层油宜在摊铺面层当天酒布。C.封层。铺筑在面层表面的称为上封层，铺筑在面层下面的称为下封层。封层油直采用改性沥青或改性乳化沥青，封层集料应质地坚硬、耐磨、洁净且粒径与级配应符合要求。\n\nC选项错误，规范要求气温在10℃及以下不应喷洒； E选项错误，规范要求风力超过5级(含5级)时不应喷洒。其他选项均符合规范要求。'},{id:92,ch:1,type:'single',q:'关于粘层施工的说法，正确的是（ ）',opts:['粘层油应采用慢裂乳化沥青','粘层油应在面层摊铺前一周洒布','粘层油可用于加强新旧沥青层的粘结','粘层油喷洒应采用柱状喷射方式'],ans:2,exp:'正确答案为C。粘层油可用于加强新旧沥青层的粘结\n\n📖 教材依据（第1章）：但尚未硬化的情况下喷洒，洒布透层油后，应封闭交通。透层油1西布后的养护时间应根据透层油的品种和气候条件由试验确定。液体沥青中的稀释剂全部挥发或乳化沥青水分蒸发后，应及时铺筑沥青混合料面层。b.粘层。在既有结构和路缘石、检查井等构筑物与沥青泪合料层的连接面应喷洒粘层油。为加强路面沥青层之间，沥青层与水泥混凝土路面之间的粘结而洒布的沥青材料薄层。\n\nA错误，粘层油宜采用快裂或中裂乳化沥青； B选项错误，应在摊铺面层当天洒布； D选项错误，应呈雾状喷洒。'},{id:93,ch:1,type:'single',q:'下列说法正确的的是（ ）',opts:['当气温为5℃，可以喷洒粘层油','当气温为15℃，可以喷洒粘层油','当风力为6级，可以喷洒粘层油','当风力为5级，可以喷洒粘层油'],ans:1,exp:'当气温在10℃及以下，风力大于5级(含5级),不应喷洒透层、粘层、封层油。'},{id:94,ch:1,type:'single',q:'热拌普通沥青混合料路面工艺流程中，压实成型的紧前工作为（ ）',opts:['摊铺','接缝处理','运输','养护'],ans:1,exp:'正确答案为B。接缝处理\n\n📖 教材依据（第1章）：养护。1.3.3城镇道路面层施工1.沥青类混合料面层施工1)沥青类混合料面层施工热拌普通沥青海合料路面工艺流程:施工准备→运输→摊铺→接缝处理→压实成型→养护→开放交通。第1篇市政公用工程技术22(1)施工准备①透层、粘层、封层:a透层。为使沥青混合料面层与非沥青材料基层结合良好，在基层上喷洒能很好渗入表面的沥青类材料薄层。\n\n施工准备→运输→摊铺→接缝处理→压实成 型→养护→开放交通。'},{id:95,ch:1,type:'single',q:'关于沥青混合料运输要求的说法，错误的是（ ）',opts:['运料车轮胎上不得沾有泥土等脏物','等候的运料车宜在5辆以上','已遭雨淋的沥青混合料经晾干后可继续使用','运料车应在摊铺机前100～300mm外空挡等候'],ans:2,exp:'正确答案为C。已遭雨淋的沥青混合料经晾干后可继续使用\n\n📖 教材依据（第1章）：合施工温度要求或结团成块、己遭雨淋则不得使用。d.应按施工方案安排运输和布料，摊铺机前应有足够的运料车等候。对高等级道路，等候的运料车宜在5辆以上。e.运料车应在摊铺机前100~300mm外空挡等候，摊铺时被摊铺机缓缓顶推前进井逐步卸料，避免撞击摊铺机。每次卸料必须倒净，如有余料应及时清除，防止硬结。\n\n规范要求已遭雨淋的沥青混合料不得使用，故C选项错误。'},{id:96,ch:1,type:'multi',q:'关于沥青混合料运输与摊铺，正确的有（ ）',opts:['装料前应喷洒防粘结剂防止混合料粘结车厢','运输过程中应采用篷布覆盖保温防雨','结团成块的混合料可打散后继续使用','运料车应避免撞击摊铺机','每次卸料后车厢内余料应及时清除'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。装料前应喷洒防粘结剂防止混合料粘结车厢；运输过程中应采用篷布覆盖保温防雨；运料车应避免撞击摊铺机；每次卸料后车厢内余料应及时清除\n\n📖 教材依据（城镇道路工程）：⑤二灰稳定粒料基层中的粉煤灰，若三氧化硫(S03)含量偏高，易使路面起拱，直接影响道路基层和面层的弯沉值。2.城镇道路基层施工技术才)石灰稳定土类基层与水泥稳定土类基层(1)运输与摊铺①拌成的稳定土类泪合料应及时运送到铺筑现场。水泥稳定土类材料自搅拌至摊铺碾压成型，不应超过弛。②运输中应采取防止水分蒸发和防扬尘措施。'},{id:97,ch:1,type:'single',q:'关于城市快速路、主干路沥青面层摊铺要求的说法，错误的是（ ）',opts:['每台摊铺机的摊铺宽度宜大于8m','两幅之间应有30～60mm宽度的搭接','宜采用两台以上摊铺机联合摊铺','上下层搭接位置宜错开200mm以上'],ans:0,exp:'正确答案为A。每台摊铺机的摊铺宽度宜大于8m\n\n📖 教材依据（第1章）：料等类型。(2)功能与作用①士工合成材料可设置于岩土或其他工程结构内部、表面或各结构层之间，具有加筋、防护、过滤、排水、隔离等功能。②当工程中使用土工合成材料兼有其他功能且要考虑这些功能的作用时，还需进第1章城镇道路工程19行相应项目的校核设计。2)工程应用(1)路堤加筋①路堤加筋的主要目的是提升路堤的稳定性。\n\n要求每台摊铺机的摊铺宽度宜小于6m，故A选项错误。'},{id:98,ch:1,type:'single',q:'关于沥青混合料面层摊铺施工的说法，正确的是（ ）。',opts:['摊铺前应提前预热熨平板，使其温度不低于80℃','摊铺速度宜控制在4～8m/min范围内，以提高效率','上面层摊铺宜采用钢丝绳或路缘石控制高程与厚度','摊铺机必须缓慢、均匀、连续不间断地摊铺，不得随意变速或中途停顿'],ans:3,exp:'教材规定：摊铺机必须缓慢、均匀、连续不间断地摊铺，不得随意变速或中途停顿（D正确）。A错误：熨平板预热温度应不低于100℃而非80℃。B错误：摊铺速度宜控制在2～6m/min。C错误：上面层宜采用导梁或平衡梁控制，下面层才用钢丝绳或路缘石。'},{id:99,ch:1,type:'multi',q:'关于沥青混合料面层摊铺施工技术，正确的有（ ）。',opts:['摊铺前应提前0.5～1h预热熨平板，使其不低于100℃','熨平板的振捣或夯实装置应选择适宜的振动频率和振幅','摊铺速度宜控制在2～6m/min，且应连续不间断','发现明显离析、波浪、裂缝、拖痕时应继续摊铺后再处理','下面层宜采用导梁或平衡梁控制高程与厚度'],ans:[0,1,2],exp:'教材规定：摊铺前应提前0.5～1h预热熨平板使其不低于100℃（A正确）；振捣装置应选择适宜频率和振幅（B正确）；摊铺速度宜控制在2～6m/min且应连续不间断（C正确）。D错误：发现离析等问题应立即处理而非继续摊铺。E错误：下面层宜采用钢丝绳控制，上面层才用导梁或平衡梁。'},{id:100,ch:1,type:'single',q:'关于摊铺机操作要求的说法，正确的是（ ）',opts:['可根据需要随意变换摊铺速度','熨平板振动频率应固定不变','必须连续不间断地均匀摊铺','中途停顿对路面质量无影响'],ans:2,exp:'A选项错误，不得随意变换速度； B选项错误，应选择适宜频率； D选项错误，中途停顿会影响质量。'},{id:101,ch:1,type:'single',q:'沥青混合料面层铺筑时，熨平板振捣装置应选择适宜的振动频率和振幅目的是（）',opts:['保证路面的平整度','确定最佳弯沉值','控制厚度','提升路面初始压实度'],ans:3,exp:'教材规定：熨平板振捣或夯实装置应选择适宜的振动频率和振幅，目的是提升路面初始压实度。通过振捣使混合料在熨平板下获得初步压实，提高路面初始密实度。平整度主要通过摊铺工艺控制，弯沉值与整体压实度有关，厚度控制是另一项指标。'},{id:102,ch:1,type:'multi',q:'沥青混合料最低摊铺温度根据下列（）执行',opts:['基层厚度','沥青混合料种类','气温','风速','下卧层表面温度'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。沥青混合料种类；气温；风速；下卧层表面温度\n\n📖 教材依据（第1章）：第1篇市政公用工程技术(3)透水铺装地面施工前，应对基层(垫层)进行检查验收，透水铺装基层除了满足设计要求的高程、横坡、强度等要求外，还应满足透水基层厚度、材料要求，符合要求后方可进行面层施工。2)施工要求(1)透水砖路面一般应用于城市人行道、建筑小区及城市广场人行通道。(2)采用透水铺装时，铺装面层孔隙率不小于20%，透水基层孔隙率不小于30%。'},{id:103,ch:1,type:'multi',q:'沥青混合料面层控制高程与摊铺厚度，下列说法正确的是（）',opts:['下面层宜采用钢丝绳','下面层宜采用路缘石','下面层宜采用平石','上面层宜采用钢丝绳','上面层宜采用路缘石'],ans:[0,1,2],exp:'正确答案为A、B、C。下面层宜采用钢丝绳；下面层宜采用路缘石；下面层宜采用平石\n\n📖 教材依据（第1章）：、较高的撕破强度、顶破强度和握持强度等性能。②加筋路堤的施工原则是以能够充分发挥加筋效果为出发点。合成材料连接应牢固，受力方向的连接强度不得低于材料设计抗拉强度，其叠合长度不应小于3ûûmm，连接时搭接宽度不得小于150mm。铺设土工合成材料的土层表面应平整，表面严禁有碎、块石等坚硬凸出物。土工合成材料摊铺后宜在48h以内填筑填料，以避免其遭受过长时间的阳光直晒。\n\n上面层宜采用导梁或平衡梁的控制方式'},{id:104,ch:1,type:'multi',q:'具备条件的道路宜采用的先进施工技术，包括（）',opts:['卫星定位','三维数据模型(BIM)','雷达','激光控制','无线感应'],ans:[0,1,3],exp:'教材规定：具备条件的道路宜采用卫星定位（GPS）、三维数据模型（BIM）和雷达等先进施工技术。D选项"激光控制"和E选项"无线感应"不属于教材所列的先进施工技术，教材明确列出的是卫星定位、BIM和雷达。'},{id:105,ch:1,type:'multi',q:'沥青面层碾压温度应根据（）因素经试压确定',opts:['沥青混合料种类','沥青种类','压路机','风速','层厚'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。沥青混合料种类；沥青种类；压路机；层厚\n\n📖 教材依据（第1章）：滞留。(3)路面裂缝防治①采用玻纤网、土工织物等土工合成材料，铺设于旧沥青路面、旧水泥混凝土路面的沥青加铺层底部或新建道路沥青面层底部，可减少或延缓由旧路面对沥青加铺层的反射裂缝，或半刚性基层对沥青面层的反射裂缝。用于裂缝防治的玻纤网和土工织物应分别满足抗拉强度、最大负荷延伸率、网孔尺寸、单位面积质量等技术要求。\n\n教材规定：沥青面层碾压温度应根据沥青种类、沥青混合料种类、压路机类型和层厚等因素经试压确定。C选项"风速"虽然影响施工条件，但不是确定碾压温度的因素，碾压温度通过试压确定主要考虑材料性质、设备厚度等。'},{id:106,ch:1,type:'multi',q:'关于沥青混合料初压下列说法正确的是（）',opts:['初压应采用轮胎压路机','压路机的驱动轮背向摊铺机','超高路段和坡道上则由低处向高处碾压','复压应紧跟初压连续进行','碾压路段长度宜为60～80m'],ans:[2,3,4],exp:'正确答案为C、D、E。超高路段和坡道上则由低处向高处碾压；复压应紧跟初压连续进行；碾压路段长度宜为60～80m\n\n📖 教材依据（第1章）：的碾压温度见表1.3-3。d.初压应采用钢轮压路机静压1~2遍。初压后检查平整度、路拱，必要时应及时修整。碾压时应将压路机的驱动轮面向摊铺机，从外侧向中心碾压，在超高路段和坡道上则由低处向高处碾压。复压应紧跟初压连续进行。碾压路段长度宜为60~80m。表1.3-2压路机碾压速度(km/h)初压复压终压压路机类型钢筒式压路机适宜最大适宜最大适宜最大1.5~232.5~3.552.5~3.553.5~4.564~68轮胎压路机振动压路机才5~251.5~2才5~22~35(静压)(静压)(振动)(振……\n\n初压应采用钢轮压路机静压1～2遍。初压后检查平整度、路拱、必要时应及时修整。碾压时应将压路机的驱动轮面向摊铺机'},{id:107,ch:1,type:'single',q:'沥青混合料面层终压下列说法错误的是（）',opts:['终压应紧接在复压后进行','可选用双轮钢筒式压路机','可选用振动压路机','碾压至无明显轮迹为止'],ans:2,exp:'正确答案为C。可选用振动压路机\n\n📖 教材依据（第1章）：压带宜重叠100~200mm。当采用三轮钢筒式压路机时，总质量不小于12t，相邻碾压带宜重叠后轮的1/2轮宽，并不应小于200mm。f.终压应紧接在复压后进行。宜选用双轮钢筒式压路机或关闭振动的振动压路机碾压至无明显轮迹为止。g.为防止沥青海合料粘轮，对压路机钢轮可涂刷隔离剂或防粘结剂，严禁刷柴油。1"\'"j第1章城镇道路工程25亦可向碾轮喷淋添加少量表面活性剂的雾状水。\n\n宜选用双轮钢筒式压路机或关闭振动的振动压路机'},{id:108,ch:1,type:'single',q:'关于沥青混合料面层接缝说法错误的是（）',opts:['表面层横向接缝应采用斜接缝','表面层横向接缝应采用垂直的平接缝','中面层横向接缝可采用斜接缝','中面层横向接缝可采用阶梯形接缝'],ans:0,exp:'正确答案为A。表面层横向接缝应采用斜接缝\n\n📖 教材依据（第1章）：将先铺的沥青混合料刨出毛搓，涂刷粘层油后再铺新料，新料跨缝摊铺与巳铺层重叠50~100mm，软化下层后铲走重叠部分，再跨缝压密挤紧。C.高等级道路的表面层横向接缝应采用垂直的平接缝，以下各层和其他等级的道路的各层可采用斜接缝或阶梯形接缝。平接缝宜采用机械切割或人工刨除层厚不足部分，使工作缝成直角连接。\n\n高等级道路的表面层横向接缝应采用垂直的平接缝，以下各层和其他等级的道路的各层可采用斜接缝或阶梯形接缝。'},{id:109,ch:1,type:'multi',q:'关于沥青路面接缝施工的要求，正确的有（ ）',opts:['热接缝应留下100～200mm宽暂不碾压作为基准面','可采用3m直尺检查接缝平整度','新料摊铺应与已铺层重叠50～100mm','应先纵向碾压再横向碾压','接缝处可不涂粘层油直接铺筑'],ans:[0,1,2],exp:'正确答案为A、B、C。热接缝应留下100～200mm宽暂不碾压作为基准面；可采用3m直尺检查接缝平整度；新料摊铺应与已铺层重叠50～100mm\n\n📖 教材依据（第1章）：，为确保交通安全与施工安全，在编制施工组织设计前应掌握路面结构、交通情况，特别是了解路基中埋设的地下管线、电缆及其他障碍物等情况。③了解线路管理部门对施工的要求和施工期间交通疏导及机车限速的可行性。第1篇市政公用工程技术118(2)人员与设备①作业人员进行安全技术培训，经考核合格后上岗。②作业设备进行性能和安全检查，符合有关安全规定。\n\nD选项错误，应先横向碾压再纵向碾压； E选项错误，热接缝虽可不涂粘层油，但题目未明确限定热接缝。'},{id:110,ch:1,type:'multi',q:'关于改性沥青混合料面层施工说法错误的是（）',opts:['在喷洒有粘层油的路面上铺筑改性沥青混合料时，宜使用履带式摊铺机','上面层找平宜采用非接触式平衡梁','初压开始温度不低于160℃','碾压终了的表面温度应不低于80℃','振动压实应遵循“紧跟、慢压、低频、高幅”的原则'],ans:[2,3,4],exp:'正确答案为C、D、E。初压开始温度不低于160℃；碾压终了的表面温度应不低于80℃；振动压实应遵循“紧跟、慢压、低频、高幅”的原则\n\n📖 教材依据（第1章）：必须及时清除，防止硬结。在运输、等候过程中，如发现有沥青结合料滴漏时，应采取措施纠正。(2)施工①摊铺:a.在喷洒有粘层油的路面上铺筑改性沥青混合料时，宜使用履带式摊铺机。改性沥青SMA1昆合料施工温度应经试验确定，一般情况下，摊铺温度不低于160"C。b.摊铺速度宜放慢至1~3m/min。松铺系数应通过试验段取得。\n\n初压开始温度不低于150℃,碾压终了的表面温度应不低于90～120℃。 振动压实应遵循“紧跟、慢压、高频、低幅”的原则'},{id:111,ch:1,type:'multi',q:'改性沥青混合料振动压实，采取高频率、低振幅的方式慢速碾压，其目的是保证（ ）',opts:['弯沉值','平整度','厚度','抗滑性','密实度'],ans:[1,4],exp:'教材原文："振动压实应遵循紧跟、慢压、高频、低幅的原则……采取高频率、低振幅的方式慢速碾压，这是保证平整度和密实度的关键。"\n\n✅ B正确——高频低幅可让混合料充分密实的同时保持表面平整度不受破坏。\n✅ E正确——高频低幅是实现密实度的关键措施。\n❌ D错误——抗滑性主要靠骨料级配和构造深度实现，不是振动压实的目的。\n❌ A、C——弯沉值和厚度通过控制碾压遍数等其他参数实现。'},{id:112,ch:1,type:'single',q:'关于干法添加型温拌沥青添加剂的掺量，下列说法正确的是（ ）。',opts:['一般为最佳沥青用量的0.5%～0.8%','一般为最佳沥青用量的3%～4%','一般为最佳沥青用量的5%～6%','一般为最佳沥青用量的8%～10%'],ans:2,exp:'正确答案为C。一般为最佳沥青用量的5%～6%\n\n📖 教材依据（第1章）：几点:(1)温拌沥青的生产和运输①表面活性剂类温拌添加剂用量，干法添加型温拌添加剂的掺量一般为最佳沥青用量的5%~6%，湿法添加型温拌添加剂的掺量一般为最佳沥青用量的0.5%~0.8%。②沥青降粘类温拌添加剂的掺量一般为最佳沥青用量的3%~4%。以上两种类型用量均可根据施工温度降幅需求和混合料路用性能指标适当调整。\n\n干法添加型温拌添加剂的掺量一般为最佳沥青用量的5%～6%，湿法添加型为0.5%～0.8%，沥青降粘类为3%～4%。'},{id:113,ch:1,type:'single',q:'温拌沥青混合料的出料温度应比热拌沥青混合料降低（ ）。',opts:['10℃以上','15℃以上','20℃以上','25℃以上'],ans:2,exp:'正确答案为C。20℃以上\n\n📖 教材依据（第1章）：。④运料车装料时，应通过前后移动运料车来消除粗细料的离析现象。一车料最少应分两层装载，每层应按3次以上装料。(2)温拌沥青的施工①温拌沥青混合料的基准摊铺温度应满足表1.3-4的要求。表1.3-4温拌沥青混合料的基准摊铺温度范围j且拌沥青混合料类型施工工序温拌石油沥青混合料WAC、WATB、WATPB摊铺温度("c)二E刊5温拌改性沥青混合料WAC温拌改性沥青混合料WSMA、WOGFC、二主丁35WUTFC二"140j且拌橡胶沥青混合料WARHM~才45②按表1.3-5控制温拌沥青混合料的基准初……\n\n原文明确说明温拌沥青混合料的出料温度较热拌沥青混合料降低20℃以上。'},{id:114,ch:1,type:'multi',q:'下列属于水泥混凝土路面工艺流程的是（）',opts:['模板安装','钢筋设置','摊铺与振捣','碾压','拉毛与切缝'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。模板安装；钢筋设置；摊铺与振捣；拉毛与切缝\n\n📖 教材依据（第1章）：70"c)温拌橡胶沥青WSMA、WOGFC、主140~702.水泥混凝土路面施工水泥混凝土路面工艺流程:施工准备→模板安装→钢筋设置→摊铺与振捣→拉毛与切缝→养护→填缝→开放交通。以下内容主要介绍普通水泥混凝土路面泪凝土的运输、浇筑施工、接缝设置及养护等。1)混凝土运输(1)应根据施工进度、运量、运距及路况，选配车型和车辆总数。\n\n教材规定：水泥混凝土路面工艺流程包括模板安装、钢筋设置、摊铺与振捣、拉毛与切缝等工序。D选项"碾压"属于沥青路面施工工序，水泥混凝土路面采用振捣方式密实而非碾压。'},{id:115,ch:1,type:'multi',q:'水泥混凝土路面支模前应核对（）',opts:['路基标高','施工缝位置','面板分块','构造物位置','路面标高'],ans:[2,3,4],exp:'正确答案为C、D、E。面板分块；构造物位置；路面标高\n\n📖 教材依据（城镇道路工程）：~30mm，每O.5~O.8m设1处支撑装置，模板与混凝土接触面及模板顶面应刨光。模板制作偏差应符合规范规定要求。第1篇市政公用工程技术28③模板安装应符合:支模前应核对路面标高、面板分块、胀缝和构造物位置;模板应安装稳固、}I顶直、平整，无扭曲，相邻模板连接应紧密平)帜，不得错位;严禁在基层上挖槽嵌入模板;使用轨道摊铺机应采用专用钢制轨模;模板安装完毕，应进行检验，合格后方可使用;模板安装检验合格后表面应涂脱模剂，接头应粘贴胶带或塑料薄膜等密封。'},{id:116,ch:1,type:'single',q:'三辊轴机组铺筑混凝土面层时，当面层铺装厚度小于（ ）时，可采用振捣梁。',opts:['120mm','150mm','180mm','200mm'],ans:1,exp:'正确答案为B。150mm\n\n📖 教材依据（第1章）：胀缝板、提缝板一起安装。当一次铺筑宽度小于面层宽度时，应设置纵向施工缝，纵向施工缝宜采用平缝加拉杆型。(3)摊铺与振捣①三辑轴机组铺筑棍凝土面层时，与昆轴直径应与摊铺层厚度匹配，且必须同时配备一台安装插入式振捣器组的排式振捣机;当面层铺装厚度小于150mm时，可采用振捣梁;当一次摊铺双车道面层时应配备纵缝拉杆插入机，并配有插入深度控制和拉杆间距调整装置。\n\n三辊轴机组铺筑混凝土面层时，当面层铺装厚度小于150mm时，可采用振捣梁。'},{id:117,ch:1,type:'single',q:'三辊轴机组铺筑混凝土面层说法错误的是（）',opts:['三辊轴整平机分段整平的作业单元长度宜为','振捣机振实与三辊轴整平工序之间的时间间隔不宜超过15min','在一个作业单元长度内，应采用前进静滚、后退振动方式作业','最佳滚压遍数应经过试验段确定'],ans:2,exp:'教材规定：三辊轴机组铺筑时，在一个作业单元长度内，应采用前进振动、后退静滚方式作业，而非"前进静滚、后退振动"（C错误）。A选项三辊轴整平机分段整平作业单元长度宜为20～30m。B选项振捣与整平时间间隔不宜超过15min。D选项最佳滚压遍数应经试验段确定。'},{id:118,ch:1,type:'single',q:'采用轨道摊铺机铺筑混凝土面层时，坍落度宜控制在（ ）。',opts:['10～20mm','20～40mm','30～50mm','40～60mm'],ans:1,exp:'正确答案为B。20～40mm\n\n📖 教材依据（第1章）：轴整平工序之间的时间间隔不宜超过15min;在一个作业单元长度内，应采用前进振动、后退静滚方式作业，最佳滚压遍数应经过试验段确定。②采用轨道摊铺机铺筑时，最小摊铺宽度不宜小于3.75m，并选择适宜的摊铺机型;明落度宜控制在20~40mm，根据不同明落度时的松铺系数计算出松铺高度;轨道摊铺机应配备振捣器组，当面板厚度超过150mm，明落度小于30mm时，必须插入振捣;轨道摊铺机应配备振动梁或振动板对混凝土表面进行振捣和修整，使用振动板提浆饰面时，提浆厚度宜控制在(4土1)mm;面层表面整平时应及时……\n\n轨道摊铺机铺筑时，坍落度宜控制在20～40mm，并需根据不同坍落度调整松铺系数。'},{id:119,ch:1,type:'multi',q:'关于滑模摊铺机施工混凝土面层的技术要求，下列说法正确的有（ ）。',opts:['振动仓内料位高度一般应高出路面10cm','混凝土坍落度小时，应采用高频振动、低速度摊铺','胀缝支架的支撑点间距宜为40～60cm','滑模摊铺机施工时无需设置基准线','坍落度大时，应采用低频振动、高速度摊铺'],ans:[0,1,2,4],exp:'教材规定：振动仓内料位高度一般应高出路面10cm（A正确）；坍落度小时应采用高频振动、低速度摊铺（B正确）；胀缝支架支撑点间距宜为40～60cm（C正确）；坍落度大时采用低频振动、高速度摊铺（E正确）。D错误：滑模摊铺需设置基准线控制高程和方向。'},{id:120,ch:1,type:'multi',q:'混凝土面层横向缩缝，说法正确的是（ ）',opts:['采用切缝机施工，宽度宜为3～5mm','设传力杆时，切缝深度最低70mm','不设传力杆时，切缝深度不应小于面层厚的1/3, 且不应小于70mm','当混凝土达到设计强度的25%～30%时，方可切割','切割用水冷却时，应防止切缝水渗入基层和土层'],ans:[1,3,4],exp:'此题考核混凝土面板接缝相关内容。横向缩缝采用切缝机施工，宜在水泥混凝土强度达到设计强度25%-30%时进行，宽度控制在4-6mm，切缝深度：设传力杆时，不应小于面层厚度的1/3，且不得小于70mm；不设传力杆时，不应小于面层厚度的1/4，且不应小于60mm。混凝土板养护期满后应及时灌缝。'},{id:121,ch:1,type:'multi',q:'混凝土面层纵缝施工缝有（）',opts:['平缝','企口缝','斜接缝','阶梯型接缝','V型接缝'],ans:[0,1],exp:'正确答案为A、B。平缝；企口缝\n\n📖 教材依据（第1章）：，且不应小于60mm。当f昆凝土达到设计强度的25%~30%时，采用切缝机进行切割。切割用水冷却时，应防止切缝水渗入基层和土层。④纵缝施工缝有平缝、企口缝等形式。平缝纵缝，对已浇筑混凝土板的缝隙涂刷沥青，避免涂在拉杆上。挠筑邻板时缝的上部压成规定深度的缝槽。企口缝纵缝，宜先浇筑1昆凝土板凹棒的一边，缝壁涂刷沥青，浇筑邻板时靠缝壁浇筑。\n\n教材规定：混凝土面层纵向施工缝可分为平缝（设拉杆）和企口缝（设拉杆）两种形式。C选项"斜接缝"、D选项"阶梯型接缝"是沥青路面横向接缝的接缝形式。V型缝非规范接缝形式。'},{id:122,ch:1,type:'multi',q:'关于混凝土填缝说法正确的有（）',opts:['混凝土板养护前，缝槽应及时填缝','灌填缝料前，清除缝内砂石、凝结泥浆、杂物等','常温施工宜略低于板面，冬期施工与路面平','填缝料应与混凝土缝壁粘附紧密，不渗水','面层混凝土弯拉强度达到设计强度，开放交通'],ans:[1,3],exp:'正确答案为B、D。灌填缝料前，清除缝内砂石、凝结泥浆、杂物等；填缝料应与混凝土缝壁粘附紧密，不渗水\n\n📖 教材依据（第1章）：807570振动压路机7570605550505045开放交通的路表温度，不高于("c)e.密级配沥青混凝土混合料复压宜优先采用重型轮胎压路机进行碾压，以增加密实性，其总质量不宜小于25t。相邻碾压带应重叠1/3~1/2轮宽。对粗集料为主的1昆合料，宜优先采用振动压路机复压(厚度宜大于30mm)，振动频率宜为35~50Hz，振幅宜为O.3~O.8mm。\n\n混凝土板养护期满后，缝槽应及时填缝'},{id:123,ch:1,type:'single',q:'关于混凝土面板养护说法错误的有（）',opts:['可采取喷洒养护剂或保湿覆盖等方式','不宜使用围水养护','养护时间应根据混凝土弯拉强度增长情况而定，不宜小于设计弯拉强度的75%,一般宜为14～21d','应特别注重前7d的保湿(温)养护'],ans:2,exp:'教材规定：养护时间应根据混凝土弯拉强度增长情况而定，不宜小于设计弯拉强度的80%，一般宜为14～21d。C选项"75%"错误，应为80%。A选项喷洒养护剂或保湿覆盖正确，B选项不宜使用围水养护正确，D选项注重前7d保湿养护正确。'},{id:124,ch:1,type:'multi',q:'设置水泥混凝土路面的胀缝很重要，它应满足（  ）等要求。',opts:['应与路面中心线垂直','缝宽必须一致','缝中不得连浆','缝壁必须垂直','缝内灌满填缝料'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。应与路面中心线垂直；缝宽必须一致；缝中不得连浆；缝壁必须垂直\n\n📖 教材依据（第1章）：路工程29(4)接缝①普通混凝土路面在与结构物衔接处、道路交叉和填挖土方变化处应设胀缝。胀缝应设置胀缝补强钢筋支架、胀缝板和传力杆。胀缝应与路面中心线垂直，缝壁必须垂直，缝宽必须一致，缝中不得连浆。缝上部灌填缝料，下部安装胀缝板和传力杆。当一次铺筑宽度小于面层加硬路肩总宽度时，应按设计要求设置纵向施工缝。\n\n此题考核混凝土面板接缝相关内容。普通混凝土路面的胀缝应设置胀缝补强钢筋支架、胀缝板和传力杆。胀缝应与路面中心线垂直；缝壁必须垂直；缝宽必须一致，缝中不得连浆。缝上部灌填缝料，下部安装胀缝板和传力杆。'},{id:125,ch:1,type:'single',q:'关于砌筑砂浆的要求，下列说法错误的是（ ）。',opts:['应采用干硬性水泥砂浆','虚铺系数应经试验确定','砂浆应采用中砂配制','可用在料石下填塞砂浆找平'],ans:3,exp:'正确答案为D。可用在料石下填塞砂浆找平\n\n📖 教材依据（第1章）：高强度螺栓连接。安装时模板的接缝不得漏浆(特别是拉筋孔位置)，采用双面胶带填塞缝隙。安装底节模板前，检查承台顶高程及外轮廓线，不符合要求时凿除或用砂浆找平处理，以确保墩身模板准确就位及模板的垂直度符合要求。承台顶面与模板联结面要平整、无缝隙，防止水泥浆流失。c.模板吊装组拼时，吊点布置要合理，起吊过程中不得发生碰撞，并用配套螺栓与下层模板对应连接，同一水平相邻模板也要按照对应螺栓孔进行连接。\n\n不得用在料石下填塞砂浆或支垫方法找平，因此D选项是错误的做法。'},{id:126,ch:1,type:'single',q:'铺砌控制基线的设置距离，在直线段宜为（ ）。',opts:['3～5m','5～10m','10～15m','15～20m'],ans:1,exp:'正确答案为B。5～10m\n\n📖 教材依据（城镇道路工程）：干硬性砂浆→铺贴天然石材→拼缝处理→养护。②施工要点:a.砌筑砂浆中采用的水泥、砂、水应符合规范要求。b铺砌应采用干硬性水泥砂浆，虚铺系数应经试验确定。C.铺砌控制基线的设置距离直线段宜为5~lOm曲线段应视情况适度加密。d.当采用水泥泪凝土做基层时，铺砌面层胀缝应与基层胀缝对齐。e.铺砌中砂浆应饱满，且表面平整、稳定、缝隙均匀。'},{id:127,ch:1,type:'multi',q:'关于铺砌面层的施工，下列说法正确的有（ ）。',opts:['铺砌面层胀缝应与基层胀缝对齐','伸缩缝材料应安放平直并与料石粘贴牢固','铺砌完成后可立即开放交通','与检查井相接时应平整美观，不得反坡','铺砌完成后应及时灌缝'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。铺砌面层胀缝应与基层胀缝对齐；伸缩缝材料应安放平直并与料石粘贴牢固；与检查井相接时应平整美观，不得反坡；铺砌完成后应及时灌缝\n\n📖 教材依据（第1章）：水泥砂浆，虚铺系数应经试验确定。C.铺砌控制基线的设置距离直线段宜为5~lOm曲线段应视情况适度加密。d.当采用水泥泪凝土做基层时，铺砌面层胀缝应与基层胀缝对齐。e.铺砌中砂浆应饱满，且表面平整、稳定、缝隙均匀。与检查井等构筑物相接时，应平整、美观，不得反坡。不得用在料石下填塞砂浆或支垫方法找平。f.伸缩缝材料应安放平直，并应与料石粘贴牢固。\n\nC错误：必须封闭交通养护至设计强度。'},{id:128,ch:1,type:'multi',q:'方砖步道施工要点，错误的是（）',opts:['人行道铺设应以面层顶面为基准','按照设计横坡和宽度铺设','人行道施工应与斜坡、踏步、挡土墙等施工结合进行','曲线段道板砖铺砌，必须采用扇形铺砌法','行进盲道与提示盲道交替铺设'],ans:[0,3,4],exp:'正确答案为A、D、E。人行道铺设应以面层顶面为基准；曲线段道板砖铺砌，必须采用扇形铺砌法；行进盲道与提示盲道交替铺设\n\n📖 教材依据（第1章）：3)方砖步道施工方砖步道主要应用于人行道铺筑，方砖步道材料、铺砌与养护可参照石材路面，还应注意以下几点:(1)人行道铺设应以侧石顶面为基准，按照设计横坡和宽度铺设。(2)人行道施工应与斜坡、踏步、挡土墙等施工结合进行。(3)曲线段道板砖铺砌，可采用直铺法和扇形铺砌法。通过调整道板砖缝隙宽度进行施工，但缝隙宽度应满足下列要求:第1章城镇道路工程31①弯道外侧的接缝宽度运6mm。\n\n(1)人行道铺设应以侧石顶面为基准，按照设计横坡和宽度铺设。 (2)人行道施工应与斜坡、踏步、挡土墙等施工结合进行。 (3)曲线段道板砖铺砌，可采用直铺法和扇形铺砌法。 行进盲道与提示盲道不得混用。'},{id:129,ch:1,type:'single',q:'关于路缘石安装控制桩的设置要求，下列说法正确的是（ ）。',opts:['直线段桩距宜为5～10m','曲线段桩距宜为10～15m','路口处桩距宜为1～5m','所有区段桩距均应为10～15m'],ans:2,exp:'正确答案为C。路口处桩距宜为1～5m\n\n📖 教材依据（第1章）：证平整度和密实度的关键。压路机的碾压速度参照表1.3-2要求。如发现改性沥青SMA混合料高温碾压有推塞现象，应复查其第1篇市政公用工程技术26级配，且不得采用轮胎压路机碾压，以防混合料被搓擦挤压上浮，造成构造深度降低或泛油。e.碾压改性沥青SMAt昆合料过程中应密切注意压实度变化，防止过度碾压。③接缝:a.改性沥青混合料路面冷却后很坚硬，冷接缝处理很困难，因此应尽量避免出现冷接缝。\n\n路口处桩距宜为1～5m， 直线段应为10～15m， 曲线段应为5～10m，因此C选项正确。'},{id:130,ch:1,type:'single',q:'路缘石施工要点，错误的是（）',opts:['路缘石基础宜与相应的路基同步施工','安装路缘石的控制桩，直线段桩距宜为10～15m； 曲线段桩距宜为5～10m；路口处桩距宜为1～5m','平石宜从雨水口两侧开始铺设，不得在雨水口位置进行收口','路口人行道位置应设置缘石坡道，且与周边道路齐平。'],ans:0,exp:'正确答案为A。路缘石基础宜与相应的路基同步施工\n\n📖 教材依据（城镇道路工程）：段路缘石，宜按设计弧形加工预制。③石质路缘石应采用质地坚硬的石料加工，强度应符合设计要求，直选用花岗石。④路缘石力学性能、物理性能及外观质量应符合设计及规范要求。(2)施工要点①路缘石基础宜与相应的基层同步施工。②安装路缘石的控制桩，直线段桩距宜为1O~15m;曲线段桩距宜为5~lOm;路口处桩距宜为1~5m。'},{id:131,ch:1,type:'single',q:'路缘石砌筑完成后，常温期养护时间不应少于（ ）。',opts:['1d','2d','3d','5d'],ans:2,exp:'正确答案为C。3d\n\n📖 教材依据（城镇道路工程）：收口;侧石与平石应错缝铺设，不得出现通缝现象。⑤路缘石靠背宜采用现挠?昆凝土，按照设计图纸高度和宽度立模浇筑。路缘石宜采用MlO水泥砂浆灌缝。灌缝后，常温期养护不应少于3d。⑥路口人行道位置应设置缘石坡道，且与周边道路齐平。2)雨水支营与雨水口施工(1)雨水口用料要求①快速路、主次干道、支路上的雨水口应使用承载能力D级400kN及以上等级铸铁雨水算盖，街巷雨水口可使用承载能力C级250kN及以上等级钢纤维混凝土雨水算盖。'},{id:132,ch:1,type:'multi',q:'关于路缘石施工的技术要求，说法正确的有（ ）。',opts:['路缘石基础应与基层同步施工','平石应从雨水口中间位置开始铺设','侧石与平石应错缝铺设','缘石坡道应与周边道路齐平','可采用M5水泥砂浆灌缝'],ans:[0,2,3],exp:'正确答案为A、C、D。路缘石基础应与基层同步施工；侧石与平石应错缝铺设；缘石坡道应与周边道路齐平\n\n📖 教材依据（第1章）：面对沥青加铺层的反射裂缝，或半刚性基层对沥青面层的反射裂缝。用于裂缝防治的玻纤网和土工织物应分别满足抗拉强度、最大负荷延伸率、网孔尺寸、单位面积质量等技术要求。玻纤网网孔尺寸宜为其上铺筑的沥青面层材料最大粒径的0.5~1.0倍。土工织物应能耐170"C以上的高温。第1篇20市政公用工程技术②用土工合成材料和沥青棍凝土面层对旧沥青路面裂缝进行防治，首先要对旧路进行外观评定和弯沉值测定，进而确定旧路处理和新料加铺方案。\n\nB错误：应从雨水口两侧开始铺设； E错误：应采用M10水泥砂浆灌缝。'},{id:133,ch:1,type:'single',q:'关于不同道路雨水口箅盖选用的说法，正确的是（ ）。',opts:['城市主干道上的雨水口，必须使用承载能力不低于C级400kN的球墨铸铁箅盖','居住小区内部街巷的雨水口，可使用承载能力为C级250kN的钢纤维混凝土箅盖','快速路辅路的雨水口，为节约成本，可采用承载能力250kN的钢纤维混凝土箅盖','所有机动车道下的雨水口，其箅盖最低承载能力要求均为C级（250kN）'],ans:1,exp:'(1)雨水口用料要求：①快速路、主次干道、支路上的雨水口应使用承载能力D级400kN及以上等级铸铁水算盖，街巷雨水口可使用承载能力C级250kN及以上等级钢纤维混凝土水算盖。② 机动车道及非机动车道雨水口宜采用现浇混凝土雨水口、预制成品雨水口。其他部位可采用砖砌式雨水口。 补充解释： D级400kN：等级：D级。试验荷载：400千牛（约40吨）。 应用场景：用于快速路、主次干道、支路。这些道路通行的大型、重型车辆多，车流量大，车速较快，对井盖的冲击和压力非常大，因此要求最高的D级承载能力。 材料要求：必须使用铸铁井盖。铸铁（尤其是球墨铸铁）具有强度高、韧性好、耐冲击、寿命长的特点，能满足严苛的工况。 C级250kN：等级：C级。试验荷载：250千牛（约25吨）。 应用场景：允许用于街巷（如胡同、里弄、小区内部道路）。这些地方主要通行小型车辆（轿车、SUV），偶尔有轻型货车，车流量和车速相对较低，荷载要求也相应降低。 材料要求：可以使用钢纤维混凝土井盖。这种材料通过加入钢纤维增强了混凝土的抗拉、抗裂和抗冲击性能，成本通常低于铸铁，在荷载要求不极端的情况下是一种经济耐用的选择。'},{id:134,ch:1,type:'multi',q:'道路雨水口施工中，其结构与材料的选择正确的是（ ）。',opts:['为提升施工效率，在城市主干道的机动车道上采用了预制成品混凝土雨水口','在一条设计时速60km/h的城市主干道上，选用承载等级为D400的铸铁雨水箅盖','在一条禁止机动车通行的街巷内，为节省投资，采用了砖砌式雨水口','在非机动车道上，选用承载等级C250的钢纤维混凝土雨水箅盖','考虑到重型车辆可能借道通行，将支路上的雨水口箅盖全部提高标准，采用E600级铸铁箅盖'],ans:[0,1,2,3],exp:'教材规定：城市主干道机动车道可采用预制成品混凝土雨水口（A正确）；快速路、主次干道应使用D级400kN及以上铸铁箅盖（B正确）；街巷可采用砖砌式雨水口（C正确）；非机动车道可使用C级250kN钢纤维混凝土箅盖（D正确）。E选项E600级为过高的标准，支路采用D400级即可，无需提高至E600。'},{id:135,ch:1,type:'multi',q:'重力式砌体挡土墙特点，正确的是（ ）。',opts:['依靠墙体自重抵挡土压力作用','一般用浆砌片(块)石砌筑，外观有天然之美','形式简单，就地取材，施工方便，造价大','人工耗用量大，工效低，工期长','挡土墙高度不受限'],ans:[0,1,3],exp:'正确答案为A、B、D。依靠墙体自重抵挡土压力作用；一般用浆砌片(块)石砌筑，外观有天然之美；人工耗用量大，工效低，工期长\n\n📖 教材依据（第1章）：式及分类结构示意图结构特点.....\'.-1-混凝土压顶①依靠墙体自重抵挡土压力作用。②般用浆砌片(块)石砌筑，外观有天然之美。重力式砌体挡土墙③形式简单，就地取材，施工方便，造价低。④人工耗用量大，工效低，工期长3挡土墙高度受限浆砌块石基础34第才篇市政公用工程技术续表类型结构示意图结构特点①依靠墙体自重抵挡土压力作用。\n\n①依靠墙体自重抵挡土压力作用。 ②一般用浆砌片(块)石砌筑，外观有天然之美。 ③形式简单，就地取材，施工方便，造价低。 ④人工耗用量大，工效低，工期长，挡土墙高度受限。'},{id:136,ch:1,type:'single',q:'关于衡重式挡土墙说法正确的是（  ）。',opts:['依靠墙体自重抵挡土压力的作用','钢筋用量大，造价高','仅利用衡重台上填土的下压作用增加墙体稳定','全墙重心的后移可以增加墙体稳定'],ans:3,exp:'教材规定：衡重式挡土墙利用衡重台上填土的下压作用和全墙重心的后移增加墙体稳定（D正确）。A选项依靠墙体自重描述的是重力式挡土墙。B选项钢筋用量大、造价高描述的是悬臂式和扶壁式挡土墙。C选项"仅利用"表述不全面。'},{id:137,ch:1,type:'multi',q:'钢筋混凝土悬臂式挡土墙由（  ）组成。',opts:['立壁','墙面板','墙趾板','扶壁','墙踵板'],ans:[0,2,4],exp:'正确答案为A、C、E。立壁；墙趾板；墙踵板\n\n📖 教材依据（第1章）：后移增加墙体稳定。衡重式挡土墙②墙胸1皮陡，下墙倾斜，可降低墙高，减少基础开挖①采用钢筋混凝土材料3由立壁、墙趾板、墙踵板三部分组成。钢筋混凝土悬臂式②墙高时，立壁下部弯矩大，配筋多，不挡土墙经济①沿墙长，隔适当距离加筑肋板(扶壁)，使墙面与墙踵板连接。钢筋混凝土扶壁式②~t悬臂式受力条件好，在高墙时较悬臂挡土墙式经济①自立柱、底梁、拉杆、挡板和基座组成，带卸荷板的柱板式借卸荷板上的土重平衡全墙。\n\n教材规定：钢筋混凝土悬臂式挡土墙由立壁、墙趾板和墙踵板三个部分组成。B选项"墙面板"和D选项"扶壁"是扶壁式挡土墙的组成部分，悬臂式挡墙无扶壁结构。'},{id:138,ch:1,type:'single',q:'三种土压力中，土压力最小（  ）。',opts:['主动土压力','被动土压力','静止土压力','刚性土压力'],ans:0,exp:'正确答案为A。主动土压力\n\n📖 教材依据（第1章）：受到土体的侧压力作用，该力的总值会随结构与土相对位移和方向而变化，侧压力的分布会随结构施工程序及变形过程特性而变化。挡土墙结构承受的土压力有:静止土压力、主动土压力和被动土压力。(2)静止土压力(见图1.4-1a);若刚性的挡土墙保持原位静止不动，墙背土层在未受任何干扰时，作用在墙上水平的压应力称为静止土压力;其合力为Eo(kN/m)、强度为Po(kPa)。\n\n教材规定：三种土压力中，主动土压力最小，静止土压力居中，被动土压力最大。墙体背离土体位移时土压力减小至主动土压力，墙体推挤土体时增大至被动土压力。D选项"刚性土压力"不是标准分类。'},{id:139,ch:1,type:'single',q:'挡墙墙身模板拆除时，混凝土抗压强度应不小于（ ）。',opts:['1.5MPa','2.0MPa','2.5MPa','3.0MPa'],ans:2,exp:'正确答案为C。2.5MPa\n\n📖 教材依据（第1章）：量中心线桩和下坡脚桩，分层填土、压实。(4)碾压前检查铺筑土层的宽度、厚度及含水率，合格后即可碾压，碾压遵循"先轻后重"原则，最后碾压应采用不小于12t级的压路机。(5)填方高度内的管涵顶面填土500mm以上才能用压路机碾压。(6)路基填方高度应按设计标高增加预沉量值。填土至最后一层时，应按设计断面，高程控制填土厚度并及时碾压修整。\n\n当墙身混凝土抗压强度≥2.5MPa，可拆除墙身模板，因此C选项正确。'},{id:140,ch:1,type:'multi',q:'关于挡墙混凝土浇筑施工的技术要求，下列说法正确的有（ ）。',opts:['应水平分层浇筑','分层厚度不应超过300mm','混凝土必须通过溜槽送入模内','模板拆除后应及时养护','混凝土抗压强度达到1.5MPa时可拆除模板'],ans:[0,1,3],exp:'C错误：混凝土要通过导管送入模内； E错误：拆除模板要求强度≥2.5MPa，而非1.5MPa。'},{id:141,ch:1,type:'single',q:'电压110KV，挖掘机、起重机(含吊物、载物)等机械与电力架空线路的最小安全距离（  ）',opts:['沿垂直方向3.0m','沿垂直方向4.0m','沿垂直方向5.0m','沿垂直方向6.0m'],ans:2,exp:'正确答案为C。沿垂直方向5.0m\n\n📖 教材依据（第1章）：吊物、载物)等机械与电力架空线路的最小安全距离电压(kV)安全距离(m)<才才O35才才O220330500沿垂直方向才53.04.05.06.07.08.5沿水平为向才.52.03.54.06.07.08.52)填土路基为土质边坡每侧填土宽度应大于设计宽度0.5m。碾压高填方时，应自路基边缘向中央进行，且与填土外侧距离不得小于0.5m。\n\n教材规定：电压110KV时，挖掘机、起重机等机械与电力架空线路的最小安全距离沿垂直方向为5.0m（C正确）。沿垂直方向3.0m对应1kV以下，4.0m对应1～10kV，6.0m对应220kV。'},{id:142,ch:1,type:'single',q:'路基工程质量控制指标，说法错误的是（）。',opts:['土方路基压实度和弯沉值应100%合格','纵断面高程、中线偏位、平整度、宽度、横坡及路堤边坡为一般项目','填石路基沉降差不应小于试验路段确定的沉降差','挖石路基上边坡必须稳定、严禁有松石、险石'],ans:2,exp:'正确答案为C。填石路基沉降差不应小于试验路段确定的沉降差\n\n📖 教材依据（城镇道路工程）：应与各专业管线相一致，不得混用;未安装井(室)盖(算)时，应加设临时盖板，并应设置安全防护设施、安全标志。1.5.2城镇道路工程质量控制要点才.城镇道路工程质量控制指标1)路基工程质量控制指标(1)土方路基土方路基压实度和弯沉值应100%合格，纵断面高程、中线偏位、平整度、宽度、横坡及路堤边坡等应符合要求。'},{id:143,ch:1,type:'single',q:'沥青混凝土面层（  ）是主控项目。',opts:['平整度、厚度和弯沉值','压实度、平整度和面层厚度','压实度、平整度和弯沉值','压实度、面层厚度和弯沉值'],ans:3,exp:'正确答案为D。压实度、面层厚度和弯沉值\n\n📖 教材依据（第1章）：(3)分析道路面层出现龟裂、车辙的主要原因。3.参考答案(1)不符合。未办理开工手续不可以组织施工。(2)不妥之处主要是:①沥青混凝土面层施工时的气温不符合规定，根据相关要求，次干路沥青混凝土面层的施工气温应在5"C以上;石灰及石灰粉煤灰稳定土类基层宜在冬期开始前30~45d停止施工。②不符合规范关于基层采用沥青乳液和沥青下封层养护7d的规定。\n\n教材规定：沥青混凝土面层主控项目包括压实度、面层厚度和弯沉值。平整度属于一般项目而非主控项目。A、B、C选项均包含平整度，只有D选项正确列出了压实度、厚度和弯沉值三个主控项目。'},{id:144,ch:1,type:'multi',q:'级配砾石(砂砾)基层，主控项目有（）。',opts:['集料质量及级配','压实度','弯沉','厚度','7d无侧限抗压强度'],ans:[0,1,2],exp:'教材规定：级配砾石(砂砾)基层主控项目包括集料质量及级配（A）、压实度（B）和弯沉值（C）。D选项"厚度"和E选项"7d无侧限抗压强度"不属于级配砾石基层的主控项目，7d无侧限抗压强度是半刚性基层（如水泥稳定碎石）的检验项目。'},{id:145,ch:1,type:'single',q:'城镇道路工程冬季施工，下列错误的是（）',opts:['应尽量将土方、土基施工项目安排在上冻前完成','采用人工为主、机械为辅方式开挖冻土，挖到设计标高立即碾压成型','城市快速路、主干路的路基不得用含有冻土块的土料填筑','水泥稳定土(粒料)类基层，宜在进入冬期前15～30d停止施工'],ans:1,exp:'教材规定：土方开挖冻土时，应"采用机械为主、人工为辅"方式开挖，而非"人工为主、机械为辅"（B错误）。A选项土方施工安排在上冻前完成正确。C选项快速路主干路不得用含冻土块土料正确。D选项水泥稳定土类宜在进入冬期前15～30d停止施工正确。'},{id:146,ch:1,type:'multi',q:'水泥混凝土面层冬季施工，外加剂正确的是（）',opts:['防冻剂','速凝剂','早强剂','缓凝剂','减水剂'],ans:[0,2],exp:'教材规定：水泥混凝土面层冬季施工可加防冻剂（A）和早强剂（C）。B选项"速凝剂"在冬施中不用，速凝剂主要用于喷射混凝土。D选项"缓凝剂"会延长凝结时间不利于低温环境。E选项"减水剂"虽然可减少用水量，但不是冬季施工特有的外加剂。'},{id:147,ch:1,type:'multi',q:'水泥混凝土面层冬季施工，下列正确的是（）',opts:['施工现场环境日平均气温连续3d稳定低于5℃,宜停止施工','施工现场环境最低气温低于3℃时，宜停止施工','可加防冻剂、早强剂','搅拌时间适当延长','混凝土板浇筑前，基层应无冰冻、不积冰雪，摊铺混凝土时气温不低于5℃'],ans:[2,3,4],exp:'正确答案为C、D、E。可加防冻剂、早强剂；搅拌时间适当延长；混凝土板浇筑前，基层应无冰冻、不积冰雪，摊铺混凝土时气温不低于5℃\n\n📖 教材依据（第1章）：上时，沥青混合料面层不应施工。(2)粘层、透层、封层严禁冬期施工。5)水泥混凝土面层(1)施工中应根据气温变化采取保温防冻措施。当施工现场环境日平均气温连续到稳定低于5"<::，或最低气温低于一3"<::时，宜停止施工。(2)拌合物中不得使用带有冰雪的砂、石料，可加防冻剂、早强剂，搅拌时间适当延长。(3)泪凝土板弯拉强度低于1MPa或抗压强度低于5MPa时，不得受冻。\n\n(1)施工中应根据气温变化采取保温防冻措施。当施工现场环境日平均气温连续5d稳定低于5℃,或最低气温低于-3℃时，宜停止施工。'},{id:148,ch:1,type:'single',q:'雨期基层施工，下列正确的是（）',opts:['对稳定类材料，应坚持拌多少、铺多少、压多少、完成多少','坚持当天挖完、压完，不留后患','按2%～3%的横坡整平压实，以防积水','有计划地组织快速施工，分段开挖，切忌全面开挖或挖段过长。'],ans:0,exp:'教材规定：雨期基层施工对稳定类材料，应坚持拌多少、铺多少、压多少、完成多少（A正确）。B选项"挖完、压完"是对土路基的要求。C选项"2%～3%横坡"是土路基的要求。D选项"分段开挖"是雨期路基施工的要求。各选项描述不同施工对象，本题专指"基层"施工。'},{id:149,ch:1,type:'single',q:'关于高温期水泥混凝土路面施工的说法，正确的是（ ）。',opts:['高温期施工应尽量安排在中午气温最高时段进行，以保证养护温度','洒水养护时，养护水温与混凝土表面温差可控制在20℃以内','高温期混凝土切缝时机应比常温施工适度提前','为加快施工进度，高温期可适当延长运输和操作时间'],ans:2,exp:'教材规定：高温期施工应避开中午高温时段（A错误）；洒水养护时水温与表面温差不宜超过15℃，而非20℃（B错误）；热期混凝土水分蒸发快，切缝时机应比常温适度提前（C正确）；应缩短运输和操作时间（D错误）。'},{id:201,ch:2,type:'single',q:'关于桥梁基本组成的说法，错误的是（ ）',opts:['上部结构是跨越障碍的主要承载结构','桥台仅用于支承桥跨结构端部','承台是联结桩顶的钢筋混凝土平台','墩台基础将荷载传至地基'],ans:1,exp:'正确答案为B。桥台仅用于支承桥跨结构端部\n\n📖 教材依据（城市桥梁工程）：、下部结构、支座系统和附属设施四个基本部分组成。(1)上部结构(桥跨结构):线路跨越障碍(如江河、山谷或其他线路等)的结构物。是在线路中断时跨越障碍的主要承载结构。(2)下部结构:包括桥墩、桥台和墩台基础，是支承桥跨结构的结构物。①桥墩:多跨桥的中间支承桥跨结构的结构物。②桥台:设在桥的两端，一边与路堤相接，以防止路堤滑塌，另一边则支承桥跨结构的端部。\n\n桥台除支承桥跨结构端部外，还需与路堤相接并防止路堤滑塌，故B选项错误。'},{id:202,ch:2,type:'multi',q:'桥梁下部结构包括（ ）',opts:['桥跨结构','桥墩','桥台','支座系统','墩台基础'],ans:[1,2,4],exp:'正确答案为B、C、E。桥墩；桥台；墩台基础\n\n📖 教材依据（城市桥梁工程）：术城市桥梁结构组成与类型1.桥梁基本组成与常用术语才)桥梁基本组成桥梁由上部结构、下部结构、支座系统和附属设施四个基本部分组成。(1)上部结构(桥跨结构):线路跨越障碍(如江河、山谷或其他线路等)的结构物。是在线路中断时跨越障碍的主要承载结构。(2)下部结构:包括桥墩、桥台和墩台基础，是支承桥跨结构的结构物。\n\nA选项属于上部结构，D选项属于支座系统。'},{id:203,ch:2,type:'single',q:'桥梁的下部结构作用是（  ）。',opts:['传递上部结构荷载','支承桥跨结构的结构物','保证桥梁的整体稳定性','减少桥梁的沉降'],ans:1,exp:'教材规定：桥梁下部结构包括桥墩、桥台和墩台基础，其作用是支承桥跨结构的结构物（B正确），并将上部结构荷载传递给地基。A选项"传递上部结构荷载"是作用的一部分描述但不完整。C、D选项不是下部结构的主要作用定义。'},{id:204,ch:2,type:'multi',q:'桥梁附属设施包括（ ）',opts:['桥面铺装','防水排水系统','承台','伸缩缝','锥形护坡'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。桥面铺装；防水排水系统；伸缩缝；锥形护坡\n\n📖 教材依据（城市桥梁工程）：)支座系统:是在桥跨结构与桥墩或桥台的支承处设置的传力装置，不仅要传递很大的荷载，而且要保证桥跨结构能产生一定的变位。(4)附属设施:包括桥面系(桥面铺装、防水排水系统、栏杆或防撞栏杆以及灯光照明等)、伸缩缝、桥头搭板和锥形护坡等。①桥面铺装(或称行车道铺装):铺装的平整性、耐磨性、不翘曲、不渗水是保证行车舒适的关键。\n\nC选项承台属于下部结构，不属于附属设施。'},{id:205,ch:2,type:'multi',q:'承台的作用包括（  ）。',opts:['承受由墩身传递的荷载','分布由墩身传递的荷载','联结各桩顶的钢筋混凝土平台','防止路堤滑塌','支承桥跨 结构的端部'],ans:[0,1,2],exp:'正确答案为A、B、C。承受由墩身传递的荷载；分布由墩身传递的荷载；联结各桩顶的钢筋混凝土平台\n\n📖 教材依据（城市桥梁工程）：一边与路堤相接，以防止路堤滑塌，另一边则支承桥跨结构的端部。为保护桥台和路堤填土，桥台两侧常做锥形护坡、挡土墙等防护工程。③承台:为承受、分布由墩身传递的荷载，在桩基顶部设置的联结各桩顶的钢筋?昆凝土平台。④墩台基础:是保证桥梁墩台安全并将荷载传至地基的结构。(3)支座系统:是在桥跨结构与桥墩或桥台的支承处设置的传力装置，不仅要传递很大的荷载，而且要保证桥跨结构能产生一定的变位。\n\n教材规定：承台是联结各桩顶的钢筋混凝土平台（C正确），承受并分布由墩身传递的荷载（A和B正确）。D选项"防止路堤滑塌"是桥台锥形护坡的作用。E选项"支承桥跨结构端部"是桥台和桥墩的作用。'},{id:206,ch:2,type:'multi',q:'以下属于附属设施的有（  ）。',opts:['桥面铺装','排水防水系统','栏杆','伸缩缝','桥台'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。桥面铺装；排水防水系统；栏杆；伸缩缝\n\n📖 教材依据（城市桥梁工程）：)支座系统:是在桥跨结构与桥墩或桥台的支承处设置的传力装置，不仅要传递很大的荷载，而且要保证桥跨结构能产生一定的变位。(4)附属设施:包括桥面系(桥面铺装、防水排水系统、栏杆或防撞栏杆以及灯光照明等)、伸缩缝、桥头搭板和锥形护坡等。①桥面铺装(或称行车道铺装):铺装的平整性、耐磨性、不翘曲、不渗水是保证行车舒适的关键。\n\n教材规定：桥梁附属设施包括桥面铺装（A）、防水排水系统（B）、栏杆（C）、伸缩缝（D）、灯光照明等。E选项"桥台"属于桥梁下部结构，不属于附属设施范畴。'},{id:207,ch:2,type:'multi',q:'桥面铺装时，保证桥面行车舒适的关键因素有（  ）。',opts:['平整性','抗滑性','不翘曲','不渗水','耐磨性'],ans:[0,2,3,4],exp:'教材规定：桥面铺装（或称行车道铺装）的平整性、耐磨性、不翘曲、不渗水是保证行车舒适的关键。A平整性、C不翘曲、D不渗水、E耐磨性四项均为教材明确列出的关键因素。B抗滑性属于保证行车安全的因素，不属于"行车舒适"的范畴。'},{id:208,ch:2,type:'single',q:'关于桥梁伸缩缝的说法，正确的是（ ）',opts:['仅设置在桥跨上部结构之间','主要作用是增强桥梁整体性','可保证结构在各种因素作用下的变位','对行车舒适性没有影响'],ans:2,exp:'正确答案为C。可保证结构在各种因素作用下的变位\n\n📖 教材依据（城市桥梁工程）：):既是保证安全的构造设施，又是有利于观赏的最佳装饰件。④伸缩缝:是桥跨上部结构之间或桥跨上部结构与桥台端墙之间所设的缝隙，用以保证结构在各种因素作用下的变位。为使行车)1民适、不颠簸，桥面上要设置伸缩缝构造。⑤灯光照明:现代城市中，大跨径桥梁通常是一个城市的标志性建筑，大多装置了灯光照明系统，构成了城市夜景的重要组成部分。\n\nA选项错误，也设置在上部结构与桥台端墙之间； B选项错误，作用是允许变位而非增强整体性； D选项错误，直接影响行车舒适性。'},{id:209,ch:2,type:'single',q:'关于桥梁基本参数的说法，错误的是（ ）',opts:['净跨径是指相邻两个桥墩之间的净距','计算跨径对于拱桥是指两拱脚截面形心点之间的水平距离','桥梁高度是指桥面与设计洪水位之间的高差','建筑高度是指轨顶标高至桥跨结构最下缘的距离'],ans:2,exp:'正确答案为C。桥梁高度是指桥面与设计洪水位之间的高差\n\n📖 教材依据（城市桥梁工程）：)悬臂浇筑必须对称进行，桥墩两侧平衡偏差不得大于设计要求，轴线挠度必须在设计要求范围内。梁体表面不得出现超过设计要求的受力裂缝。悬臂合龙时，两侧梁体的高差必须在设计要求允许范围内。6.钢梁制作安装质量控制钢梁结构形式多样，下面以钢箱梁为例，列出钢梁制作安装质量控制要点。(1)梁段出厂前在加工厂胎架上进行预拼装，采用连续匹配组装的工艺，每次组装的梁段不少于3段，检测时要避开日照，预拼装允许偏差要符合规范要求。\n\n桥梁高度是指桥面与低水位之间的高差，或与桥下线路路面的距离，而非设计洪水位，故C选项错误。'},{id:210,ch:2,type:'multi',q:'关于拱桥参数的说法，正确的有（ ）',opts:['拱轴线是拱圈各截面形心点的连线','净矢高是从拱顶截面下缘至拱脚连线最低点的垂直距离','计算矢高是从拱顶截面形心至拱脚截面形心连线的垂直距离','矢跨比是净矢高与净跨径之比','矢跨比反映拱桥受力特性'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。拱轴线是拱圈各截面形心点的连线；净矢高是从拱顶截面下缘至拱脚连线最低点的垂直距离；计算矢高是从拱顶截面形心至拱脚截面形心连线的垂直距离；矢跨比反映拱桥受力特性\n\n📖 教材依据（城市桥梁工程）：路路面至桥跨结构最下缘之间的距离。(7)容许建筑高度:公路或铁路定线中所确定的桥面或轨道顶标高对于通航净空顶部标高之差。(8)拱轴线:拱圈各截面形心点的连线。(9)建筑高度:桥上行车路面(或轨顶)标高至桥跨结构最下缘之间的距离。(10)净矢高:从拱顶截面下缘至相邻两拱脚截面下缘最低点之连线的垂直距离。\n\nD错误，矢跨比是计算矢高与计算跨径之比。'},{id:211,ch:2,type:'single',q:'拱式桥计算跨径的说法正确的是（  ）。',opts:['指两相邻拱脚截面最低点之间的水平距离','指两相邻拱脚截面顶点之间的水平距离','等于净跨径','指两相邻拱脚截面形心点之间的水平距离'],ans:3,exp:'正确答案为D。指两相邻拱脚截面形心点之间的水平距离\n\n📖 教材依据（城市桥梁工程）：填塞水泥砂浆。锚链块预留拉杆孔，锚链块、肋柱与拉杆连接处按设计要求防锈。肋柱安装时适当后仰，倾斜度为20:1，肋柱基础的杯座槽内铺垫沥青砂浆。每个锚链块的面积不小于0.5m采用钢筋混凝土预制。拉杆选用螺纹钢筋，直径不小于22mm、2不大于32mm，两端焊接螺丝杆，穿过挡土板、锚l链块预留孔，装上钢垫板，拧紧螺母。\n\n净跨径：对于拱式桥是每孔拱跨两个拱脚截面最低点之间的水平距离。'},{id:212,ch:2,type:'single',q:'关于涵洞的说法，正确的是（ ）',opts:['多孔跨径全长8m以上的称为涵洞','单孔跨径5m以上的称为涵洞','建造涵洞时路堤必须中断','是用来宣泄路堤下水流的构造物'],ans:3,exp:'正确答案为D。是用来宣泄路堤下水流的构造物\n\n📖 教材依据（城市桥梁工程）：之连线的垂直距离。(12)矢跨比:计算矢高与计算跨径之比，也称拱矢度，它是反映拱桥受力特性的一个重要指标。(13)涵洞:用来宣泄路堤下水流的构造物。通常在建造涵洞处路堤不中断。凡是多孔跨径全长不到8m和单孔跨径不到5m的泄水结构物，均称为涵洞。2.桥梁的主要类型1)城市桥梁主要类型(1)跨河桥:是为跨越江河水流障碍而修建的桥梁。\n\nA、B错误，多孔不到8m和单孔不到5m；C选项错误，路堤不中断。'},{id:213,ch:2,type:'single',q:'桥面与桥下线路路面之间的距离为（  ）。',opts:['桥梁高度','桥下净空高度','建筑高度','容许建筑高度'],ans:0,exp:'教材规定：桥梁高度是指桥面与低水位之间的高差，或为桥面与桥下线路路面之间的距离。B选项"桥下净空高度"是指桥下至设计洪水位或通航水位的高度。C选项"建筑高度"是指桥上行车路面标高至桥跨结构最下缘的距离。'},{id:214,ch:2,type:'single',q:'桥梁全长是指（  ）。',opts:['多孔桥梁中各孔净跨径的总和','单孔拱桥两拱脚截面形心点之间的水平距离','桥梁两端两个桥台的侧墙或八字墙后端点之间的距离','单跨桥梁两个桥台之间的净距'],ans:2,exp:'正确答案为C。桥梁两端两个桥台的侧墙或八字墙后端点之间的距离\n\n📖 教材依据（城市桥梁工程）：宣泄洪水的能力。(4)桥梁高度:指桥面与低水位之间的高差，或指桥面与桥下线路路面之间的距离，简称桥高。(5)桥梁全长:简称桥长，是桥梁两端两个桥台的侧墙或八字墙后端点之间的距离。(6)桥下净空高度:设计洪水位、计算通航水位或桥下线路路面至桥跨结构最下缘之间的距离。(7)容许建筑高度:公路或铁路定线中所确定的桥面或轨道顶标高对于通航净空顶部标高之差。\n\n桥梁全长：是桥梁两端两个桥台的侧墙或八字墙后端点之间的距离，简称桥长。'},{id:215,ch:2,type:'single',q:'总跨径反映（  ）的能力。',opts:['桥下宣泄洪水','提高承载力','减少沉降','跨越障碍'],ans:0,exp:'正确答案为A。桥下宣泄洪水\n\n📖 教材依据（城市桥梁工程）：青砂浆。每个锚链块的面积不小于0.5m采用钢筋混凝土预制。拉杆选用螺纹钢筋，直径不小于22mm、2不大于32mm，两端焊接螺丝杆，穿过挡土板、锚l链块预留孔，装上钢垫板，拧紧螺母。③挡土板采用预制钢筋混凝土槽形板、矩形板或空心板。矩形板厚度不小于15cm，挡土板与肋柱搭接长度不小于10cm，挡土板一般高50cm，板上留有泄水孔，板后设置反滤层。\n\n总跨径：多孔桥梁中各孔净跨径的总和，也称桥梁孔径，反映桥下宣泄洪水的能力。'},{id:216,ch:2,type:'single',q:'从拱顶截面下缘至相邻两拱脚截面下缘最低点之连线的垂直距离为（  ）。',opts:['拱轴线','净矢高','计算矢高','矢跨比'],ans:1,exp:'教材规定：净矢高是从拱顶截面下缘至相邻两拱脚截面下缘最低点之连线的垂直距离。A选项"拱轴线"是拱圈各截面形心点的连线。C选项"计算矢高"是从拱顶截面形心至拱脚截面形心连线的垂直距离。D选项"矢跨比"是计算矢高与计算跨径之比。'},{id:217,ch:2,type:'single',q:'跨越公路、铁路和城市道路等交通线路的桥梁为（  ）。',opts:['跨河桥','跨线桥','高架桥','立交桥'],ans:1,exp:'教材规定：跨越公路、铁路和城市道路等交通线路的桥梁为跨线桥（又称立交桥）。A选项"跨河桥"是跨越江河水流障碍的桥梁。C选项"高架桥"是代替高路堤的桥梁。D选项"立交桥"范围更广，跨线桥属于立交桥的一种。'},{id:218,ch:2,type:'single',q:'关于城市桥梁类型的说法，错误的是（ ）',opts:['跨线桥是跨越公路、铁路等交通线路的桥梁','高架桥主要用于跨越江河水流障碍','互通立交桥可使车辆免受红绿灯管制','人行天桥可避免车流和人流平面相交'],ans:1,exp:'正确答案为B。高架桥主要用于跨越江河水流障碍\n\n📖 教材依据（城市桥梁工程）：不中断。凡是多孔跨径全长不到8m和单孔跨径不到5m的泄水结构物，均称为涵洞。2.桥梁的主要类型1)城市桥梁主要类型(1)跨河桥:是为跨越江河水流障碍而修建的桥梁。(2)跨线桥:是跨越公路、铁路和城市道路等交通线路的桥梁。(3)高架桥:是指代替高路堤的桥梁，具有疏散交通、降低车流密度，提高运输效率，节省用地功能，一般出现在城市道路建设中。\n\n高架桥是代替高路堤的桥梁，主要用于城市道路建设，跨越江河水流障碍的是跨河桥，故B选项错误。'},{id:219,ch:2,type:'multi',q:'关于城市桥梁功能的说法，正确的有（ ）',opts:['跨河桥主要解决跨越水流障碍问题','高架桥可降低车流密度，提高运输效率','互通立交桥可实现多方向行驶互不干扰','人行天桥允许行人和非机动车通行','廊桥仅具有交通功能，不提供休憩场所'],ans:[0,1,2],exp:'D选项错误，人行天桥只允许行人通过； E选项错误，廊桥具有休憩等功能。'},{id:220,ch:2,type:'single',q:'关于廊桥的说法，正确的是（ ）',opts:['是一种没有屋檐的简易桥梁','主要功能是提高车辆通行效率','可提供遮阳避雨和休憩场所','仅用于跨越交通线路'],ans:2,exp:'A选项错误，廊桥有屋檐； B选项错误，主要功能不是提高车行效率； D选项错误，廊桥不用于跨越交通线路。'},{id:221,ch:2,type:'single',q:'关于简支梁桥的特点，下列说法错误的是（ ）',opts:['各孔独立工作，不受墩台变位影响','随着跨径增大，主梁内力将急剧减小','可采用自行式架桥机一次架设主梁','大跨径桥一般不用简支梁'],ans:1,exp:'正确答案为B。随着跨径增大，主梁内力将急剧减小\n\n📖 教材依据（城市桥梁工程）：第1篇48市政公用工程技术功。但简支梁桥各孔不相连续，车辆在通过断缝时将产生跳跃，影响车速的提升。因此，趋向于把主梁做成为简支，而把桥面做成连续的形式。简支梁桥随着跨径增大，主梁内力将急剧增大，用料便相应增多，因而大跨径桥一般不用简支梁。b.连续梁桥:主梁连续支承在几个桥墩上，在荷载作用下，主梁在不同截面上有的呈现正弯矩，有的呈现负弯矩，而弯矩的绝对值均较同跨径桥的简支梁小。'},{id:222,ch:2,type:'single',q:'（ ）在竖向荷载作用下，梁部主要受弯，柱脚处具有水平反力',opts:['梁式','拱式桥','刚架桥','悬索桥'],ans:2,exp:'正确答案为C。刚架桥\n\n📖 教材依据（城市桥梁工程）：简支的挂梁，相互衔接构成多跨悬臂梁。有短臂和挂梁的桥孔称为悬臂孔或挂孔，支持短臂的桥孔称为锚固孔。②拱式桥的主要承重结构是拱圈或拱肋。这种结构在竖向荷载作用下，桥墩或桥台承受水平推力，同时这种水平推力将显著抵消竖向荷载在拱圈(或拱肋)内引发的弯矩作用。拱桥的承重结构以受压为主，通常用抗压能力强的巧工材料(砖、石、混凝土)和钢筋混凝土等来建造。\n\n教材规定：刚架桥在竖向荷载作用下，梁部主要受弯，而柱脚处具有水平反力（即推力），其受力状态介于梁桥和拱桥之间。梁式桥柱脚无反力，拱式桥以受压为主，悬索桥以受拉为主。'},{id:223,ch:2,type:'multi',q:'关于连续梁桥的特点，正确的有（ ）',opts:['主梁连续支承在多个桥墩上','弯矩绝对值较同跨径简支梁小','通常3-5孔做成一联','施工时可采用悬臂浇筑法','行车舒适性较简支梁差'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。主梁连续支承在多个桥墩上；弯矩绝对值较同跨径简支梁小；通常3-5孔做成一联；施工时可采用悬臂浇筑法\n\n📖 教材依据（城市桥梁工程）：而把桥面做成连续的形式。简支梁桥随着跨径增大，主梁内力将急剧增大，用料便相应增多，因而大跨径桥一般不用简支梁。b.连续梁桥:主梁连续支承在几个桥墩上，在荷载作用下，主梁在不同截面上有的呈现正弯矩，有的呈现负弯矩，而弯矩的绝对值均较同跨径桥的简支梁小。这样，可节省主梁材料用量。连续梁桥通常是将3~5孔做成一联，在一联内元桥面接缝，行车较为顺适。\n\nE选项错误，连续梁桥行车舒适性优于简支梁。'},{id:224,ch:2,type:'single',q:'关于拱式桥的受力特点，下列说法正确的是（ ）',opts:['主要承重结构以受拉为主','水平推力会增大拱肋内的弯矩','桥墩或桥台不承受水平推力','通常采用抗压能力强的材料建造'],ans:3,exp:'A选项错误，拱桥以受压为主；B选项错误，水平推力会抵消弯矩；C选项错误，桥墩台承受水平推力。'},{id:225,ch:2,type:'multi',q:'桥梁工程上的受力构件，基本受力方式包括（ ）',opts:['拉','屈','折','压','弯'],ans:[0,3,4],exp:'教材规定：桥梁工程中受力构件的基本受力方式包括拉、压、弯三种。B选项"屈"（屈曲）是结构失稳现象而非基本受力方式，C选项"折"非受力方式术语。受拉（如悬索）、受压（如拱圈）、受弯（如梁）是三种基本受力形态。'},{id:226,ch:2,type:'single',q:'下列属于组合体系桥的是（ ）。',opts:['梁式桥','斜拉桥','刚架桥','悬索桥'],ans:1,exp:'正确答案为B。斜拉桥\n\n📖 教材依据（城市桥梁工程）：程上的受力构件，拉、压、弯为兰种基本受力方式，由基本件组成的各种结构物，在力学上也可归结为梁式、拱式、悬吊式三种基本体系以及它们之间的各种组合。①梁式桥又可分为简支梁桥、连续梁桥和悬臂梁桥:a.简支梁桥:主梁简支在墩台上，各孔独立工作，不受墩台变位影响。实腹式主梁构造简单，设计简便，施工时可用自行式架桥机或联合架桥机将一片主梁一次架设成第1篇48市政公用工程技术功。\n\n教材规定：组合体系桥由不同体系组合而成，斜拉桥属于组合体系桥（梁与索的组合）。梁式桥、刚架桥、悬索桥均为单一体系桥。斜拉桥由梁、索和塔三种基本构件组成，属于组合体系。'},{id:227,ch:2,type:'multi',q:'下列关于连续梁桥说法正确的是（ ）',opts:['主梁在不同截面上都呈现正弯矩','弯矩的绝对值均较同跨径桥的简支梁小','通常是将1～3孔做成一联','一联内没有桥面接缝','可以先将主梁逐孔架设成简支梁'],ans:[1,3,4],exp:'教材规定：连续梁桥弯矩的绝对值均较同跨径的简支梁小（B正确）；一联内没有桥面接缝（D正确）；可以先将主梁逐孔架设成简支梁再进行体系转换（E正确）。A错误：主梁在支座处呈现负弯矩。C错误：通常将3～5孔做成一联，而非1～3孔。'},{id:228,ch:2,type:'multi',q:'关于悬索桥的特点，正确的有（ ）',opts:['结构自重较轻','能以较小建筑高度修建大跨度桥','在风荷载作用下变形较小','构造简单，受力明确','刚度较大，振动较小'],ans:[0,1,3],exp:'正确答案为A、B、D。结构自重较轻；能以较小建筑高度修建大跨度桥；构造简单，受力明确\n\n📖 教材依据（城市桥梁工程）：桥的正弯矩比梁式桥要小刚架桥的建筑高度可以降低·但刚架桥施工比较困难，用普通钢筋混凝土修建，梁柱刚结处易产生裂缝。④悬索桥以悬索为主要承重结构，结构自重较轻，构造简单，受力明确，能以较小的建筑高度经济合理地修建大跨度桥。由于这种桥的结构自重轻，刚度差，在车辆动荷载和风荷载作用下有较大的变形和振动。⑤组合体系桥由几个不同体系的结构组合而成，最常见的为连续刚构，梁、拱组合等。\n\nC、E选项错误，悬索桥刚度差，在荷载作用下有较大变形和振动。'},{id:229,ch:2,type:'multi',q:'下列关于悬索桥说法正确的是（ ）',opts:['以索塔为主要承重结构','结构自重较重，构造简单','能以较小的建筑高度经济合理地修建大跨度桥','刚度差','车辆动荷载和风荷载作用下有较大的变形和振动'],ans:[2,3,4],exp:'正确答案为C、D、E。能以较小的建筑高度经济合理地修建大跨度桥；刚度差；车辆动荷载和风荷载作用下有较大的变形和振动\n\n📖 教材依据（城市桥梁工程）：及它们之间的各种组合。①梁式桥又可分为简支梁桥、连续梁桥和悬臂梁桥:a.简支梁桥:主梁简支在墩台上，各孔独立工作，不受墩台变位影响。实腹式主梁构造简单，设计简便，施工时可用自行式架桥机或联合架桥机将一片主梁一次架设成第1篇48市政公用工程技术功。但简支梁桥各孔不相连续，车辆在通过断缝时将产生跳跃，影响车速的提升。\n\n悬索桥以悬索为主要承重结构'},{id:230,ch:2,type:'single',q:'按照跨径长度划分，单孔跨径40m的桥为（）。',opts:['特大桥','大桥','中桥','小桥'],ans:1,exp:'教材规定：按跨径分类标准，单孔跨径在20m以上至40m（含40m）为中桥，40m以上至100m为大桥。40m恰好是大桥的起始值，属于大桥范围。特大桥为单孔跨径＞150m或多孔跨径全长＞1000m，小桥为单孔跨径≤20m或全长≤100m。'},{id:231,ch:2,type:'single',q:'计算桥梁墩台侧模刚度时采用的载荷有（  ）',opts:['新浇筑钢筋混凝土自重','振捣混凝土时的荷载','新浇筑混凝土对侧模的压力','施工机具荷载'],ans:2,exp:'教材规定：计算桥梁墩台侧模刚度时采用的载荷为新浇筑混凝土对侧模的压力。A选项"新浇筑钢筋混凝土自重"用于底模计算，B选项"振捣混凝土时的荷载"用于强度验算而非刚度验算，D选项"施工机具荷载"也非侧模刚度控制荷载。'},{id:232,ch:2,type:'multi',q:'设于水中的支架所承受的力包括（ ）。',opts:['水流压力','波浪力','流冰压力','船只及其他漂浮物的撞击力','结构竖向压力'],ans:[0,1,2,3],exp:'教材规定：设于水中的支架所承受的力包括水流压力、波浪力、流冰压力以及船只及其他漂浮物的撞击力。E选项"结构竖向压力"是任何支架都需承受的荷载，并非水中支架特有的力。本题特指设于水中的支架所承受的附加力。'},{id:233,ch:2,type:'single',q:'关于模板、支架和拱架刚度验算要求的说法，正确的是（ ）',opts:['结构表面外露模板的挠度限值为跨度的1/250','拱架弹性挠度限值为相应跨度的1/400','钢模板面板变形值限值为3mm','钢楞变形值仅需满足L/400的要求'],ans:1,exp:'验算模板、支架和拱架的刚度时，其变形值不得超过下列要求： ① 结构表面外露的模板挠度为模板构件跨度的1/400。 ② 结构表面隐蔽的模板挠度为模板构件跨度的1/250。 ③ 拱架和支架受载后挠曲的杆件，其弹性挠度为相应结构跨度的1/400。 ④ 钢模板的面板变形值为1.5mm。 ⑤ 钢模板的钢楞、柱箍变形值为L/500及B/500 (L：计算跨度，B：柱宽度)'},{id:234,ch:2,type:'multi',q:'关于支架下列说法正确的是（  ）。',opts:['钢管满堂支架搭设完毕后，安装模版','预压荷载应不小于最大施工荷载','预压加载可按最大施工荷载的60%、80%、100%分三次加载','门式钢管支架可用于搭设满堂承重支架体系','每级加载完毕6h后进行支架的变形观测'],ans:[1,2],exp:'预压加载可按最大施工荷载的60%、80%、100%分三次加载，加载时应对称、分层进行，禁止集中加载、卸 载，每级加载完毕1h后进行支架的变形观测，加载完毕后宜每6h测量一次变形值。预压卸载时间以支架地基沉降变形稳定为原则确定，最后两次沉落量观测平均值之差不大于2mm时，即可终止预压卸载。'},{id:235,ch:2,type:'single',q:'混凝土砌块拱桥拱架的卸落说法错误的是（  ）。',opts:['砂浆强度应达到设计标准值的75%以上卸落拱架','跨径8m的拱桥宜在拱上结构全部完成后卸落拱架','中等跨径实腹式拱桥宜在护拱完成后卸落拱架','大跨径空腹式拱桥宜在腹拱横墙完成后卸落拱架'],ans:0,exp:'① 浆砌石、混凝土砌块拱桥应在砂浆强度达到设计要求强度后卸落拱架，设计未规定时，砂浆强度应达到设计标准值的80%以上。 ② 跨径小于10的拱桥宜在拱上结构全部完成后卸落拱架；中等跨径实腹式拱桥 宜在护拱完成后卸落拱架；大跨径空腹式拱桥宜在腹拱横墙完成(未砌腹拱圈)后卸落拱架。 ③ 在裸拱状态卸落拱架时，应对主拱进行强度及稳定性验算并采取必要的稳定措施。'},{id:236,ch:2,type:'single',q:'关于模板、支架拆除原则的说法，错误的是（ ）',opts:['应遵循"先支后拆、后支先拆"的原则','简支梁模板应从支座向跨中方向卸落','悬臂梁模板宜从悬臂端开始卸落','支架卸落量宜由小渐大'],ans:1,exp:'正确答案为B。简支梁模板应从支座向跨中方向卸落\n\n📖 教材依据（城市桥梁工程）：墙完成(未砌腹拱圈)后卸落拱架。③在裸拱状态卸落拱架时，应对主拱进行强度及稳定性验算并采取必要的稳定措施。(3)模板、支架和拱架拆除应遵循"先支后拆、后支先拆"的原则。支架和拱架应按几个循环卸落，卸落量宜由小渐大。每一循环中，在横向应同时卸落、在纵向应对称均衡卸落。简支梁、连续梁结构的模板应从跨中向支座方向依次循环卸落;悬臂梁结第2章城市桥梁工程53构的模板宜从悬臂端开始顺序卸落。\n\n简支梁模板应从跨中向支座方向卸落，故B选项错误。'},{id:237,ch:2,type:'multi',q:'关于预应力混凝土结构模板拆除的要求，正确的有（ ）',opts:['侧模应在预应力张拉前拆除','底模应在结构建立预应力后拆除','侧模和底模应同时拆除','模
