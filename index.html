<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>一建市政题库（董老师题库）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#1a73e8;--primary-light:#e8f0fe;--success:#34a853;--danger:#ea4335;--warning:#fbbc04;--bg:#f5f7fa;--card:#fff;--text:#202124;--text2:#5f6368;--border:#dadce0;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:12px 12px 80px}
.header{display:flex;align-items:center;gap:12px;padding:12px 0;margin-bottom:8px}
.header h1{font-size:20px;font-weight:700;flex:1}
.header .badge{background:var(--primary);color:#fff;font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab{flex:1;text-align:center;padding:10px 4px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:.2s;border:none;background:none}
.tab.active{background:var(--primary);color:#fff;font-weight:600}
.tab:not(.active):active{background:#e8e8e8}
.panel{display:none}
.panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .num{font-size:28px;font-weight:800;color:var(--primary)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.green .num{color:var(--success)}
.stat-card.orange .num{color:#e37400}
.stat-card.red .num{color:var(--danger)}
.chapter-grid{display:grid;gap:8px}
.chapter-btn{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:2px solid transparent;transition:.2s;display:flex;align-items:center;justify-content:space-between}
.chapter-btn:active{border-color:var(--primary);background:var(--primary-light)}
.chapter-btn .name{font-size:14px;font-weight:500}
.chapter-btn .count{font-size:12px;color:var(--text2)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.qa-btn{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border:none;font-size:14px;font-weight:600;color:var(--text);transition:.2s}
.qa-btn:active{transform:scale(.97);background:var(--primary-light)}
.qa-btn .icon{font-size:24px;display:block;margin-bottom:6px}
.q-card{background:var(--card);border-radius:var(--radius);padding:20px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.q-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.q-text{font-size:16px;line-height:1.7;margin-bottom:14px;font-weight:500}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:.2s;background:#fff;font-size:14px;line-height:1.5}
.option:active{transform:scale(.98)}
.option .tag{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);font-weight:700;font-size:13px;color:var(--text2)}
.option .text{flex:1;padding-top:2px}
.option.selected{border-color:var(--primary);background:var(--primary-light)}
.option.selected .tag{background:var(--primary);color:#fff}
.option.correct{border-color:var(--success);background:#e6f4ea}
.option.correct .tag{background:var(--success);color:#fff}
.option.wrong{border-color:var(--danger);background:#fce8e6}
.option.wrong .tag{background:var(--danger);color:#fff}
.option.disabled{cursor:default;pointer-events:none}
.feedback{margin-top:14px;padding:14px;border-radius:10px;font-size:14px;line-height:1.6;display:none}
.feedback.show{display:block}
.feedback.correct{background:#e6f4ea;border-left:4px solid var(--success)}
.feedback.wrong{background:#fce8e6;border-left:4px solid var(--danger)}
.q-actions{display:flex;gap:10px;margin-top:14px}
.q-actions button{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.q-actions button:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--text2);border:2px solid var(--border)!important}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;color:var(--text)}
.top-bar .title{font-size:16px;font-weight:600;flex:1}
.top-bar .info{font-size:13px;color:var(--text2)}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:12px}
.wrong-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.wrong-item .ch{font-size:12px;color:var(--text2);margin-bottom:4px}
.wrong-item .q{font-size:14px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wrong-item .tag-w{display:inline-block;background:#fce8e6;color:var(--danger);font-size:11px;padding:1px 8px;border-radius:4px;margin-top:4px}
.setting-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);padding:14px 16px;border-radius:var(--radius);margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.setting-row .label{font-size:14px}
.setting-row .hint{font-size:12px;color:var(--text2);margin-top:2px}
.toggle{position:relative;width:48px;height:28px;background:var(--border);border-radius:14px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .knob{left:23px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 24px;border-radius:24px;font-size:14px;z-index:100;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:400px){.q-text{font-size:15px}.option{font-size:13px;padding:10px 12px}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>📗 一建市政题库</h1>
    <span class="badge" id="totalBadge">董老师题库</span>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="home">🏠 首页</button>
    <button class="tab" data-tab="practice">📝 练习</button>
    <button class="tab" data-tab="wrong">❌ 错题</button>
    <button class="tab" data-tab="settings">⚙️ 设置</button>
  </div>

  <div class="panel active" id="panel-home">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总题数</div></div>
      <div class="stat-card green"><div class="num" id="statDone">0</div><div class="label">已练习</div></div>
      <div class="stat-card orange"><div class="num" id="statRate">0%</div><div class="label">正确率</div></div>
      <div class="stat-card red"><div class="num" id="statWrong">0</div><div class="label">错题数</div></div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">快速开始</div>
    <div class="quick-actions">
      <button class="qa-btn" onclick="startRandom()"><span class="icon">🎲</span>随机 <span id="practiceCountDisplay">25</span> 题</button>
      <button class="qa-btn" onclick="startWrongOnly()"><span class="icon">📕</span>错题重练</button>
      <button class="qa-btn" onclick="startExam()"><span class="icon">⏱️</span>模拟考试</button>
      <button class="qa-btn" onclick="startByChapter(-1)"><span class="icon">📚</span>章节选择</button>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin:16px 0 8px">选择章节练习</div>
    <div class="chapter-grid" id="chapterGrid"></div>
  </div>

  <div class="panel" id="panel-practice">
    <div class="top-bar">
      <button class="back-btn" onclick="backToHome()">←</button>
      <div class="title" id="practiceTitle">练习模式</div>
      <div class="info" id="progressInfo">1/25</div>
    </div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div id="questionArea"></div>
  </div>

  <div class="panel" id="panel-wrong">
    <div id="wrongList"></div>
    <div id="wrongEmpty" class="empty" style="display:none"><div class="icon">🎉</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">没有错题</div><div style="font-size:13px;color:var(--text2)">继续保持！</div></div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="setting-row">
      <div><div class="label">📖 显示解析</div><div class="hint">答题后立即显示答案解析</div></div>
      <div class="toggle on" id="toggleShowAnswer" onclick="toggleSetting('showAnswer')"><div class="knob"></div></div>
    </div>
    <div class="setting-row">
      <div><div class="label">🔀 选项随机</div><div class="hint">每题选项随机排序</div></div>
      <div class="toggle" id="toggleShuffleOpts" onclick="toggleSetting('shuffleOpts')"><div class="knob"></div></div>
    </div>
    <div class="setting-row">
      <div><div class="label">⏱️ 模拟考试时长</div><div class="hint">模拟考试限时（分钟）</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="adjExamTime(-5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">−</button>
        <span id="examTimeDisplay" style="font-size:16px;font-weight:600;min-width:32px;text-align:center">30</span>
        <button onclick="adjExamTime(5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">+</button>
      </div>
    </div>
    <div class="setting-row">
      <div><div class="label">🎲 随机练习题数</div><div class="hint">每次随机练习的题目数量（5~90题）</div></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="adjPracticeCount(-5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">−</button>
        <span id="practiceCountSetting" style="font-size:16px;font-weight:600;min-width:32px;text-align:center">25</span>
        <button onclick="adjPracticeCount(5)" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;font-size:18px;cursor:pointer">+</button>
      </div>
    </div>

    <div id="updatePanel" style="margin-top:20px;padding:16px;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:600">📦 版本更新</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">当前版本：<span id="versionDisplay">v1.0.0-dong</span></div>
        </div>
        <button id="checkUpdateBtn" onclick="checkUpdate()" style="padding:8px 16px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:500;cursor:pointer">🔄 检查更新</button>
      </div>
      <div id="updateStatus" style="font-size:13px;min-height:20px"></div>
    </div>

    <div style="margin-top:16px">
      <button onclick="clearAllProgress()" style="width:100%;padding:12px;border-radius:10px;border:2px solid var(--danger);background:#fff;color:var(--danger);font-size:14px;font-weight:600;cursor:pointer">🗑️ 清除所有进度</button>
    </div>
    <div style="margin-top:20px;text-align:center;font-size:12px;color:var(--text2);line-height:1.8">
      依据：董老师章节选择习题班<br>
      题目来源：董老师章节练习题<br>
      第1章：城镇道路工程 | 第2章：城市桥梁工程
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>
<script>
const QUESTIONS = [
  {id:1, ch:1, type:'single', q:'主干路沥青路面使用年限（）。', opts:["10", "15", "20", "30"], ans:1, exp:'教材规定：主干路沥青路面设计使用年限为15年，水泥混凝土路面为30年。根据教材表1.1-1，主干路沥青路面为15年，而10年为支路沥青路面，20年为支路或次干路混凝土路面，30年为主干路或快速路混凝土路面。'},
  {id:2, ch:1, type:'single', q:'次干路混凝土路面使用年限（）。', opts:["10", "15", "20", "30"], ans:2, exp:'教材规定：次干路水泥混凝土路面设计使用年限为20年。根据教材表1.1-1，次干路沥青路面为15年，水泥混凝土路面为20年。A选项10年为支路或砌块路面的年限，15年为主干路沥青路面或次干路沥青路面年限，30年为快速路或主干路混凝土路面年限。'},
  {id:3, ch:1, type:'multi', q:'沥青贯入式与沥青表面处治路面适合于（  ）。', opts:["各交通等级道路", "支路", "停车场", "广场", "步行街"], ans:[1, 2], exp:'教材规定：沥青贯入式与沥青表面处治路面适用于支路、停车场。A选项"各交通等级道路"对应的是沥青混凝土路面而非贯入式与表面处治。C选项"广场"、D选项"步行街"属于砌块路面的适用范围。'},
  {id:4, ch:1, type:'single', q:'下列路面材料中只适合支路的是（  ）。', opts:["沥青混合料", "钢筋混凝土", "水泥混凝土", "砌块路面"], ans:3, exp:'沥青混合料适用于各交通等级道路沥青贯入式与沥青表面处治路面适用于支路、停车场。水泥混凝土路面结构类型包括普通混凝土、钢筋混凝土、连续配筋混凝土与钢纤维混凝土，适用于各交通等级道路。砌块路面适用于支路、广场、停车场、人行道与步行街。'},
  {id:5, ch:1, type:'single', q:'关于城市道路功能的描述中，符合主干路主要特点的是（ ）', opts:["完全为交通功能服务，解决城市大容量、长距离、快速交通", "以交通功能为主，连接城市各主要分区，构成道路网主要骨架", "为区域交通集散服务，兼有服务功能，与主干路组成干路网", "连接次干路与居住小区等内部道路，以服务功能为主"], ans:1, exp:'教材规定：主干路以交通功能为主，为连接城市各主要分区的干路，是城市道路网的主要骨架。A选项描述的是快速路的特点（完全为交通功能服务），C选项是次干路的特点，D选项是支路的特点。'},
  {id:6, ch:1, type:'multi', q:'下列关于城市道路分类与功能的表述中，正确的有（ ）', opts:["快速路完全为交通功能服务，主要解决大容量、长距离、快速交通", "主干路以交通功能为主，是连接城市各主要分区的干路", "次干路兼有服务功能，与主干路共同组成城市干路网", "支路以服务功能为主，直接连接居住小区与快速路", "次干路是城市道路网的主要骨架，承担最长距离的交通"], ans:[0, 1, 2], exp:'教材规定：快速路完全为交通功能服务，主干路以交通功能为主，次干路兼有服务功能并与主干路组成干路网。D错误：支路连接次干路与居住小区等内部道路，并非直接连接快速路。E错误：次干路是区域性交通干道，承担最长距离交通的是快速路。'},
  {id:7, ch:1, type:'single', q:'关于城市快速路的特点，下列说法正确的是（ ）', opts:["主要服务于短距离通勤交通", "允许非机动车和行人通行", "完全为交通功能服务，解决大容量、长距离、快速交通", "是城市区域性的交通干道"], ans:2, exp:'根据题干描述，快速路完全为交通功能服务，解决大容量、长距离、快速交通，因此C正确。A错误，快速路不是短距离道路；B错误，快速路一般禁止非机动车和行人；D错误，区域性交通干道是次干路的特点。'},
  {id:8, ch:1, type:'multi', q:'关于城市主干路和次干路的区别，下列说法正确的有（ ）', opts:["主干路以交通功能为主，次干路兼有服务功能", "主干路是城市道路网的主要骨架，次干路是区域交通集散道路", "主干路和次干路均允许设置大量路边停车位", "主干路通常比次干路设计车速更高", "次干路主要连接快速路，主干路主要连接支路"], ans:[0, 1, 3], exp:'A正确，主干路以交通功能为主，次干路兼有服务功能。B正确，主干路是城市主要骨架，次干路是区域性集散道路。C错误，主干路一般不允许大量路边停车。D正确，主干路设计车速通常高于次干路。E错误，次干路连接主干路和支路，而非快速路。'},
  {id:9, ch:1, type:'single', q:'支路在城市道路网中的主要功能是（ ）', opts:["承担长距离快速交通", "连接次干路与居住区、工业区等内部道路", "作为城市主要交通骨架", "解决大容量交通需求"], ans:1, exp:'支路的主要功能是连接次干路与居住区、工业区等内部道路，以服务功能为主，因此B正确。A、D是快速路的特点；C是主干路的特点。'},
  {id:10, ch:1, type:'multi', q:'根据道路使用功能划分，可分为（）', opts:["机动车道", "非机动车道", "人行道", "水泥混凝土路面", "沥青类路面"], ans:[0, 1, 2], exp:'教材规定：根据道路使用功能可分为机动车道、非机动车道、人行道。D选项"水泥混凝土路面"和E选项"沥青类路面"属于按路面材料分类，而非按使用功能分类。'},
  {id:11, ch:1, type:'multi', q:'道路路面的基本结构层一般为（）', opts:["面层", "基层", "垫层", "路基", "路堤"], ans:[0, 1, 2], exp:'教材规定：道路路面的基本结构层一般为面层、基层和垫层。D选项"路基"和E选项"路堤"属于路基结构部分，而非路面结构层。'},
  {id:12, ch:1, type:'single', q:'关于路面垫层的作用，下列说法错误的是（ ）。', opts:["改善土基的湿度和温度状况", "保证面层和基层的强度稳定性及抗冻胀能力", "直接承受汽车车轮的剪切与磨耗作用", "扩散由基层传来的荷载应力，减小土基变形"], ans:2, exp:'C选项描述的是面层的作用，而非垫层。'},
  {id:13, ch:1, type:'multi', q:'关于路面面层应具有的性能要求，正确的包括（ ）。', opts:["足够的结构强度", "良好的高温稳定性", "足够的抗滑能力", "良好的平整度", "主要起承重作用并具有水稳定性"], ans:[0, 1, 2, 3], exp:'E选项描述的是基层的主要作用。'},
  {id:14, ch:1, type:'multi', q:'基层性能的主要指标，以下说法正确的有：', opts:["基层应满足结构强度和扩散荷载的能力", "基层需具备水稳性和抗冻性", "不透水性是基层的重要性能要求", "排水基层下应设置不透水底基层", "底基层顶面必须铺设防水土工织物"], ans:[0, 1, 2], exp:'E选项中“必须”说法过于绝对，底基层顶面宜铺设沥青封层或防水土工织物'},
  {id:15, ch:1, type:'multi', q:'对垫层性能要求的主要指标包括（  ）。', opts:["高温抗车辙", "承载能力", "扩散荷载", "水稳性", "压实度"], ans:[1, 2, 3], exp:'教材规定：垫层应具有一定的强度和良好的水稳定性，主要作用为改善土基温湿度、保证面层基层强度、扩散荷载应力。垫层性能指标包括承载能力、扩散荷载和水稳性。A选项"高温抗车辙"是面层指标，E选项"压实度"是施工控制指标而非性能指标。'},
  {id:16, ch:1, type:'single', q:'水泥混凝土面层的性能，以下说法错误的是（ ）', opts:["应具有足够的强度和耐久性", "表面应满足抗滑、耐磨、平整的要求", "需具备良好的透水性以利于排水", "抗冻性是耐久性的重要指标之一"], ans:2, exp:'水泥混凝土面层要求不透水，透水性并非其性能要求，故C错误。'},
  {id:17, ch:1, type:'single', q:'沥青混合料面层的使用指标不包括（ ）', opts:["承载能力和平整度", "温度稳定性和透水性", "水稳定性和抗滑能力", "抗压强度和弹性模量"], ans:3, exp:'沥青混合料面层使用指标未提及抗压强度和弹性模量，D为结构设计参数，非使用指标。'},
  {id:18, ch:1, type:'multi', q:'路基是路面结构以下的部分，包括（  ）。', opts:["路床", "路堑", "基层", "垫层", "路堤"], ans:[0, 1, 4], exp:'教材规定：路基断面形式有路堤（路基顶面高于原地面的填方路基）、路堑（全部由地面开挖出的路基）以及半填半挖路基。路床是路基的一部分。C选项"基层"和D选项"垫层"属于路面结构层，不属于路基范围。'},
  {id:19, ch:1, type:'single', q:'路床是路基的一部分，指路面结构层以下（ ）范围内的部分。', opts:["30cm", "50cm", "80cm", "150cm"], ans:2, exp:'教材规定：路床是路基的一部分，指路面结构层以下80cm范围内的部分。30cm和50cm均偏小，150cm则偏大，路床仅为路基顶面以下80cm深度范围。'},
  {id:20, ch:1, type:'single', q:'上路堤是指路面结构层以下（ ）的填方路基。', opts:["0～30cm", "30～80cm", "30～80cm", "80～150cm"], ans:3, exp:'教材规定：上路堤是指路面结构层以下80～150cm的填方路基。0～30cm和30～80cm属于路床范围（路床厚80cm，分上路床0～30cm和下路床30～80cm）。'},
  {id:21, ch:1, type:'single', q:'关于高液限黏土、高液限粉土及含有机质细粒土作为路基填料的要求，下列说法正确的是（ ）。', opts:["可直接用作路基填料，无需特殊处理", "须掺加石灰或水泥等结合料进行改善", "仅适用于地下水位较低的路段", "仅能用于填筑路基底层"], ans:1, exp:'教材规定：高液限黏土、高液限粉土及含有机质的细粒土，不适于做路基填料。因条件限制而必须采用上述土做填料时，应掺加石灰或水泥等结合料进行改善。A选项"可直接使用"错误，C和D选项不准确。'},
  {id:22, ch:1, type:'multi', q:'在地下水位较高的路段进行路基填筑时，可采取的措施包括（ ）。', opts:["提高路基顶面标高", "选用粗粒土作为填料", "采用低剂量石灰稳定细粒土", "在边沟下设置排水渗沟", "直接使用高液限黏土填筑"], ans:[0, 1, 2, 3], exp:'地下水位高时，宜提高路基顶面标高；若设计标高受限，应选用粗粒土或低剂量石灰稳定细粒土，并采取排水渗沟等措施。高液限黏土不宜直接使用，故E错误。'},
  {id:23, ch:1, type:'single', q:'关于岩石或填石路基顶面整平层的设置，下列说法错误的是（ ）。', opts:["整平层可采用未筛分碎石和石屑", "整平层厚度一般为100～150mm", "必须采用高剂量水泥稳定粒料", "整平层用于调整路基顶面的平整度"], ans:2, exp:'规范要求整平层可采用未筛分碎石、石屑或低剂量水泥稳定粒料，而非高剂量，故C错误。高液限黏土、高液限粉土及含有机质的细粒土，不适于做路基填料。因条件限制而必须采用上述土做填料时，应掺加石灰或水泥等结合料进行改善。岩石或填石路基顶面应铺设整平层。整平层可采用未筛分碎石和石屑或低剂量水泥稳定粒料，其厚度视路基顶面不平整程度而定，一般为100～150mm。'},
  {id:24, ch:1, type:'multi', q:'对路基性能要求的主要指标不包括（  ）。', opts:["整体稳定性", "承载能力", "变形量控制", "透水性", "压实度"], ans:[1, 3, 4], exp:'教材规定：路基性能主要指标包括路基整体稳定性和变形量控制。A选项"整体稳定性"和C选项"变形量控制"是核心指标。B选项"承载能力"、D选项"透水性"、E选项"压实度"均不属于路基性能要求的主要指标。'},
  {id:25, ch:1, type:'single', q:'关于垫层在道路结构中的作用，说法错误的是（）', opts:["主要设置在温度和湿度状况不良的路段", "在季节性冰冻地区可减轻冻胀和翻浆病害", "垫层应选用黏性土以提高水稳性", "可改善路面结构的使用性能"], ans:2, exp:'根据规范要求，垫层宜采用砂、砂砾等颗粒材料，而非黏性土，故C选项错误。'},
  {id:26, ch:1, type:'multi', q:'下列（ ）路段应按设计要求设置垫层', opts:["季节性冰冻地区的干燥路段", "季节性冰冻地区的中湿或潮湿路段", "地下水位高、排水不良的路基", "水文地质条件良好的土质路堑", "路床土处于潮湿或过湿状态的土质路堑"], ans:[1, 2, 4], exp:'季节性冰冻地区的中湿或潮湿路段（B）、地下水位高排水不良的路基（C）、以及路床土潮湿或过湿的土质路堑（E）需要设置垫层。'},
  {id:27, ch:1, type:'single', q:'关于垫层材料的选用要求，下列说法正确的是：', opts:["垫层材料中小于0.075mm的颗粒含量不应大于3%", "垫层宜采用粉质黏土以增强隔水性能", "垫层材料中小于0.075mm的颗粒含量不应大于5%", "垫层必须采用级配碎石材料"], ans:2, exp:'规范明确规定垫层材料中小于0.075mm的颗粒含量不应大于5%，故C选项正确。'},
  {id:28, ch:1, type:'multi', q:'以下（ ）路段按设计要求设置垫层。', opts:["季节性冰冻地区的干燥路段", "地下水位高、排水不良，路基处于潮湿或过湿状态的路段", "水文地质条件不良的土质路堑，路床土处于潮湿或过湿状态的路段", "地下水位高、排水不良，路基处于干燥状态的路段", "水文地质条件不良的土质路堑，路床土处于干燥状态的路段"], ans:[1, 2], exp:'(1)季节性冰冻地区的中湿或潮湿路段。(2)地下水位高、排水不良，路基处于潮湿或过湿状态的路段。(3)水文地质条件不良的土质路堑，路床土处于潮湿或过湿状态的路段。'},
  {id:29, ch:1, type:'single', q:'关于基层材料选用的说法，正确的是（ ）', opts:["石灰稳定类材料可用于特重交通的上基层", "级配砾石可用于次干路的上基层，最大粒径应≤37.5mm", "热拌沥青碎石适用于中轻交通道路的基层", "水泥稳定土类基层属于柔性基层"], ans:1, exp:'A错在石灰类不用于特重交通上基层；C错在沥青碎石用于重交通以上；D错在水稳类属于半刚性基层。② 应根据道路交通等级和路基抗冲刷能力来选择基层材料。在冰冻、多雨潮湿地 区，石灰粉煤灰稳定类材料宜用于特重、重交通的下基层。石灰稳定类材料宜用于各类 交通等级的下基层以及中、轻交通的基层。热拌沥青碎石宜用于重交通及以上道路的基 层；级配碎石可用于中、轻交通道路的下基层及轻交通道路的基层；级配砾石可用于轻 交通道路的下基层。'},
  {id:30, ch:1, type:'multi', q:'关于半刚性基层施工技术要求，正确的有（ ）', opts:["工业废渣应性能稳定、无风化", "石灰粉煤灰稳定类宜用于特重交通的下基层", "级配砂砾含泥量应≤砂质量的15%", "水泥稳定碎石适用于轴载重的道路", "钢渣稳定土类基层属于柔性基层"], ans:[0, 1, 3], exp:'C错在含泥量应≤10%；E错在钢渣稳定类属于半刚性基层。ABD均符合原文表述，特别注意B选项"宜用于"的规范用语。'},
  {id:31, ch:1, type:'multi', q:'下列关于热拌沥青混合料，说法正确的是（  ）。', opts:["按空隙率大小将沥青混合料分为连续配、间断级配两大类", "AC型混合料以及SMA均属于密级配混合料", "热拌沥青碎石(AM)是一种半开级配混合料", "OGFC排水沥青混合料是一种半开级配沥青混合料"], ans:[1,2], exp:'热拌沥青混合料，按空隙率大小将沥青混合料分为密级配、半开级配、开级配三大类。\n\n✅ B正确——AC型混合料以及骨架型混合料SMA均属于密级配混合料（教材原文）。\n✅ C正确——热拌沥青碎石(AM)是一种半开级配混合料，空隙率8%～15%。\n❌ A错误——空隙率分类应为密级配、半开级配、开级配，而非连续/间断级配。\n❌ D错误——OGFC排水沥青混合料是一种开级配（空隙率18%～23%），不是半开级配。'},
  {id:32, ch:1, type:'single', q:'关于沥青表面处治面层，说法错误的是（  ）', opts:["起防水层的作用", "起磨耗层的作用", "起防冻层的作用", "起改善碎(砾)石路面的作用"], ans:2, exp:'教材规定：沥青表面处治面层主要起防水层、磨耗层、防滑层或改善碎(砾)石路面的作用。C选项"起防冻层的作用"错误，防冻是垫层的作用，非沥青表面处治面层的功能。'},
  {id:33, ch:1, type:'multi', q:'下列关于沥青路面类型及适用范围，说法正确的是（  ）。', opts:["热拌沥青混合料适用各种等级道路的面层", "温拌沥青混合料适用于次干路和支路", "冷拌沥青混合料适用于支路及以下道路的面层、支路的表面层", "沥青贯入式面层适用于城市次干路以下道路面层", "沥青表面处治面层适用于支路及停车场"], ans:[0, 2, 3, 4], exp:'教材规定：热拌沥青混合料适用各种等级道路的面层；冷拌沥青混合料适用于支路及其以下道路的面层、支路的表面层；沥青贯入式面层适用于城市次干路以下道路面层；沥青表面处治面层适用于支路及停车场。B选项错误：温拌沥青混合料适用范围与热拌相同，适用于各等级道路。'},
  {id:34, ch:1, type:'multi', q:'基层的性能指标包括（  ）。', opts:["应满足结构强度", "扩散荷载的能力", "水稳性", "抗冻性", "透水性好"], ans:[0, 1, 2, 3], exp:'教材规定：基层性能主要指标包括：应满足结构强度、扩散荷载的能力以及水稳性和抗冻性。E选项"透水性好"错误，基层应具有足够的不透水性或对排水基层有专门要求，并非透水性好。'},
  {id:35, ch:1, type:'multi', q:'沥青混合料面层的性能指标包括（  ）。', opts:["承载能力", "透水性", "平整度", "水稳定性", "温度稳定性"], ans:[0, 2, 3, 4], exp:'教材规定：沥青混合料面层使用指标包括承载能力、平整度、温度稳定性、抗滑能力、水稳定性。B选项"透水性"不是沥青混合料面层的性能指标，面层应具备不透水性防止水分下渗。'},
  {id:36, ch:1, type:'multi', q:'关于降噪排水路面的特点，下列说法正确的有（ ）。', opts:["上面层采用OGFC沥青混合料，具有排水降噪功能", "中、下面层采用密级配沥青混合料，保证结构强度", "适用于所有等级的城市道路", "能显著减少城市交通噪声", "仅适用于非机动车道"], ans:[0, 1, 3], exp:'A、B正确，符合降噪排水路面的结构特点。C错误，降噪排水路面通常用于城市主干路、快速路等交通量较大的道路，并非所有道路。D正确，OGFC路面能有效降低轮胎噪声。E错误，降噪排水路面适用于机动车道，而非仅非机动车道。'},
  {id:37, ch:1, type:'single', q:'降噪排水路面的主要功能不包括（ ）。', opts:["提高路面抗滑性能", "减少雨天水雾，提高行车安全性", "降低城市交通噪声", "提高路面的承载能力"], ans:3, exp:'降噪排水路面的核心功能是排水和降噪（A、B、C均符合），而承载能力主要由中、下面层的密级配沥青混合料保证，并非降噪排水路面的特有功能，故D不属于其主要功能。'},
  {id:38, ch:1, type:'multi', q:'关于水泥混凝土路面基层材料选用原则，下列说法正确的有（ ）', opts:["特重交通宜选用贫混凝土或沥青混凝土", "重交通道路宜选用水泥稳定粒料", "中、轻交通道路只能使用级配粒料", "湿润多雨地区的繁重交通路段宜采用排水基层", "所有交通等级道路均可使用石灰稳定土"], ans:[0, 1, 3], exp:'C选项"只能使用"表述绝对化错误；E选项石灰稳定土不适用于所有交通等级道路。'},
  {id:39, ch:1, type:'single', q:'基层的宽度应根据混凝土面层施工方式的不同，比混凝土面层每侧至少宽出300mm、500mm或650mm，与上述宽出宽度相对应的施工方式为（  ）。', opts:["小型机具施工，轨模式摊铺机施工，滑模式摊铺机施工", "轨模式摊铺机施工，滑模式摊铺机施工，小型机具施工", "滑模式摊铺机施工，小型机具施工，轨模式摊铺机施工", "轨模式摊铺机施工，小型机具施工，滑模式摊铺机施工"], ans:0, exp:'教材规定：基层的宽度应根据混凝土面层施工方式的不同，比混凝土面层每侧至少宽出：小型机具施工时300mm，轨模式摊铺机施工时500mm，滑模式摊铺机施工时650mm。因此对应关系为：300mm→小型机具，500mm→轨式，650mm→滑式。'},
  {id:40, ch:1, type:'single', q:'水泥混凝土路面工程中，特重交通基层宜选用材料中，不包括（  ）', opts:["贫混凝土", "碾压混凝土", "沥青混凝土", "素混凝土"], ans:3, exp:'教材规定：特重交通道路宜选用贫混凝土、碾压混凝土或沥青混凝土基层。D选项"素混凝土"即普通混凝土不在特重交通基层推荐选用范围内，贫混凝土和碾压混凝土均属于低水泥用量的特配混凝土，不同于普通素混凝土。'},
  {id:41, ch:1, type:'single', q:'水泥混凝土路面工程中，基层材料的选用原则，以下说法错误的是（  ）', opts:["特重交通道路宜选用碾压混凝土或沥青混凝土", "重交通道路宜选用水泥稳定粒料", "中等交通道路宜选择沥青稳定碎石", "轻交通道路宜选择石灰粉煤灰稳定粒料或级配粒料"], ans:2, exp:'教材规定：特重交通宜选用贫混凝土、碾压混凝土或沥青混凝土（A正确）；重交通宜选用水泥稳定粒料（B正确）；轻交通宜选择石灰粉煤灰稳定粒料或级配粒料（D正确）。C选项错误：中等交通宜选择水泥稳定粒料或石灰粉煤灰稳定粒料，而非沥青稳定碎石。'},
  {id:42, ch:1, type:'single', q:'基层施工时，在湿润和多雨地区宜采用（  ）。', opts:["排水基层", "不排水基层", "湿润基层", "底基层"], ans:0, exp:'教材规定：在湿润和多雨地区，宜采用排水基层。排水基层可有效排除渗入路面结构内的水分，防止水损害。B选项"不排水基层"、C选项"湿润基层"、D选项"底基层"均不符合规范要求。'},
  {id:43, ch:1, type:'single', q:'在温度和湿度状况不良的环境下，城市水泥混凝土道路应设置垫层，以改善路面结构的使用性能。以下关于垫层说法错误的是(  )', opts:["防冻垫层宜采用砂、砂砾等颗粒材料", "排水垫层宜采用砂、砂砾等颗粒材料", "半刚性垫层宜采用砂、砂砾等颗粒材料", "半刚性垫层宜采用无机结合料稳定粒料"], ans:2, exp:'教材规定：防冻垫层和排水垫层宜采用砂、砂砾等颗粒材料；半刚性垫层宜采用无机结合料稳定粒料。C选项错误：半刚性垫层应采用无机结合料稳定粒料，而非砂、砂砾等颗粒材料。砂、砂砾属于柔性材料，不具半刚性特征。'},
  {id:44, ch:1, type:'multi', q:'关于水泥混凝土道路基层的作用，下列说法正确的是（  ）', opts:["防止或减轻由于唧泥产生板底脱空和错台等病害", "减少路基不均冻胀", "减少体积变形对混凝土面层产生的不利影响", "改善接缝的传荷能力", "调节路基可能产生的不均匀沉降"], ans:[0, 1, 2, 3], exp:'E错误，垫层可调节路基可能产生的不均匀沉降'},
  {id:45, ch:1, type:'single', q:'关于排水基层下设置不透水底基层的说法，正确的是（ ）。', opts:["底基层应采用透水性良好的开级配粒料", "底基层顶面宜铺设沥青封层或防水土工织物", "底基层的主要作用是承受车轮荷载的直接磨耗", "底基层应设置在面层与排水基层之间"], ans:1, exp:'教材规定：排水基层下应设置不透水底基层，底基层可采用水泥稳定粒料或密级配粒料，底基层顶面宜铺设沥青封层或防水土工织物。B选项正确。A选项"开级配粒料"透水性强，不符合不透水要求。C选项底基层不直接承受车轮磨耗。D选项底基层在排水基层之下而非之上。'},
  {id:46, ch:1, type:'multi', q:'为有效防止下渗水影响路基，在排水基层下设置不透水底基层时，正确的构造与材料要求包括（ ）。', opts:["底基层可采用水泥稳定粒料", "底基层可采用密级配粒料", "底基层顶面宜铺设沥青封层", "底基层顶面宜铺设防水土工织物", "底基层应采用开级配大孔隙沥青混合料"], ans:[0, 1, 2, 3], exp:'教材规定：排水基层下应设置不透水底基层，底基层可采用水泥稳定粒料（A）或密级配粒料（B），底基层顶面宜铺设沥青封层（C）或防水土工织物（D）。E选项错误：开级配大孔隙沥青混合料透水性强，不宜用作不透水底基层。'},
  {id:47, ch:1, type:'multi', q:'面层混凝土板常分为普通（素）混凝土板、（  ）和钢筋混凝土板等。', opts:["聚合物混凝土板", "高强混凝土板", "连续配筋混凝土板", "高性能混凝土板", "预应力混凝土板"], ans:[2, 4], exp:'此题考核水泥混凝土面层。面层混凝土板分为普通（素）混凝土板、连续配筋混凝土板、预应力混凝土板和钢筋混凝土板等。目前我国较多采用普通（素）混凝土板。'},
  {id:48, ch:1, type:'multi', q:'水泥混凝土面层性能包括（  ）。', opts:["强度", "耐久性", "抗滑", "耐磨", "扩散荷载"], ans:[0, 1, 2, 3], exp:'水泥混凝土面层应具有足够的强度、耐久性(抗冻性),表面应抗滑、耐磨、平整。'},
  {id:49, ch:1, type:'single', q:'快速路、主干路的横向缩缝应加设（  ）。', opts:["连接杆", "传力杆", "拉力杆", "伸缩杆"], ans:1, exp:'教材规定：快速路、主干路的横向缩缝应加设传力杆。传力杆的作用是保证缩缝上下缝壁能有效传递荷载，防止错台病害。连接杆用于纵向施工缝，拉力杆和伸缩杆非规范术语。'},
  {id:50, ch:1, type:'multi', q:'水泥混凝土路面的纵向接缝是根据(  )设置的。', opts:["路基宽度", "路面宽度", "施工铺筑宽度", "单幅可变宽度", "全幅可变宽度"], ans:[1, 2], exp:'教材规定：纵向接缝是根据路面宽度和施工铺筑宽度设置的。当一次铺筑宽度小于路面宽度时设纵向施工缝；当一次铺筑宽度大于4.5m时设纵向缩缝。A选项"路基宽度"、D选项"单幅可变宽度"、E选项"全幅可变宽度"均非设置依据。'},
  {id:51, ch:1, type:'single', q:'关于混凝土路面纵向接缝，说法正确的是（ ）。', opts:["根据路面长度和施工铺筑宽度设置", "一次铺筑宽度大于路面宽度时，应设置带拉杆的平缝形式的纵向施工缝", "一次铺筑宽度小于4.5m时，应设置带拉杆的假缝形式的纵向缩缝", "纵缝应与线路中线平行"], ans:3, exp:'纵向接缝根据路面宽度和施工铺筑宽度设置。一次铺筑宽度小于路面宽度时，应设置带拉杆的平缝形式的纵向施工缝。一次铺筑宽度大于4.5m时，应设置带拉杆的 假缝形式的纵向缩缝，纵缝应与线路中线平行。'},
  {id:52, ch:1, type:'single', q:'关于水泥混凝土路面横向接缝设置，下列说法错误的是（ ）', opts:["快速路横向胀缝应加设传力杆", "横向施工缝应避开缩缝和胀缝位置", "板厚改变处应设置胀缝", "小半径平曲线处应设置胀缝"], ans:1, exp:'规范要求横向施工缝尽可能选在缩缝或胀缝处，故B选项错误。其他选项均符合规范要求。'},
  {id:53, ch:1, type:'multi', q:'下列（ ）情况下水泥混凝土路面应设置传力杆', opts:["特重交通等级的横向缩缝", "主干路的横向胀缝", "轻交通道路的横向缩缝", "自由边处的胀缝", "承受繁重交通的施工缝"], ans:[0, 1, 3, 4], exp:'根据规范，特重及重交通等级的横向胀缝、缩缝均设置传力杆，自由边处和繁重交通的胀缝、施工缝也应设置。轻交通道路的横向缩缝可不设传力杆。 54关于水泥混凝土路面与沥青路面相接的处理，正确的是（ ） A. 应设置长度不少于2m的过渡段 B. 过渡段路面应采用平顺衔接 C. 应采用两种路面呈阶梯状叠合布置 D. 只需在混凝土路面端部设置胀缝'},
  {id:54, ch:1, type:'multi', q:'对于特重及重交通等级的混凝土路面,下列哪些(  )设置配筋补强。', opts:["自由边处", "承受繁重交通的缩缝", "小于90°的面层角隅", "下穿市政管线路段", "雨水口和地下设施的检查井周围"], ans:[0, 2, 3, 4], exp:'教材规定：面层角隅（小于90°）及自由边处应设置配筋补强；下穿市政管线路段和雨水口、检查井周围应设置配筋补强。B选项"承受繁重交通的缩缝"设置的是传力杆而非配筋补强。'},
  {id:55, ch:1, type:'multi', q:'为提高砌块路面抗滑性能，加工材料可采用下列（ ）方法', opts:["刻槽", "压槽", "拉槽", "拉毛", "打磨"], ans:[0, 1, 2], exp:'教材规定：砌块路面为提高抗滑性能，加工材料可采用刻槽、压槽、拉槽等方法。D选项"拉毛"、E选项"打磨"不是规范规定的抗滑加工方法，拉毛通常用于混凝土路面而非砌块路面。'},
  {id:56, ch:1, type:'multi', q:'下列（ ）材料，可用于胀缝填料。', opts:["硅酮类", "聚氨酯类", "聚氯乙烯胶泥类", "树脂类", "水泥浆"], ans:[0, 1, 2, 3], exp:'胀缝板宜用厚20mm, 水稳定性好，具有一定柔性的板材制作，且应经防腐处理。填缝材料宜用硅酮类、聚氨酯类、树脂类、橡胶沥青类、聚氯乙烯胶泥类、改性沥青类填缝材料，并宜加入耐老化剂。（口诀：竖向铝盖挺规矩）'},
  {id:57, ch:1, type:'single', q:'下列关于地下水的描述错误的是（）', opts:["根据地下水的埋藏条件又可将地下水分为上层滞水、潜水、承压水", "上层滞水分布范围有限，存在于地下两个隔水层之间", "潜水分布广，与道路等市政公用工程关系密切", "承压水具有一定的水头高度"], ans:1, exp:'教材规定：按埋藏条件地下水分为上层滞水、潜水和承压水。B选项描述错误：上层滞水存在于地表以下、第一个隔水层之上，而非"存在于地下两个隔水层之间"——那是承压水的特征。上层滞水分布范围有限，补给区与分布区一致。'},
  {id:58, ch:1, type:'multi', q:'水与土体相互作用，可以使土体的强度和稳定性降低，导致路基或地下构筑物周围土体软化，并可能产生（）等危害。', opts:["滑坡", "沉陷", "潜蚀", "爆管", "翻浆"], ans:[0, 1, 2, 4], exp:'教材规定：水与土体相互作用，可使土体强度降低，导致路基或地下构筑物周围土体软化，并可能产生滑坡（A）、沉陷（B）、潜蚀（C）、翻浆（E）等危害。D选项"爆管"是指管道因内部压力爆裂，不属于水与土体相互作用导致的危害。'},
  {id:59, ch:1, type:'single', q:'坚土的坚实系数为（  ）。', opts:["0.5～0.6", "0.6～0.8", "0.8～1.0", "1.0～1.5"], ans:2, exp:'1)一类土，松软土；坚实系数为 0.5～0.6。2)二类土，普通土；坚实系数为0.6～0.8。 3)三类土，坚土；坚实系数为0.8～1.0。4)四类土，砂砾坚土；1.0～1.5。五类土是软石，六类土是次坚石，七类土是坚石，八类土是特坚石。'},
  {id:60, ch:1, type:'single', q:'土中水的质量与干土粒质量之比，称为（  ）。', opts:["天然密度", "孔隙率", "含水率", "孔隙比"], ans:2, exp:'此题考核常用路基土的主要性能参数。含水率ω：土中水的质量与干土粒质量之比。 （故选择C）。孔隙率n：土的孔隙体积与土的体积之比。孔隙比e：土的孔隙体积与土粒体积之比。天然密度ρ：土的单位体积的质量。'},
  {id:61, ch:1, type:'single', q:'关于土的液性指数I，下列说法正确的是：', opts:["当I=0.8时，土体处于硬塑状态", "液性指数计算公式为I=(W-Wp)/Ip", "I≥1.0表示土体处于软塑状态", "当I<0时，土体处于流塑状态"], ans:1, exp:'A错误，0.5≤I<1.0为软塑状态；C错误，I≥1.0为流塑状态；D错误，I<0为坚硬、半坚硬状态。B选项正确表述了液性指数计算公式。2．常用路基土的主要性能参数 1）含水率ω；2）天然密度p3）孔隙比e；4）孔隙率n5）塑限ωp土由可塑状态转为半固体状态时的界限含水量为塑性下限，称为塑性界限，简称塑限。6）液限ωl土由可塑状态转为流体状态时的界限含水量为液性上限，称为液性界限，简称液限。7）塑性指数 土的液限与塑限之差值，Ip= ωl - ωp8）液性指数Il土的天然含水率与塑限之差值对塑性指数之比值，Il=（ω- ωp ）/Ip，Il可用以判别土的软硬程度；Il＜0坚硬、半坚硬状态， 0≤Il＜0.5 硬塑状态，0.5≤Il＜1.0 软塑状态，Il≥1.0 流塑状态。'},
  {id:62, ch:1, type:'multi', q:'关于土的液性指数I及其工程意义，正确的有（ ）', opts:["液性指数是判别黏性土软硬程度的指标", "I=0.3时，土体处于硬塑状态", "软塑状态的土体范围是0≤I<0.5", "流塑状态的土体不宜直接作为地基持力层", "计算液性指数需要用到土的塑限和液限指标"], ans:[0, 1, 3], exp:'C错误，软塑状态应为0.5≤I<1.0；E错误，计算需要塑限和塑性指数；其他选项均正确。'},
  {id:63, ch:1, type:'multi', q:'不良土质路基按路基处理的作用机理，大致分为（ ）。', opts:["土质改良", "土的置换", "土的夯实", "土的排水", "土的补强"], ans:[0, 1, 4], exp:'教材规定：按路基处理的作用机理，大致分为土质改良、土的置换、土的补强三类。C选项"土的夯实"和D选项"土的排水"属于土质改良的具体方法，而非作用机理分类。'},
  {id:64, ch:1, type:'multi', q:'路基采用振冲、挤密的处理方法包括（ ）', opts:["灰土挤密桩、", "砂砾桩、", "碎石桩、", "石灰桩、", "CFG桩"], ans:[0, 1, 2, 3], exp:'振冲 、挤密包括：振冲挤密、灰土挤密桩、砂桩、砂砾桩、碎石桩、石灰桩、爆破挤密、强夯置换。 口诀：振、灰、砂、砂、碎、石、爆、强 振冲置换及拌入包括：振冲置换、深层搅拌、高压喷射注浆、石灰桩、CFG桩。 口诀：深、圳、石、膏、C'},
  {id:65, ch:1, type:'multi', q:'下列地基处理方法中，属于振冲置换及拌入类的有（ ）。', opts:["振冲置换", "深层搅拌", "砂桩", "高压喷射注浆", "CFG桩"], ans:[0, 1, 3, 4], exp:'教材规定：振冲置换及拌入包括振冲置换、深层搅拌、高压喷射注浆、石灰桩、CFG桩。C选项"砂桩"属于振冲、挤密类方法而非置换及拌入类。口诀：深、圳、石、膏、C（深层搅拌、振冲置换、石灰桩、高压喷射注浆、CFG桩）。'},
  {id:66, ch:1, type:'multi', q:'城镇道路路基工程的施工特点，描述正确的有（ ）。', opts:["工程施工处于露天作业，受天气等自然条件影响大", "施工区域内的专业类型和结构物多，管线纵横交错", "专业及社会间配合工作多，干扰多，易导致施工方案变化多", "所有路基工程均面临巨大的交通压力和对既有构筑物的保护问题", "人工配合土方作业时，为提升效率，可由机械操作员兼岗指挥"], ans:[0, 1, 2], exp:'教材规定：城镇道路路基工程施工处于露天作业，受自然条件影响大；专业类型和结构物多，管线纵横交错；专业及社会配合工作多，干扰多，易导致施工方案变化。D选项"所有路基工程均面临巨大交通压力"表述绝对化；E选项由机械操作员兼岗指挥违反安全规定。'},
  {id:67, ch:1, type:'multi', q:'城镇道路路基工程包括（）', opts:["涵洞", "挡土墙", "排水边沟", "垫层土方", "急流槽"], ans:[0, 1, 2, 4], exp:'路基工程包括路基(路床、路堤)的土(石)方、相关的项目有涵洞、挡土墙、路肩、边坡防护、排水边沟、急流槽、各类管线等'},
  {id:68, ch:1, type:'multi', q:'路基施工前，应根据工程地质勘察报告，对路基土进行（）试验。', opts:["压实度", "液限", "塑限", "标准击实", "CBR"], ans:[1, 2, 3, 4], exp:'施工前，应根据工程地质勘察报告，对路基土进行天然含水量、液限、塑限、标准击实、CBR试验，必要时应做颗粒分析、有机质含量、易溶盐含量、冻胀和膨胀量等试验。'},
  {id:69, ch:1, type:'single', q:'关于路基施工准备工作的说法，错误的是（ ）', opts:["交通导行方案需经交通管理部门批准后实施", "技术安全交底应由项目经理向施工人员讲解", "测量控制点应进行闭合加密，建立控制网", "施工前需补钉转角桩和路两侧外边桩"], ans:1, exp:'规范要求技术安全交底应由施工项目技术负责人进行，而非项目经理，故B选项错误。其他选项均符合规范要求。'},
  {id:70, ch:1, type:'multi', q:'路基施工准备阶段必须完成的工作包括（ ）', opts:["按批准方案设置围挡和导行临时交通", "项目总工向施工人员进行技术交底", "对测量控制点进行闭合复核", "建立施工测量控制网", "办理工程质量监督手续"], ans:[0, 1, 2, 3], exp:'E选项"办理工程质量监督手续"属于开工前建设单位的工作，不属于施工单位的施工准备内容。其他选项均符合规范要求。'},
  {id:71, ch:1, type:'single', q:'在路基施工测量中，不属于施工准备阶段测量工作的是（ ）', opts:["对已知控制点进行闭合加密", "恢复道路中线", "进行横断面测量", "补钉转角桩"], ans:2, exp:'横断面测量属于施工过程中的测量工作，不属于施工准备阶段的测量工作。 A、B、D均为施工准备阶段的测量工作。'},
  {id:72, ch:1, type:'single', q:'关于路基填筑施工要求的说法，正确的是（ ）', opts:["不同性质的填料可以混合填筑在同一层", "透水性小的土类填筑横坡宜为2%～3%", "液限大于50%的土可直接用于路基填筑", "路基每层最大压实厚度不宜大于300mm"], ans:3, exp:'A选项错误，规范要求不同填料应分层填筑；B选项错误，透水性小的土类横坡应为4%； C选项错误，液限大于50%的土需处理合格后才能使用； D选项符合规范要求。'},
  {id:73, ch:1, type:'multi', q:'关于路基填筑施工，下列要求正确的有（ ）', opts:["高边坡施工应制定专项施工方案", "一般土质填筑横坡宜为2%～3%", "塑性指数大于26的土可直接使用", "顶面最后一层压实厚度应不小于80mm", "含水率超标的土必须处理后使用"], ans:[0, 1, 4], exp:'C选项错误，塑性指数大于26的土需处理； D选项错误，最后一层厚度应不小于100mm； 其他选项均符合规范要求。'},
  {id:74, ch:1, type:'multi', q:'挖方路基施工时，应做到（  ）。', opts:["根据测量中线和边桩开挖", "挖土时应自上向下分层开挖，严禁掏洞开挖", "在距管道边2m范围内应采用人工开挖", "距直埋缆线1m范围内必须采用人工开挖", "挖方段不得超挖，应留有200-300mm人工开挖到设计标高。"], ans:[0, 1], exp:'教材规定：挖方路基应根据测量中线和边桩开挖（A正确）；挖土应自上向下分层开挖，严禁掏洞开挖（B正确）。C选项中管道边2m范围应为1m范围；D选项中直埋缆线1m范围应为2m范围；E选项中应留有200～300mm人工开挖但这是路基填筑要求而非挖方要求。'},
  {id:75, ch:1, type:'single', q:'城市快速路，最小填料强度(CBR)值错误的是（）', opts:["路床顶面以下深度0～30cm，6%", "路床顶面以下深度30～80cm，5%", "路床顶面以下深度80～150cm，4%", "路床顶面以下深度＞150cm，3%"], ans:0, exp:'教材规定：城市快速路、主干路路床顶面以下深度0～30cm时CBR应不小于8%，而非6%。A选项"6%"错误，正确数值为8%。30～80cm为5%，80～150cm为4%，＞150cm为3%（该行数据正确）。'},
  {id:76, ch:1, type:'multi', q:'土基压实应做试验段，以取得（  ）等施工参数。', opts:["碾压遍数", "碾压机具组合", "摊铺长度", "路基预沉量值", "每层虚铺厚度"], ans:[0, 1, 3, 4], exp:'教材规定：土基压实应做试验段，以取得碾压遍数、碾压机具组合、路基预沉量值和每层虚铺厚度等施工参数。C选项"摊铺长度"不是试验段需要取得的参数，摊铺长度根据施工组织确定即可。'},
  {id:77, ch:1, type:'multi', q:'路基压实，说法正确的是（）。', opts:["分为静压和振动压实两种", "土质路基压实原则：“先轻后重、先静后振、先低后高、先慢后快，轮迹重叠”", "压路机最快速度不宜超过6km/h", "碾压应从路基边缘向中央进行，压路机轮外缘距路基边应保持安全距离", "碾压不到的部位应采用小型夯压机夯实，防止漏夯，要求夯击面积重叠1/4～1/3"], ans:[0, 1, 3, 4], exp:'教材规定：路基压实分为静压和振动压实两种（A正确）。压实原则：先轻后重、先静后振、先低后高、先慢后快、轮迹重叠（B正确）。碾压应从路基边缘向中央进行（D正确）。夯击面积重叠1/4～1/3（E正确）。C选项错误：压路机最快速度不宜超过4km/h，而非6km/h。'},
  {id:78, ch:1, type:'single', q:'下列关于无机结合料稳定基层特点的描述中，错误的是（ ）。', opts:["结构较密实，孔隙率较小", "透水性较大，利于路面排水", "水稳性较好，适宜于机械化施工", "通常采用水泥、石灰及工业废渣等稳定材料"], ans:1, exp:'教材规定：无机结合料稳定基层结构较密实、孔隙率较小、透水性较小（而非较大），水稳性较好，适宜机械化施工。B选项"透水性较大，利于路面排水"错误，半刚性基层透水性小，有利于阻止水分下渗路基。A、C、D选项均正确。'},
  {id:79, ch:1, type:'single', q:'二灰稳定土的（  ）优于石灰稳定土。', opts:["水稳性", "抗冻性", "板体性", "早强性"], ans:1, exp:'教材规定：二灰稳定土有良好的力学性能、板体性和水稳性，但其抗冻性能明显优于石灰稳定土。二灰稳定土中粉煤灰与石灰的火山灰反应使其抗冻性显著提高。水稳性、板体性虽然也较好，但"抗冻性"是二灰稳定土相比石灰稳定土最突出的优势。'},
  {id:80, ch:1, type:'single', q:'石灰土只能用作（  ）。', opts:["高级路面的底基层", "次高级路面的基层", "高等级路面的基层", "柔性路面的基层"], ans:0, exp:'此题考核石灰稳定土类基层相关内容。石灰稳定土的干缩和温缩特性均十分明显，且都会导致裂缝。与水泥土一样，由于其收缩裂缝严重，强度未充分形成时表面会遇水软化，并容易产生唧浆冲刷等损坏，石灰土已被严格禁止用于高级路面的基层，只能用作高级路面的底基层。'},
  {id:81, ch:1, type:'single', q:'关于水泥稳定细粒土（水泥土）的说法，正确的是（ ）。', opts:["水泥土的干缩系数小于水泥稳定粒料，不易产生收缩裂缝", "水泥土强度未充分形成时表面遇水会软化，导致沥青面层龟裂", "水泥土抗冲刷能力强，可用于高速公路基层", "水泥土温缩系数小，适合严寒地区路面基层"], ans:1, exp:'教材规定：水泥稳定细粒土（水泥土）的干缩系数和温缩系数均大于水泥稳定粒料，易产生收缩裂缝。水泥土强度未充分形成时表面遇水会软化，导致沥青面层龟裂（B正确）。水泥土抗冲刷能力差，严禁用于高速及一级公路基层，故C、D错误。'},
  {id:82, ch:1, type:'multi', q:'级配砂砾基层施工的说法，正确的有（  ）。', opts:["碾压后应适量洒水，保持砂砾湿润，但不应导致层下翻浆", "碾压中对存在过碾压现象的部位，应重新碾压", "控制碾压速度，碾压至轮迹不大于5mm,", "基层压实后至面层施工前适量洒水。", "未铺装上层前不得开放交通"], ans:[2, 3, 4], exp:'① 碾压前和碾压中应适量洒水，保持砂砾湿润，但不应导致层下翻浆。② 碾压中对存在过碾压现象的部位，应进行换填处理。级配碎石及级配碎砾石视压实碎石的缝隙情况撒布嵌缝料。③ 控制碾压速度，碾压至轮迹不大于5mm, 表面平整、坚实。基层压实后至面层 施工前适量洒水。④ 未铺装上层前不得开放交通。'},
  {id:83, ch:1, type:'single', q:'关于二灰稳定土的说法，正确的是（  ）。', opts:["抗冻性能比石灰稳定土低", "粉煤灰用量越多早期强度越高", "收缩性大于水泥稳定土和石灰稳定土", "被禁止用于高等级路面的基层"], ans:3, exp:'教材规定：二灰稳定土的收缩性小于水泥稳定土和石灰稳定土（C错误）。二灰稳定土被禁止用于高等级路面的基层，只能用作底基层（D正确）。二灰稳定土抗冻性优于石灰稳定土（A错误），粉煤灰用量越多早期强度越低（B错误）。'},
  {id:84, ch:1, type:'single', q:'水泥稳定土类基层施工，错误的是（  ）。', opts:["材料自搅拌至摊铺碾压成型，不应超过3h。", "宜在春末和气温较高季节施工，施工气温应不低于10℃", "在有冰冻的地区应在第一次重冰冻到来之前的", "运输中应采取防止水分蒸发和防扬尘措施"], ans:1, exp:'教材规定：水泥稳定土材料自搅拌至摊铺碾压成型不应超过3h（A正确）。宜在春末和气温较高季节施工，施工气温应不低于5℃，而非10℃（B错误）。有冰冻地区应在第一次重冰冻到来之前的0.5～1个月前完成（C选项完整）。运输中应采取防水分蒸发和防扬尘措施（D正确）。'},
  {id:85, ch:1, type:'single', q:'在常温状态下，二灰混合料基层的养护时间至少应为（  ）。', opts:["3d", "7d", "14d", "28d"], ans:1, exp:'教材规定：二灰混合料基层应在潮湿状态下养护，常温下养护时间不宜少于7d。3d时间太短，14d和28d虽然更安全但不是规范规定的最少天数。7d是规范明确的最小养护时间要求。'},
  {id:86, ch:1, type:'multi', q:'关于二灰混合料拌合、运输和施工的说法，正确的有（  ）。', opts:["宜采用强制式拌和机拌合", "运输时，应采取遮盖封闭措施防止水分损失和遗撒", "可以用薄层贴补法进行找平", "碾压时采用先重型、后轻型压路机碾压", "应在潮湿状态下养护，常温下不宜少于7d"], ans:[0, 1, 4], exp:'教材规定：二灰混合料宜采用强制式拌和机拌合（A正确）；运输时应遮盖封闭防水分损失和遗撒（B正确）；应在潮湿状态下养护，常温下不宜少于7d（E正确）。C错误：严禁用薄层贴补法进行找平。D错误：碾压时应采用先轻型后重型压路机。'},
  {id:87, ch:1, type:'multi', q:'土工合成材料可置于岩土或其他工程结构内部、表面或各结构层之间，具有（  ）、隔离等功能。', opts:["加筋", "防护", "过滤", "排水", "衬垫"], ans:[0, 1, 2, 3], exp:'教材规定：土工合成材料可置于岩土或其他工程结构内部、表面或各结构层之间，具有加筋、防护、过滤、排水、隔离等功能。E选项"衬垫"不是土工合成材料的功能分类，衬垫属于防渗材料。'},
  {id:88, ch:1, type:'single', q:'关于台背路基填土加筋的说法，正确的是（ ）。', opts:["加筋的主要目的是提高路面的抗滑性能", "加筋台背适宜的高度为5.0～10.0m", "加筋材料宜选用土工膜或防水土工织物", "台背填料宜采用高液限黏土，以保证水稳定性"], ans:1, exp:'教材规定：台背路基填土加筋宜采用土工网或土工格栅，加筋台背适宜的高度为5.0～10.0m（B正确）。A错误：加筋主要目的是提升路堤稳定性而非抗滑。C错误：加筋材料应选用土工网或土工格栅，而非土工膜。D错误：台背填料宜采用透水性材料，不能用高液限黏土。'},
  {id:89, ch:1, type:'multi', q:'关于垫隔土工布加固地基施工，正确的是（ ）。', opts:["在整平好的下承层上按路堤底宽全断面铺设", "铺设土工聚合物，在路堤每边留足够的锚固长度", "当采用搭接法连接，搭接长度宜为0.3～0.9m", "采用缝接法时，粘结宽度不小于30mm,", "上下层接缝应交替错开，错开长度不小于0.5m"], ans:[0, 1, 2, 4], exp:'② 施工： a.在整平好的下承层上按路堤底宽全断面铺设，摊平时拉直平顺，紧贴下承层，不 得出现扭曲、折皱、重叠。在斜坡上摊铺时，应保持一定松紧度(可用U 形钉控制)。 b.铺设土工聚合物，应在路堤每边留足够的锚固长度，回折覆盖在压实的填料 面上。 c.为保证土工合成材料的整体性，当采用搭接法连接，搭接长度宜为0.3～0.9m; 采用缝接法时，粘结宽度不小于50mm, 粘结强度不低于土工合成材料的抗拉强度。 d.现场施工中，一方面注意土工合成材料破损时必须立即修补好，另一方面上下 层接缝应交替错开，错开长度不小于0.5m。'},
  {id:90, ch:1, type:'single', q:'关于透层施工要求的说法，错误的是（ ）', opts:["透层油应在基层表面稍变干燥但未硬化时喷洒", "透层油宜采用渗透性好的液体沥青或乳化沥青", "透层油洒布后应立即开放交通以加快挥发", "透层油洒布后应封闭交通直至养护期满"], ans:2, exp:'规范要求透层油洒布后应封闭交通，故C选项错误。'},
  {id:91, ch:1, type:'multi', q:'关于沥青路面透层、粘层、封层的施工要求，正确的有（ ）', opts:["粘层油宜在摊铺面层当天洒布", "封层集料应质地坚硬、耐磨、洁净", "气温低于5℃时不应喷洒粘层油", "透层油喷洒后养护时间应根据试验确定", "风力超过4级时应停止喷洒封层油"], ans:[0, 1, 3], exp:'C选项错误，规范要求气温在10℃及以下不应喷洒； E选项错误，规范要求风力超过5级(含5级)时不应喷洒。其他选项均符合规范要求。'},
  {id:92, ch:1, type:'single', q:'关于粘层施工的说法，正确的是（ ）', opts:["粘层油应采用慢裂乳化沥青", "粘层油应在面层摊铺前一周洒布", "粘层油可用于加强新旧沥青层的粘结", "粘层油喷洒应采用柱状喷射方式"], ans:2, exp:'A错误，粘层油宜采用快裂或中裂乳化沥青； B选项错误，应在摊铺面层当天洒布； D选项错误，应呈雾状喷洒。'},
  {id:93, ch:1, type:'single', q:'下列说法正确的的是（ ）', opts:["当气温为5℃，可以喷洒粘层油", "当气温为15℃，可以喷洒粘层油", "当风力为6级，可以喷洒粘层油", "当风力为5级，可以喷洒粘层油"], ans:1, exp:'当气温在10℃及以下，风力大于5级(含5级),不应喷洒透层、粘层、封层油。'},
  {id:94, ch:1, type:'single', q:'热拌普通沥青混合料路面工艺流程中，压实成型的紧前工作为（ ）', opts:["摊铺", "接缝处理", "运输", "养护"], ans:1, exp:'施工准备→运输→摊铺→接缝处理→压实成 型→养护→开放交通。'},
  {id:95, ch:1, type:'single', q:'关于沥青混合料运输要求的说法，错误的是（ ）', opts:["运料车轮胎上不得沾有泥土等脏物", "等候的运料车宜在5辆以上", "已遭雨淋的沥青混合料经晾干后可继续使用", "运料车应在摊铺机前100～300mm外空挡等候"], ans:2, exp:'规范要求已遭雨淋的沥青混合料不得使用，故C选项错误。'},
  {id:96, ch:1, type:'multi', q:'关于沥青混合料运输与摊铺，正确的有（ ）', opts:["装料前应喷洒防粘结剂防止混合料粘结车厢", "运输过程中应采用篷布覆盖保温防雨", "结团成块的混合料可打散后继续使用", "运料车应避免撞击摊铺机", "每次卸料后车厢内余料应及时清除"], ans:[0, 1, 3, 4], exp:'C选项错误，规范要求结团成块的混合料不得使用。'},
  {id:97, ch:1, type:'single', q:'关于城市快速路、主干路沥青面层摊铺要求的说法，错误的是（ ）', opts:["每台摊铺机的摊铺宽度宜大于8m", "两幅之间应有30～60mm宽度的搭接", "宜采用两台以上摊铺机联合摊铺", "上下层搭接位置宜错开200mm以上"], ans:0, exp:'要求每台摊铺机的摊铺宽度宜小于6m，故A选项错误。'},
  {id:98, ch:1, type:'single', q:'关于沥青混合料面层摊铺施工的说法，正确的是（ ）。', opts:["摊铺前应提前预热熨平板，使其温度不低于80℃", "摊铺速度宜控制在4～8m/min范围内，以提高效率", "上面层摊铺宜采用钢丝绳或路缘石控制高程与厚度", "摊铺机必须缓慢、均匀、连续不间断地摊铺，不得随意变速或中途停顿"], ans:3, exp:'教材规定：摊铺机必须缓慢、均匀、连续不间断地摊铺，不得随意变速或中途停顿（D正确）。A错误：熨平板预热温度应不低于100℃而非80℃。B错误：摊铺速度宜控制在2～6m/min。C错误：上面层宜采用导梁或平衡梁控制，下面层才用钢丝绳或路缘石。'},
  {id:99, ch:1, type:'multi', q:'关于沥青混合料面层摊铺施工技术，正确的有（ ）。', opts:["摊铺前应提前0.5～1h预热熨平板，使其不低于100℃", "熨平板的振捣或夯实装置应选择适宜的振动频率和振幅", "摊铺速度宜控制在2～6m/min，且应连续不间断", "发现明显离析、波浪、裂缝、拖痕时应继续摊铺后再处理", "下面层宜采用导梁或平衡梁控制高程与厚度"], ans:[0, 1, 2], exp:'教材规定：摊铺前应提前0.5～1h预热熨平板使其不低于100℃（A正确）；振捣装置应选择适宜频率和振幅（B正确）；摊铺速度宜控制在2～6m/min且应连续不间断（C正确）。D错误：发现离析等问题应立即处理而非继续摊铺。E错误：下面层宜采用钢丝绳控制，上面层才用导梁或平衡梁。'},
  {id:100, ch:1, type:'single', q:'关于摊铺机操作要求的说法，正确的是（ ）', opts:["可根据需要随意变换摊铺速度", "熨平板振动频率应固定不变", "必须连续不间断地均匀摊铺", "中途停顿对路面质量无影响"], ans:2, exp:'A选项错误，不得随意变换速度； B选项错误，应选择适宜频率； D选项错误，中途停顿会影响质量。'},
  {id:101, ch:1, type:'single', q:'沥青混合料面层铺筑时，熨平板振捣装置应选择适宜的振动频率和振幅目的是（）', opts:["保证路面的平整度", "确定最佳弯沉值", "控制厚度", "提升路面初始压实度"], ans:3, exp:'教材规定：熨平板振捣或夯实装置应选择适宜的振动频率和振幅，目的是提升路面初始压实度。通过振捣使混合料在熨平板下获得初步压实，提高路面初始密实度。平整度主要通过摊铺工艺控制，弯沉值与整体压实度有关，厚度控制是另一项指标。'},
  {id:102, ch:1, type:'multi', q:'沥青混合料最低摊铺温度根据下列（）执行', opts:["基层厚度", "沥青混合料种类", "气温", "风速", "下卧层表面温度"], ans:[1, 2, 3, 4], exp:'铺筑层厚度'},
  {id:103, ch:1, type:'multi', q:'沥青混合料面层控制高程与摊铺厚度，下列说法正确的是（）', opts:["下面层宜采用钢丝绳", "下面层宜采用路缘石", "下面层宜采用平石", "上面层宜采用钢丝绳", "上面层宜采用路缘石"], ans:[0, 1, 2], exp:'上面层宜采用导梁或平衡梁的控制方式'},
  {id:104, ch:1, type:'multi', q:'具备条件的道路宜采用的先进施工技术，包括（）', opts:["卫星定位", "三维数据模型(BIM)", "雷达", "激光控制", "无线感应"], ans:[0, 1, 3], exp:'教材规定：具备条件的道路宜采用卫星定位（GPS）、三维数据模型（BIM）和雷达等先进施工技术。D选项"激光控制"和E选项"无线感应"不属于教材所列的先进施工技术，教材明确列出的是卫星定位、BIM和雷达。'},
  {id:105, ch:1, type:'multi', q:'沥青面层碾压温度应根据（）因素经试压确定', opts:["沥青混合料种类", "沥青种类", "压路机", "风速", "层厚"], ans:[0, 1, 2, 4], exp:'教材规定：沥青面层碾压温度应根据沥青种类、沥青混合料种类、压路机类型和层厚等因素经试压确定。C选项"风速"虽然影响施工条件，但不是确定碾压温度的因素，碾压温度通过试压确定主要考虑材料性质、设备厚度等。'},
  {id:106, ch:1, type:'multi', q:'关于沥青混合料初压下列说法正确的是（）', opts:["初压应采用轮胎压路机", "压路机的驱动轮背向摊铺机", "超高路段和坡道上则由低处向高处碾压", "复压应紧跟初压连续进行", "碾压路段长度宜为60～80m"], ans:[2, 3, 4], exp:'初压应采用钢轮压路机静压1～2遍。初压后检查平整度、路拱、必要时应及时修整。碾压时应将压路机的驱动轮面向摊铺机'},
  {id:107, ch:1, type:'single', q:'沥青混合料面层终压下列说法错误的是（）', opts:["终压应紧接在复压后进行", "可选用双轮钢筒式压路机", "可选用振动压路机", "碾压至无明显轮迹为止"], ans:2, exp:'宜选用双轮钢筒式压路机或关闭振动的振动压路机'},
  {id:108, ch:1, type:'single', q:'关于沥青混合料面层接缝说法错误的是（）', opts:["表面层横向接缝应采用斜接缝", "表面层横向接缝应采用垂直的平接缝", "中面层横向接缝可采用斜接缝", "中面层横向接缝可采用阶梯形接缝"], ans:0, exp:'高等级道路的表面层横向接缝应采用垂直的平接缝，以下各层和其他等级的道路的各层可采用斜接缝或阶梯形接缝。'},
  {id:109, ch:1, type:'multi', q:'关于沥青路面接缝施工的要求，正确的有（ ）', opts:["热接缝应留下100～200mm宽暂不碾压作为基准面", "可采用3m直尺检查接缝平整度", "新料摊铺应与已铺层重叠50～100mm", "应先纵向碾压再横向碾压", "接缝处可不涂粘层油直接铺筑"], ans:[0, 1, 2], exp:'D选项错误，应先横向碾压再纵向碾压； E选项错误，热接缝虽可不涂粘层油，但题目未明确限定热接缝。'},
  {id:110, ch:1, type:'multi', q:'关于改性沥青混合料面层施工说法错误的是（）', opts:["在喷洒有粘层油的路面上铺筑改性沥青混合料时，宜使用履带式摊铺机", "上面层找平宜采用非接触式平衡梁", "初压开始温度不低于160℃", "碾压终了的表面温度应不低于80℃", "振动压实应遵循“紧跟、慢压、低频、高幅”的原则"], ans:[2, 3, 4], exp:'初压开始温度不低于150℃,碾压终了的表面温度应不低于90～120℃。 振动压实应遵循“紧跟、慢压、高频、低幅”的原则'},
  {id:111, ch:1, type:'multi', q:'改性沥青混合料振动压实，采取高频率、低振幅的方式慢速碾压，其目的是保证（ ）', opts:["弯沉值", "平整度", "厚度", "抗滑性", "密实度"], ans:[1, 4], exp:'教材原文："振动压实应遵循紧跟、慢压、高频、低幅的原则……采取高频率、低振幅的方式慢速碾压，这是保证平整度和密实度的关键。"\n\n✅ B正确——高频低幅可让混合料充分密实的同时保持表面平整度不受破坏。\n✅ E正确——高频低幅是实现密实度的关键措施。\n❌ D错误——抗滑性主要靠骨料级配和构造深度实现，不是振动压实的目的。\n❌ A、C——弯沉值和厚度通过控制碾压遍数等其他参数实现。'},
  {id:112, ch:1, type:'single', q:'关于干法添加型温拌沥青添加剂的掺量，下列说法正确的是（ ）。', opts:["一般为最佳沥青用量的0.5%～0.8%", "一般为最佳沥青用量的3%～4%", "一般为最佳沥青用量的5%～6%", "一般为最佳沥青用量的8%～10%"], ans:2, exp:'干法添加型温拌添加剂的掺量一般为最佳沥青用量的5%～6%，湿法添加型为0.5%～0.8%，沥青降粘类为3%～4%。'},
  {id:113, ch:1, type:'single', q:'温拌沥青混合料的出料温度应比热拌沥青混合料降低（ ）。', opts:["10℃以上", "15℃以上", "20℃以上", "25℃以上"], ans:2, exp:'原文明确说明温拌沥青混合料的出料温度较热拌沥青混合料降低20℃以上。'},
  {id:114, ch:1, type:'multi', q:'下列属于水泥混凝土路面工艺流程的是（）', opts:["模板安装", "钢筋设置", "摊铺与振捣", "碾压", "拉毛与切缝"], ans:[0, 1, 2, 4], exp:'教材规定：水泥混凝土路面工艺流程包括模板安装、钢筋设置、摊铺与振捣、拉毛与切缝等工序。D选项"碾压"属于沥青路面施工工序，水泥混凝土路面采用振捣方式密实而非碾压。'},
  {id:115, ch:1, type:'multi', q:'水泥混凝土路面支模前应核对（）', opts:["路基标高", "施工缝位置", "面板分块", "构造物位置", "路面标高"], ans:[2, 3, 4], exp:'支模前应核对路面标高、面板分块、胀缝和构造物位置'},
  {id:116, ch:1, type:'single', q:'三辊轴机组铺筑混凝土面层时，当面层铺装厚度小于（ ）时，可采用振捣梁。', opts:["120mm", "150mm", "180mm", "200mm"], ans:1, exp:'三辊轴机组铺筑混凝土面层时，当面层铺装厚度小于150mm时，可采用振捣梁。'},
  {id:117, ch:1, type:'single', q:'三辊轴机组铺筑混凝土面层说法错误的是（）', opts:["三辊轴整平机分段整平的作业单元长度宜为", "振捣机振实与三辊轴整平工序之间的时间间隔不宜超过15min", "在一个作业单元长度内，应采用前进静滚、后退振动方式作业", "最佳滚压遍数应经过试验段确定"], ans:2, exp:'教材规定：三辊轴机组铺筑时，在一个作业单元长度内，应采用前进振动、后退静滚方式作业，而非"前进静滚、后退振动"（C错误）。A选项三辊轴整平机分段整平作业单元长度宜为20～30m。B选项振捣与整平时间间隔不宜超过15min。D选项最佳滚压遍数应经试验段确定。'},
  {id:118, ch:1, type:'single', q:'采用轨道摊铺机铺筑混凝土面层时，坍落度宜控制在（ ）。', opts:["10～20mm", "20～40mm", "30～50mm", "40～60mm"], ans:1, exp:'轨道摊铺机铺筑时，坍落度宜控制在20～40mm，并需根据不同坍落度调整松铺系数。'},
  {id:119, ch:1, type:'multi', q:'关于滑模摊铺机施工混凝土面层的技术要求，下列说法正确的有（ ）。', opts:["振动仓内料位高度一般应高出路面10cm", "混凝土坍落度小时，应采用高频振动、低速度摊铺", "胀缝支架的支撑点间距宜为40～60cm", "滑模摊铺机施工时无需设置基准线", "坍落度大时，应采用低频振动、高速度摊铺"], ans:[0, 1, 2, 4], exp:'教材规定：振动仓内料位高度一般应高出路面10cm（A正确）；坍落度小时应采用高频振动、低速度摊铺（B正确）；胀缝支架支撑点间距宜为40～60cm（C正确）；坍落度大时采用低频振动、高速度摊铺（E正确）。D错误：滑模摊铺需设置基准线控制高程和方向。'},
  {id:120, ch:1, type:'multi', q:'混凝土面层横向缩缝，说法正确的是（ ）', opts:["采用切缝机施工，宽度宜为3～5mm", "设传力杆时，切缝深度最低70mm", "不设传力杆时，切缝深度不应小于面层厚的1/3, 且不应小于70mm", "当混凝土达到设计强度的25%～30%时，方可切割", "切割用水冷却时，应防止切缝水渗入基层和土层"], ans:[1, 3, 4], exp:'此题考核混凝土面板接缝相关内容。横向缩缝采用切缝机施工，宜在水泥混凝土强度达到设计强度25%-30%时进行，宽度控制在4-6mm，切缝深度：设传力杆时，不应小于面层厚度的1/3，且不得小于70mm；不设传力杆时，不应小于面层厚度的1/4，且不应小于60mm。混凝土板养护期满后应及时灌缝。'},
  {id:121, ch:1, type:'multi', q:'混凝土面层纵缝施工缝有（）', opts:["平缝", "企口缝", "斜接缝", "阶梯型接缝", "V型接缝"], ans:[0, 1], exp:'教材规定：混凝土面层纵向施工缝可分为平缝（设拉杆）和企口缝（设拉杆）两种形式。C选项"斜接缝"、D选项"阶梯型接缝"是沥青路面横向接缝的接缝形式。V型缝非规范接缝形式。'},
  {id:122, ch:1, type:'multi', q:'关于混凝土填缝说法正确的有（）', opts:["混凝土板养护前，缝槽应及时填缝", "灌填缝料前，清除缝内砂石、凝结泥浆、杂物等", "常温施工宜略低于板面，冬期施工与路面平", "填缝料应与混凝土缝壁粘附紧密，不渗水", "面层混凝土弯拉强度达到设计强度，开放交通"], ans:[1, 3], exp:'混凝土板养护期满后，缝槽应及时填缝'},
  {id:123, ch:1, type:'single', q:'关于混凝土面板养护说法错误的有（）', opts:["可采取喷洒养护剂或保湿覆盖等方式", "不宜使用围水养护", "养护时间应根据混凝土弯拉强度增长情况而定，不宜小于设计弯拉强度的75%,一般宜为14～21d", "应特别注重前7d的保湿(温)养护"], ans:2, exp:'教材规定：养护时间应根据混凝土弯拉强度增长情况而定，不宜小于设计弯拉强度的80%，一般宜为14～21d。C选项"75%"错误，应为80%。A选项喷洒养护剂或保湿覆盖正确，B选项不宜使用围水养护正确，D选项注重前7d保湿养护正确。'},
  {id:124, ch:1, type:'multi', q:'设置水泥混凝土路面的胀缝很重要，它应满足（  ）等要求。', opts:["应与路面中心线垂直", "缝宽必须一致", "缝中不得连浆", "缝壁必须垂直", "缝内灌满填缝料"], ans:[0, 1, 2, 3], exp:'此题考核混凝土面板接缝相关内容。普通混凝土路面的胀缝应设置胀缝补强钢筋支架、胀缝板和传力杆。胀缝应与路面中心线垂直；缝壁必须垂直；缝宽必须一致，缝中不得连浆。缝上部灌填缝料，下部安装胀缝板和传力杆。'},
  {id:125, ch:1, type:'single', q:'关于砌筑砂浆的要求，下列说法错误的是（ ）。', opts:["应采用干硬性水泥砂浆", "虚铺系数应经试验确定", "砂浆应采用中砂配制", "可用在料石下填塞砂浆找平"], ans:3, exp:'不得用在料石下填塞砂浆或支垫方法找平，因此D选项是错误的做法。'},
  {id:126, ch:1, type:'single', q:'铺砌控制基线的设置距离，在直线段宜为（ ）。', opts:["3～5m", "5～10m", "10～15m", "15～20m"], ans:1, exp:'直线段宜为5～10m，因此B选项正确。'},
  {id:127, ch:1, type:'multi', q:'关于铺砌面层的施工，下列说法正确的有（ ）。', opts:["铺砌面层胀缝应与基层胀缝对齐", "伸缩缝材料应安放平直并与料石粘贴牢固", "铺砌完成后可立即开放交通", "与检查井相接时应平整美观，不得反坡", "铺砌完成后应及时灌缝"], ans:[0, 1, 3, 4], exp:'C错误：必须封闭交通养护至设计强度。'},
  {id:128, ch:1, type:'multi', q:'方砖步道施工要点，错误的是（）', opts:["人行道铺设应以面层顶面为基准", "按照设计横坡和宽度铺设", "人行道施工应与斜坡、踏步、挡土墙等施工结合进行", "曲线段道板砖铺砌，必须采用扇形铺砌法", "行进盲道与提示盲道交替铺设"], ans:[0, 3, 4], exp:'(1)人行道铺设应以侧石顶面为基准，按照设计横坡和宽度铺设。 (2)人行道施工应与斜坡、踏步、挡土墙等施工结合进行。 (3)曲线段道板砖铺砌，可采用直铺法和扇形铺砌法。 行进盲道与提示盲道不得混用。'},
  {id:129, ch:1, type:'single', q:'关于路缘石安装控制桩的设置要求，下列说法正确的是（ ）。', opts:["直线段桩距宜为5～10m", "曲线段桩距宜为10～15m", "路口处桩距宜为1～5m", "所有区段桩距均应为10～15m"], ans:2, exp:'路口处桩距宜为1～5m， 直线段应为10～15m， 曲线段应为5～10m，因此C选项正确。'},
  {id:130, ch:1, type:'single', q:'路缘石施工要点，错误的是（）', opts:["路缘石基础宜与相应的路基同步施工", "安装路缘石的控制桩，直线段桩距宜为10～15m； 曲线段桩距宜为5～10m；路口处桩距宜为1～5m", "平石宜从雨水口两侧开始铺设，不得在雨水口位置进行收口", "路口人行道位置应设置缘石坡道，且与周边道路齐平。"], ans:0, exp:'路缘石基础宜与相应的基层同步施工'},
  {id:131, ch:1, type:'single', q:'路缘石砌筑完成后，常温期养护时间不应少于（ ）。', opts:["1d", "2d", "3d", "5d"], ans:2, exp:'常温期养护不应少于3d，因此C选项正确。'},
  {id:132, ch:1, type:'multi', q:'关于路缘石施工的技术要求，说法正确的有（ ）。', opts:["路缘石基础应与基层同步施工", "平石应从雨水口中间位置开始铺设", "侧石与平石应错缝铺设", "缘石坡道应与周边道路齐平", "可采用M5水泥砂浆灌缝"], ans:[0, 2, 3], exp:'B错误：应从雨水口两侧开始铺设； E错误：应采用M10水泥砂浆灌缝。'},
  {id:133, ch:1, type:'single', q:'关于不同道路雨水口箅盖选用的说法，正确的是（ ）。', opts:["城市主干道上的雨水口，必须使用承载能力不低于C级400kN的球墨铸铁箅盖", "居住小区内部街巷的雨水口，可使用承载能力为C级250kN的钢纤维混凝土箅盖", "快速路辅路的雨水口，为节约成本，可采用承载能力250kN的钢纤维混凝土箅盖", "所有机动车道下的雨水口，其箅盖最低承载能力要求均为C级（250kN）"], ans:1, exp:'(1)雨水口用料要求：①快速路、主次干道、支路上的雨水口应使用承载能力D级400kN及以上等级铸铁水算盖，街巷雨水口可使用承载能力C级250kN及以上等级钢纤维混凝土水算盖。② 机动车道及非机动车道雨水口宜采用现浇混凝土雨水口、预制成品雨水口。其他部位可采用砖砌式雨水口。 补充解释： D级400kN：等级：D级。试验荷载：400千牛（约40吨）。 应用场景：用于快速路、主次干道、支路。这些道路通行的大型、重型车辆多，车流量大，车速较快，对井盖的冲击和压力非常大，因此要求最高的D级承载能力。 材料要求：必须使用铸铁井盖。铸铁（尤其是球墨铸铁）具有强度高、韧性好、耐冲击、寿命长的特点，能满足严苛的工况。 C级250kN：等级：C级。试验荷载：250千牛（约25吨）。 应用场景：允许用于街巷（如胡同、里弄、小区内部道路）。这些地方主要通行小型车辆（轿车、SUV），偶尔有轻型货车，车流量和车速相对较低，荷载要求也相应降低。 材料要求：可以使用钢纤维混凝土井盖。这种材料通过加入钢纤维增强了混凝土的抗拉、抗裂和抗冲击性能，成本通常低于铸铁，在荷载要求不极端的情况下是一种经济耐用的选择。'},
  {id:134, ch:1, type:'multi', q:'道路雨水口施工中，其结构与材料的选择正确的是（ ）。', opts:["为提升施工效率，在城市主干道的机动车道上采用了预制成品混凝土雨水口", "在一条设计时速60km/h的城市主干道上，选用承载等级为D400的铸铁雨水箅盖", "在一条禁止机动车通行的街巷内，为节省投资，采用了砖砌式雨水口", "在非机动车道上，选用承载等级C250的钢纤维混凝土雨水箅盖", "考虑到重型车辆可能借道通行，将支路上的雨水口箅盖全部提高标准，采用E600级铸铁箅盖"], ans:[0, 1, 2, 3], exp:'教材规定：城市主干道机动车道可采用预制成品混凝土雨水口（A正确）；快速路、主次干道应使用D级400kN及以上铸铁箅盖（B正确）；街巷可采用砖砌式雨水口（C正确）；非机动车道可使用C级250kN钢纤维混凝土箅盖（D正确）。E选项E600级为过高的标准，支路采用D400级即可，无需提高至E600。'},
  {id:135, ch:1, type:'multi', q:'重力式砌体挡土墙特点，正确的是（ ）。', opts:["依靠墙体自重抵挡土压力作用", "一般用浆砌片(块)石砌筑，外观有天然之美", "形式简单，就地取材，施工方便，造价大", "人工耗用量大，工效低，工期长", "挡土墙高度不受限"], ans:[0, 1, 3], exp:'①依靠墙体自重抵挡土压力作用。 ②一般用浆砌片(块)石砌筑，外观有天然之美。 ③形式简单，就地取材，施工方便，造价低。 ④人工耗用量大，工效低，工期长，挡土墙高度受限。'},
  {id:136, ch:1, type:'single', q:'关于衡重式挡土墙说法正确的是（  ）。', opts:["依靠墙体自重抵挡土压力的作用", "钢筋用量大，造价高", "仅利用衡重台上填土的下压作用增加墙体稳定", "全墙重心的后移可以增加墙体稳定"], ans:3, exp:'教材规定：衡重式挡土墙利用衡重台上填土的下压作用和全墙重心的后移增加墙体稳定（D正确）。A选项依靠墙体自重描述的是重力式挡土墙。B选项钢筋用量大、造价高描述的是悬臂式和扶壁式挡土墙。C选项"仅利用"表述不全面。'},
  {id:137, ch:1, type:'multi', q:'钢筋混凝土悬臂式挡土墙由（  ）组成。', opts:["立壁", "墙面板", "墙趾板", "扶壁", "墙踵板"], ans:[0, 2, 4], exp:'教材规定：钢筋混凝土悬臂式挡土墙由立壁、墙趾板和墙踵板三个部分组成。B选项"墙面板"和D选项"扶壁"是扶壁式挡土墙的组成部分，悬臂式挡墙无扶壁结构。'},
  {id:138, ch:1, type:'single', q:'三种土压力中，土压力最小（  ）。', opts:["主动土压力", "被动土压力", "静止土压力", "刚性土压力"], ans:0, exp:'教材规定：三种土压力中，主动土压力最小，静止土压力居中，被动土压力最大。墙体背离土体位移时土压力减小至主动土压力，墙体推挤土体时增大至被动土压力。D选项"刚性土压力"不是标准分类。'},
  {id:139, ch:1, type:'single', q:'挡墙墙身模板拆除时，混凝土抗压强度应不小于（ ）。', opts:["1.5MPa", "2.0MPa", "2.5MPa", "3.0MPa"], ans:2, exp:'当墙身混凝土抗压强度≥2.5MPa，可拆除墙身模板，因此C选项正确。'},
  {id:140, ch:1, type:'multi', q:'关于挡墙混凝土浇筑施工的技术要求，下列说法正确的有（ ）。', opts:["应水平分层浇筑", "分层厚度不应超过300mm", "混凝土必须通过溜槽送入模内", "模板拆除后应及时养护", "混凝土抗压强度达到1.5MPa时可拆除模板"], ans:[0, 1, 3], exp:'C错误：混凝土要通过导管送入模内； E错误：拆除模板要求强度≥2.5MPa，而非1.5MPa。'},
  {id:141, ch:1, type:'single', q:'电压110KV，挖掘机、起重机(含吊物、载物)等机械与电力架空线路的最小安全距离（  ）', opts:["沿垂直方向3.0m", "沿垂直方向4.0m", "沿垂直方向5.0m", "沿垂直方向6.0m"], ans:2, exp:'教材规定：电压110KV时，挖掘机、起重机等机械与电力架空线路的最小安全距离沿垂直方向为5.0m（C正确）。沿垂直方向3.0m对应1kV以下，4.0m对应1～10kV，6.0m对应220kV。'},
  {id:142, ch:1, type:'single', q:'路基工程质量控制指标，说法错误的是（）。', opts:["土方路基压实度和弯沉值应100%合格", "纵断面高程、中线偏位、平整度、宽度、横坡及路堤边坡为一般项目", "填石路基沉降差不应小于试验路段确定的沉降差", "挖石路基上边坡必须稳定、严禁有松石、险石"], ans:2, exp:'沉降差不应大于试验路段确定的沉降差'},
  {id:143, ch:1, type:'single', q:'沥青混凝土面层（  ）是主控项目。', opts:["平整度、厚度和弯沉值", "压实度、平整度和面层厚度", "压实度、平整度和弯沉值", "压实度、面层厚度和弯沉值"], ans:3, exp:'教材规定：沥青混凝土面层主控项目包括压实度、面层厚度和弯沉值。平整度属于一般项目而非主控项目。A、B、C选项均包含平整度，只有D选项正确列出了压实度、厚度和弯沉值三个主控项目。'},
  {id:144, ch:1, type:'multi', q:'级配砾石(砂砾)基层，主控项目有（）。', opts:["集料质量及级配", "压实度", "弯沉", "厚度", "7d无侧限抗压强度"], ans:[0, 1, 2], exp:'教材规定：级配砾石(砂砾)基层主控项目包括集料质量及级配（A）、压实度（B）和弯沉值（C）。D选项"厚度"和E选项"7d无侧限抗压强度"不属于级配砾石基层的主控项目，7d无侧限抗压强度是半刚性基层（如水泥稳定碎石）的检验项目。'},
  {id:145, ch:1, type:'single', q:'城镇道路工程冬季施工，下列错误的是（）', opts:["应尽量将土方、土基施工项目安排在上冻前完成", "采用人工为主、机械为辅方式开挖冻土，挖到设计标高立即碾压成型", "城市快速路、主干路的路基不得用含有冻土块的土料填筑", "水泥稳定土(粒料)类基层，宜在进入冬期前15～30d停止施工"], ans:1, exp:'教材规定：土方开挖冻土时，应"采用机械为主、人工为辅"方式开挖，而非"人工为主、机械为辅"（B错误）。A选项土方施工安排在上冻前完成正确。C选项快速路主干路不得用含冻土块土料正确。D选项水泥稳定土类宜在进入冬期前15～30d停止施工正确。'},
  {id:146, ch:1, type:'multi', q:'水泥混凝土面层冬季施工，外加剂正确的是（）', opts:["防冻剂", "速凝剂", "早强剂", "缓凝剂", "减水剂"], ans:[0, 2], exp:'教材规定：水泥混凝土面层冬季施工可加防冻剂（A）和早强剂（C）。B选项"速凝剂"在冬施中不用，速凝剂主要用于喷射混凝土。D选项"缓凝剂"会延长凝结时间不利于低温环境。E选项"减水剂"虽然可减少用水量，但不是冬季施工特有的外加剂。'},
  {id:147, ch:1, type:'multi', q:'水泥混凝土面层冬季施工，下列正确的是（）', opts:["施工现场环境日平均气温连续3d稳定低于5℃,宜停止施工", "施工现场环境最低气温低于3℃时，宜停止施工", "可加防冻剂、早强剂", "搅拌时间适当延长", "混凝土板浇筑前，基层应无冰冻、不积冰雪，摊铺混凝土时气温不低于5℃"], ans:[2, 3, 4], exp:'(1)施工中应根据气温变化采取保温防冻措施。当施工现场环境日平均气温连续5d稳定低于5℃,或最低气温低于-3℃时，宜停止施工。'},
  {id:148, ch:1, type:'single', q:'雨期基层施工，下列正确的是（）', opts:["对稳定类材料，应坚持拌多少、铺多少、压多少、完成多少", "坚持当天挖完、压完，不留后患", "按2%～3%的横坡整平压实，以防积水", "有计划地组织快速施工，分段开挖，切忌全面开挖或挖段过长。"], ans:0, exp:'教材规定：雨期基层施工对稳定类材料，应坚持拌多少、铺多少、压多少、完成多少（A正确）。B选项"挖完、压完"是对土路基的要求。C选项"2%～3%横坡"是土路基的要求。D选项"分段开挖"是雨期路基施工的要求。各选项描述不同施工对象，本题专指"基层"施工。'},
  {id:149, ch:1, type:'single', q:'关于高温期水泥混凝土路面施工的说法，正确的是（ ）。', opts:["高温期施工应尽量安排在中午气温最高时段进行，以保证养护温度", "洒水养护时，养护水温与混凝土表面温差可控制在20℃以内", "高温期混凝土切缝时机应比常温施工适度提前", "为加快施工进度，高温期可适当延长运输和操作时间"], ans:2, exp:'教材规定：高温期施工应避开中午高温时段（A错误）；洒水养护时水温与表面温差不宜超过15℃，而非20℃（B错误）；热期混凝土水分蒸发快，切缝时机应比常温适度提前（C正确）；应缩短运输和操作时间（D错误）。'},
  {id:201, ch:2, type:'single', q:'关于桥梁基本组成的说法，错误的是（ ）', opts:["上部结构是跨越障碍的主要承载结构", "桥台仅用于支承桥跨结构端部", "承台是联结桩顶的钢筋混凝土平台", "墩台基础将荷载传至地基"], ans:1, exp:'桥台除支承桥跨结构端部外，还需与路堤相接并防止路堤滑塌，故B选项错误。'},
  {id:202, ch:2, type:'multi', q:'桥梁下部结构包括（ ）', opts:["桥跨结构", "桥墩", "桥台", "支座系统", "墩台基础"], ans:[1, 2, 4], exp:'A选项属于上部结构，D选项属于支座系统。'},
  {id:203, ch:2, type:'single', q:'桥梁的下部结构作用是（  ）。', opts:["传递上部结构荷载", "支承桥跨结构的结构物", "保证桥梁的整体稳定性", "减少桥梁的沉降"], ans:1, exp:'教材规定：桥梁下部结构包括桥墩、桥台和墩台基础，其作用是支承桥跨结构的结构物（B正确），并将上部结构荷载传递给地基。A选项"传递上部结构荷载"是作用的一部分描述但不完整。C、D选项不是下部结构的主要作用定义。'},
  {id:204, ch:2, type:'multi', q:'桥梁附属设施包括（ ）', opts:["桥面铺装", "防水排水系统", "承台", "伸缩缝", "锥形护坡"], ans:[0, 1, 3, 4], exp:'C选项承台属于下部结构，不属于附属设施。'},
  {id:205, ch:2, type:'multi', q:'承台的作用包括（  ）。', opts:["承受由墩身传递的荷载", "分布由墩身传递的荷载", "联结各桩顶的钢筋混凝土平台", "防止路堤滑塌", "支承桥跨 结构的端部"], ans:[0, 1, 2], exp:'教材规定：承台是联结各桩顶的钢筋混凝土平台（C正确），承受并分布由墩身传递的荷载（A和B正确）。D选项"防止路堤滑塌"是桥台锥形护坡的作用。E选项"支承桥跨结构端部"是桥台和桥墩的作用。'},
  {id:206, ch:2, type:'multi', q:'以下属于附属设施的有（  ）。', opts:["桥面铺装", "排水防水系统", "栏杆", "伸缩缝", "桥台"], ans:[0, 1, 2, 3], exp:'教材规定：桥梁附属设施包括桥面铺装（A）、防水排水系统（B）、栏杆（C）、伸缩缝（D）、灯光照明等。E选项"桥台"属于桥梁下部结构，不属于附属设施范畴。'},
  {id:207, ch:2, type:'multi', q:'桥面铺装时，保证桥面行车舒适的关键因素有（  ）。', opts:["平整性", "抗滑性", "不翘曲", "不渗水", "耐磨性"], ans:[0, 2, 3, 4], exp:'教材规定：桥面铺装（或称行车道铺装）的平整性、耐磨性、不翘曲、不渗水是保证行车舒适的关键。A平整性、C不翘曲、D不渗水、E耐磨性四项均为教材明确列出的关键因素。B抗滑性属于保证行车安全的因素，不属于"行车舒适"的范畴。'},
  {id:208, ch:2, type:'single', q:'关于桥梁伸缩缝的说法，正确的是（ ）', opts:["仅设置在桥跨上部结构之间", "主要作用是增强桥梁整体性", "可保证结构在各种因素作用下的变位", "对行车舒适性没有影响"], ans:2, exp:'A选项错误，也设置在上部结构与桥台端墙之间； B选项错误，作用是允许变位而非增强整体性； D选项错误，直接影响行车舒适性。'},
  {id:209, ch:2, type:'single', q:'关于桥梁基本参数的说法，错误的是（ ）', opts:["净跨径是指相邻两个桥墩之间的净距", "计算跨径对于拱桥是指两拱脚截面形心点之间的水平距离", "桥梁高度是指桥面与设计洪水位之间的高差", "建筑高度是指轨顶标高至桥跨结构最下缘的距离"], ans:2, exp:'桥梁高度是指桥面与低水位之间的高差，或与桥下线路路面的距离，而非设计洪水位，故C选项错误。'},
  {id:210, ch:2, type:'multi', q:'关于拱桥参数的说法，正确的有（ ）', opts:["拱轴线是拱圈各截面形心点的连线", "净矢高是从拱顶截面下缘至拱脚连线最低点的垂直距离", "计算矢高是从拱顶截面形心至拱脚截面形心连线的垂直距离", "矢跨比是净矢高与净跨径之比", "矢跨比反映拱桥受力特性"], ans:[0, 1, 2, 4], exp:'D错误，矢跨比是计算矢高与计算跨径之比。'},
  {id:211, ch:2, type:'single', q:'拱式桥计算跨径的说法正确的是（  ）。', opts:["指两相邻拱脚截面最低点之间的水平距离", "指两相邻拱脚截面顶点之间的水平距离", "等于净跨径", "指两相邻拱脚截面形心点之间的水平距离"], ans:3, exp:'净跨径：对于拱式桥是每孔拱跨两个拱脚截面最低点之间的水平距离。'},
  {id:212, ch:2, type:'single', q:'关于涵洞的说法，正确的是（ ）', opts:["多孔跨径全长8m以上的称为涵洞", "单孔跨径5m以上的称为涵洞", "建造涵洞时路堤必须中断", "是用来宣泄路堤下水流的构造物"], ans:3, exp:'A、B错误，多孔不到8m和单孔不到5m；C选项错误，路堤不中断。'},
  {id:213, ch:2, type:'single', q:'桥面与桥下线路路面之间的距离为（  ）。', opts:["桥梁高度", "桥下净空高度", "建筑高度", "容许建筑高度"], ans:0, exp:'教材规定：桥梁高度是指桥面与低水位之间的高差，或为桥面与桥下线路路面之间的距离。B选项"桥下净空高度"是指桥下至设计洪水位或通航水位的高度。C选项"建筑高度"是指桥上行车路面标高至桥跨结构最下缘的距离。'},
  {id:214, ch:2, type:'single', q:'桥梁全长是指（  ）。', opts:["多孔桥梁中各孔净跨径的总和", "单孔拱桥两拱脚截面形心点之间的水平距离", "桥梁两端两个桥台的侧墙或八字墙后端点之间的距离", "单跨桥梁两个桥台之间的净距"], ans:2, exp:'桥梁全长：是桥梁两端两个桥台的侧墙或八字墙后端点之间的距离，简称桥长。'},
  {id:215, ch:2, type:'single', q:'总跨径反映（  ）的能力。', opts:["桥下宣泄洪水", "提高承载力", "减少沉降", "跨越障碍"], ans:0, exp:'总跨径：多孔桥梁中各孔净跨径的总和，也称桥梁孔径，反映桥下宣泄洪水的能力。'},
  {id:216, ch:2, type:'single', q:'从拱顶截面下缘至相邻两拱脚截面下缘最低点之连线的垂直距离为（  ）。', opts:["拱轴线", "净矢高", "计算矢高", "矢跨比"], ans:1, exp:'教材规定：净矢高是从拱顶截面下缘至相邻两拱脚截面下缘最低点之连线的垂直距离。A选项"拱轴线"是拱圈各截面形心点的连线。C选项"计算矢高"是从拱顶截面形心至拱脚截面形心连线的垂直距离。D选项"矢跨比"是计算矢高与计算跨径之比。'},
  {id:217, ch:2, type:'single', q:'跨越公路、铁路和城市道路等交通线路的桥梁为（  ）。', opts:["跨河桥", "跨线桥", "高架桥", "立交桥"], ans:1, exp:'教材规定：跨越公路、铁路和城市道路等交通线路的桥梁为跨线桥（又称立交桥）。A选项"跨河桥"是跨越江河水流障碍的桥梁。C选项"高架桥"是代替高路堤的桥梁。D选项"立交桥"范围更广，跨线桥属于立交桥的一种。'},
  {id:218, ch:2, type:'single', q:'关于城市桥梁类型的说法，错误的是（ ）', opts:["跨线桥是跨越公路、铁路等交通线路的桥梁", "高架桥主要用于跨越江河水流障碍", "互通立交桥可使车辆免受红绿灯管制", "人行天桥可避免车流和人流平面相交"], ans:1, exp:'高架桥是代替高路堤的桥梁，主要用于城市道路建设，跨越江河水流障碍的是跨河桥，故B选项错误。'},
  {id:219, ch:2, type:'multi', q:'关于城市桥梁功能的说法，正确的有（ ）', opts:["跨河桥主要解决跨越水流障碍问题", "高架桥可降低车流密度，提高运输效率", "互通立交桥可实现多方向行驶互不干扰", "人行天桥允许行人和非机动车通行", "廊桥仅具有交通功能，不提供休憩场所"], ans:[0, 1, 2], exp:'D选项错误，人行天桥只允许行人通过； E选项错误，廊桥具有休憩等功能。'},
  {id:220, ch:2, type:'single', q:'关于廊桥的说法，正确的是（ ）', opts:["是一种没有屋檐的简易桥梁", "主要功能是提高车辆通行效率", "可提供遮阳避雨和休憩场所", "仅用于跨越交通线路"], ans:2, exp:'A选项错误，廊桥有屋檐； B选项错误，主要功能不是提高车行效率； D选项错误，廊桥不用于跨越交通线路。'},
  {id:221, ch:2, type:'single', q:'关于简支梁桥的特点，下列说法错误的是（ ）', opts:["各孔独立工作，不受墩台变位影响", "随着跨径增大，主梁内力将急剧减小", "可采用自行式架桥机一次架设主梁", "大跨径桥一般不用简支梁"], ans:1, exp:'简支梁桥随着跨径增大，主梁内力将急剧增大，故B选项错误。'},
  {id:222, ch:2, type:'single', q:'（ ）在竖向荷载作用下，梁部主要受弯，柱脚处具有水平反力', opts:["梁式", "拱式桥", "刚架桥", "悬索桥"], ans:2, exp:'教材规定：刚架桥在竖向荷载作用下，梁部主要受弯，而柱脚处具有水平反力（即推力），其受力状态介于梁桥和拱桥之间。梁式桥柱脚无反力，拱式桥以受压为主，悬索桥以受拉为主。'},
  {id:223, ch:2, type:'multi', q:'关于连续梁桥的特点，正确的有（ ）', opts:["主梁连续支承在多个桥墩上", "弯矩绝对值较同跨径简支梁小", "通常3-5孔做成一联", "施工时可采用悬臂浇筑法", "行车舒适性较简支梁差"], ans:[0, 1, 2, 3], exp:'E选项错误，连续梁桥行车舒适性优于简支梁。'},
  {id:224, ch:2, type:'single', q:'关于拱式桥的受力特点，下列说法正确的是（ ）', opts:["主要承重结构以受拉为主", "水平推力会增大拱肋内的弯矩", "桥墩或桥台不承受水平推力", "通常采用抗压能力强的材料建造"], ans:3, exp:'A选项错误，拱桥以受压为主；B选项错误，水平推力会抵消弯矩；C选项错误，桥墩台承受水平推力。'},
  {id:225, ch:2, type:'multi', q:'桥梁工程上的受力构件，基本受力方式包括（ ）', opts:["拉", "屈", "折", "压", "弯"], ans:[0, 3, 4], exp:'教材规定：桥梁工程中受力构件的基本受力方式包括拉、压、弯三种。B选项"屈"（屈曲）是结构失稳现象而非基本受力方式，C选项"折"非受力方式术语。受拉（如悬索）、受压（如拱圈）、受弯（如梁）是三种基本受力形态。'},
  {id:226, ch:2, type:'single', q:'下列属于组合体系桥的是（ ）。', opts:["梁式桥", "斜拉桥", "刚架桥", "悬索桥"], ans:1, exp:'教材规定：组合体系桥由不同体系组合而成，斜拉桥属于组合体系桥（梁与索的组合）。梁式桥、刚架桥、悬索桥均为单一体系桥。斜拉桥由梁、索和塔三种基本构件组成，属于组合体系。'},
  {id:227, ch:2, type:'multi', q:'下列关于连续梁桥说法正确的是（ ）', opts:["主梁在不同截面上都呈现正弯矩", "弯矩的绝对值均较同跨径桥的简支梁小", "通常是将1～3孔做成一联", "一联内没有桥面接缝", "可以先将主梁逐孔架设成简支梁"], ans:[1, 3, 4], exp:'教材规定：连续梁桥弯矩的绝对值均较同跨径的简支梁小（B正确）；一联内没有桥面接缝（D正确）；可以先将主梁逐孔架设成简支梁再进行体系转换（E正确）。A错误：主梁在支座处呈现负弯矩。C错误：通常将3～5孔做成一联，而非1～3孔。'},
  {id:228, ch:2, type:'multi', q:'关于悬索桥的特点，正确的有（ ）', opts:["结构自重较轻", "能以较小建筑高度修建大跨度桥", "在风荷载作用下变形较小", "构造简单，受力明确", "刚度较大，振动较小"], ans:[0, 1, 3], exp:'C、E选项错误，悬索桥刚度差，在荷载作用下有较大变形和振动。'},
  {id:229, ch:2, type:'multi', q:'下列关于悬索桥说法正确的是（ ）', opts:["以索塔为主要承重结构", "结构自重较重，构造简单", "能以较小的建筑高度经济合理地修建大跨度桥", "刚度差", "车辆动荷载和风荷载作用下有较大的变形和振动"], ans:[2, 3, 4], exp:'悬索桥以悬索为主要承重结构'},
  {id:230, ch:2, type:'single', q:'按照跨径长度划分，单孔跨径40m的桥为（）。', opts:["特大桥", "大桥", "中桥", "小桥"], ans:1, exp:'教材规定：按跨径分类标准，单孔跨径在20m以上至40m（含40m）为中桥，40m以上至100m为大桥。40m恰好是大桥的起始值，属于大桥范围。特大桥为单孔跨径＞150m或多孔跨径全长＞1000m，小桥为单孔跨径≤20m或全长≤100m。'},
  {id:231, ch:2, type:'single', q:'计算桥梁墩台侧模刚度时采用的载荷有（  ）', opts:["新浇筑钢筋混凝土自重", "振捣混凝土时的荷载", "新浇筑混凝土对侧模的压力", "施工机具荷载"], ans:2, exp:'教材规定：计算桥梁墩台侧模刚度时采用的载荷为新浇筑混凝土对侧模的压力。A选项"新浇筑钢筋混凝土自重"用于底模计算，B选项"振捣混凝土时的荷载"用于强度验算而非刚度验算，D选项"施工机具荷载"也非侧模刚度控制荷载。'},
  {id:232, ch:2, type:'multi', q:'设于水中的支架所承受的力包括（ ）。', opts:["水流压力", "波浪力", "流冰压力", "船只及其他漂浮物的撞击力", "结构竖向压力"], ans:[0, 1, 2, 3], exp:'教材规定：设于水中的支架所承受的力包括水流压力、波浪力、流冰压力以及船只及其他漂浮物的撞击力。E选项"结构竖向压力"是任何支架都需承受的荷载，并非水中支架特有的力。本题特指设于水中的支架所承受的附加力。'},
  {id:233, ch:2, type:'single', q:'关于模板、支架和拱架刚度验算要求的说法，正确的是（ ）', opts:["结构表面外露模板的挠度限值为跨度的1/250", "拱架弹性挠度限值为相应跨度的1/400", "钢模板面板变形值限值为3mm", "钢楞变形值仅需满足L/400的要求"], ans:1, exp:'验算模板、支架和拱架的刚度时，其变形值不得超过下列要求： ① 结构表面外露的模板挠度为模板构件跨度的1/400。 ② 结构表面隐蔽的模板挠度为模板构件跨度的1/250。 ③ 拱架和支架受载后挠曲的杆件，其弹性挠度为相应结构跨度的1/400。 ④ 钢模板的面板变形值为1.5mm。 ⑤ 钢模板的钢楞、柱箍变形值为L/500及B/500 (L：计算跨度，B：柱宽度)'},
  {id:234, ch:2, type:'multi', q:'关于支架下列说法正确的是（  ）。', opts:["钢管满堂支架搭设完毕后，安装模版", "预压荷载应不小于最大施工荷载", "预压加载可按最大施工荷载的60%、80%、100%分三次加载", "门式钢管支架可用于搭设满堂承重支架体系", "每级加载完毕6h后进行支架的变形观测"], ans:[1, 2], exp:'预压加载可按最大施工荷载的60%、80%、100%分三次加载，加载时应对称、分层进行，禁止集中加载、卸 载，每级加载完毕1h后进行支架的变形观测，加载完毕后宜每6h测量一次变形值。预压卸载时间以支架地基沉降变形稳定为原则确定，最后两次沉落量观测平均值之差不大于2mm时，即可终止预压卸载。'},
  {id:235, ch:2, type:'single', q:'混凝土砌块拱桥拱架的卸落说法错误的是（  ）。', opts:["砂浆强度应达到设计标准值的75%以上卸落拱架", "跨径8m的拱桥宜在拱上结构全部完成后卸落拱架", "中等跨径实腹式拱桥宜在护拱完成后卸落拱架", "大跨径空腹式拱桥宜在腹拱横墙完成后卸落拱架"], ans:0, exp:'① 浆砌石、混凝土砌块拱桥应在砂浆强度达到设计要求强度后卸落拱架，设计未规定时，砂浆强度应达到设计标准值的80%以上。 ② 跨径小于10的拱桥宜在拱上结构全部完成后卸落拱架；中等跨径实腹式拱桥 宜在护拱完成后卸落拱架；大跨径空腹式拱桥宜在腹拱横墙完成(未砌腹拱圈)后卸落拱架。 ③ 在裸拱状态卸落拱架时，应对主拱进行强度及稳定性验算并采取必要的稳定措施。'},
  {id:236, ch:2, type:'single', q:'关于模板、支架拆除原则的说法，错误的是（ ）', opts:["应遵循\"先支后拆、后支先拆\"的原则", "简支梁模板应从支座向跨中方向卸落", "悬臂梁模板宜从悬臂端开始卸落", "支架卸落量宜由小渐大"], ans:1, exp:'简支梁模板应从跨中向支座方向卸落，故B选项错误。'},
  {id:237, ch:2, type:'multi', q:'关于预应力混凝土结构模板拆除的要求，正确的有（ ）', opts:["侧模应在预应力张拉前拆除", "底模应在结构建立预应力后拆除", "侧模和底模应同时拆除", "模板拆除顺序应考虑预应力建立情况", "底模可在预应力张拉前拆除"], ans:[0, 1, 3], exp:'C选项错误，侧模和底模拆除时间不同；E选项错误，底模应在预应力建立后拆除。'},
  {id:238, ch:2, type:'multi', q:'模板、支架和拱架拆除下列说法正确的是（  ）。', opts:["“先支后拆、后支先拆” 的原则", "卸落量宜由大渐小", "横向应同时卸落、在纵向应对称均衡卸落", "悬臂梁结构的模板宜从固定端开始顺序卸落", "预应力混凝土结构的侧模应在预应力张拉后拆除"], ans:[0, 2], exp:'(3)模板、支架和拱架拆除应遵循“先支后拆、后支先拆”的原则。支架和拱架应按几个循环卸落，卸落量宜由小渐大。每一循环中，在横向应同时卸落、在纵向应对称均衡卸落。简支梁、连续梁结构的模板应从跨中向支座方向依次循环卸落；悬臂梁结构的模板宜从悬臂端开始顺序卸落。 (4)预应力混凝土结构的侧模应在预应力张拉前拆除；底模应在结构建立预应力后拆除。'},
  {id:239, ch:2, type:'single', q:'关于模板安装的说法，正确的是（ ）。', opts:["模板应与脚手架牢固连接，以增强整体稳定性", "梁、板底模板应按设计要求设置预拱度", "侧模板安装时无需设置防倾覆设施", "预埋件安装可待混凝土浇筑时临时插入"], ans:1, exp:'教材规定：梁、板底模板应按设计要求设置预拱度（B正确）。A错误：模板不得与脚手架连接。C错误：侧模板应设置防倾覆设施。D错误：预埋件应按设计位置准确安装，不得临时插入。'},
  {id:240, ch:2, type:'single', q:'关于钢筋按所起作用分类的说法，正确的是（ ）。', opts:["受力筋只能承受拉力，不能承受压力", "分布筋的主要作用是承受构件中的剪力", "架立筋与梁内受力筋一起构成钢筋骨架", "箍筋仅用于固定纵向钢筋位置，不承受剪力"], ans:2, exp:'(1)受力筋： 一般承受构件中的拉力，称为受拉钢筋。在梁、柱构件中有时还需 要配置承受压力的钢筋，称为受压钢筋。 (2)分布筋：它与板内的受力筋一起构成钢筋的骨架。 (3)架立筋：它与梁内的受力筋一起构成钢筋的骨架。 (4)构造筋：因构件的构造要求和施工安装需要配置的钢筋。架立筋和分布筋也属于构造筋。 (5)箍筋：是构件中承受剪力或扭力的钢筋，同时用来固定纵向钢筋的位置， 一 般用于梁或柱中。'},
  {id:241, ch:2, type:'single', q:'关于钢筋存放要求的说法，错误的是（ ）', opts:["不同规格钢筋应分别堆置并设立识别标志", "存放时间不宜超过12个月", "钢筋与地面之间垫高不低于200mm", "顶部应采用合适材料覆盖防水"], ans:1, exp:'规范要求钢筋存放时间不宜超过6个月，故B选项错误。'},
  {id:242, ch:2, type:'multi', q:'关于钢筋保管的技术要求，正确的有（ ）', opts:["应按品种、规格分批分别堆放", "存放场地应设防水排水设施", "可直接堆放在经压实的泥土地面上", "堆放时间超过6个月需重新检验", "应防止锈蚀、污染和变形"], ans:[0, 1, 3, 4], exp:'C选项错误，钢筋不得直接置于地面，应垫高或堆置在台座上。'},
  {id:243, ch:2, type:'multi', q:'钢筋进场抽取试件作（）检验', opts:["屈服强度", "抗压强度", "伸长率", "弯曲性能", "重量偏差"], ans:[0, 2, 3, 4], exp:'教材规定：钢筋进场抽取试件作屈服强度、伸长率、弯曲性能和重量偏差检验。B选项"抗压强度"是混凝土的检验指标而非钢筋指标。钢筋主要检验其拉伸力学性能和加工性能，包括屈服强度、伸长率、弯曲性能和重量偏差。'},
  {id:244, ch:2, type:'multi', q:'钢筋下料后应按（  ）分别挂牌标明。', opts:["品种", "种类", "规格", "使用部位", "等级"], ans:[1, 3], exp:'钢筋下料前，应核对钢筋品种、规格、等级及加工数量，并应根据设计要求和钢筋长度配料；下料后应按种类和使用部位分别挂牌标明。'},
  {id:245, ch:2, type:'single', q:'关于钢筋加工，下列说法错误的是（ ）。', opts:["优先选用机械方法调直，且不得使用卷扬机调直", "箍筋末端弯钩平直部分的长度，一般结构不宜小于箍筋直径的5倍", "钢筋宜从两端向中部开始弯制，弯钩应一次弯成", "箍筋弯钩的弯曲直径应大于被箍主钢筋的直径"], ans:2, exp:'教材规定：钢筋宜从中部向两端开始弯制，弯钩应一次弯成（而非"从两端向中部"，C错误）。A选项优先选用机械方法调直且不得使用卷扬机调直正确。B选项箍筋末端弯钩平直部分长度一般结构不宜小于箍筋直径5倍正确。D选项弯曲直径应大于被箍主筋直径正确。'},
  {id:246, ch:2, type:'multi', q:'关于钢筋连接，下列说法错误的是（ ）。', opts:["钢筋接头可采用闪光对焊接", "机械连接可采用套筒连接", "当普通混凝土中钢筋直径大于22mm, 在无焊接条件时，可采用绑扎连接", "钢筋骨架和钢筋网片的交叉点焊接宜采用埋弧压力焊或电弧焊", "钢筋与钢板的T形连接，宜采用电阻点焊"], ans:[0, 2, 3, 4], exp:'③ 当普通混凝土中钢筋直径等于或小于22mm, 在无焊接条件时，可采用绑扎连接，但受拉构件中的主钢筋不得采用绑扎连接。 ④ 钢筋骨架和钢筋网片的交叉点焊接宜采用电阻点焊。 ⑤ 钢筋与钢板的T 形连接，宜采用埋弧压力焊或电弧焊。'},
  {id:247, ch:2, type:'single', q:'关于钢筋接头设置要求的说法，错误的是（ ）', opts:["钢筋接头应设在受力较小区段", "接头末端至钢筋弯起点的距离不得小于钢筋直径的5倍", "施工中分不清受拉、受压的按受拉处理", "同一连接区段内接头面积百分率100%时应选用I级接头"], ans:1, exp:'规范要求接头末端至钢筋弯起点的距离不得小于钢筋直径的10倍，故B选项错误。 钢筋机械连接接头：在混凝土结构中要求充分发挥钢筋强度或对延性要求高的部位应选用Ⅱ级或I级接头；当在同一连接区段内钢筋接头面积百分率为100%时， 应选用I级接头。 I级接头：接头抗拉强度不小于被连接钢筋抗拉强度标准值的1.1倍 Ⅱ级接头：接头抗拉强度不小于被连接钢筋抗拉强度标准值 Ⅲ级接头：接头抗拉强度不小于被连接钢筋屈服强度标准值的1.25倍'},
  {id:248, ch:2, type:'multi', q:'直螺纹钢筋连接接头的技术要求，正确的有（ ）', opts:["钢筋端部应采用专用切断机切平", "钢筋丝头长度极限偏差应为0-2.0p", "止规旋入不得超过3p", "安装后单侧外露螺纹不宜超过2p", "现场抽检应每1000个接头为一个验收批"], ans:[0, 1, 2, 3], exp:'E选项错误，验收批应为500个接头。'},
  {id:249, ch:2, type:'single', q:'关于钢筋接头，下列说法错误的是（）', opts:["接头应设在受力较小区段，不宜位于构件的最大弯矩处", "接头末端至钢筋弯起点的距离不得小于钢筋直径的10倍", "直螺纹接头安装后用扭力扳手校核拧紧扭矩，校核用扭力扳手每年校核一次", "直螺纹接头现场抽检不包括极限抗拉强度试验"], ans:3, exp:'⑩ 直螺纹接头安装后用扭力扳手校核拧紧扭矩，校核用扭力扳手每年校核一次。 ⑪ 直螺纹接头现场抽检项目应包括极限抗拉强度试验、加工和安装质量检验。'},
  {id:250, ch:2, type:'multi', q:'关于钢筋现场绑扎，下列说法错误的是（）', opts:["钢筋的交叉点应采用绑丝绑牢，不需要辅以点焊", "梁和柱的箍筋，应与受力钢筋平行设置", "钢筋骨架的多层钢筋之间，应用短钢筋支垫", "钢筋绑扎时要考虑混凝土下料孔和振捣孔预留", "圆形柱所有竖向钢筋弯钩平面应朝向圆心"], ans:[0, 1], exp:'钢筋的交叉点应采用绑丝绑牢，必要时可辅以点焊；梁和柱的箍筋，应与受力钢筋垂直设置。'},
  {id:251, ch:2, type:'multi', q:'钢筋的混凝土保护层厚度，下列说法正确的是（）', opts:["后张构件预应力直线形钢筋不得小于其管道直径的1/2", "受拉区主筋的混凝土保护层厚度40mm，应在保护层内设置直径不小于6mm间距不大于100mm的钢筋网", "普通钢筋最小混凝土保护层厚度不小于钢筋公称直径", "预应力直线形钢筋的最小混凝土保护层厚度不小于钢筋公称直径", "钢筋机械连接件的最小保护层厚度不得小于20mm"], ans:[0, 2, 3, 4], exp:'教材规定：后张构件预应力直线形钢筋保护层厚度不得小于管道直径的1/2（A正确）；保护层厚度40mm时需设钢筋网（B正确）；普通钢筋最小保护层厚度不小于钢筋公称直径（C正确）；预应力直线形钢筋最小保护层厚度不小于公称直径（D正确）。E错误：机械连接件最小保护层厚度不得小于15mm而非20mm。'},
  {id:252, ch:2, type:'multi', q:'制作边长150mm立方体标准养护条件有（ ）', opts:["温度20℃", "温度16℃", "温度22℃", "相对湿度在95%以上", "相对湿度在90%以上"], ans:[0, 2, 3], exp:'温度(20±2)℃、相对湿度在95%以上'},
  {id:253, ch:2, type:'multi', q:'配制高强度混凝土的矿物掺合料可选用（ ）', opts:["优质粉煤灰", "磨细矿渣粉", "硅粉", "磨细天然沸石粉", "优质石灰"], ans:[0, 1, 2, 3], exp:'配制高强度混凝土的矿物掺合料可选用优质粉煤灰、磨细矿渣粉、硅粉和磨细天然沸石粉。'},
  {id:254, ch:2, type:'single', q:'关于混凝土外加剂的选用，下列说法错误的是（ ）', opts:["夏季施工宜选用缓凝剂延缓混凝土凝结时间", "冬季施工宜选用防冻剂保证混凝土强度发展", "泵送混凝土应选用减水剂改善工作性能", "喷射混凝土宜选用膨胀剂加速凝结硬化"], ans:3, exp:'喷射混凝土应选用速凝剂加速凝结，膨胀剂主要用于补偿收缩或产生预应力，故D选项错误。'},
  {id:255, ch:2, type:'multi', q:'混凝土配合比设计说法正确的是（ ）', opts:["混凝土配合比应采用质量比", "配制的混凝土拌合物应满足和易性", "预应力混凝土中的水泥用量不宜大于600kg/m³", "预应力混凝土中宜使用含氯化物的外加剂", "引入混凝土中的水溶性氯离子最大含量不宜超过胶凝材料用量的0.06%"], ans:[0, 1, 4], exp:'教材规定：混凝土配合比应采用质量比（A正确）；拌合物应满足和易性（B正确）；引入混凝土中水溶性氯离子最大含量不宜超过胶凝材料用量的0.06%（E正确）。C错误：预应力混凝土中水泥用量不宜大于550kg/m³而非600kg/m³。D错误：预应力混凝土中严禁使用含氯化物的外加剂。'},
  {id:256, ch:2, type:'multi', q:'下列关于混凝土施工说法正确的是（ ）', opts:["对骨料含水率的检测，每一工作班不应少于一次", "对骨料含水率的检测，雨期施工应减少测定次数", "混凝土拌合物应均匀，颜色一致，不得有离析和泌水现象", "坍落度仅在搅拌地点检测", "坍落度检测每一工作班或每一单元结构物不应少于一次"], ans:[0, 2], exp:'对骨料含水率的检测，每一工作班不应少于一次。雨期施工应增加测定次数 混凝土拌合物的坍落度应在搅拌地点和浇筑地点分别随机取样检测。每一工作班或每一单元结构物不应少于两次。'},
  {id:257, ch:2, type:'single', q:'混凝土运输、浇筑及间歇的全部时间不应超过混凝土的（  ）。', opts:["养护时间", "初凝时间", "振捣延续时间", "终凝时间"], ans:1, exp:'混凝土运输、浇筑及间歇的全部时间不应超过混凝土的初凝时间。同一施工段的混凝土应连续浇筑，并应在底层混凝土初凝之前将上一层混凝土浇筑完毕。'},
  {id:258, ch:2, type:'single', q:'下列关于混凝土浇筑正确的有（  ）', opts:["自高处向模板内倾卸混凝土时，其自由倾落高度不得超过3m", "当倾落高度达3m时，应通过串筒、溜槽或振动溜管等设施下落", "倾落高度5m时应设置减速装置", "上下层同时浇筑时，上层与下层前后浇筑距离应保持1m以上"], ans:1, exp:'③ 自高处向模板内倾卸混凝土时，其自由倾落高度不得超过2m； 当倾落高度超过2m时，应通过串筒、溜槽或振动溜管等设施下落； 倾落高度超过10m时应设置减速装置。 ④ 混凝土应按一定厚度、顺序和方向水平分层浇筑，上层混凝土应在下层混凝土初凝前浇筑、捣实，上下层同时浇筑时，上层与下层前后浇筑距离应保持1.5m以上。'},
  {id:259, ch:2, type:'multi', q:'混凝土振捣，需达到的标准有（  ）', opts:["混凝土不再沉落", "混凝土不出现气泡", "混凝土表面不呈现浮浆", "混凝土不分层", "混凝土不离析"], ans:[0, 1], exp:'教材规定：混凝土振捣需达到的标准：混凝土不再沉落、不出现气泡。C选项"表面不呈现浮浆"——适度浮浆属正常现象，完全不浮浆反而说明振捣不足；D选项"不分层"和E选项"不离析"是混凝土质量的基本要求，但非振捣达到的直接标准。'},
  {id:260, ch:2, type:'multi', q:'下列属于桥梁工程混凝土养护方式有（）', opts:["浇水", "覆盖保湿", "喷涂养护剂", "冬季蓄热", "自然降温"], ans:[0, 1, 2, 3], exp:'教材规定：桥梁工程混凝土养护方式包括浇水、覆盖保湿、喷涂养护剂和冬季蓄热养护等。E选项"自然降温"不是养护方式，养护的核心是保持适宜温湿度促进强度发展，自然降温与此无关。冬季施工时应采取蓄热养护而非自然降温。'},
  {id:261, ch:2, type:'single', q:'下列（ ）不属于混凝土制品厂生产养护方式', opts:["蒸汽养护", "湿热养护", "潮湿自然养护", "蓄热养护"], ans:3, exp:'混凝土施工可采用浇水、覆盖保湿、喷涂养护剂、冬季蓄热养护等方法进行养护； 混凝土构件或制品厂生产可采用蒸汽养护、湿热养护或潮湿自然养护等方法进行养护。选择的养护方法应满足施工养护方案或生产养护制度的要求。'},
  {id:262, ch:2, type:'single', q:'混凝土拌合物坍落度的检测，每一工作班或每一单元结构物不应少于（  ）次。', opts:["1", "2", "3", "4"], ans:1, exp:'教材规定：混凝土拌合物坍落度的检测，每一工作班或每一单元结构物不应少于2次。1次不足以保证质量，3次和4次不是规范规定的最少次数。还应在搅拌地点和浇筑地点分别随机取样检测。'},
  {id:263, ch:2, type:'single', q:'关于混凝土强度检验评定的说法，错误的是（ ）', opts:["抗压强度应采用150mm立方体标准试件测定", "标准差已知统计法适用于生产条件稳定的情况", "非统计法适用于试件组数不足10组的情况", "标准差未知统计法适用于试件组数不少于3组的情况"], ans:3, exp:'标准差未知统计法适用于试件组数不少于10组的情况，故D选项错误。'},
  {id:264, ch:2, type:'single', q:'关于混凝土试件取样频率的说法，正确的是（ ）', opts:["每50盘同配合比混凝土应至少取样一次", "当一次连续浇筑的同配合比混凝土超过1000m³，", "工作班拌制不足100盘时可不取样", "C60以上混凝土宜留不少于10组试件"], ans:3, exp:'A选项错误，应为每100盘；B选项错误，超过1000m³时每200m³取样；C选项错误，不足100盘也应取样。'},
  {id:265, ch:2, type:'multi', q:'关于后张法预应力的施工要点，正确的有（ ）', opts:["先安装套管和构造钢筋再浇筑混凝土", "张拉时混凝土必须达到设计强度", "预应力筋与套管间空隙必须灌浆", "无粘结预应力筋需涂刷防锈材料", "适用于预制构件"], ans:[0, 1, 2, 3], exp:'A选项描述施工顺序；B选项强调强度要求；C选项是灌浆要求；D选项是无粘结工艺要点。E选项是适用结构类型现浇连续箱梁和盖梁。'},
  {id:266, ch:2, type:'single', q:'预应力筋张拉前应根据设计要求对孔道的（  ）进行实测。', opts:["摩阻损失", "直径", "摩阻力", "长度"], ans:0, exp:'张拉前应根据设计要求对孔道的摩阻损失进行实测，以便确定张拉控制应力，并确定预应力筋的理论伸长值。'},
  {id:267, ch:2, type:'single', q:'钢绞线检查和验收每批重量不大于（ ）t。', opts:["30", "50", "60", "100"], ans:3, exp:'教材规定：钢绞线检查和验收每批重量不大于60t。30t和50t低于规范上限，100t超过规范最大限制。60t是规范明确规定的每批最大重量限额。'},
  {id:268, ch:2, type:'single', q:'在同种材料和同一生产工艺条件下，锚具、夹片应以不超过（  ）套为一个验收批。', opts:["500", "600", "800", "1000"], ans:3, exp:'验收应分批进行，批次划分时，同一种材料和同一生产工艺条件下生产的产品可列为同一批次。锚具、夹片应以不超过1000套为一个验收批。连接器的每个验收批不宜超过500套。'},
  {id:269, ch:2, type:'single', q:'关于预应力筋制作的说法，错误的是（ ）', opts:["下料长度计算应考虑张拉伸长值和弹性回缩值", "可采用电弧切割进行预应力筋下料", "HRB500级钢筋镦粗后应进行电热处理", "编束时应逐根梳理直顺不扭转"], ans:1, exp:'预应力筋不得采用电弧切割，故B选项错误。'},
  {id:270, ch:2, type:'multi', q:'关于预应力筋制作的技术要求，正确的有（ ）', opts:["下料长度计算应考虑锚具长度和千斤顶长度", "冷拉钢筋的镦粗应在冷拉前完成", "同束预应力筋应采用强度相等的钢材", "钢绞线束移运时支点距离不得大于5m", "可采用砂轮锯进行预应力筋切断"], ans:[0, 1, 2, 4], exp:'D选项错误，支点距离不得大于3m。'},
  {id:271, ch:2, type:'multi', q:'计算预应力筋下料长度应考虑的因素有（  ）', opts:["台座长度", "锚(夹)具长度", "千斤顶长度", "孔道长度", "螺旋筋长度"], ans:[0, 1, 2, 3], exp:'考虑孔道长度或台座长度、锚(夹)具长度、千斤顶长度、镦头预留量，冷拉伸长值、弹性回缩值、张拉伸长值和外露长度等因素。'},
  {id:272, ch:2, type:'multi', q:'锚具和连接器进场时，应进行的验收项目有（  ）。', opts:["外观检查", "硬度检验", "动载锚固试验", "静载锚固试验", "刚度检验"], ans:[0, 1, 3], exp:'教材规定：锚具和连接器进场时，应进行的验收项目包括外观检查、硬度检验和静载锚固试验。C选项"动载锚固试验"不是进场验收项目。E选项"刚度检验"对锚具而言非进场检验指标。静载锚固试验是验证锚具性能的核心试验。'},
  {id:273, ch:2, type:'single', q:'预应力构件施工属于先张法的工序是（  ）。', opts:["放张", "预留孔道", "孔道压浆", "封锚"], ans:0, exp:'教材规定：先张法施工工序是先张拉预应力筋后浇筑混凝土，待混凝土达到设计强度后放张。"预留孔道"和"孔道压浆"是后张法的工序，"封锚"是后张法完成后的工序。"放张"是先张法特有的工序。'},
  {id:274, ch:2, type:'single', q:'140吨无粘结预应力筋，检验批数量（）', opts:["1", "2", "3", "4"], ans:2, exp:'教材规定：无粘结预应力筋每批重量不大于60t为一个检验批。140吨预应力筋，每60t为一个检验批，140÷60≈2.33，向上取整为3个检验批。'},
  {id:275, ch:2, type:'single', q:'关于钢丝进场的检验要求，下列说法错误的有（  ）。', opts:["进场时，应对包装、标志进行检验", "分批检验，每批重量不大于100t", "逐盘进行形状、尺寸和表面检查", "检查合格的钢丝中抽取5%，但不少于3盘，进行力学性能试验"], ans:1, exp:'钢丝成批检查和验收，每批钢丝由同一牌号、同一规格、同一加工状态的钢丝组成，每批质量不大于60t。钢丝应逐盘进行形状、尺寸和表面检查。从检查合格的钢丝中抽取5%,但不少于3盘，进行力学性能试验及其他试验。在检查中，如有某一项检查结果不符合产品标准或合同的要求，则该盘不得交货。并从同一批未经试验的钢丝盘中取双倍数量的试样进行该不合格项目的复验(包括该项试验所要求的任一指标),复验结果即使只有一个试样不合格，也不得整批交货，但允许对该批产品逐盘检验，合格产品允许交货。'},
  {id:276, ch:2, type:'single', q:'预应力钢筋和金属管道在室外存放时，时间不宜超过（  ）', opts:["3个月", "4个月", "5个月", "6个月"], ans:3, exp:'教材规定：预应力钢筋和金属管道在室外存放时，时间不宜超过6个月（D正确）。3个月、4个月和5个月均较规范规定的6个月期限短，规范允许最长室外存放时间为6个月。超过6个月应重新检验。'},
  {id:277, ch:2, type:'multi', q:'关于桥梁后张法，说法正确的是（  ）', opts:["一般用于预制构件", "先浇筑构件，然后在构件上直接施加预应力", "预应力筋必须先穿入套管在浇筑混凝土", "混凝土达到强度后，用千斤顶将预应力筋张拉到要求的应力并锚于梁的两端", "后张法在现浇连续箱梁和盖梁中采用较多"], ans:[1, 3, 4], exp:'教材规定：后张法先浇筑构件（B正确），混凝土达到强度后用千斤顶张拉预应力筋并锚固（D正确），后张法在现浇连续箱梁和盖梁中采用较多（E正确）。A错误：后张法一般用于现浇构件而非预制构件。C错误：预应力筋可在浇筑后再穿入套管。'},
  {id:278, ch:2, type:'multi', q:'下列关于后张法说法正确的是（  ）', opts:["预留管道不得留有压浆孔与溢浆孔", "预应力筋安装完毕，方可采取蒸汽养护", "曲线预应力筋或长度大于等于25m的直线预应力筋，宜在两端张拉", "长度小于25m的直线预应力筋，可在一端张拉", "张拉过程中，预应力筋不得断丝、断筋或滑丝"], ans:[2, 3, 4], exp:'管道应留压浆孔与溢浆孔；曲线孔道的波峰部位应留排气孔；在最低部位宜留排水孔。 混凝土采用蒸汽养护时，养护期内不得装入预应力筋。'},
  {id:279, ch:2, type:'single', q:'关于预应力筋张拉要求的说法，错误的是（ ）', opts:["混凝土强度未达到设计值75%时严禁张拉", "长度小于25m的直线预应力筋在一端张拉", "张拉后应实测孔道摩阻损失", "宜采取分批、分阶段对称张拉方式"], ans:2, exp:'张拉前应实测孔道摩阻损失。'},
  {id:280, ch:2, type:'multi', q:'关于预应力筋张拉的技术要求，正确的有（ ）', opts:["张拉后应拆除限制位移的模板", "曲线预应力筋宜在两端张拉", "同一截面多束一端张拉时应交错设置张拉端", "张拉控制应力值应考虑孔道摩阻损失", "张拉过程中允许出现少量断丝现象"], ans:[1, 2, 3], exp:'E选项错误，规范明确要求预应力筋不得断丝'},
  {id:281, ch:2, type:'single', q:'关于后张法作业封锚要求，正确的是（  ）', opts:["后张法预应力筋锚固后的外露部分禁止机械切割", "凸出或内凹锚具强度等级比预应力结构构件提高一个等级", "凸出式锚具封锚应配置钢筋网片", "可用收缩防水砂浆封闭保护"], ans:2, exp:'① 后张法预应力筋锚固后的外露部分应采用机械切割工艺切除。预应力筋的外露长度不宜小于其直径的1.5倍，且不应小于30mm。 a.凸出或内凹锚具应采用与预应力结构构件相同强度等级的细石混凝土或无收缩防水砂浆封闭保护。'},
  {id:282, ch:2, type:'single', q:'关于钢板桩围堰施工要求的说法，错误的是（ ）', opts:["有大漂石的河床不宜使用钢板桩围堰", "施打顺序应从下游向上游合龙", "黏土中不宜使用射水下沉方法", "接长的钢板桩接头应上下错开"], ans:1, exp:'规范要求施打顺序应从上游向下游合龙。'},
  {id:283, ch:2, type:'multi', q:'关于钢板桩围堰施工的技术要求，正确的有（ ）', opts:["施打前应在围堰一侧上下游设测量观测点", "必须配备导向设备保证正确位置", "锁口应用止水材料捻缝防漏水", "可采用捶击、振动等方法下沉", "桩身垂直度偏差可累积至合龙时统一调整"], ans:[1, 2, 3], exp:'E选项错误，施打过程中应随时检查并及时纠正偏差。'},
  {id:284, ch:2, type:'multi', q:'钢筋混凝土板桩制作的技术要求，正确的有（ ）', opts:["应使用刚度较大的模板制作", "桩尖斜度宜采用1:2.5～1:1.5", "圆形榫口接合性能较好", "空心板桩可用钢管作芯模", "板桩断面可调整"], ans:[0, 1, 2, 3], exp:'E选项错误，板桩断面必须符合设计要求。'},
  {id:285, ch:2, type:'single', q:'关于钢筋混凝土板桩围堰施工要求的说法，错误的是（ ）', opts:["沉入砂砾层的板桩桩头可不做加强处理", "榫口接缝应保证顺直、密合", "采用中心射水下沉时应预留射水通道", "空心板桩多采用圆形空心截面"], ans:0, exp:'规范要求沉入砂砾层的板桩桩头应增设加劲钢筋或钢板，故A选项错误。'},
  {id:286, ch:2, type:'multi', q:'下列属于土石围堰的有（  ）。', opts:["土围堰", "土袋围堰", "竹篱土围堰", "堆石土围堰", "钢板桩围堰"], ans:[0, 1, 2, 3], exp:'教材规定：土石围堰包括土围堰、土袋围堰、竹篱土围堰、竹、铁丝笼围堰、堆石土围堰等。E选项"钢板桩围堰"属于板桩围堰类，不属于土石围堰。土石围堰以土石为主要材料，钢板桩围堰以钢板桩为主要挡水结构。'},
  {id:287, ch:2, type:'single', q:'关于土围堰施工要求，下列表述错误的是（  ）。', opts:["围堰填筑应自上游开始至下游合龙", "筑堰材料宜用黏性土、粉质黏土或砂质黏土", "可在围堰中心部分填筑黏土及黏性土芯墙", "围堰外河床上的淤泥、石块、杂物应筑堰前清除"], ans:2, exp:'教材规定：土围堰筑堰材料宜用黏性土、粉质黏土或砂质黏土（B正确）。C选项错误：土的渗透系数小，在围堰中心部分填筑黏土及黏性土芯墙的做法仅适用于土袋围堰而非土围堰。A选项围堰自上游至下游合龙正确。D选项筑堰前清除淤泥石块正确。'},
  {id:288, ch:2, type:'multi', q:'围堰施工技术要求中，钢板桩可采用的下沉方法有（  ）。', opts:["捶击", "人工钻孔", "振动", "静压", "射水"], ans:[0, 2, 4], exp:'教材规定：钢板桩可采用捶击（A）、振动（C）和射水（E）等方法下沉。B选项"人工钻孔"和D选项"静压"不是钢板桩常用的下沉方法。捶击法适用广泛，振动法适用于砂土，射水法在密实砂层中作为辅助手段。'},
  {id:289, ch:2, type:'single', q:'围堰高度应高出施工期内可能出现最高水位（包括浪高）（  ）。', opts:["0.3～0.5m", "0.5～0.7m", "0.7～1m", "1.0～1.5m"], ans:1, exp:'教材规定：围堰高度应高出施工期内可能出现最高水位（包括浪高）0.5～0.7m（B正确）。0.3～0.5m偏低不足以应对浪高和安全富余，0.7～1m和1.0～1.5m偏高不经济。'},
  {id:290, ch:2, type:'multi', q:'下列土石围堰，能够适用水深2m的有（  ）。', opts:["土围堰", "土袋围堰", "木桩竹条土围堰", "竹篱土围堰", "竹、铁丝笼围堰"], ans:[1, 2, 3, 4], exp:'教材规定：土袋围堰适用水深≤3m，木桩竹条土围堰适用水深2～4m，竹篱土围堰适用水深1.5～7m，竹、铁丝笼围堰适用水深5m以内。A选项"土围堰"仅适用于水深≤1.5m，不满足水深2m的要求。B、C、D、E均可适用于水深2m。'},
  {id:291, ch:2, type:'single', q:'关于双壁钢围堰浮运施工的说法，错误的是（ ）', opts:["浮运宜选择夜间低水位时进行", "露出水面高度不应小于1m", "水深流急处可设导向船", "应验算浮运时的稳定性"], ans:0, exp:'浮运宜选择白昼进行，故A选项错误。'},
  {id:292, ch:2, type:'multi', q:'双壁钢围堰拼焊施工应满足的要求包括（ ）', opts:["按设计在施工岸边制作", "分块大小考虑吊装能力", "按顺序对称拼焊", "拼焊后需做水密试验", "可在现场随意切割修改"], ans:[1, 2, 3], exp:'A选项错误，按设计在工厂制作。 E选项错误，围堰应按设计要求制作，不得随意修改'},
  {id:293, ch:2, type:'single', q:'关于双壁钢围堰锚锭系统的要求，正确的是（ ）', opts:["锚绳规格长度应差异明显", "边锚预拉力越大越好", "锚绳受力应均匀", "不需检查水位涨落影响"], ans:2, exp:'A选项错误，锚绳规格长度应相差不大； B选项错误，预拉力应适当； D选项错误，需注意水位影响。'},
  {id:294, ch:2, type:'multi', q:'双壁钢围堰着床后的施工要求包括（ ）', opts:["对称均衡灌水落床", "观测河床冲刷情况", "必要时垫填卵石整平", "封底前由潜水员检查", "允许偏差可忽略不计"], ans:[0, 1, 2, 3], exp:'E选项错误，着床偏差必须符合设计要求。'},
  {id:295, ch:2, type:'single', q:'在密实的砂土、碎石土、砂砾的土层中，当锤击法和振动沉桩法施工困难时，可采用的辅助沉桩方法是（ ）。', opts:["钻孔埋桩", "静力压桩", "射水沉桩", "爆破沉桩"], ans:2, exp:'教材规定：在密实的砂土、碎石土、砂砾的土层中，当锤击法和振动沉桩法施工困难时，可采用射水沉桩作为辅助方法。钻孔埋桩适用于河床覆土较厚的碎石土地层，静力压桩适用于软黏土（N<20），爆破沉桩用于特殊地层。'},
  {id:296, ch:2, type:'single', q:'静力压桩最适宜用于下列哪种土层？（ ）', opts:["密实砂土", "软黏土（标准贯入度N<20）", "风化岩", "砾石层"], ans:1, exp:'教材规定：静力压桩最适宜用于软黏土（标准贯入度N<20）。密实砂土和砾石层贯入阻力大，风化岩强度更高，均不适合静力压桩。静力压桩通过自重和配重将桩压入土中，对软土效果好。'},
  {id:297, ch:2, type:'multi', q:'关于沉桩方法的选择，下列说法正确的有（ ）。', opts:["锤击沉桩适用于砂类土和黏性土", "振动沉桩适用于密实黏性土和风化岩", "射水沉桩可在重要建筑物附近优先使用", "钻孔埋桩适用于河床覆土较厚的碎石土", "静力压桩适用于标准贯入度N>30的砂土层"], ans:[0, 1, 3], exp:'C错误：在重要建筑物附近不宜采用射水沉桩"； E错误：静力压桩适用于N<20的软黏土。'},
  {id:298, ch:2, type:'single', q:'关于沉桩前的准备工作，下列说法错误的是（ ）。', opts:["沉桩前必须处理地上(下)障碍物", "城区人员密集场所可以进行沉桩施工", "对地质复杂的大桥应进行试桩", "预制桩混凝土强度应达到设计要求"], ans:1, exp:'城区、居民区等人员密集的场所不得进行沉桩施工。'},
  {id:299, ch:2, type:'single', q:'对于特大桥和地质复杂的大、中桥，承载能力试桩宜采用（ ）。', opts:["静压试验方法", "动载试验法", "高应变检测法", "低应变检测法"], ans:0, exp:'教材规定：对于特大桥和地质复杂的大、中桥，承载能力试桩宜采用静压试验方法（即静载试验）。动载试验法、高应变检测法和低应变检测法适用于一般工程或作为静载试验的补充。静载试验最直接可靠。'},
  {id:300, ch:2, type:'multi', q:'关于沉桩准备工作，下列要求正确的有（ ）。', opts:["应掌握工程地质钻探资料和水文资料", "地面承载能力应满足沉桩需求", "所有桥梁工程都必须进行静载试验", "钢桩在腐蚀性土层需做防腐处理", "贯入度由施工单位自行确定"], ans:[0, 1, 3], exp:'C错误:一般大、中桥可采用静载试验。； E错误:需会同监理及设计单位确定。'},
  {id:301, ch:2, type:'multi', q:'下列关于沉入桩沉桩顺序的选项中，说法正确的是（  ）', opts:["宜由一端向另一端进行", "密集桩群，自中间向两端(两个方向)或四周对称施打", "根据基础的设计标高，宜先浅后深", "桩的规格，宜先大后小，先短后长", "斜坡地形，应先坡顶后坡脚"], ans:[0, 1, 4], exp:'教材规定：密集桩群自中间向两端(两个方向)或四周对称施打（B正确）；斜坡地形应先坡顶后坡脚（E正确）；"宜由一端向另一端进行"（A正确）。C错误：根据基础设计标高宜先深后浅。D错误：规格宜先大后小、先长后短。'},
  {id:302, ch:2, type:'multi', q:'在沉桩过程中发现以下（  ）情况应暂停施工。', opts:["贯入度减小", "桩身发生突然倾斜", "桩头或桩身破坏", "地面隆起", "桩身上浮"], ans:[1, 2, 3, 4], exp:'教材规定：沉桩过程中发现桩身发生突然倾斜（B）、桩头或桩身破坏（C）、地面隆起（D）、桩身上浮（E）等情况时应暂停施工。A选项"贯入度减小"属于正常现象，需要继续观测而非暂停施工；贯入度骤增或骤减才需关注。'},
  {id:303, ch:2, type:'single', q:'下列可采用（  ）作为锤击法辅助手段进行沉桩施工', opts:["振动沉桩", "射水沉桩", "静力压桩", "钻孔埋桩"], ans:1, exp:'教材规定：射水沉桩可作为锤击法辅助手段进行沉桩施工。在密实砂土、碎石土中锤击困难时，可用射水冲散土层减小阻力。振动沉桩和静力压桩是独立沉桩方法而非辅助手段，钻孔埋桩也不是锤击的辅助手段。'},
  {id:304, ch:2, type:'multi', q:'关于锤击沉桩，下列说法正确的是（）', opts:["控制桩锤的冲击能，高锤慢打", "当桩入土一定深度后，可按要求的落距和正常锤击频率进行", "一般情况以控制桩端设计标高为主，贯入度为辅", "桩端位于黏性土或较松软土层时，应以标高控制，贯入度作为校核", "桩端位于坚硬土层，应以设计标高控制"], ans:[1, 2, 3], exp:'锤击沉桩开始时，应控制桩锤的冲击能，低锤慢打，当桩入土一定深度后，可按要求的落距和正常锤击频率进行。桩终止锤击的控制应视桩端土质而定， 一般情况下以控制桩端设计标高为主，贯入度为辅。 ① 桩端位于黏性土或较松软土层时，应以标高控制，贯入度作为校核。 ② 桩端位于坚硬、硬塑的黏土及中密以上的粉土、砂、碎石类土、风化岩时，应以贯入度控制。 ① 桩端位于黏性土或较松软土层 控制方式：以标高控制为主，贯入度作为校核 软土中，贯入度容易突然变小（碰到硬夹层）或突然变大（进入软区），数据不稳定。 只要桩顶打到设计标高，一般认为承载力够了。 校核： 打到标高后，再锤几下，看看贯入度是否在合理范围，防止虚打。 ② 桩端位于坚硬、硬塑黏土及中密以上粉土、砂、碎石、风化岩 控制方式：以贯入度控制为主 土层很硬，可能还没打到标高，桩就打不动了（锤很多下也不下沉）。 此时强行打到标高可能损坏桩身。 只要最后贯入度满足设计要求（比如最后10锤下沉≤30mm），说明桩已打紧，承载力够了，可以不继续打。 软土看“高度”（标高为主），硬土看“力度”（贯入度为主）'},
  {id:305, ch:2, type:'single', q:'地下水位以下土层的桥梁钻孔灌注桩基础施工，不应采用的成桩设备是（  ）。', opts:["正循环回旋钻", "旋挖钻", "长螺旋钻机", "冲击钻"], ans:2, exp:'教材规定：长螺旋钻机为干作业成孔方法，在地下水位以下的土层中无法形成有效孔壁，不应采用。正循环回旋钻、旋挖钻和冲击钻均可用于泥浆护壁成孔（湿作业），适用于地下水位以下土层。'},
  {id:306, ch:2, type:'multi', q:'下列属于泥浆护壁成孔的有（  ）。', opts:["正循环钻孔灌注桩", "冲击钻成孔灌注桩", "旋挖成孔灌注桩", "钻孔扩底灌注桩", "长螺旋钻孔灌注桩"], ans:[0, 1, 2, 3], exp:'教材规定：泥浆护壁成孔包括正循环钻孔灌注桩、冲击钻成孔灌注桩、旋挖成孔灌注桩和钻孔扩底灌注桩。E选项"长螺旋钻孔灌注桩"属于干作业成孔方法，不需泥浆护壁。'},
  {id:307, ch:2, type:'multi', q:'泥浆设备与护筒埋设，下列说法正确的是（）', opts:["钻孔后应埋设护筒", "护筒顶面宜高出施工水位或地下水2m, 并宜高出施工地面0.3m", "泥浆宜选用高塑性黏土或膨润土", "清孔后的泥浆相对密度应大于1.10", "含砂率不得大于2%"], ans:[1, 2, 4], exp:'清孔后的泥浆相对密度应小于1.10'},
  {id:308, ch:2, type:'single', q:'灌注水下混凝土时，导管埋置深度宜控制在（  ）', opts:["1～3m", "2～4m", "3～5m", "2～6m"], ans:3, exp:'教材规定：灌注水下混凝土时，导管埋置深度宜控制在2～6m（D正确）。1～3m埋深过浅易导致导管拔空发生断桩；2～4m和3～5m虽然部分符合要求但不如2～6m完整。最小埋深2m，最大不宜超过6m。'},
  {id:309, ch:2, type:'multi', q:'灌注桩钢筋笼其接头连接方式（  ）', opts:["焊接", "机械连接", "法兰连接", "螺栓连接", "绑扎连接"], ans:[0, 1], exp:'教材规定：灌注桩钢筋笼接头连接方式可采用焊接（A）和机械连接（B）。C选项"法兰连接"和D选项"螺栓连接"非钢筋连接常用方式；E选项"绑扎连接"不适用于灌注桩钢筋笼的纵向受力钢筋连接。'},

  {id:311, ch:2, type:'multi', q:'关于钻孔扩底下列说法正确的是（  ）', opts:["钻杆应保持垂直稳固，位置准确", "防止因钻杆晃动引起孔径扩大", "钻孔扩底桩施工扩底孔部分虚土厚度应符合设计要求", "第一次应灌到扩底部位，随即振捣密实", "灌注桩顶以下5m范围内混凝土时，应随灌注随振动，每次灌注高度不大于2m"], ans:[0, 1, 2], exp:'灌注混凝土时，第一次应灌到扩底部位的顶面，随即振捣密实；灌注桩顶以下5m范围内混凝土时，应随灌注随振动，每次灌注高度不大于1.5m。'},
  {id:312, ch:2, type:'multi', q:'关于钢筋笼施工要点下列说法正确的是（  ）', opts:["桩身纵向受力钢筋接头应设置在桩身受力较小处", "接头位置宜相互错开", "主筋与箍筋不得点焊", "钢筋笼吊放前，必须清除槽底沉渣", "钢筋笼入孔后至浇筑混凝土完毕的时间不超过5h"], ans:[0, 1, 3], exp:'主筋与箍筋应点焊。 钢筋笼入孔后至浇筑混凝土 完毕的时间不超过4h。'},
  {id:313, ch:2, type:'single', q:'钻孔灌注桩工艺流程，灌注水下混凝土的紧前工作（  ）', opts:["清孔", "安装钢筋笼", "安放导管", "二次清孔"], ans:3, exp:'教材规定：钻孔灌注桩工艺流程为：成孔→终孔验收→清孔→安装钢筋笼→安放导管→二次清孔→灌注水下混凝土。"安放导管"（C）是灌注水下混凝土的紧前工作，导管安放并完成二次清孔后方可灌注混凝土。'},
  {id:314, ch:2, type:'multi', q:'钻孔灌注桩施工时，由于孔内泥浆悬浮的砂粒太多导致的问题可能有（  ）。', opts:["桩身混凝土夹渣", "断桩", "灌注混凝土过程中钢筋骨架上浮", "灌注混凝土时堵管", "混凝土强度低或离析"], ans:[0, 1, 2, 3], exp:'教材规定：孔内泥浆悬浮砂粒太多可能导致桩身混凝土夹渣（A）、断桩（B）、灌注过程中钢筋骨架上浮（C）和堵管（D）。E选项"混凝土强度低或离析"属于混凝土自身质量问题，与泥浆含砂率过高无直接关系。'},
  {id:315, ch:2, type:'multi', q:'可能导致灌注桩钢筋骨架上浮的因素包括（ ）。', opts:["混凝土初凝时间过短", "泥浆中含砂量过高", "钢筋骨架直径过大", "混凝土灌注速度过快", "导管埋深过小"], ans:[0, 1, 3], exp:'a. 混凝土初凝和终凝时间太短，使孔内混凝土过早结块，当混凝土面上升至钢筋骨架底时，结块的混凝土托起钢筋骨架。 b. 清孔时孔内泥浆悬浮的砂粒太多，混凝土灌注过程中砂粒回沉在混凝土面上，形成较密实的砂层，并随孔内混凝土逐渐升高，当砂层上升至钢筋骨架底部时托起钢筋骨架。 c. 混凝土灌注至钢筋骨架底部时，灌注速度太快，造成钢筋骨架上浮。'},
  {id:316, ch:2, type:'single', q:'关于桥梁承台施工错误的是（  ）。', opts:["承台施工前应检查桩基位置", "在基坑有水情况下浇筑100mm厚混凝土垫层", "分层浇筑时，接缝应按施工缝处理", "水中高桩承台可采用套箱法施工"], ans:1, exp:'教材规定：在基坑有水情况下应先进行降水排水，待桩基验收合格后浇筑垫层，垫层应干燥状态下浇筑。B选项"在基坑有水情况下浇筑100mm厚混凝土垫层"错误，有水时直接浇筑垫层会导致混凝土离析、强度不足。A、C、D选项均符合规范要求。'},
  {id:317, ch:2, type:'multi', q:'关于柱式桥墩施工正确的是（  ）。', opts:["模板、支架稳定计算中应考虑风力影响", "墩台柱的混凝土宜一次连续浇筑完成", "满足桥柱先浇系梁后浇的原则", "V形墩柱混凝土应对称浇筑", "采用预制混凝土管做柱身外模"], ans:[0, 1, 3, 4], exp:'教材原文："柱身高度内有系梁连接时，系梁应与柱同步浇筑。"\n\n✅ A正确——模板支架稳定计算中应考虑风力影响。\n✅ B正确——墩台柱混凝土宜一次连续浇筑完成。\n❌ C错误——教材规定系梁应与柱同步浇筑，"先浇系梁后浇柱"或"先浇柱后浇系梁"均不正确。选项本身表述为"桥柱先浇系梁后浇"，系梁在柱之前浇筑，不符合同步浇筑要求。\n✅ D正确——V形墩柱混凝土应对称浇筑（教材原文）。\n✅ E正确——可采用预制混凝土管做柱身外模。'},
  {id:318, ch:2, type:'single', q:'关于重力式混凝土桥台浇筑施工，说法错误的是（ ）。', opts:["每层浇筑高度宜控制在1.5～2m", "接缝应与桥台截面尺寸较大的一边平行", "基础混凝土顶面需做凿毛处理", "分块接缝应做成企口形"], ans:1, exp:'教材规定：重力式混凝土桥台浇筑接缝应与桥台截面尺寸较小的一边平行（而非较大的一边，B错误）。A选项每层浇筑高度1.5～2m正确。C选项基础混凝土顶面需凿毛处理正确。D选项分块接缝做成企口形正确。'},
