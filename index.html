....……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:483,ch:4,type:'single',q:'在污水中，主要针对水中悬浮物质的常用处理方法是（  ）。',opts:['一级处理','二级处理','三级处理','深度处理'],ans:0,exp:'4．1．3污水处理工艺 污水中有机物浓度 生物化学需氧量（BOD5）、化学需氧量（COD）、 总需氧量（TOD）、总有机碳（TOC）来表示。 污水处理根据原理分为 ①物理处理法（筛滤截留、重力分离、离心分离）； ②化学处理法（主要方式有中和、混凝、电解、氧化还原、汽提、萃取、吸附、离子交换和电渗析） ③生物化学处理法（活性污泥法、生物膜法）； 根据处理程度分为 一级处理：针对水中悬浮物质； 二级处理：去除污水中呈胶体和溶解状态的有机污染物质； 深度处理：进一步处理难降解的有机物以及可导致水体富营养化的氮、磷等可溶性无机物等。'},{id:484,ch:4,type:'single',q:'截流去除经沉淀或澄清后剩余的细微杂质属于（）',opts:['自然沉淀','混凝沉淀','过滤','消毒'],ans:2,exp:'正确答案为C。过滤\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:485,ch:4,type:'single',q:'总需氧量，下列表述正确的是（）',opts:['BOD₅','COD','TOD','TOC'],ans:2,exp:'正确答案为C。TOD\n\n📖 教材依据（给水排水厂站工程）：可分为悬浮固体污染物、有机污染物、有毒物质、污染生物和污染营养物质。污水中有机物浓度一般用生物化学需氧量(BODs)、化学需氧量(COD)，总需氧量(TOD)和总有机碳(TOC)表示。(2)污水处理方法根据原理可分为物理处理法、化学处理法及生物化学处理法三类。①物理处理法是利用物理作用分离和去除污水中呈悬浮固体状态污染物质的方法。\n\n污水中有机物浓度一般用生物化学需氧量(BOD₅)、化学需氧量(COD)、总需氧量(TOD)和总有机碳(TOC)表示。'},{id:486,ch:4,type:'multi',q:'可导致水体富营养化的有（）',opts:['氮','磷','铁','锰','钠'],ans:[0,1],exp:'正确答案为A、B。氮；磷\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:487,ch:4,type:'single',q:'属于污水再生回用的城市杂用水的是（  ）。',opts:['水产养殖水','城市绿化水','娱乐性景观环境用水','地表水'],ans:1,exp:'正确答案为B。城市绿化水\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:488,ch:4,type:'multi',q:'关于再生水回用分类，下列说法正确的有（ ）',opts:['农田灌溉属于农林渔业用水','城市绿化用水属于城市杂用水','水产养殖属于工业用水','道路清扫用水属于城市杂用水','车辆冲洗用水属于农林渔业用水'],ans:[0,1,3],exp:'正确答案为A、B、D。农田灌溉属于农林渔业用水；城市绿化用水属于城市杂用水；道路清扫用水属于城市杂用水\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:489,ch:4,type:'multi',q:'抵抗地下水浮力的主要方法有（）',opts:['排水抗浮法','泄水抗浮法','压重抗浮法','结构抗浮法','锚固抗浮法'],ans:[2,3,4],exp:'正确答案为C、D、E。压重抗浮法；结构抗浮法；锚固抗浮法\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:490,ch:4,type:'single',q:'采用锚固抗浮法，下列说法错误的有（）',opts:['抗浮锚杆，应采取打入式工艺或压浆工艺','预制抗浮桩，按设计要求进行桩身抗裂性能检验','抗浮锚杆、抗浮桩，应按设计要求进行抗拔检验','抗浮锚杆宜在地下结构底板混凝土垫层完成前进行施工'],ans:3,exp:'正确答案为D。抗浮锚杆宜在地下结构底板混凝土垫层完成前进行施工\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:491,ch:4,type:'single',q:'关于场站工程地基处理方法，下列描述正确的是（ ）',opts:['水泥土搅拌桩属于换填垫层法','振冲碎石桩属于复合地基处理方法','旋喷桩不属于复合地基','注浆加固法不能用于复合地基处理'],ans:1,exp:'正确答案为B。振冲碎石桩属于复合地基处理方法\n\n📖 教材依据（给水排水厂站工程）：土的补强是采用薄膜、绳网、板桩等约束住路基土，或者在土中放入抗拉强度高的补强材料形成复合路基以加强和改善路基土的剪切特性。2)路基处理方法分类路基处理的方法，根据其作用和原理大致分为六类，见表1.2-1。表中所列各种方一-一一一注是根据软弱去曲-特点和既需赴理的目的而发展起来的+一各种方法的具悻选用，-应丛路基条件、处理的指标及范围、工程费用、工程进度及材料来源、当地环境等多方面进行考虑和研究。\n\n复合地基包括：振冲碎石桩和沉管砂石桩复合地基、水泥土搅拌桩复合地基、旋喷桩复合地基、灰土挤密桩和土挤密桩复合地基、夯实水泥土桩复合地基、水泥粉煤灰碎石桩复合地基、柱锤冲扩桩复合地基、多桩型复合地基等。'},{id:492,ch:4,type:'single',q:'关于地基处理施工方案的内容要求，下列说法正确的是（ ）',opts:['复合地基施工方案不包含承载力检测要求','普通地基处理方案必须包含成桩工艺','施工参数是地基处理施工方案的必备内容','复合地基施工方案可不考虑材料配合比'],ans:2,exp:'地基处理的施工方案一般包括：地基处理方式的选择，材料、配合比，施工工艺和顺序，施工参数，施工机具，地基强度及承载力检验方法；口诀：采访残疾沛公强撑 地基基础为复合地基的，施工方案一般包括：成桩工艺，材料、配合比，施工参数，施工机具，承载力检测要求。'},{id:493,ch:4,type:'single',q:'关于复合地基施工要求，下列说法正确的是（ ）',opts:['水泥土搅拌桩停浆面应低于设计桩顶标高','高压旋喷桩施工可不考虑相邻桩位间距','振冲桩施工需控制填料用量和振密电流','灰土挤密桩成孔预留覆盖土层厚度统一为0.5m'],ans:2,exp:'A选项错误，停浆面应高于设计桩顶300～500mm； B选项错误，高压旋喷桩需控制相邻桩位间距； D选项错误，预留厚度因成孔方式不同而不同，成桩预留覆盖土层厚度：沉管(锤击、振动)成孔宜为0.50～0.70m，冲击成孔宜为1.20～1.50m。'},{id:494,ch:4,type:'multi',q:'关于高压旋喷桩施工技术，正确的有（ ）。',opts:['应控制水泥用量、压力、相邻桩位间距','应控制提升速度和旋转速度','应合理安排成桩施工顺序，并详细记录成孔情况','复喷措施仅用于扩大加固范围','复喷措施仅用于提高强度'],ans:[0,1,2],exp:'正确答案为A、B、C。应控制水泥用量、压力、相邻桩位间距；应控制提升速度和旋转速度；应合理安排成桩施工顺序，并详细记录成孔情况\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:495,ch:4,type:'multi',q:'关于复合地基施工控制要点，下列符合规范要求的有（ ）',opts:['水泥粉煤灰碎石桩成桩顶标高宜高于设计标高500mm以上','砂桩施工需控制灌砂量和标高','高压旋喷桩可采用单喷法提高施工效率','灰土挤密桩应控制填料含水量','水泥土搅拌桩可不控制搅拌次数'],ans:[0,1,3],exp:'正确答案为A、B、D。水泥粉煤灰碎石桩成桩顶标高宜高于设计标高500mm以上；砂桩施工需控制灌砂量和标高；灰土挤密桩应控制填料含水量\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:496,ch:4,type:'multi',q:'工艺管线中给水排水管道越来越多采用（）PE管、球墨铸铁管等新型管材',opts:['水流性能好','抗腐蚀性高','造价低','抗地层变位性好','抗压能力强'],ans:[0,1,3],exp:'正确答案为A、B、D。水流性能好；抗腐蚀性高；抗地层变位性好\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:497,ch:4,type:'single',q:'水处理构筑物中圆柱形混凝土池体结构，下列说法正确的是（）',opts:['池壁高度大(5～8m)时宜采用整体现浇施工','支模方法有：满堂支模法及滑升模板法','满堂支模法，模板与支架用量小','滑升模板法，宜在池壁高度不小于8m时采用'],ans:1,exp:'正确答案为B。支模方法有：满堂支模法及滑升模板法\n\n📖 教材依据（给水排水厂站工程）：3.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.1给水与污水处理工艺….......……..............…………………………………………………………….2384.2厂站工程施工.......…..............……......….......…....……\n\n水处理构筑物中圆柱形混凝土池体结构，当池壁高度大(12～18m) 时宜采用整体现浇施工； 支模方法有：满堂支模法及滑升模板法，前者模板与支架用量大，后者宜在池壁高度不小于15m时采用。'},{id:498,ch:4,type:'single',q:'整体式现浇钢筋混凝土池体结构施工流程中，底板浇筑的紧后工序是（  ）。',opts:['顶板浇筑','防水层施工','池壁及顶板支撑柱浇筑','功能性试验'],ans:2,exp:'正确答案为C。池壁及顶板支撑柱浇筑\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:499,ch:4,type:'multi',q:'根据对污染物的去除途径不同，给水预处理方法可分为（  ）。',opts:['活性炭吸附法','吸附法','氧化法','臭氧氧化法','膜滤法'],ans:[1,2],exp:'提高饮用水水质还有预处理和深度处理工艺 预处理 氧化法 化学氧化法 ①氯气预氧化 ②高锰酸钾氧化 ③紫外光氧化 ④臭氧氧化 生物氧化法 生物膜法 吸附法 粉末活性炭吸附 黏土吸附 深度处理 ①活性炭吸附法；②臭氧氧化法； ③膜滤法（超滤、纳滤）；④光催化氧化法；'},{id:500,ch:4,type:'single',q:'无粘结预应力封锚混凝土强度等级不得低于相应结构混凝土强度等级，且不得低于（  ）。',opts:['C40','C30','C35','C50'],ans:0,exp:'正确答案为A。C40\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:501,ch:4,type:'single',q:'厂站工程混凝土分层浇筑厚度控制要求，正确的是（ ）',opts:['使用插入式振动器时，分层厚度不得超过振动器作用部分长度的1.5倍','采用平板振动器时，混凝土分层厚度不得超过300mm','附着式振动器的分层厚度需通过试验确定','预留孔洞周边混凝土可直接用振动器振捣无需人工辅助'],ans:2,exp:'正确答案为C。附着式振动器的分层厚度需通过试验确定\n\n📖 教材依据（给水排水厂站工程）：严禁用薄层贴补的办法找平。石灰土应湿养，养护期不宜少于7d。养护期间应封闭交通。b.水泥稳定土基层宜采用摊铺机械摊铺，自拌合至摊铺完成，不得超过弛。宜在水泥初凝时间到达前碾压成型。分层摊铺时，应在下层养护7d后，方可摊铺上层材料。宜洒水养护，保持温润。常温下成型后应经7d养护，方可在其上铺筑道路面层。\n\nA选项错误，应为1.25倍； B选项错误，平板振动器分层厚度≤200mm； D选项错误，预留孔洞周边需辅以人工插捣。'},{id:502,ch:4,type:'single',q:'关于单元组合现浇混凝土水池施工，下列说法正确的是（ ）',opts:['圆形水池底板单元间应采用橡胶止水带接缝','矩形水池后浇缝带应在浇筑后28天内完成灌注','壁板单元间应采用聚氯乙烯胶泥嵌缝','后浇缝带混凝土强度应比单元混凝土高一个等级'],ans:3,exp:'正确答案为D。后浇缝带混凝土强度应比单元混凝土高一个等级\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:503,ch:4,type:'multi',q:'关于大型水池单元组合施工技术要求，说法正确的是（ ）。',opts:['圆形水池宜采用厚扇形底板单元和倒T形壁板单元组合','矩形水池单元间钢筋必须切断以保证变形缝功能','后浇缝带可采用掺UEA的补偿收缩混凝土','后浇缝带灌注后养护时间不应少于14天','单元组合结构可有效防止池体渗漏'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。圆形水池宜采用厚扇形底板单元和倒T形壁板单元组合；后浇缝带可采用掺UEA的补偿收缩混凝土；后浇缝带灌注后养护时间不应少于14天；单元组合结构可有效防止池体渗漏\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:504,ch:4,type:'single',q:'关于膨胀加强带的说法，正确的是（ ）。',opts:['膨胀加强带仅能采用后浇式一种形式','连续式膨胀加强带是指带内混凝土与两侧混凝土同时浇筑','膨胀加强带部位的混凝土强度等级可与两侧混凝土相同','间歇式膨胀加强带两侧均为施工缝'],ans:1,exp:'正确答案为B。连续式膨胀加强带是指带内混凝土与两侧混凝土同时浇筑\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:505,ch:4,type:'multi',q:'关于膨胀加强带分类与技术要求，正确的有（ ）。',opts:['膨胀加强带可分为连续式、间歇式和后浇式','连续式膨胀加强带可大大缩短工期','后浇式膨胀加强带与常规后浇带浇筑方式相同','膨胀加强带部位补偿收缩混凝土强度等级应比两侧提高一个等级','间歇式膨胀加强带两侧均与相邻混凝土同时浇筑'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。膨胀加强带可分为连续式、间歇式和后浇式；连续式膨胀加强带可大大缩短工期；后浇式膨胀加强带与常规后浇带浇筑方式相同；膨胀加强带部位补偿收缩混凝土强度等级应比两侧提高一个等级\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:506,ch:4,type:'single',q:'关于水池模板穿墙螺栓施工要求，下列说法正确的是（ ）',opts:['止水环宜采用圆形设计','螺栓拆卸后应留有40-50mm深的锥形槽','螺栓孔可用普通砂浆封堵','穿墙螺栓必须采用一次性不可拆卸型式'],ans:1,exp:'正确答案为B。螺栓拆卸后应留有40-50mm深的锥形槽\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:507,ch:4,type:'multi',q:'关于水池模板施工技术要求，下列符合规范的有（ ）',opts:['跨度≥4m的梁板模板应按设计要求起拱','池壁模板可先安装一侧再绑钢筋','分层安装模板时每层层高不宜超过2m','预埋件安装前应清除铁锈和油污','操作窗口水平净距不宜超过1.5m'],ans:[0,1,3,4],exp:'对跨度不小于4m的现浇钢筋混凝土梁、板，其模板应按设计要求起拱；设计无具体要求时， 起拱高度宜为跨度的1/1000-3/1000。 池壁模板可先安装一侧，绑完钢筋后，分层安装另一侧模板，或采用一次安装到 顶而分层预留操作窗口的施工方法。分层安装模板，每层层高不宜超过1.5m; 分层留置的窗口其层高不宜超过3m, 水平净距不宜超过1.5m。'},{id:508,ch:4,type:'multi',q:'关于无粘结预应力筋施工技术要求，下列符合规范的有（ ）',opts:['上下相邻两环锚固位置应错开一个锚固肋','每段预应力筋计算长度应考虑锚固肋宽度','可在混凝土浇筑后安装预应力筋','预应力筋允许有少量死弯','张拉段数量取锚固肋数量的一半'],ans:[0,1,4],exp:'正确答案为A、B、E。上下相邻两环锚固位置应错开一个锚固肋；每段预应力筋计算长度应考虑锚固肋宽度；张拉段数量取锚固肋数量的一半\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:509,ch:4,type:'multi',q:'关于预应力筋封锚施工技术要求，下列符合要求的有（ ）',opts:['凸出式锚固端锚具保护层厚度≥50mm','外露预应力筋保护层厚度可适当减少至30mm','封锚混凝土不低于结构混凝土强度等级','封锚混凝土强度等级不得低于C40','封锚可采用低强度砂浆替代混凝土'],ans:[0,3],exp:'正确答案为A、D。凸出式锚固端锚具保护层厚度≥50mm；封锚混凝土强度等级不得低于C40\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:510,ch:4,type:'single',q:'关于止水带安装要求，下列说法正确的是（ ）',opts:['塑料止水带接头可采用叠接方式连接','金属止水带搭接长度不得小于30mm','止水带中心线应与变形缝中心线对正','可在止水带上适当穿孔固定位置'],ans:2,exp:'正确答案为C。止水带中心线应与变形缝中心线对正\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:511,ch:4,type:'multi',q:'关于水池施工缝设置技术要求，下列正确的有（ ）',opts:['底板与池壁连接有腋角时，施工缝可留在腋角上方','池壁与顶板连接有腋角时，施工缝可留在腋角下部','地下水位高于底板8m时宜设置3mm厚止水钢板','池壁施工缝必须设置遇水膨胀止水条','变形缝处可按缝分仓浇筑'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。底板与池壁连接有腋角时，施工缝可留在腋角上方；池壁与顶板连接有腋角时，施工缝可留在腋角下部；地下水位高于底板8m时宜设置3mm厚止水钢板；变形缝处可按缝分仓浇筑\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:512,ch:4,type:'single',q:'满水试验标准说法错误的是（  ）。',opts:['水池渗水量计算，按池壁（不含内隔墙）和池底的浸湿面积计算','钢筋混凝士结构水池不得超过2L/（㎡·d）','砌体结构水池不得超过3L/（㎡·d）','测定的渗水量符合标准时，须连续测定三次以上'],ans:3,exp:'正确答案为D。测定的渗水量符合标准时，须连续测定三次以上\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:513,ch:4,type:'multi',q:'水池满水试验中，池内注水的要求有（  ）。',opts:['对大、中型池体，可先注水至池壁底部施工缝以上，检查底板抗渗质量','向池内注水宜分3次进行，每次注水高度为设计水深的1/3','相邻两次注水的间隔时间不应小于24h','注水时水位上升速度不宜超过2m/d','注水至设计水位12h后，测读水位测针的初读数'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。对大、中型池体，可先注水至池壁底部施工缝以上，检查底板抗渗质量；向池内注水宜分3次进行，每次注水高度为设计水深的1/3；相邻两次注水的间隔时间不应小于24h；注水时水位上升速度不宜超过2m/d\n\n📖 教材依据（给水排水厂站工程）：................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........…………......................................…1842384.'},{id:514,ch:4,type:'single',q:'联合试运行，下列说法正确的是（）',opts:['联合试运转应带负荷运行，试运转持续时间不应小于48h','连续试运行期间，开机、停机不少于2次','处理设备及泵房机组联合试运行时间，一般不少于6h','单机试车，一般空车试运行不少于2h'],ans:2,exp:'6)联合试运行 (1)联合试运转应带负荷运行，试运转持续时间不应小于72h，设备应运行正常、性能指标符合设计文件的要求。 (2)连续试运行期间，开机、停机不少于3次。 (3)处理设备及泵房机组联合试运行时间，一般不少于6h。 D选项与本题无关'},{id:515,ch:5,type:'multi',q:'给排水管道的管材中，柔性管道有（   ）。',opts:['球墨铸铁管','钢管','钢筋混凝土管','UPVC管','PE管'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。球墨铸铁管；钢管；UPVC管；PE管\n\n📖 教材依据（城市管道工程）：市管道工程……….......….............……......….....…·……...............……2595.1城市给水排水管道工程…..............…….......…......................….......….............................2595.2城市燃气管道工程…….........….......….......…….........….......….......……………….........…2……'},{id:516,ch:5,type:'single',q:'关于压力管道施工流程，下列说法正确的是（ ）',opts:['管道安装应在检查井砌筑完成后进行','功能性试验应在全部回填完成后进行','压力管道管节回填夯实应在功能性试验前完成','沟槽开挖后可直接进行管道基础施工'],ans:2,exp:'正确答案为C。压力管道管节回填夯实应在功能性试验前完成\n\n📖 教材依据（城市管道工程）：通等级的混凝土路面，横向胀缝、缩缝均设置传力杆。在自由边处，承受繁重交通的胀缝、施工缝，小于90。的面层角隅，下穿市政管线路段，以及雨水口和地下设施的检查井周围，应配筋补强。1昆凝土既是刚性材料，又属于脆性材料。因此混凝土路面板的构造，以最大限度发挥其刚性特点为目的，使路面能承受车轮荷载保证行车平)1顶·同时又要克服其脆性的弱点，防止在车载和自然因素作用下发生开裂、破坏，最大限度提升其耐久性，延长使用年限。'},{id:517,ch:5,type:'multi',q:'下列属于排水管道施工流程的有（ ）。',opts:['沟槽开挖','管道基础','管道安装','检查井砌筑','压力试验'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。沟槽开挖；管道基础；管道安装；检查井砌筑\n\n📖 教材依据（城市管道工程）：市管道工程……….......….............……......….....…·……...............……2595.1城市给水排水管道工程…..............…….......…......................….......….............................2595.2城市燃气管道工程…….........….......….......…….........….......….......……………….........…2……'},{id:518,ch:5,type:'multi',q:'钢筋混凝土成品管，沟槽底部的开挖宽度受（ ）影响。',opts:['管外径','管道一侧的工作面宽度','管道一侧的支撑厚度','一侧模板厚度','沟槽坡度'],ans:[0,1],exp:'B=D。+2×(b₁+b₂+b₃) 式中B—管道沟槽底部的开挖宽度(mm); D—管外径(mm); b₁—管道一侧的工作面宽度(mm)； b₂—有支撑要求时，管道一侧的支撑厚度，可取150～200mm； b₃—现场浇筑混凝土或钢筋混凝土管渠一侧模板厚度(mm)。'},{id:519,ch:5,type:'multi',q:'管道一侧的工作面宽度受下列（  ）因素影响。',opts:['管道种类','管道的外径','槽底宽度','坡度','一侧支撑厚度'],ans:[0,1],exp:'正确答案为A、B。管道种类；管道的外径\n\n📖 教材依据（城市管道工程）：按表5.1-1选取;b2一一有支撑要求时，管道一侧的支撑厚度，可取150~200mm;b3一一现场浇筑j昆凝土或钢筋混凝土管渠一侧模板厚度(mm)。表5.1-1管道一侧的工作面宽度管道一侧的工作面宽度仇(mm)管道的外径00(mm)00主主500500<1000<00"三才00000"三1500金属类管道、化学建材管道混凝土类管道刚性接口400柔性接口300刚性接口500柔性接口400刚性接口600柔性接口500300400500第5章城市管道工程26才续表管道的外径。'},{id:520,ch:5,type:'single',q:'外径1000mm，柔性接口混凝土类管道工作面宽度（  ）。',opts:['300','400','500','600'],ans:1,exp:'管道的外径D0（mm） 管道一侧的工作面宽度b1（mm） 混凝土类管道 金属类管道 化学建材管道 D0≤500 刚性接口 400 300 柔性接口 300 500<D0≤1000 刚性接口 500 400 柔性接口 400 1000<D0≤1500 刚性接口 600 500 柔性接口 500 1500<D0≤3000 刚性接口 800～1000 700 柔性接口 600'},{id:521,ch:5,type:'single',q:'开挖深度4m，沟槽边坡坡顶无荷载时的最陡坡度（高：宽）为1：1的是（）。',opts:['老黄土','中密碎石类土','粉质黏土','中密砂土'],ans:3,exp:'正确答案为D。中密砂土\n\n📖 教材依据（城市管道工程）：路面板组成，其具体施工流程见图3.1-8。由于主体结构是顺作，施工方便，质量易于保证，故顺作法仍然是盖挖法中的常用方法。盖挖)1归作法的围护结构，根据现场条件、地下水位高低、开挖深度以及周围建筑物的邻近程度可选择钢筋濡凝土钻(挖)孔灌注桩或地下连续墙，对于饱和的软弱地层应以刚度大、变形小、止水性能好的地下连续墙为首选方案。'},{id:522,ch:5,type:'single',q:'相同条件下放坡开挖沟槽，可采用最陡边坡的土层是（  ）。',opts:['经井点降水后的软土','中密砂土','黏土','硬塑粉土'],ans:2,exp:'正确答案为C。黏土\n\n📖 教材依据（城市管道工程）：法自然放坡时，应进行边坡支护设计，并计算每侧临时堆土或施加的其他荷载，验算边坡稳定性。4.沟槽开挖与支护施工要点才)分层开挖及深度(1)人工开挖沟槽的槽深超过3m时应分层开挖，每层的深度不超过2m。(2)人工开挖多层沟槽的层间留台宽度:放坡开槽时不应小于O.8mj直槽时不应小于O.5mj安装井点设备时不应小于1.5m。'},{id:523,ch:5,type:'multi',q:'沟槽分层开挖及深度说法正确的是（  ）。',opts:['人工开挖沟槽的槽深超过5m时应分层开挖','每层的深度不超过2m','层间留台宽度：放坡开槽时不应小于0.5m','层间留台宽度：直槽时不应小于1.0m','安装井点设备时不应小于1.5m'],ans:[1,4],exp:'1)分层开挖及深度 (1)人工开挖沟槽的槽深超过3m时应分层开挖，每层的深度不超过2m。 (2)人工开挖多层沟槽的层间留台宽度：放坡开槽时不应小于0.8m；直槽时不应小于0.5m；安装井点设备时不应小于1.5m。 (3)采用机械挖槽时，沟槽分层的深度按机械性能确定。'},{id:524,ch:5,type:'single',q:'关于沟槽开挖施工要求，下列说法正确的是（ ）',opts:['机械开挖应直接挖至设计标高以保证效率','槽底受水浸泡时宜采用水泥稳定碎石回填','槽底为杂填土时应全部挖除并处理','开挖深度2.5m且附近有管线时可不做支护方案'],ans:2,exp:'正确答案为C。槽底土层为杂填土、腐蚀性土时，应全部挖除并按设计要求进行地基处理。A错误，槽底原状地基土不得扰动，机械开挖时槽底预留200～300mm土层由人工开挖；B错误，槽底不得受水浸泡；D错误，槽底扰动土层为湿陷性黄土时，应按设计要求进行地基处理。\n\n📖 教材依据（城市管道工程）：槽底土层为杂填土、腐蚀性土时，应全部挖除并按设计要求进行地基处理。'},{id:525,ch:5,type:'multi',q:'沟槽开挖要求说法正确的是（  ）。',opts:['槽底原状地基土不得扰动','机械分层开挖至槽底后验收','槽底局部扰动时，宜采用天然级配砂砾石回填','槽底土层为杂填土、腐蚀性土时，应加水泥、石灰进行改良','开挖深度4m，经专家论证签字后实施'],ans:[0,2],exp:'(1)槽底原状地基土不得扰动，机械开挖时槽底预留200～300mm土层，由人工开挖至设计高程，整平。 (2)槽底不得受水浸泡或受冻，槽底局部扰动或受水浸泡时，宜采用天然级配砂砾石或石灰土回填；槽底扰动土层为湿陷性黄土时，应按设计要求进行地基处理。 (3)槽底土层为杂填土、腐蚀性土时，应全部挖除并按设计要求进行地基处理。 (6)开挖深度大于等于3m或者小于3m但槽边附近有构筑物、管道、杆线时由施工单位申报开挖支护方案经专家论证签字后实施，必要时由构筑物、管道、杆线产权单位认可后实施。'},{id:526,ch:5,type:'single',q:'拉森钢板桩支护，施工工艺桩孔回填的紧前工作是（  ）。',opts:['施作管道基础','拉森钢板桩拔除','沟槽回填和支撑体系拆除','管道安装'],ans:1,exp:'正确答案为B。拉森钢板桩拔除\n\n📖 教材依据（城市管道工程）：1-1沟槽拉森钢板桩支护断面图(1)拉森钢板桩施工工艺测量→拉森钢板桩打设→沟槽开挖和支撑安装→施作管道基础→管道安装→沟槽回填和支撑体系拆除→拉森钢板桩拔除→桩孔回填。①测量:根据给水排水管线图纸要求对拉森钢板桩进行测量定位。②拉森桩钢板桩打设:a.在拉森钢板桩运至现场时，应检查其长度、厚度是否与设计要求一致，拉森铜板桩立面应平直，锁扣符合有关标准要求。\n\n测量→拉森钢板桩打设→沟槽开挖和支撑安装→施作管道基础→管道安装→沟槽回填和支撑体系拆除→拉森钢板桩拔除→桩孔回填。'},{id:527,ch:5,type:'multi',q:'管道基础主要包括（  ）。',opts:['钢结构基础','软土基础','原状土地基','混凝土基础','砂石基础'],ans:[2,3,4],exp:'正确答案为C、D、E。原状土地基；混凝土基础；砂石基础\n\n📖 教材依据（城市管道工程）：采用灌砂回填时，非湿陷性黄土地区可冲水助沉;有地面沉降控制要求时，宜采取边拔桩边注浆等措施。5.管道基础和地基处理才)管道基础类型管道基础主要有:原状土地基、1昆凝土基础、砂石基础。2)地基处理(1)管道地基应符合设计要求，管道天然地基的强度不能满足设计要求时应按设计要求加固。(2)槽底局部超挖或槽底地层承载力不足时，超挖深度不超过150mm，可用挖槽原土回填芳实，其压实度不应低于原地基土的密实度;槽底地基土壤含水率较大，不适于压实时，应采取换填等有效措施。'},{id:528,ch:5,type:'single',q:'开槽管道工程施工中，排水不良造成地基土扰动，扰动深度在100mm以内，宜填（  ）进行地基处理。',opts:['块石','天然级配砂石','砾石','卵石'],ans:1,exp:'正确答案为B。天然级配砂石\n\n📖 教材依据（城市管道工程）：实的填土等，坚实系数为0.8~1.0。4)四类土，砂砾坚土主要包括坚实密实的教性土或黄土，含有碎石卵石的中等密实的结性土或黄土，粗卵石;天然级配砂石，软泥灰岩等，坚实系数为1.0~1.5。5)五类土~八类土五类土是软石，六类土是次坚石，七类土是坚石，八类土是特坚石。2.常用路基土的主要性能参数1)含水率ω土中水的质量与干土粒质量之比。\n\n此题考核地基处理。排水不良造成地基土扰动时，扰动深度在100mm以内，宜填天然级配砂石或砂砾处理；扰动深度在300mm以内，但下部坚硬时，宜填卵石或块石，并用砾石填充空隙找平表面。'},{id:529,ch:5,type:'multi',q:'原状地基为岩石或坚硬土层时，管道下方应铺设砂垫层，其厚度依据（）',opts:['管道种类','管外径','管内径','壁厚','接口方式'],ans:[0,1],exp:'正确答案为A、B。管道种类；管外径\n\n📖 教材依据（城市管道工程）：书5.1.1中5.2)(1)的要求执行。(7)岩石地基局部超挖时，应将基底碎渣全部清理，回填低强度等级混凝土或回填粒径1O~15mm的砂石井穷实。(8)原状地基为岩石或坚硬土层时，管道下方应铺设砂垫层，其厚度应符合表5.1-3的要求。(9)非永冻土地区，管道不得铺设在冻结的地基上;管道安装过程中，应防止地基冻胀。'},{id:530,ch:5,type:'single',q:'检查井施工要点错误的是（）',opts:['现浇钢筋混凝土检查井的混凝土基础应与管道基础同时浇筑','排水管道接入检查井，管口外缘应与井内壁平齐','为防止渗水，在排水检查井底部墙体与水泥混凝土基础连接处，可做倒角','现浇钢筋混凝土结构井室浇筑完成后安装踏步'],ans:3,exp:'正确答案为D。现浇钢筋混凝土结构井室浇筑完成后安装踏步\n\n📖 教材依据（城市管道工程）：市管道工程……….......….............……......….....…·……...............……2595.1城市给水排水管道工程…..............…….......…......................….......….............................2595.2城市燃气管道工程…….........….......….......…….........….......….......……………….........…2……'},{id:531,ch:5,type:'single',q:'沟槽回填要求错误的是（）',opts:['压力管道水压试验前，除接口外，管道两侧及管顶以上回填高度不应小于0.5m','水压试验合格后，应及时回填沟槽的其余部分','无压管道在闭水或闭气试验前，应全部回填完毕','部分城市要求第三方CCTV或QV检测合格'],ans:2,exp:'(1)压力管道水压试验前，除接口外，管道两侧及管顶以上回填高度不应小于0.5m。水压试验合格后，应及时回填沟槽的其余部分；无压管道在闭水或闭气试验前，除接口外可回填至胸腔，并应在试验合格后及时回填其余部分；部分城市要求第三方CCTV或QV检测合格、管道测绘完成后方可回填。'},{id:532,ch:5,type:'single',q:'关于管道的变形率，说法正确的是（）',opts:['钢筋混凝土管道不做变形率检测','柔性管道回填至设计高程时，应在48h内测量并记录管道变形率','钢管或球墨铸铁管道变形率应不超过3%','化学建材管道变形率应不超过5%'],ans:0,exp:'(5)柔性管道回填至设计高程时，应在12～24h内测量并记录管道变形率，管道变形率应符合设计要求；当设计无要求时，钢管或球墨铸铁管道变形率应不超过2%，化学建材管道变形率应不超过3%；当超过时，需采取处理措施。'},{id:533,ch:5,type:'single',q:'施工速度快、成本较低的不开槽管道施工方法是（   ）。',opts:['盾构法','夯管法','定向钻法','浅埋暗挖法'],ans:1,exp:'正确答案为B。夯管法\n\n📖 教材依据（城市管道工程）：加固可采取:超前小导管注浆加固、深孔注浆、管棚支护等措施。1)超前小导管注浆加固(1)适用条件①超前小导管注浆加固技术可作为浅埋暗挖法隧道常用的超前预支护措施，能配套使用多种注浆材料，施工速度快，施工机具简单，工序交换容易。②在软弱、破碎地层中成孔困难或易塌孔，且施作超前锚杆比较困难或者结构断面较大时，宜采取超前小导管注浆加固处理方法。'},{id:534,ch:5,type:'multi',q:'不开槽管道施工方法中，适用于给水排水管道及综合管道的方法包括（   ）。',opts:['盾构法','夯管法','浅埋暗挖法','水平定向钻法','密闭式顶管法'],ans:[0,2,4],exp:'正确答案为A、C、E。盾构法；浅埋暗挖法；密闭式顶管法\n\n📖 教材依据（城市管道工程）：要求;当设计无要求时，钢管或球墨铸铁管道变形率应不超过2%，化学建材管道变形率应不超过3%;当超过时，需采取处理措施。管壁不得出现纵向隆起、环向扁平和其他变形情况。5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。'},{id:535,ch:5,type:'single',q:'用于穿越地面障碍的给水排水主管道工程，无降水条件且直径在3000mm以上的不开槽管道施工方法是（  ）。',opts:['盾构法','定向钻','夯管','浅埋暗挖法'],ans:0,exp:'正确答案为A。盾构法\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。'},{id:536,ch:5,type:'single',q:'非开挖施工直径800mm的混凝土污水管道，应该采用（  ）施工方法。',opts:['盾构','浅埋暗挖','密闭式顶管','夯管'],ans:2,exp:'正确答案为C。密闭式顶管\n\n📖 教材依据（城市管道工程）：5.1-2施工方法与设备分类2)不开槽施工方法与适用条件见表5.1-5表5.1-5不开槽施工方法与适用条件施工工法密闭式顶管盾构浅埋暗挖水平定向钻优点施工精度高施工速度快适用性强施工速度快缺点施工成本高施工成本高给水排水管道、给水排水管道、给水排水管道、综合管道综合管道综合管道Ø300~Ø4000Ø3000以上利000以上施工精度不大于士50mm不大于50mm不大于30mm施工距离较长长较长适用地质条件各种土层适用范围适用管径(mm)除硬岩外的相对均质地层施工速度慢、施工成本高各种土层穷管施工速……'},{id:537,ch:5,type:'multi',q:'管道顶进前检查内容有（ ）。',opts:['设备全部试运转','设备在轨道坡度高程','洞口密封情况','制定开封堵措施','初始顶进的参数'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。设备全部试运转；设备在轨道坡度高程；洞口密封情况；制定开封堵措施\n\n📖 教材依据（城市管道工程）：m，基坑内的水应及时排除;采用沉井筑岛法制作时，岛面标高应比施工期最高水位高出O.5m以上。④基坑开挖应分层有序进行，保持平整和疏干状态。顶进工作井、接收工作井施工泥浆池、控制问管道顶进前检查内容:通水、联动运行(1)设备全部试运转。(2)设备在轨道坡度高程。(3)洞口密封情况。(4)制定开封堵措施。'},{id:538,ch:5,type:'multi',q:'工作井、接收井常用的施工方法有（ ）。',opts:['盾构法','倒挂井壁法','明挖法','顶管法','沉井法'],ans:[1,2,4],exp:'正确答案为B、C、E。倒挂井壁法；明挖法；沉井法\n\n📖 教材依据（城市管道工程）：弱地层中钻孔敷管，安装冻结器，利用人工制冷效果将天然岩土变成冻土，形成完整性好、强度高、不透水的临时加固体，从而达到加固地层、隔绝地下水与拟建构筑物联系的目的。(3)在冻结体的保护下进行工作井或隧道等地下工程的开挖施工，待衬砌支护完成后，冻结地层逐步解冻，最终恢复到原始状态。(4)冻结法主要优缺点:①主要优点:冻结加固的地层强度高;地下水封闭效果好;地层整体固结性好;对工程环境污染小。'},{id:539,ch:5,type:'single',q:'关于沉井的说法，错误的有（ ）。',opts:['混凝土应对称、均匀、水平连续分层浇筑','混凝土强度应达到设计强度等级75%后，方可拆除模板或浇筑后节混凝土','下沉施工仅为排水下沉','沉井封底分为干封底和水下封底'],ans:2,exp:'正确答案为C。下沉施工仅为排水下沉\n\n📖 教材依据（城市管道工程）：用水泥砂浆抹面，并应涂一层脱模剂。270第丁篇市政公用工程技术(3)沉井预制①结构的钢筋、模板、?昆凝土工程施工应符合设计要求;混凝土应对称、均匀、水平连续分层挠筑，并应防止沉井偏斜。/^\'I图5.1-4工作井沉井法结构示意图②分节制作沉井:设计元要求时，11昆凝土强度应达到设计强度等级75%后，方可拆除模板或浇筑后节混凝土。'},{id:540,ch:5,type:'multi',q:'管道顶进过程中，应遵循的原则（ ）。',opts:['勤测量','勤纠偏','微纠偏','低速','低压'],ans:[0,1,2],exp:'正确答案为A、B、C。勤测量；勤纠偏；微纠偏\n\n📖 教材依据（城市管道工程）：顶进、开挖、出土的作业顺序和调整顶进参数。②掘进过程中应严格监测，实施信息化施工，确保开挖掘进工作面的土体稳定和土(泥水)压力平衡;并控制顶进速度、挖土和出土量，减少土体扰动和地层变形。③管道顶进过程中，应遵循"勤测量、勤纠偏、微纠偏"的原则，控制顶管机前进方向和姿态，并应根据测量结果分析偏差产生的原因和发展趋势，确定纠偏的措施。'},{id:541,ch:5,type:'multi',q:'管道顶进水平轴线和高程测量符合（ ）要求',opts:['出顶进工作井进入土层时，每顶进300mm，测量不应少于一次','正常顶进时，每顶进500mm，测量不应少于一次','进入接收工作井前30m应增加测量','进入接收工作井前30m，每顶进100mm, 测量不应少于一次','纠偏量较大或频繁纠偏时应增加测量次'],ans:[0,2,4],exp:'③管道水平轴线和高程测量符合下列要求： a.出顶进工作井进入土层时，每顶进300mm,测量不应少于一次；正常顶进时,每顶进1000mm, 测量不应少于一次。 b.进入接收工作井前30m应增加测量，每顶进300mm, 测量不应少于一次。 c.全段顶完后，应在每个管节接口处测量其水平轴线和高程；有错口时，应测出相对高差。 d.纠偏量较大或频繁纠偏时应增加测量次数。'},{id:542,ch:5,type:'multi',q:'必须经严密性试验合格后方可投入运行的给排水管道有（   ）。',opts:['污水、雨污水合流管道','流沙地区的雨水管道','膨胀土地区的雨水管道','湿陷土地区的雨水管道','地质条件良好地区的雨水管道'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。污水、雨污水合流管道；流沙地区的雨水管道；膨胀土地区的雨水管道；湿陷土地区的雨水管道\n\n📖 教材依据（城市管道工程）：力下降数值时，将试验压力降至工作压力并保持恒压30min，进行外观检查若无漏水现象，则水压试验合格。2.严密性试验1)基本要求(1)湿陷土、膨胀土、流砂地区的雨水管道、污水管道，必须经严密性试验合格后方可投入运行。(2)管道的严密性试验分为闭水试验和闭气试验，应按设计要求确定;设计无要求时，应根据实际情况选择闭水试验或闭气试验。'},{id:543,ch:5,type:'single',q:'关于给水管道压力试验说法错误的是（   ）。',opts:['试验管段所有敞口应封闭，不得有渗漏水现象','试验前应清除管内杂物','试验段内不得用闸阀做堵板','试验段内消火栓安装完毕'],ans:3,exp:'正确答案为D。试验段内消火栓安装完毕\n\n📖 教材依据（城市管道工程）：浅埋暗挖法详见本书3.4中相关内容。5.1.3给水排水管道功能性试验给水排水管道功能性试验包括压力管道的水压试验、无压管道的严密性试验。给水管道应进行水压试验，并网运行前进行冲洗与消毒，经检验水质达到标准后，方可允许并网通水投入运行。排水管道进行严密性试验，分为闭水和闭气试验两种。湿陷性黄土及膨胀士、流砂地区的雨水管道需要进行严密性试验，污水管必须经严密性试验合格后方可投入运行。\n\n试验段内不得含有消火栓、水锤消除器、安全阀等附件。'},{id:544,ch:5,type:'single',q:'给水管道的功能性试验分为（   ）。',opts:['强度试验和严密性试验','预试验和主试验','闭水试验和闭气试验','满水试验和严密性试验'],ans:1,exp:'正确答案为B。预试验和主试验\n\n📖 教材依据（城市管道工程）：浅埋暗挖法详见本书3.4中相关内容。5.1.3给水排水管道功能性试验给水排水管道功能性试验包括压力管道的水压试验、无压管道的严密性试验。给水管道应进行水压试验，并网运行前进行冲洗与消毒，经检验水质达到标准后，方可允许并网通水投入运行。排水管道进行严密性试验，分为闭水和闭气试验两种。湿陷性黄土及膨胀士、流砂地区的雨水管道需要进行严密性试验，污水管必须经严密性试验合格后方可投入运行。'},{id:545,ch:5,type:'single',q:'排水管道功能性试验时，试验段的划分应符合的要求中不正确的是（  ）。',opts:['闭水试验管段应按井距分隔，抽样选取，带井试验','当管道采用两种（或两种以上）管材时，可按管材分别进行水压试验','无压力管道的闭水试验若条件允许可一次试验不超过5个连续井段','无压力管道内径大于700mm时，可按井段数量抽样选取1／3进行闭水试验'],ans:1,exp:'正确答案为B。当管道采用两种（或两种以上）管材时，可按管材分别进行水压试验\n\n📖 教材依据（城市管道工程）：进结束后，管道内的管节接口间隙应按设计要求处理;设计无要求时，可采用弹性密封膏密封，其表面应抹平、不得凸入管内。5.浅埋暗挖法详见本书3.4中相关内容。5.1.3给水排水管道功能性试验给水排水管道功能性试验包括压力管道的水压试验、无压管道的严密性试验。给水管道应进行水压试验，并网运行前进行冲洗与消毒，经检验水质达到标准后，方可允许并网通水投入运行。'},{id:546,ch:5,type:'single',q:'污水井设计水头高程2.000，管顶内壁高程1.500，井顶高程3.000，试验水头高程（）',opts:['4.000','3.500','3.000','1.000'],ans:2,exp:'正确答案为C。3.000\n\n📖 教材依据（城市管道工程）：蚀塘底或沟底。(2)前置塘与调节塘之间的滥流口应符合设计要求，防止初期水流对前置塘与调节塘之间坝体的冲刷和侵蚀。(3)溢流井的溢流孔、井顶高程、孔径施工应符合设计要求。挡水堤岸的基础、堤身应密实、不透水，防止发生管涌现象。排水管与挡水堤之间应密实、不渗水。(4)溢洪道的高程、断面、坡度等应符合设计要求，确保溢洪道排水能力，防止出现漫堤现象。'},{id:547,ch:5,type:'single',q:'压力管道水压试验进行实际渗水量测定时，宜采用（  ）进行。',opts:['注水法','内衬法','分区检测法','内渗法'],ans:0,exp:'正确答案为A。注水法\n\n📖 教材依据（城市管道工程）：(2)坐落于道路基层内的雨水支、连管应做强度等级C25的混凝土全包封，且包封混凝土达到75%设计强度后，方可进行上部基层、面层施工。8.沟槽回填1)沟槽回填一般要求(1)压力管道水压试验前，除接口外，管道两侧及管顶以上回填高度不应小于O.5m。水压试验合格后，应及时回填沟槽的其余部分;无压管道在闭水或闭气试验合格后应及时回填，部分城市要求第三方电视检测(CCTV)或管道检测潜望镜(QV检测仪)检测合格、管道测绘完成后方可回填。'},{id:548,ch:5,type:'single',q:'通过用户管道引入口的总阀门将燃气引向室内，并分配到每个燃气用具的是（  ）。',opts:['分配管道','用户引入管道','室内燃气管道','车间燃气管道'],ans:2,exp:'（1）输气管道：从气源向储配站或天然气门站向高压调压站或大型工业企业输气的管道。 （2）分配管道：在供气地区将燃气分配给工业企业用户、商业用户和居民用户，分配管道包括街区和庭院的分配管道。 （3）用户引入管：将燃气从分配管道引到用户室内管道引入口处的总阀门。 （4）室内燃气管道：通过用户管道引入口的总阀门将燃气引向室内，并分配到每个燃具。'},{id:549,ch:5,type:'multi',q:'城市燃气输配管道分为（  ）。',opts:['输气管道','分配管道','用户引入管','炉前燃气管道','室内燃气管'],ans:[1,2,4],exp:'根据用 途分 长距离输气管道 干管及支管的末端连接城市或大型工业企业，作为供应区的气源点 城市燃气管道 分配管道 用户引入管 室内燃气管道 工业企业燃气管道 根据敷设方式分 埋地燃气管道 城市中常采用直埋或地沟方式敷设 架空燃气管道 根据输气压力分类'},{id:550,ch:5,type:'single',q:'燃气管道输气压力为0.6MPa，则其为（  ）燃气管道。',opts:['低压','中压A','次高压B','次高压A'],ans:2,exp:'正确答案为C。次高压B\n\n📖 教材依据（城市管道工程）：......…......................….......….............................2595.2城市燃气管道工程…….........….......….......…….........….......….......……………….........…2765.3城市供热管道工程……..............….......….....…......…...............…….......……................2935.……'},{id:551,ch:5,type:'single',q:'水平定向钻作业，下列说法错误的是（ ）。',opts:['穿越施工过程中，泥浆宜循环使用','入土点设置接纳泥浆涌出的泥浆池或泥浆罐','水平定向钻机的选用根据计算的最大回拖力确定','钻机最大回拖力不宜小于计算值的两倍'],ans:1,exp:'正确答案为B。入土点设置接纳泥浆涌出的泥浆池或泥浆罐\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。\n\n穿越施工过程中，泥浆宜循环使用。在出土点设置接纳泥浆涌出的泥浆池或泥浆罐。施工完成后，使用槽车将废浆清运至环保部门指定的地点排放。'},{id:552,ch:5,type:'single',q:'夯管施工作业，下列说法错误的是（ ）。',opts:['夯进的管道应为钢管','燃气管道铺设中，夯进管道不宜作为钢套管使用','夯管长度一般不超过80m','在卵石层、杂填土层中夯进，地层中最大卵砾石粒径不得超过0.5倍的夯进管外径'],ans:1,exp:'夯管施工是利用特殊的设备，将钢管沿着设计路线夯进的施工方法。夯进的管道应为钢管，在燃气管道铺设中，夯进管道一般作为钢套管使用。夯管长度一般不超过80m。在卵石层、杂填土层中夯进，地层中最大卵砾石粒径或最大块状物的尺寸不得超过0.5倍的夯进管外径。'},{id:553,ch:5,type:'multi',q:'夯进施工要点，下列说法错误的是（ ）。',opts:['开始夯进时应先进行试夯','试夯长度宜为3～5m','夯进前进行排土作业','排土方式不得采用机械方式','大口径管道可采用气压、水压方法'],ans:[2,3,4],exp:'④ 夯管完成后进行排土作业，排土方式采用人工结合机械方式；小口径管道可采用气压、水压方法；排土完成后应进行余土、残土的清理。'},{id:554,ch:5,type:'multi',q:'地下燃气管道穿过（  ）时应将燃气管道敷设在套管内。',opts:['排水管','热力管沟','隧道','建筑物和大型构筑物','加气站'],ans:[0,1,2],exp:'正确答案为A、B、C。排水管；热力管沟；隧道\n\n📖 教材依据（城市管道工程）：道或电缆同沟敷设。当需要同沟敷设时，必须采取有效的安全防护措施。第5章城市管道工程283④燃气输配管道不应在排水管(沟)、供水管渠、热力管沟、电缆沟、城市交通隧道、城市轨道交通隧道和地下人行通道等地下构筑物内敷设。当确需穿过时，应采取有效的防护措施。⑤燃气管道穿越铁路、高速公路、电车轨道或城镇主要干道时应符合下列要求:a.穿越铁路或高速公路的燃气管道，其外应加套管，并提高绝缘防腐等级。'},{id:555,ch:5,type:'single',q:'燃气管道穿越铁路时应加套管，套管内径应比燃气管道外径大（  ）以上。',opts:['50mm','70mm','100mm','150mm'],ans:2,exp:'正确答案为C。100mm\n\n📖 教材依据（城市管道工程）：管道工程283④燃气输配管道不应在排水管(沟)、供水管渠、热力管沟、电缆沟、城市交通隧道、城市轨道交通隧道和地下人行通道等地下构筑物内敷设。当确需穿过时，应采取有效的防护措施。⑤燃气管道穿越铁路、高速公路、电车轨道或城镇主要干道时应符合下列要求:a.穿越铁路或高速公路的燃气管道，其外应加套管，并提高绝缘防腐等级。'},{id:556,ch:5,type:'multi',q:'关于燃气管道穿越铁路时设置套管的说法，正确的是（  ）。',opts:['必须采用钢筋混凝土管','套管内径比燃气管外径大100mm以上','管道宜垂直与铁路布置','套管两端与燃气管的间隙应采用柔性的防腐、防水材料密封','套管埋设深度，铁路轨底至套管顶不应小于1.2m'],ans:[1,2,3],exp:'套管埋设的深度应符合铁路管理部门的要求；宜采用钢管或钢筋混凝土管；内径应比燃气管道外径大100mm以上；两端与燃气管的间隙应采用柔性防腐、防水材料密封，其一端应装设检漏管；端部距路堤坡脚外的距离不应小于2.0m。'},{id:557,ch:5,type:'single',q:'燃气管道利用道路桥梁跨越河流时，其技术要求错误的有（  ）。',opts:['燃气管道输送压力可为0.2MPa','必须为加厚的无缝钢管','燃气管道在桥梁上的部分要提高防腐等级','燃气管道在桥梁上的部分应设置必要的补偿和减振措施'],ans:1,exp:'正确答案为B。燃气管道利用道路桥梁跨越河流时，技术要求正确的是：燃气管道的输送压力不应大于0.4MPa；管道应采用加厚的无缝钢管或焊接钢管；管外壁应达到加强级的防腐等级。B选项错误，要求的是加厚的无缝钢管或焊接钢管，不仅仅是加厚的无缝钢管。\n\n📖 教材依据（城市管道工程）：燃气管道利用道路桥梁跨越河流时，其技术要求：燃气管道的输送压力不应大于0.4MPa；管道应采用加厚的无缝钢管或焊接钢管；管外壁应达到加强级的防腐等级。'},{id:558,ch:5,type:'multi',q:'燃气管道穿越河底时，应符合下列要求（  ）。',opts:['燃气管宜采用钢管','通航河流，覆土厚度应满足疏浚和投锚深度要求','埋设管道位置的河流两岸上游应设立标志','燃气管道对接安装引起的误差为3°时，设置弯管','低压燃气管道的弯管应考虑盲板力'],ans:[0,1],exp:'b.燃气管道至河床的覆土厚度应根据水流冲刷条件及规划河床标高确定，对于通航河流，还应满足疏浚和投锚深度要求。 c.稳管措施应根据计算确定。 d.在埋设燃气管道位置的河流两岸上、下游应设立标志。 e.燃气管道对接安装引起的误差不得大于3°,否则应设置弯管；次高压燃气管道的弯管应考虑盲板力。'},{id:559,ch:5,type:'multi',q:'燃气管网对口焊接的基本要求错误的是（）',opts:['可采用对口器固定，不得强力对口','焊接前打坡口','两管道纵向焊缝错开，间距应不小于50mm弧长','对口完成后应立即进行打底焊','定位焊前拆除对口器，进行焊口编号，对好的口必须当天焊完'],ans:[2,3,4],exp:'④ 对口时将两管道纵向焊缝(螺旋焊缝)相互错开，间距应不小于100mm弧长。 ⑤ 对口完成后应立即进行定位焊，定位焊的焊条应与管口焊接焊条材质相同，定位焊的厚度与坡口第一层焊接厚度相近，但不应超过管壁厚度的70%,焊缝根部必须焊透，定位焊应均匀、对称，总长度不应小于焊道总长度的50%。钢管的纵向焊缝(螺 旋焊缝)端部不得进行定位焊。'},{id:560,ch:5,type:'single',q:'钢管防腐的做法错误的是（ ）。',opts:['现场无损检测完成后补口防腐','焊口防腐后应用电火花检漏仪检查','焊口除锈可用喷砂除锈的方法，除锈后及时防腐','防腐层表层固化2h后进行电火花仪检测'],ans:0,exp:'正确答案为A。现场无损检测完成后补口防腐\n\n📖 教材依据（城市管道工程）：分段焊接完成后，对固定焊口应在接口处提前挖好工作坑。(3)钢管防腐的做法现场施工时，钢管防腐主要为对焊口处防腐处理。对焊口的处理要求如下:①现场无损检测完成及分段强度试验后进行补口防腐。防腐前钢管表面的处理应,..,第5章城市管道工程285符合《涂覆涂料前钢材表面处理表面清洁度的目视评定第2部分:巳涂覆过的钢材表面局部清除原有涂层后的处理等级~GB/T8923.2-2008和《涂装前钢材表面处理规范》SY/T0407-2024规定，其等级不低于Sa2.5级。\n\n现场无损检测完成及分段强度试验后进行补口防腐'},{id:561,ch:5,type:'multi',q:'聚乙烯燃气管道优点包括（ ）。',opts:['重量轻','耐腐蚀','阻力小','承压能力高','抗破坏能力强'],ans:[0,1,2],exp:'正确答案为A、B、C。重量轻；耐腐蚀；阻力小\n\n📖 教材依据（城市管道工程）：高程进行控制。(7)桥梁施工过程应按照设计要求进行变形观测，并保护好基点和长期观测点。3.城市管道施工测量(1)各类管道工程施工测量控制点包括起点、终点、折点、井室(支墩、支架)中心点、变坡点等特征控制点。重力流排水管道中线桩间距宜为10m，给水管道、燃气管道和供热管(沟)道的中心桩间距宜为15~20m。'},{id:562,ch:5,type:'multi',q:'聚乙烯管材贮存说法正确的是（ ）。',opts:['遵照“先进后出” 的原则','可与油类或化学品混合存放','直管可采用梯形堆放','两侧加支撑保护的矩形堆放时，堆放高度不宜超过1.5m','生产到使用期间，管材存放时间超过4年不可使用'],ans:[2,3],exp:'a.管材、管件和阀门应按不同类型、规格和尺寸分别存放，并应遵照“先进先出” 的原则。 c.管材、管件和阀门应远离热源，严禁与油类或化学品混合存放。 f.从生产到使用期间，管材存放时间超过4年、密封包装的管件存放时间超过6年，应对其抽样检验，性能符合要求方可使用。'},{id:563,ch:5,type:'multi',q:'聚乙烯管道应采用电熔连接范围有（ ）。',opts:['PE80与PE80','熔体质量流动速率差值大于等于0.5g/10min','焊接端部标准尺寸比为SDR17.6','公称外径小于90mm','壁厚小于6mm'],ans:[1,3,4],exp:'③不同级别(PE80 与PE100) 、 熔体质量流动速率差值大于等于0.5g/10min(190℃, 5kg)、 焊接端部标准尺寸比(SDR) 不同、 公称外径小于90mm 或壁厚小于6mm的聚乙烯管材、管件和阀门，应采用电熔连接。'},{id:564,ch:5,type:'multi',q:'热熔对接连接，说法正确的有（ ）。',opts:['管道应在同一轴线上','错边量不应大于壁厚的20%，且不得大于2mm','接头冷却应采用自然冷却','保压冷却期间，为保证连接质量可施加外力','保压冷却期间，不得拆开夹具'],ans:[0,2,4],exp:'正确答案为A、C、E。管道应在同一轴线上；接头冷却应采用自然冷却；保压冷却期间，不得拆开夹具\n\n📖 教材依据（城市管道工程）：放时间超过6年，应对其抽样检验，性能符合要求方可使用。(3)聚乙烯管材、管件和阅门连接方式的选择①聚乙烯管材与管件、阀门的连接方式有:热熔对接连接、电熔承插鞍形连接。热熔连接是聚乙烯管道的主要连接方法，操作方便、接头强度高、密封性好;热熔连接采用专用热熔连接设备，对于小口径管道常采用手持式熔接器进行连接，对于大口径管道常采用固定式全自动热熔焊机进行连接。\n\n管道应在同一轴线上，错边量不应大于壁厚的10%。 接头冷却应采用自然冷却。在保压冷却期间，不得拆开夹具，不得移动连接件或 在连接件上施加任何外力。'},{id:565,ch:5,type:'multi',q:'法兰连接，说法正确的有（ ）。',opts:['两法兰盘上螺孔应对中','法兰面应相互垂直','螺栓规格应一致，螺母对称至于两侧','不得强力组装','法兰盘在静置8～10h后，应二次紧固'],ans:[0,3,4],exp:'两法兰盘上螺孔应对中，法兰面应相互平行，螺栓孔与螺栓直径应配套，螺栓规格应一致，螺母应在同一侧；紧固法兰盘上的螺栓应按对称顺序分次均匀紧固，不得强力组装；螺栓拧紧后宜伸出螺母1～3倍螺距。法兰盘在静置8～10h后，应二次紧固。'},{id:566,ch:5,type:'single',q:'燃气管道回填，(Ⅱ)区压实度为（ ）。',opts:['不应小于85%','不应小于90%','不应小于95%','不应小于96%'],ans:1,exp:'对 （I）区部位采用中、粗砂或细土分层回填， 每层厚度应为100～200mm，压实度不应小于90%。 对（Ⅱ）区部位采用符合要求的原土或中、粗砂回填， 压实度不应小于90%。 对（Ⅲ）区部位，采用原土分层回填，压实度应符合相应地面对压实度的要求。'},{id:567,ch:5,type:'single',q:'聚乙烯燃气管道从下至上依次是（  ）。',opts:['示踪线→警示带→保护板→地面标志','示踪线→保护板→警示带→地面标志','保护板→示踪线→警示带→地面标志','保护板→警示带→示踪线→地面标志'],ans:1,exp:'正确答案为B。示踪线→保护板→警示带→地面标志\n\n📖 教材依据（城市管道工程）：。(3)埋地管道沿线应设置里程桩、转角桩和警示牌等永久性标志。3)聚乙烯管道警示装置敷设聚乙烯管道敷设随管走向敷设示踪线、警示带、保护板，设置地面标志。(1)示踪线应敷设在聚乙烯燃气管道的正上方，并应有良好的导电性和有效的电气连接，示踪线上应设置信号酒、井。(2)警示带宜敷设在管顶上方300~500mm处，但不得敷设在路面结构层内。'},{id:568,ch:5,type:'single',q:'按燃气流动方向，安装在管道最高点和每个阀门之前的附属设备是（  ）。',opts:['放散管','排水器','补偿器','绝缘接头'],ans:0,exp:'正确答案为A。放散管\n\n📖 教材依据（城市管道工程）：0666-2011、《混凝土结构工程施工质量验收规范>>GB50204-2015等规范规定和设计要求执行。③混凝土浇筑后的12h以内，对混凝土加以覆盖保湿养护，保湿养护可采用洒水、覆盖、喷涂养护剂等方式。采用塑料薄膜、塑料薄膜加土工织物、塑料薄膜加草帘覆盖养护时，塑料薄膜应紧贴1昆凝土裸露表面，塑料薄膜内应保持有凝结水。'},{id:569,ch:5,type:'single',q:'关于燃气管道阀门，说法错误的是（  ）。',opts:['阀体上有标志，箭头所指方向即介质的流向','阀门手轮不得向下，避免仰脸操作','阀门手轮宜位于齐胸高度，以便启阀','减压阀可倾斜安装在水平管道上'],ans:3,exp:'正确答案为D。减压阀可倾斜安装在水平管道上\n\n📖 教材依据（城市管道工程）：上，不得歪斜;在工艺允许的前提下，间门手轮直位于齐胸高，以便于启阀;明杆闸阀不要安装在地下，以防腐蚀。④安装位置有特殊要求的阀门，如减压阀要求直立地安装在水平管道上，不得倾斜;安全间也应垂直安装。⑤安装时，与阀门连接的法兰应保持平行，其偏差不应大于法兰外径的1.5%0，且不得大于2mm。⑥严禁强力组装，安装过程中应保证受力均匀，阀门下部应根据设计要求设置承重支撑。\n\n减压阀要求直立地安装在水平管道上，不得倾斜；安全阀也应垂直安装'},{id:570,ch:5,type:'multi',q:'城镇燃气管网工程施工中，当阀门与管道以（  ）方式连接时，阀门应在关闭状态下安装。',opts:['承插','焊接','热熔','法兰','螺纹'],ans:[3,4],exp:'正确答案为D、E。法兰；螺纹\n\n📖 教材依据（城市管道工程）：后进行管道基础及管道施工。④施作管道基础:管道基础按照本书5.1.1中5.要求施工。⑤管道安装:管道安装按照本书5.1.1中6.要求施工。⑥沟槽回填和支撑体系拆除:支撑体系应分层、分段拆除，沟槽回填到一定高度后，方可拆除相应支撑。⑦拉森钢板桩拔除在全部地下工程完成并回填后进行钢板桩拔除。拔桩时应采取以下措施:a.根据土质情况，可在拔桩前靠桩边沿灌入清水，减少摩阻力。'},{id:571,ch:5,type:'single',q:'为保证管网的安全与操作方便，地下燃气管道上的阀门一般都设置在（  ）。',opts:['阀门井底','阀门井内','地面上','距阀门井墙较远处'],ans:1,exp:'正确答案为B。阀门井内\n\n📖 教材依据（城市管道工程）：成爆炸性的混合气体。③放散管应装在最高点和每个阀门之前(按燃气流动方向)。放散管上安装球阀，燃气管道正常运行中必须关闭。5)阀门井为保证管网的安全与操作方便，燃气管道的地下阀门宜设置阀门井。阀门井应坚固耐久，有良好的防水性能，并保证检修时有必要的空间。井筒结构可采用砌筑、现浇混凝土、预制混凝土等结构形式。\n\n放散管保证管网的安全与操作方便，地下燃气管道上的阀门一般都设置在阀门井内。阀门井应坚固、耐久，有良好的防水性能，并保证检修时有必要的空间。考虑到人员的安全，井筒不宜过深。'},{id:572,ch:5,type:'multi',q:'管道吹扫应符合下列要求（  ）。',opts:['应由管道厂家负责组织吹扫工作','按庭院管、支管、主管的顺序进行吹扫','阀门已安装完毕','吹扫出口前严禁站人','吹扫介质宜采用压缩空气，严禁采用氧气和可燃性气体'],ans:[3,4],exp:'(2)管道安装检验合格后，应由施工单位负责组织吹扫工作，并应在吹扫前编制吹扫方案。 (3)应按主管、支管、庭院管的顺序进行吹扫，吹扫出的脏物不得进入已吹扫合格的管道。 (4)吹扫管段内的调压器、阀门、孔板、过滤网、燃气表等设备不参与吹扫，待吹扫合格后再安装复位。'},{id:573,ch:5,type:'multi',q:'燃气管道严密性试验需具备的条件有（  ）。',opts:['管道安装检验合格','吹扫合格设备复位','强度试验合格','管线全线回填后','其他试验完成后'],ans:[2,3],exp:'正确答案为C、D。强度试验合格；管线全线回填后\n\n📖 教材依据（城市管道工程）：放(抽)净，并按《城镇燃气输配工程施工及验收标准~GB/T51455-2023要求进行管道吹扫。3.严密性试验输配管道和厂站工艺管道均应在强度试验合格后进行严密性试验。1)试验压力应满足下列要求(1)低压管道严密性试验压力为设计压力，且不小于5kPa。(2)中压及以上管道严密性试验压力为设计压力，且不应小于O.lMPa。\n\n严密性试验应在强度试验合格后进行，且管线全线应回填，以减少管内温度变化对试验的影响。'},{id:574,ch:5,type:'single',q:'聚乙烯管(SDR17.6)，强度试验压力为（  ）。',opts:['设计输气压力的1.5倍','设计输气压力的1.5倍且不小于0.4MPa','设计输气压力的1.25倍且不小于0.4MPa','设计输气压力的1.5倍且不小于0.2MPa'],ans:3,exp:'正确答案为D。设计输气压力的1.5倍且不小于0.2MPa\n\n📖 教材依据（城市管道工程）：管、钢管等。(2)按管材分为:钢管、球墨铸铁管、钢筋混凝土管、预(自)应力混凝土管、第1篇市政公用工程技术260预应力钢筒混凝土管、玻璃钢管、硬聚氯乙烯管(UPVC)、聚乙烯管(PE)、聚丙烯管(pp)及其钢塑复合管、聚乙烯缠绕结构壁管等。(3)按接口形式可分为:平口管、企口管、承插口管等。2.开槽施工工艺流程(1)压力管道:测量放线→沟槽开挖→验槽→管道基础→管道安装→检查井砌筑→压力管道管节回填芳实→功能性试验→填土穷实。'},{id:575,ch:5,type:'single',q:'直接按热媒分类的热力管网是（  ）。',opts:['热水热网','一级管网','地沟管网','闭式管网'],ans:0,exp:'正确答案为A。热水热网\n\n📖 教材依据（城市管道工程）：C的蒸汽管网。(2)工作压力小于或等于2.5MPa，介质设计温度小于或等于200"C的热水管网。可分为高压、中压、低压蒸汽热网可分为高温热水热网(水温超过IOO\'C)和低温热水热网(水温不超过IOO\'C)图5.3-1供热管网按热媒分类示意图2.按所处位置分类(见图5.3-2)由热源至热力站的供热管道由热力站至热用户的供热管道图5.3-2供热管网按所处位置分类示意图3.按敷设方式分类(见图5.3-3)可分为;通行、半通行、不通行管沟(隧道)可分为:高支架、中支架、低支架管道直接埋设在地下，无管沟图……'},{id:576,ch:5,type:'multi',q:'关于管道安装与焊接的说法，正确的是（  ）。',opts:['管道端部可做十字形焊缝','焊口不得置于建（构）筑物等的墙壁中','管道支架处不得有环形焊缝','应先安装检查室，再安装主线，最后安装支线','管道两相邻环形焊缝中心之间的距离应大于钢管外径，且不得小于150mm'],ans:[1,2,4],exp:'正确答案为B、C、E。焊口不得置于建（构）筑物等的墙壁中；管道支架处不得有环形焊缝；管道两相邻环形焊缝中心之间的距离应大于钢管外径，且不得小于150mm\n\n📖 教材依据（城市管道工程）：接缝宽度和深度。(4)采用焊接接口时，两端管的环向焊缝处齐平，内壁错边量不宜超过管壁厚度的20%，且不得大于2mm。管道任何位置不得有十字形焊缝。(5)采用电熔连接、热熔连接接口时，应选择在当日温度较低或接近最低时进行;电熔连接、热熔连接时电热设备的温度控制、时间控制，挤压焊接时对焊接设备的操作等，必须严格按接头的技术指标和设备的操作程序进行;接头处应有沿管节圆周平滑对称的内、外翻边;接头检验合格后，内翻边宜铲平。\n\n钢管对口时，纵向焊缝之间应相互错开100mm弧长以上，管道任何位置不得有十字形焊缝。 管道安装顺序：一般情况下，应先安装主线，再安装检查室，最后安装支线。'},{id:577,ch:5,type:'single',q:'钢管对口错边量允许偏差受（  ）影响。',opts:['管材','管道外径','管道壁厚','管道内径'],ans:2,exp:'正确答案为C。管道壁厚\n\n📖 教材依据（城市管道工程）：的钢管、焊接材料、焊接方法、焊后热处理等，应进行焊接工艺评定，并根据评定报告确定焊接工艺。⑨焊材:所用焊丝和焊条应与母材材质相匹配，直径应根据管道壁厚和接口形式选择。受潮、生锈、掉皮的焊条不得使用。焊条在使用前应按出厂质量证明书的要求烘干，烘干后装入保温筒进行保温，随用随取。⑩焊接顺序:根据管径大小应对焊缝沿周长进行排位，采取合理的焊接顺序，避免应力集中、管口变形。'},{id:578,ch:5,type:'multi',q:'预制直埋管道安装施工要点，正确的是（  ）。',opts:['接头保温在管道安装完毕后进行','接头的外护层安装完成，全部进行气密性检验','气密性检验采用涂上肥皂水的方法检查','气密性检验压力0.02MP，保压时间不应少于2min','直埋保温水管在穿套管前应完成接头保温施工'],ans:[1,2,3,4],exp:'a.直埋管接头保温应在管道安装完毕及强度试验合格后进行。 b.接头保温施工前，应将接头钢管表面、两侧保温端面和搭接段外壳表面的水分、油污、杂质和端面保护层去除干净。 c.接头保温的结构、保温材料的材质及厚度应与预制直埋保温管相同。 d.接头外护层安装完成后，必须全部进行气密性检验并应合格。气密性检验的压力为0.02MPa，保压时间不应少于2min，压力稳定后用肥皂水仔细检查密封处，无气泡为合格。'},{id:579,ch:5,type:'single',q:'直埋蒸汽管道安装工程中，工作管的现场接口焊接应采用氩弧焊打底，焊缝应进行100%的（  ）检查。',opts:['渗透','磁粉','超声波','射线'],ans:3,exp:'正确答案为D。射线\n\n📖 教材依据（城市管道工程）：尺寸，应考虑负温对钢材收缩的影响。在负温下制作的钢构件在进行外形尺寸检查验收时，应考虑检查时的温度影响。焊缝外观检查应全部合格，等强接头和要求焊透的焊缝应进行100%超声检查，其余焊缝可按30%~50%比例进行超声抽样检查。2.雨期施工措施(1)雨期施工应通过当地气象部门提前获取气象预报资料制定切实可行的施工组织计划、施工技术方案及应急预案，做好防范各种自然灾害的准备工作。'},{id:580,ch:5,type:'multi',q:'热力管道保温材料进场，应根据标准规定现场按批抽样检测材料的（  ）。',opts:['抗剪强度','导热系数','保温层密度','透气性','厚度'],ans:[1,2,4],exp:'正确答案为B、C、E。导热系数；保温层密度；厚度\n\n📖 教材依据（城市管道工程）：地质条件、现场条件允许时，通常采用放坡开挖基坑形式修建地下工程或构筑物的地下部分。此时保持基坑边坡的稳定是非常重要的，当基坑边坡土体中的剪应力大于土体的抗剪强度时，边坡就会失稳胡塌。一旦边坡胡塌，不但地基受到扰动，影响承载力，而且也影响周围地下管线、地面建筑物、交通和人身安全。(2)基坑放坡基本要求:放坡应以控制分级坡高和坡度为主，必要时辅以局部支护和防护措施，放坡设计与施工时应考虑雨水的不利影响。\n\n保温材料进场对品种、规格、外观等进行检查验收，从进场的每批材料中，任选1-2组试样进行导热系数、保温层密度、厚度和吸水（质量含水、憎水）率等测定。'},{id:581,ch:5,type:'multi',q:'固定支架主要用于固定管道，均匀分配补偿器之间管道的伸缩量，保证补偿器正常工作，多设置在（  ）。',opts:['阀门井旁','凝水缸旁','放散管旁','补偿器旁','附件旁'],ans:[3,4],exp:'正确答案为D、E。补偿器旁；附件旁\n\n📖 教材依据（城市管道工程）：承结构称为支架，作用是支承管道并限制管道的变形和位移，承受管道的内压力、外载荷及温度变形的弹性力，并传递到支承结构。根据支架对管道的约束作用不同，可分为活动支架和固定支架。(1)固定支架固定支架主要用于固定管道，均匀分配补偿器之间管道的伸缩量，保证补偿器正常工作，多设置在补偿器和附件旁。固定支架承受作用力较为复杂，不仅承受管道、附件、管内介质及保温结构的重量，同时还承受管道因温度、压力的影响而产生的轴向伸缩推力和变形应力，并将作用力传递到支承结构。'},{id:582,ch:5,type:'multi',q:'悬吊支架可分为（  ）等几种形式。',opts:['弹簧吊架','普通刚性吊架','滑动支架','导向支架','滚动支架'],ans:[0,1],exp:'正确答案为A、B。弹簧吊架；普通刚性吊架\n\n📖 教材依据（城市管道工程）：。当场地周围有地表第才9章施工安全管理517水汇流、排泄或地下水管渗漏时，应对基坑采取保护措施。地下水的控制方法主要有降水、截水和回灌等几种形式，这几种形式可以单独使用也可以组合使用。降水会引起基坑周围士体沉降，当基坑邻近有建筑物时，宜采用截水或回灌方法。5)控制好边坡无支撑放坡开挖的基坑要控制好边坡坡度，有支撑基坑开挖时要控制好纵向放坡坡度。'},{id:583,ch:5,type:'single',q:'支架、吊架安装说法错误的是（）',opts:['位置应正确，标高和坡度应符合设计要求','管道支架支撑面 的标高可采用加设金属垫板的方式进行调整','金属垫板不得大于三层','金属垫板与预埋钢板或钢结构进行焊接'],ans:2,exp:'正确答案为C。金属垫板不得大于三层\n\n📖 教材依据（城市管道工程）：安装前其底面基层混凝土应达到设计要求。④支架、吊架安装的位置应正确，标高和坡度应符合设计要求，管道支架支撑面的标高可采用加设金属垫板的方式进行调整，但金属垫板不得大于两层，并与预埋钢板或钢结构进行焊接。⑤固定支架卡板和支架结构接触面应贴实;活动支架的偏移方向、偏移量及导向性能应符合设计要求;弹簧吊架安装高度应按设计要求进行调整，弹簧的临时固定件，应在管道安装、试压、保温完成后拆除。'},{id:584,ch:5,type:'single',q:'相连两法兰端面应保持平行，偏差不大于法兰外径的1.5%，且不得大于（  ）。',opts:['1mm','1.5mm','2mm','2.5mm'],ans:2,exp:'正确答案为C。2mm\n\n📖 教材依据（城市管道工程）：体钢筋及模板进行切割或焊接。隔离套管内端应堵严。③同时张拉多根预应力筋时，各根预应力筋的初始应力应一致。张拉过程中应使活动横梁与固定横梁始终保持平行。④张拉程序应符合设计要求，设计未要求时，其张拉程序应符合表2.1-5的要求。⑤张拉过程中，预应力筋不得断丝、断筋或滑丝。⑥放张预应力筋时混凝土强度必须符合设计要求，设计未要求时，不得低于设计混凝土强度等级值的75%。\n\n两个法兰连接端面应保持平行，偏差不大于法兰外径的1.5%，且不得大于2mm；不得采用加偏垫、多层垫或加强力拧紧法兰一侧螺栓的方法来消除法兰接口端面的偏差。'},{id:585,ch:5,type:'single',q:'阀门的主要作用不包括（）',opts:['启闭管路','调节被输送介质流向','调节被输送介质压力','调节被输送介质温度'],ans:3,exp:'正确答案为D。调节被输送介质温度\n\n📖 教材依据（城市管道工程）：，需要用垫圈调整时，每个螺栓只能采用一个垫圈。⑨法兰距支架或墙面的净距不应小于200mm。4)阀门安装①阀门的作用:阀门是用启闭管路，调节被输送介质流向、压力、流量，以达到控制介质流动、满足使用要求的重要管道部件。②阅门的类型和特点:供热管道工程中常用的阀门有:闸阀、截止阀、止回阀、柱塞阀、蝶阀、球阅、减压阀、安全阀、疏水阀及平衡阀等。'},{id:586,ch:5,type:'single',q:'焊接蝶阀的安装错误的是（  ）。',opts:['阀板的轴应安装在水平方向上','轴与水平面的最大夹角不应大于60°','不得垂直安装','安装焊接前阀板打开'],ans:3,exp:'a.阀板的轴应安装在水平方向上，轴与水平面的最大夹角不应大于60°,不得垂直安装。b.安装焊接前应关闭阀板，并应采取保护措施。'},{id:587,ch:5,type:'single',q:'下列（ ）适用于三向位移的热力管道',opts:['方形补偿器','球形补偿器','套筒式补偿器','波纹管补偿器'],ans:1,exp:'正确答案为B。球形补偿器\n\n📖 教材依据（城市管道工程）：管道横向变形要求严格。e.球形补偿器(如图5.3-12和图5.3-13所示)是由外壳、球体、密封圈压紧法兰组成，它是利用球体的角位移来补偿管道的热伸长而消除热应力的，适用于三向位移的热力管道。其优点是占用空间小，节省材料，不产生推力;但易漏水、漏汽，要加强维修。上述补偿器中，自然补偿器、方形补偿器和波纹管补偿器利用补偿材料的变形吸收热伸长，而套筒式补偿器和球形补偿器则利用管道的位移来吸收热伸长。'},{id:588,ch:5,type:'single',q:'价格低廉，占据空间大的补偿器是（  ）。',opts:['球形补偿器','方形补偿器','套管补偿器','波纹管补偿器'],ans:1,exp:'正确答案为B。方形补偿器\n\n📖 教材依据（城市管道工程）：，故在工程中只有选用合适的补偿器，才能消除热胀应力，从而确保供热管道的安全运行。③补偿器类型及特点:供热管道采用的补偿器种类很多，主要有自然补偿器、方形补偿器、波纹管补偿器、套筒式补偿器、球形补偿器等。a.自然补偿器:自然补偿，是利用管路几何形状所具有的弹性来吸收热变形。最常见的是将管道两端以任意角度相接，多为两管道垂直相交。'},{id:589,ch:5,type:'multi',q:'换热站交接验收，参加单位有（）',opts:['土建施工单位','工艺安装单位','监理单位','设计单位','建设单位'],ans:[0,1,2],exp:'正确答案为A、B、C。土建施工单位；工艺安装单位；监理单位\n\n📖 教材依据（城市管道工程）：应的隔震、防沉降的措施。设备进场应对设备数量、包装、型号、规格、外观质量和技术文件进行开箱检查，填写相关记录，合格后方可安装。③管道及设备安装前，土建施工单位、工艺安装单位和监理单位应对预埋吊点的数量与位置以及设备基础位置、表面质量、几何尺寸、标高及混凝土质量，预留孔洞的位置、尺寸、标高等共同复核检查，并办理书面交验手续。'},{id:590,ch:5,type:'multi',q:'关于城镇供热管网试验的说法，正确的是（  ）。',opts:['强度试验压力为1.25倍PN，且不低于0.6MPa','严密性试验压力为1.15倍PN，且不得低于0.6MPa','强度试验目的是试验管道本身与安装焊口的强度','严密性试验是在各管段强度试验合格且应该是管道安装内容施焊工序全部完成后进行','严密性试验长度与强度试验长度一致'],ans:[2,3],exp:'正确答案为C、D。强度试验目的是试验管道本身与安装焊口的强度；严密性试验是在各管段强度试验合格且应该是管道安装内容施焊工序全部完成后进行\n\n📖 教材依据（城市管道工程）：度等级不得低于1.0级。压力表的量程应为试验压力的1.5~2倍，数量不得少于两块。压力表应安装在试验泵出口和试验系统末端。(3)强度试验压力为1.5倍设计压力，且不得小于0.6MPa。充水时应排净系统内的气体，在试验压力下稳压10min，检查无渗漏、无压力降后降至设计压力，在设计压力下稳压30min，检查无渗漏、无压力降为合格。'},{id:591,ch:5,type:'multi',q:'关于起重设备或垂直运输系统说法正确的（  ）。',opts:['起重设备必须经过起重荷载计算','起重作业前应试吊','吊离地面500mm左右时，应检查重物捆扎情况','起吊时工作井内严禁站人','当吊运重物下井距作业面底部小于1000mm时，操作人员方可近前工作'],ans:[0,1,3],exp:'正确答案为A、B、D。起重设备必须经过起重荷载计算；起重作业前应试吊；起吊时工作井内严禁站人\n\n📖 教材依据（城市管道工程）：方法和设备条件等确定管道内通风系统模式;设备供排风能力、管道内人员作业环境等还应满足国家有关标准的规定。(6)采用起重设备或垂直运输系统:①起重设备必须经过起重荷载计算。②使用前应按有关规定进行检查验收，合格后方可使用。③起重作业前应试吊，吊离地面100mm左右时，应检查重物捆扎情况和制动性能，确认安全后方可起吊;起吊时工作井内严禁站人，当吊运重物下井距作业面底部小于500mm时，操作人员方可近前工作。\n\n③ 起重作业前应试吊，吊离地面100mm左右时，应检查重物捆扎情况和制动性能，确认安全后方可起吊；起吊时工作井内严禁站人，当吊运重物下井距作业面底部小于500mm时，操作人员方可近前工作。'},{id:592,ch:5,type:'multi',q:'沟槽回填主要控制项目（  ）。',opts:['回填材料','柔性管道的变形率','刚性管道的外径','有功能性试验要求的管道试验合格','回填土压实度'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。回填材料；柔性管道的变形率；有功能性试验要求的管道试验合格；回填土压实度\n\n📖 教材依据（城市管道工程）：通裂缝和明显缺损情况;柔性管道的管壁不得出现纵向隆起、环向扁平和其他变形情况;管道竖向变形率不得超过要求;管道铺设安装应稳固，管道安装后应线形平直。各种管道连接接口详见国家相关规范要求。沟槽回填主要控制项目:回填材料;柔性管道的变形率;有功能性试验要求的管道，试验合格;回填土压实度。(3)不开槽施工管道主要控制项目工作井:原材料、成品、半成品的产品质量，结构的强度、刚度和尺寸，海凝土结构的抗压强度等级、抗渗等级。'},{id:593,ch:5,type:'single',q:'柔性管道回填时间宜在一昼夜中（  ）气温时段。',opts:['平均','最高','最低','管材要求的'],ans:2,exp:'正确答案为C。最低。柔性管道回填时间宜在一昼夜中气温最低时段，因为低温时管道收缩，回填后随着气温升高管道膨胀，有利于减少管道变形。\n\n📖 教材依据（城市管道工程）：柔性管道回填时间宜在一昼夜中气温最低时段，因为低温时管道处于收缩状态，回填后随着气温升高管道膨胀，管道与回填土结合更紧密，有利于控制管道变形。'},{id:594,ch:5,type:'single',q:'柔性管道回填施工质量控制错误的是（ ）。',opts:['管道主体安装检验合格后，沟槽应及时回填，但需留出未检验的安装接口','管道中心标高以下回填时应采取防止管道上浮、位移的措施','管内径大于800mm柔性管道，回填施工时应在管内采取预变形措施','管基基础支承角范围采用黏土填充并捣固密实'],ans:3,exp:'正确答案为D。管基基础支承角范围采用黏土填充并捣固密实\n\n📖 教材依据（城市管道工程）：量检查，回填材料条件变化或来源变化时，应分别取样检测。b.回填土压实度应符合设计要求。C.回填应达到设计高程，表面应平整。d.回填时管道及附属构筑物无损伤、沉降、位移。②柔性管道回填施工质量控制是柔性管道工程施工质量控制的关键。除一般要求以外柔性管道回填还应符合以下要求:a.柔性管道回填前应选取长度为一个井段或不少于50m的试验段，按设计要求选择回填材料，特别是管道周围回填需用的中粗砂;按照施工方案的回填方式进行现场试验，明确压实遍数、压实工具、虚铺厚度和含水量;因工程因素变化改变回填方式时，应重新进行现场试验。'},{id:595,ch:5,type:'single',q:'关于水平定向钻导向孔钻进施工的说法，正确的是（ ）。',opts:['导向孔钻进时发现偏差应立即大幅度纠正，以确保快速复位','入土段和出土段直线钻进长度宜控制在10m左右','随钻测量顶角、方位角等参数，用于计算钻头空间位置并指导纠偏','每钻进两根钻杆应进行一次导向探测'],ans:2,exp:'正确答案为C。随钻测量顶角、方位角等参数，用于计算钻头空间位置并指导纠偏\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。\n\nA错误，应采用小角度逐步纠偏，不可大幅度急纠；B错误，直线长度宜控制在20m左右； D错误，应为每进一根钻杆进行探测。'},{id:596,ch:5,type:'multi',q:'关于水平定向钻导向孔钻进施工技术，正确的有（ ）。',opts:['导向孔施工的关键是钻孔轨迹的监测和控制','发现偏差时应采用小角度逐步纠偏','钻孔轨迹偏差不得大于终孔直径','第一根钻杆入土钻进时应采取轻压快转方式','曲线段和有相邻管线段应减少导向探测频率'],ans:[0,1,2],exp:'正确答案为A、B、C。导向孔施工的关键是钻孔轨迹的监测和控制；发现偏差时应采用小角度逐步纠偏；钻孔轨迹偏差不得大于终孔直径\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。'},{id:597,ch:5,type:'multi',q:'关于水平定向钻扩孔、清孔施工技术，正确的有（ ）。',opts:['扩孔目的是将孔径扩大至能容纳生产管线的要求','扩孔可一次完成或分多次完成','硬土层和岩层可使用牙轮扩孔钻头','管线铺设前应进行一次或多次清孔','分次扩孔时每次回扩的级差宜控制在150～200mm'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。扩孔目的是将孔径扩大至能容纳生产管线的要求；扩孔可一次完成或分多次完成；硬土层和岩层可使用牙轮扩孔钻头；管线铺设前应进行一次或多次清孔\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。'},{id:598,ch:5,type:'single',q:'水平定向钻管线铺设施工的说法，正确的是（ ）。',opts:['回拖管道应从入土点向出土点连续进行','回拖过程中应采用匀速慢拉的方法，严禁硬拉硬拖','发送装置仅可采用水力发送沟一种形式','管道进入设计位置后，钻孔与管道之间的空隙无需填充'],ans:1,exp:'正确答案为B。回拖过程中应采用匀速慢拉的方法，严禁硬拉硬拖\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。'},{id:599,ch:5,type:'single',q:'关于燃气管道聚乙烯管热熔连接接头检验的说法，正确的是（ ）。',opts:['热熔连接接头完成后，仅需对10%的接头进行卷边对称性检验','开挖敷设时，应不少于15%的接头进行卷边切除检验','水平定向钻非开挖施工时，应不少于15%的接头进行卷边切除检验','卷边切除检验仅适用于钢制管道，不适用于聚乙烯管'],ans:1,exp:'正确答案为B。开挖敷设时，应不少于15%的接头进行卷边切除检验\n\n📖 教材依据（城市管道工程）：5.1.2不开槽管道施工方法不开槽管道施工方法是相对于开槽管道施工方法而言，市政公用工程常用的不开槽管道施工方法有盾构法、浅埋暗挖法、顶管法、水平定向钻法、穷管法等。才.方法选择与设备选型一般要求才)工程设计文件和项目合同施工单位应按中标合同文件和设计文件进行具体方法和设备的选择。2)工程详勘资料(1)开工前施工单位应仔细核对建设单位提供的工程岩土勘察报告，进行现场沿线的调查;必要时对已有地下管线和构筑物进行人工挖探孔(通称坑探)、物探，确定第5章城市管道工程267其准确位置，以免施工造成损坏。'},{id:600,ch:6,type:'multi',q:'综合管廊附属设施包括（  ）。',opts:['消防系统','通风系统','供电系统','照明系统','给水系统'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。消防系统；通风系统；供电系统；照明系统\n\n📖 教材依据（城市综合管廊工程）：........….......…..….......….......….......…......................…309第6章城市综合管廊工程.........…......….................…...........................………….3176.才城市综合营廊分类与主要施工方法….......…......…….......….......….......…..........……3176.2城市综合管廊施工技术…...........……\n\n综合管廊附属设施包括消防系统、通风系统、供电系统、照明系统、监控与报警 系统、排水系统、标识系统等。'},{id:601,ch:6,type:'multi',q:'综合管廊缓解了直埋管线存在的（ ）问题。',opts:['检修及敷设管线需不断破挖路面','各管线分属不同部门管理，信息不畅，重复建设','直埋管线与土壤接触，易造成管线腐蚀、损坏','电力线缆占地大，影响城市规划及市容','设计不合理，影响城市规划及市容'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。检修及敷设管线需不断破挖路面；各管线分属不同部门管理，信息不畅，重复建设；直埋管线与土壤接触，易造成管线腐蚀、损坏；电力线缆占地大，影响城市规划及市容\n\n📖 教材依据（城市综合管廊工程）：城市管道工程安全质量控制....
