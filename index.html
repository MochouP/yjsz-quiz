板拆除顺序应考虑预应力建立情况','底模可在预应力张拉前拆除'],ans:[0,1,3],exp:'正确答案为A、B、D。侧模应在预应力张拉前拆除；底模应在结构建立预应力后拆除；模板拆除顺序应考虑预应力建立情况\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\nC选项错误，侧模和底模拆除时间不同；E选项错误，底模应在预应力建立后拆除。'},{id:238,ch:2,type:'multi',q:'模板、支架和拱架拆除下列说法正确的是（  ）。',opts:['“先支后拆、后支先拆” 的原则','卸落量宜由大渐小','横向应同时卸落、在纵向应对称均衡卸落','悬臂梁结构的模板宜从固定端开始顺序卸落','预应力混凝土结构的侧模应在预应力张拉后拆除'],ans:[0,2],exp:'(3)模板、支架和拱架拆除应遵循“先支后拆、后支先拆”的原则。支架和拱架应按几个循环卸落，卸落量宜由小渐大。每一循环中，在横向应同时卸落、在纵向应对称均衡卸落。简支梁、连续梁结构的模板应从跨中向支座方向依次循环卸落；悬臂梁结构的模板宜从悬臂端开始顺序卸落。 (4)预应力混凝土结构的侧模应在预应力张拉前拆除；底模应在结构建立预应力后拆除。'},{id:239,ch:2,type:'single',q:'关于模板安装的说法，正确的是（ ）。',opts:['模板应与脚手架牢固连接，以增强整体稳定性','梁、板底模板应按设计要求设置预拱度','侧模板安装时无需设置防倾覆设施','预埋件安装可待混凝土浇筑时临时插入'],ans:1,exp:'正确答案为B。梁、板底模板应按设计要求设置预拱度\n\n📖 教材依据（城市桥梁工程）：工环境，编制专项施工方案，并进行受力验算，也可纳入钢箱梁专项施工方案，经专家评审，相关单位审批后实施，确保施工安全。②临时支架主柱底板与基础预埋钢板牢固连接，支架安装完成后在支架横梁上标注箱梁安装就位控制点、高程控制点。③临时支架旁有交通通行需要的，一方面要做好交通疏导，设立醒目安全警示标识，另一方面在支架外侧做好防撞墙，防止汽车撞击支架体系。\n\n教材规定：梁、板底模板应按设计要求设置预拱度（B正确）。A错误：模板不得与脚手架连接。C错误：侧模板应设置防倾覆设施。D错误：预埋件应按设计位置准确安装，不得临时插入。'},{id:240,ch:2,type:'single',q:'关于钢筋按所起作用分类的说法，正确的是（ ）。',opts:['受力筋只能承受拉力，不能承受压力','分布筋的主要作用是承受构件中的剪力','架立筋与梁内受力筋一起构成钢筋骨架','箍筋仅用于固定纵向钢筋位置，不承受剪力'],ans:2,exp:'(1)受力筋： 一般承受构件中的拉力，称为受拉钢筋。在梁、柱构件中有时还需 要配置承受压力的钢筋，称为受压钢筋。 (2)分布筋：它与板内的受力筋一起构成钢筋的骨架。 (3)架立筋：它与梁内的受力筋一起构成钢筋的骨架。 (4)构造筋：因构件的构造要求和施工安装需要配置的钢筋。架立筋和分布筋也属于构造筋。 (5)箍筋：是构件中承受剪力或扭力的钢筋，同时用来固定纵向钢筋的位置， 一 般用于梁或柱中。'},{id:241,ch:2,type:'single',q:'关于钢筋存放要求的说法，错误的是（ ）',opts:['不同规格钢筋应分别堆置并设立识别标志','存放时间不宜超过12个月','钢筋与地面之间垫高不低于200mm','顶部应采用合适材料覆盖防水'],ans:1,exp:'正确答案为B。存放时间不宜超过12个月\n\n📖 教材依据（城市桥梁工程）：在更换钻头前或容易缩孔处，均应验孔并应做记录。④排渣过程中应及时补给泥浆。⑤冲孔中遇到斜孔、梅花孔、塌孔等情况时，应采取措施后方可继续施工。⑥稳定性差的孔壁应采用泥浆循环或抽渣筒排渣，清孔后灌注混凝土之前的泥浆指标应符合要求。(5)旋挖成孔①旋挖钻成孔灌注桩应根据不同的地层情况及地下水位埋深，采用不同的成孔工艺，选用相应的钻头。\n\n规范要求钢筋存放时间不宜超过6个月，故B选项错误。'},{id:242,ch:2,type:'multi',q:'关于钢筋保管的技术要求，正确的有（ ）',opts:['应按品种、规格分批分别堆放','存放场地应设防水排水设施','可直接堆放在经压实的泥土地面上','堆放时间超过6个月需重新检验','应防止锈蚀、污染和变形'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。应按品种、规格分批分别堆放；存放场地应设防水排水设施；堆放时间超过6个月需重新检验；应防止锈蚀、污染和变形\n\n📖 教材依据（城市桥梁工程）：建道路沥青面层底部，可减少或延缓由旧路面对沥青加铺层的反射裂缝，或半刚性基层对沥青面层的反射裂缝。用于裂缝防治的玻纤网和土工织物应分别满足抗拉强度、最大负荷延伸率、网孔尺寸、单位面积质量等技术要求。玻纤网网孔尺寸宜为其上铺筑的沥青面层材料最大粒径的0.5~1.0倍。土工织物应能耐170"C以上的高温。'},{id:243,ch:2,type:'multi',q:'钢筋进场抽取试件作（）检验',opts:['屈服强度','抗压强度','伸长率','弯曲性能','重量偏差'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。屈服强度；伸长率；弯曲性能；重量偏差\n\n📖 教材依据（城市桥梁工程）：在台座上，钢筋与地面之间应垫不低于200mm的地楞;顶部采用合适的材料覆盖，防水浸、雨淋。(4)钢筋进场应按现行国家相关标准的规定，抽取试件做屈服强度、抗拉强度、伸长率、弯曲性能和重量偏差检验，检验结果应符合相应标准的规定。(5)钢筋的级别、种类和直径应按设计要求采用。当需要代换时，应由原设计单位做变更设计。\n\n教材规定：钢筋进场抽取试件作屈服强度、伸长率、弯曲性能和重量偏差检验。B选项"抗压强度"是混凝土的检验指标而非钢筋指标。钢筋主要检验其拉伸力学性能和加工性能，包括屈服强度、伸长率、弯曲性能和重量偏差。'},{id:244,ch:2,type:'multi',q:'钢筋下料后应按（  ）分别挂牌标明。',opts:['品种','种类','规格','使用部位','等级'],ans:[1,3],exp:'正确答案为B、D。种类；使用部位\n\n📖 教材依据（城市桥梁工程）：钢筋宜采用数控化机械设备在专用厂房中集中下料和加工，其形状、尺寸应符合设计的要求;加工后的钢筋，其表面不应有削弱钢筋截面的伤痕。下料后应按种类和使用部位分别挂牌标明。54第1篇市政公用工程技术(3)受力钢筋弯制和末端弯钩均应符合设计要求或规范规定。(4)箍筋末端弯钩形式应符合设计要求或规范规定。箍筋弯钩的弯曲直径应大于被箍主钢筋的直径，且HPB300钢筋不得小于箍筋直径的2.5倍，HRB400钢筋不得小于箍筋直径的5倍，且末端弯钩的弯折角度不应小于1350弯钩平直部分的长度，一般结构不宜小于箍筋……\n\n钢筋下料前，应核对钢筋品种、规格、等级及加工数量，并应根据设计要求和钢筋长度配料；下料后应按种类和使用部位分别挂牌标明。'},{id:245,ch:2,type:'single',q:'关于钢筋加工，下列说法错误的是（ ）。',opts:['优先选用机械方法调直，且不得使用卷扬机调直','箍筋末端弯钩平直部分的长度，一般结构不宜小于箍筋直径的5倍','钢筋宜从两端向中部开始弯制，弯钩应一次弯成','箍筋弯钩的弯曲直径应大于被箍主钢筋的直径'],ans:2,exp:'教材规定：钢筋宜从中部向两端开始弯制，弯钩应一次弯成（而非"从两端向中部"，C错误）。A选项优先选用机械方法调直且不得使用卷扬机调直正确。B选项箍筋末端弯钩平直部分长度一般结构不宜小于箍筋直径5倍正确。D选项弯曲直径应大于被箍主筋直径正确。'},{id:246,ch:2,type:'multi',q:'关于钢筋连接，下列说法错误的是（ ）。',opts:['钢筋接头可采用闪光对焊接','机械连接可采用套筒连接','当普通混凝土中钢筋直径大于22mm, 在无焊接条件时，可采用绑扎连接','钢筋骨架和钢筋网片的交叉点焊接宜采用埋弧压力焊或电弧焊','钢筋与钢板的T形连接，宜采用电阻点焊'],ans:[0,2,3,4],exp:'③ 当普通混凝土中钢筋直径等于或小于22mm, 在无焊接条件时，可采用绑扎连接，但受拉构件中的主钢筋不得采用绑扎连接。 ④ 钢筋骨架和钢筋网片的交叉点焊接宜采用电阻点焊。 ⑤ 钢筋与钢板的T 形连接，宜采用埋弧压力焊或电弧焊。'},{id:247,ch:2,type:'single',q:'关于钢筋接头设置要求的说法，错误的是（ ）',opts:['钢筋接头应设在受力较小区段','接头末端至钢筋弯起点的距离不得小于钢筋直径的5倍','施工中分不清受拉、受压的按受拉处理','同一连接区段内接头面积百分率100%时应选用I级接头'],ans:1,exp:'规范要求接头末端至钢筋弯起点的距离不得小于钢筋直径的10倍，故B选项错误。 钢筋机械连接接头：在混凝土结构中要求充分发挥钢筋强度或对延性要求高的部位应选用Ⅱ级或I级接头；当在同一连接区段内钢筋接头面积百分率为100%时， 应选用I级接头。 I级接头：接头抗拉强度不小于被连接钢筋抗拉强度标准值的1.1倍 Ⅱ级接头：接头抗拉强度不小于被连接钢筋抗拉强度标准值 Ⅲ级接头：接头抗拉强度不小于被连接钢筋屈服强度标准值的1.25倍'},{id:248,ch:2,type:'multi',q:'直螺纹钢筋连接接头的技术要求，正确的有（ ）',opts:['钢筋端部应采用专用切断机切平','钢筋丝头长度极限偏差应为0-2.0p','止规旋入不得超过3p','安装后单侧外露螺纹不宜超过2p','现场抽检应每1000个接头为一个验收批'],ans:[0,1,2,3],exp:'E选项错误，验收批应为500个接头。'},{id:249,ch:2,type:'single',q:'关于钢筋接头，下列说法错误的是（）',opts:['接头应设在受力较小区段，不宜位于构件的最大弯矩处','接头末端至钢筋弯起点的距离不得小于钢筋直径的10倍','直螺纹接头安装后用扭力扳手校核拧紧扭矩，校核用扭力扳手每年校核一次','直螺纹接头现场抽检不包括极限抗拉强度试验'],ans:3,exp:'正确答案为D。直螺纹接头现场抽检不包括极限抗拉强度试验\n\n📖 教材依据（城市桥梁工程）：附加锁紧螺母、顶紧凸台等措施紧固。第2章城市桥梁工程55⑩直螺纹接头安装后用扭力扳手校核拧紧扭矩，校核用扭力扳手每年校核一次。。直螺纹接头现场抽检项目应包括极限抗拉强度试验、加工和安装质量检验。抽检应按验收批进行，同钢筋生产厂、同强度等级、同规格、同类型和同型式接头应以500个为一个验收批进行检验与验收，不足500个也应作为一个验收批。\n\n⑩ 直螺纹接头安装后用扭力扳手校核拧紧扭矩，校核用扭力扳手每年校核一次。 ⑪ 直螺纹接头现场抽检项目应包括极限抗拉强度试验、加工和安装质量检验。'},{id:250,ch:2,type:'multi',q:'关于钢筋现场绑扎，下列说法错误的是（）',opts:['钢筋的交叉点应采用绑丝绑牢，不需要辅以点焊','梁和柱的箍筋，应与受力钢筋平行设置','钢筋骨架的多层钢筋之间，应用短钢筋支垫','钢筋绑扎时要考虑混凝土下料孔和振捣孔预留','圆形柱所有竖向钢筋弯钩平面应朝向圆心'],ans:[0,1],exp:'正确答案为A、B。钢筋的交叉点应采用绑丝绑牢，不需要辅以点焊；梁和柱的箍筋，应与受力钢筋平行设置\n\n📖 教材依据（城市桥梁工程）：装时，在需要焊接的位置宜采用模形卡卡紧，防止焊接时局部变形。④骨架接长焊接时，不同直径钢筋的中心线应在同一平面上。(2)钢筋现场绑扎应符合下列要求①钢筋的交叉点应采用绑丝绑牢，必要时可辅以点焊。②钢筋网的外围两行钢筋交叉点应全部扎牢，中间部分交叉点可间隔交错扎牢，但双向受力的钢筋网，钢筋交叉点必须全部扎牢。\n\n钢筋的交叉点应采用绑丝绑牢，必要时可辅以点焊；梁和柱的箍筋，应与受力钢筋垂直设置。'},{id:251,ch:2,type:'multi',q:'钢筋的混凝土保护层厚度，下列说法正确的是（）',opts:['后张构件预应力直线形钢筋不得小于其管道直径的1/2','受拉区主筋的混凝土保护层厚度40mm，应在保护层内设置直径不小于6mm间距不大于100mm的钢筋网','普通钢筋最小混凝土保护层厚度不小于钢筋公称直径','预应力直线形钢筋的最小混凝土保护层厚度不小于钢筋公称直径','钢筋机械连接件的最小保护层厚度不得小于20mm'],ans:[0,2,3,4],exp:'教材规定：后张构件预应力直线形钢筋保护层厚度不得小于管道直径的1/2（A正确）；保护层厚度大于50mm时需设钢筋网，题干说40mm错误（B错误）；普通钢筋最小保护层厚度不小于钢筋公称直径（C正确）；预应力直线形钢筋最小保护层厚度不小于公称直径（D正确）；钢筋机械连接件的最小保护层厚度不得小于20mm（E正确）。正确答案：ACDE。'},{id:252,ch:2,type:'multi',q:'制作边长150mm立方体标准养护条件有（ ）',opts:['温度20℃','温度16℃','温度22℃','相对湿度在95%以上','相对湿度在90%以上'],ans:[0,2,3],exp:'正确答案为A、C、D。温度20℃；温度22℃；相对湿度在95%以上\n\n📖 教材依据（城市桥梁工程）：槐凝土的抗压强度是通过试验得出的，用边长为150mm的立方体试件作为1昆凝土抗压强度试验的标准尺寸试件。按照《混凝土物理力学性能试验方法标准~GB!T50081-2019，制作边长为150mm的立方体在标准养护[温度(20土2)"c、相对湿度在95%以上]条件下，养护至28d龄期，用标准试验方法测得的极限抗压强度，称为混凝土标准立方体抗压强度，混凝土的强度等级应按照其立方体抗压强度标准值确定。'},{id:253,ch:2,type:'multi',q:'配制高强度混凝土的矿物掺合料可选用（ ）',opts:['优质粉煤灰','磨细矿渣粉','硅粉','磨细天然沸石粉','优质石灰'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。优质粉煤灰；磨细矿渣粉；硅粉；磨细天然沸石粉\n\n📖 教材依据（城市桥梁工程）：输等环节应执行《预拌泪凝土))GB/T14902-2012。配制混凝土用的水泥等各种原材料，其质量应分别符合相应标准。(2)配制高强度混凝土的矿物掺合料可选用优质粉煤灰、磨细矿渣粉、硅粉和磨细天然沸石粉。(3)常用的外加剂有减水剂、早强剂、缓凝剂、引气剂、防冻剂、膨胀剂、防水剂、混凝土泵送剂、喷射混凝土用的速凝剂等。\n\n配制高强度混凝土的矿物掺合料可选用优质粉煤灰、磨细矿渣粉、硅粉和磨细天然沸石粉。'},{id:254,ch:2,type:'single',q:'关于混凝土外加剂的选用，下列说法错误的是（ ）',opts:['夏季施工宜选用缓凝剂延缓混凝土凝结时间','冬季施工宜选用防冻剂保证混凝土强度发展','泵送混凝土应选用减水剂改善工作性能','喷射混凝土宜选用膨胀剂加速凝结硬化'],ans:3,exp:'正确答案为D。喷射混凝土宜选用膨胀剂加速凝结硬化\n\n📖 教材依据（城市桥梁工程）：与垫层共同作用，可控制或减少路基不均匀冻胀或体积变形对?昆凝土面层产生的不利影响;为混凝土面层提供稳定而坚实的基础，并改善接缝的荷载传递能力。②基层材料的选用原则:根据道路交通等级和路基抗冲刷能力来选择基层材料。特重交通宜选用贫混凝土、碾压混凝土或沥青混凝土;重交通道路宜选用水泥稳定粒料或沥青稳定碎石;中、轻交通道路宜选择水泥或石灰粉煤灰稳定粒料或级配粒料。\n\n喷射混凝土应选用速凝剂加速凝结，膨胀剂主要用于补偿收缩或产生预应力，故D选项错误。'},{id:255,ch:2,type:'multi',q:'混凝土配合比设计说法正确的是（ ）',opts:['混凝土配合比应采用质量比','配制的混凝土拌合物应满足和易性','预应力混凝土中的水泥用量不宜大于600kg/m³','预应力混凝土中宜使用含氯化物的外加剂','引入混凝土中的水溶性氯离子最大含量不宜超过胶凝材料用量的0.06%'],ans:[0,1,4],exp:'教材规定：混凝土配合比应采用质量比（A正确）；拌合物应满足和易性（B正确）；引入混凝土中水溶性氯离子最大含量不宜超过胶凝材料用量的0.06%（E正确）。C错误：预应力混凝土中水泥用量不宜大于550kg/m³而非600kg/m³。D错误：预应力混凝土中严禁使用含氯化物的外加剂。'},{id:256,ch:2,type:'multi',q:'下列关于混凝土施工说法正确的是（ ）',opts:['对骨料含水率的检测，每一工作班不应少于一次','对骨料含水率的检测，雨期施工应减少测定次数','混凝土拌合物应均匀，颜色一致，不得有离析和泌水现象','坍落度仅在搅拌地点检测','坍落度检测每一工作班或每一单元结构物不应少于一次'],ans:[0,2],exp:'正确答案为A、C。对骨料含水率的检测，每一工作班不应少于一次；混凝土拌合物应均匀，颜色一致，不得有离析和泌水现象\n\n📖 教材依据（城市桥梁工程）：和混凝土养护等内容。(1)原材料计量各种计量器具应按计量法的规定定期检定，保持计量准确。在1昆凝土生产过程中，应注意控制原材料的计量偏差。对骨料含水率的检测，每一工作班不应少于一次。雨期施工应增加测定次数，根据骨料实际含水率调整砂石料和水的用量。(2)棍凝土搅拌\'"""1第2章城市桥梁工程57混凝土拌合物应均匀，颜色一致，不得有离析和泌水现象。\n\n对骨料含水率的检测，每一工作班不应少于一次。雨期施工应增加测定次数 混凝土拌合物的坍落度应在搅拌地点和浇筑地点分别随机取样检测。每一工作班或每一单元结构物不应少于两次。'},{id:257,ch:2,type:'single',q:'混凝土运输、浇筑及间歇的全部时间不应超过混凝土的（  ）。',opts:['养护时间','初凝时间','振捣延续时间','终凝时间'],ans:1,exp:'正确答案为B。初凝时间\n\n📖 教材依据（城市桥梁工程）：。石灰土应湿养，养护期不宜少于7d。养护期间应封闭交通。b.水泥稳定土基层宜采用摊铺机械摊铺，自拌合至摊铺完成，不得超过弛。宜在水泥初凝时间到达前碾压成型。分层摊铺时，应在下层养护7d后，方可摊铺上层材料。宜洒水养护，保持温润。常温下成型后应经7d养护，方可在其上铺筑道路面层。C.石灰工业废渣(石灰粉煤灰)稳定砂砾(碎石)基层混合料在摊铺前其含水率宜在最佳含水率的允许偏差范围内。\n\n混凝土运输、浇筑及间歇的全部时间不应超过混凝土的初凝时间。同一施工段的混凝土应连续浇筑，并应在底层混凝土初凝之前将上一层混凝土浇筑完毕。'},{id:258,ch:2,type:'single',q:'下列关于混凝土浇筑正确的有（  ）',opts:['自高处向模板内倾卸混凝土时，其自由倾落高度不得超过3m','当倾落高度达3m时，应通过串筒、溜槽或振动溜管等设施下落','倾落高度5m时应设置减速装置','上下层同时浇筑时，上层与下层前后浇筑距离应保持1m以上'],ans:1,exp:'③ 自高处向模板内倾卸混凝土时，其自由倾落高度不得超过2m； 当倾落高度超过2m时，应通过串筒、溜槽或振动溜管等设施下落； 倾落高度超过10m时应设置减速装置。 ④ 混凝土应按一定厚度、顺序和方向水平分层浇筑，上层混凝土应在下层混凝土初凝前浇筑、捣实，上下层同时浇筑时，上层与下层前后浇筑距离应保持1.5m以上。'},{id:259,ch:2,type:'multi',q:'混凝土振捣，需达到的标准有（  ）',opts:['混凝土不再沉落','混凝土不出现气泡','混凝土表面不呈现浮浆','混凝土不分层','混凝土不离析'],ans:[0,1],exp:'教材规定：混凝土振捣需达到的标准：混凝土不再沉落、不出现气泡。C选项"表面不呈现浮浆"——适度浮浆属正常现象，完全不浮浆反而说明振捣不足；D选项"不分层"和E选项"不离析"是混凝土质量的基本要求，但非振捣达到的直接标准。'},{id:260,ch:2,type:'multi',q:'下列属于桥梁工程混凝土养护方式有（）',opts:['浇水','覆盖保湿','喷涂养护剂','冬季蓄热','自然降温'],ans:[0,1,2,3],exp:'教材规定：桥梁工程混凝土养护方式包括浇水、覆盖保湿、喷涂养护剂和冬季蓄热养护等。E选项"自然降温"不是养护方式，养护的核心是保持适宜温湿度促进强度发展，自然降温与此无关。冬季施工时应采取蓄热养护而非自然降温。'},{id:261,ch:2,type:'single',q:'下列（ ）不属于混凝土制品厂生产养护方式',opts:['蒸汽养护','湿热养护','潮湿自然养护','蓄热养护'],ans:3,exp:'混凝土施工可采用浇水、覆盖保湿、喷涂养护剂、冬季蓄热养护等方法进行养护； 混凝土构件或制品厂生产可采用蒸汽养护、湿热养护或潮湿自然养护等方法进行养护。选择的养护方法应满足施工养护方案或生产养护制度的要求。'},{id:262,ch:2,type:'single',q:'混凝土拌合物坍落度的检测，每一工作班或每一单元结构物不应少于（  ）次。',opts:['1','2','3','4'],ans:1,exp:'正确答案为B。2\n\n📖 教材依据（城市桥梁工程）：度分类多孔跨径总长L特大桥L>1000大桥1000?L中桥才00>小桥(m)注丁00L>3030主L二:::8单孔跨径Lo(m)Lo>150150?40>20Lo注40Lo注20>L。主5注:①单孔跨径系指标准跨径。梁式桥、板式桥以两桥墩中线之间桥中心线长度或桥墩中线与桥台台背前缘线之间桥中心线长度为标准跨径;拱式桥以净跨径为标准跨径。\n\n教材规定：混凝土拌合物坍落度的检测，每一工作班或每一单元结构物不应少于2次。1次不足以保证质量，3次和4次不是规范规定的最少次数。还应在搅拌地点和浇筑地点分别随机取样检测。'},{id:263,ch:2,type:'single',q:'关于混凝土强度检验评定的说法，错误的是（ ）',opts:['抗压强度应采用150mm立方体标准试件测定','标准差已知统计法适用于生产条件稳定的情况','非统计法适用于试件组数不足10组的情况','标准差未知统计法适用于试件组数不少于3组的情况'],ans:3,exp:'正确答案为D。标准差未知统计法适用于试件组数不少于3组的情况\n\n📖 教材依据（城市桥梁工程）：0mm的立方体标准试件测定。(2){混凝土强度检验评定标准~GB/T50107-2010中规定了评定混凝土强度的方法，包括标准差己知统计法、标准差未知统计法以及非统计法三种。(3)试件的取样频率和数量应符合下列要求:①每100盘，但不超过100m的同配合比混凝土，取样次数不应少于一次。33②每一工作班拌制的同配合比混凝土，不足100盘和100m时其取样次数不应少于一次。\n\n标准差未知统计法适用于试件组数不少于10组的情况，故D选项错误。'},{id:264,ch:2,type:'single',q:'关于混凝土试件取样频率的说法，正确的是（ ）',opts:['每50盘同配合比混凝土应至少取样一次','当一次连续浇筑的同配合比混凝土超过1000m³，','工作班拌制不足100盘时可不取样','C60以上混凝土宜留不少于10组试件'],ans:3,exp:'正确答案为D。C60以上混凝土宜留不少于10组试件\n\n📖 教材依据（城市桥梁工程）：。③铺砌式路面使用的石材质量、外形尺寸应符合设计及规范要求;预制泪凝土砌块的强度应符合设计要求。砂浆平均抗压强度等级应符合设计要求、任一组试件抗压强度最低值不应低于设计强度的85%。2.城镇道路工程质量控制1)施工准备(1)人员准备道路工程开工前应建立健全质量、环境、职业健康安全管理体系，并对各类施工人员进行岗位培训，特种作业人员应持证上岗。\n\nA选项错误，应为每100盘；B选项错误，超过1000m³时每200m³取样；C选项错误，不足100盘也应取样。'},{id:265,ch:2,type:'multi',q:'关于后张法预应力的施工要点，正确的有（ ）',opts:['先安装套管和构造钢筋再浇筑混凝土','张拉时混凝土必须达到设计强度','预应力筋与套管间空隙必须灌浆','无粘结预应力筋需涂刷防锈材料','适用于预制构件'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。先安装套管和构造钢筋再浇筑混凝土；张拉时混凝土必须达到设计强度；预应力筋与套管间空隙必须灌浆；无粘结预应力筋需涂刷防锈材料\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\nA选项描述施工顺序；B选项强调强度要求；C选项是灌浆要求；D选项是无粘结工艺要点。E选项是适用结构类型现浇连续箱梁和盖梁。'},{id:266,ch:2,type:'single',q:'预应力筋张拉前应根据设计要求对孔道的（  ）进行实测。',opts:['摩阻损失','直径','摩阻力','长度'],ans:0,exp:'正确答案为A。摩阻损失\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n张拉前应根据设计要求对孔道的摩阻损失进行实测，以便确定张拉控制应力，并确定预应力筋的理论伸长值。'},{id:267,ch:2,type:'single',q:'钢绞线检查和验收每批重量不大于（ ）t。',opts:['30','50','60','100'],ans:3,exp:'正确答案为D。100\n\n📖 教材依据（城市桥梁工程）：用高强度螺栓连接。安装时模板的接缝不得漏浆(特别是拉筋孔位置)，采用双面胶带填塞缝隙。安装底节模板前，检查承台顶高程及外轮廓线，不符合要求时凿除或用砂浆找平处理，以确保墩身模板准确就位及模板的垂直度符合要求。承台顶面与模板联结面要平整、无缝隙，防止水泥浆流失。c.模板吊装组拼时，吊点布置要合理，起吊过程中不得发生碰撞，并用配套螺栓与下层模板对应连接，同一水平相邻模板也要按照对应螺栓孔进行连接。\n\n教材规定：钢绞线检查和验收每批重量不大于60t。30t和50t低于规范上限，100t超过规范最大限制。60t是规范明确规定的每批最大重量限额。'},{id:268,ch:2,type:'single',q:'在同种材料和同一生产工艺条件下，锚具、夹片应以不超过（  ）套为一个验收批。',opts:['500','600','800','1000'],ans:3,exp:'正确答案为D。1000\n\n📖 教材依据（城市桥梁工程）：固定纵向钢筋的位置，一般用于梁或柱中。2)一般要求(1)钢筋混凝土结构所用钢筋的品种、规格、性能等均应符合设计要求和现行国家标准，其他特殊钢筋应符合其相应产品标准的规定。(2)钢筋应按不同钢种、等级、牌号、规格及生产厂家分批验收，确认合格后方可使用。(3)钢筋在运输、储存、加工过程中应防止锈蚀、污染和变形。\n\n验收应分批进行，批次划分时，同一种材料和同一生产工艺条件下生产的产品可列为同一批次。锚具、夹片应以不超过1000套为一个验收批。连接器的每个验收批不宜超过500套。'},{id:269,ch:2,type:'single',q:'关于预应力筋制作的说法，错误的是（ ）',opts:['下料长度计算应考虑张拉伸长值和弹性回缩值','可采用电弧切割进行预应力筋下料','HRB500级钢筋镦粗后应进行电热处理','编束时应逐根梳理直顺不扭转'],ans:1,exp:'正确答案为B。可采用电弧切割进行预应力筋下料\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n预应力筋不得采用电弧切割，故B选项错误。'},{id:270,ch:2,type:'multi',q:'关于预应力筋制作的技术要求，正确的有（ ）',opts:['下料长度计算应考虑锚具长度和千斤顶长度','冷拉钢筋的镦粗应在冷拉前完成','同束预应力筋应采用强度相等的钢材','钢绞线束移运时支点距离不得大于5m','可采用砂轮锯进行预应力筋切断'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。下料长度计算应考虑锚具长度和千斤顶长度；冷拉钢筋的镦粗应在冷拉前完成；同束预应力筋应采用强度相等的钢材；可采用砂轮锯进行预应力筋切断\n\n📖 教材依据（城市桥梁工程）：采取有效措施防止因地面软化下沉导致构件断裂及损坏。(10)对台座基础应进行沉降验算、控制整体及不均匀沉降量。存梁台座需进行承载力、稳定性和变形计算，其结构变形应满足所存放混凝土梁的技术要求和规定。3.装配式梁(板)的安装1)技术准备(1)编制吊运(吊装、运输)专项方案，并按有关规定进行论证、批准。(2)吊运方案应对各受力部分的设备、杆件进行验算，特别是起重机等机具安全性验算，起吊过程中构件内产生的应力验算必须符合要求。'},{id:271,ch:2,type:'multi',q:'计算预应力筋下料长度应考虑的因素有（  ）',opts:['台座长度','锚(夹)具长度','千斤顶长度','孔道长度','螺旋筋长度'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。台座长度；锚(夹)具长度；千斤顶长度；孔道长度\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n考虑孔道长度或台座长度、锚(夹)具长度、千斤顶长度、镦头预留量，冷拉伸长值、弹性回缩值、张拉伸长值和外露长度等因素。'},{id:272,ch:2,type:'multi',q:'锚具和连接器进场时，应进行的验收项目有（  ）。',opts:['外观检查','硬度检验','动载锚固试验','静载锚固试验','刚度检验'],ans:[0,1,3],exp:'教材规定：锚具和连接器进场时，应进行的验收项目包括外观检查、硬度检验和静载锚固试验。C选项"动载锚固试验"不是进场验收项目。E选项"刚度检验"对锚具而言非进场检验指标。静载锚固试验是验证锚具性能的核心试验。'},{id:273,ch:2,type:'single',q:'预应力构件施工属于先张法的工序是（  ）。',opts:['放张','预留孔道','孔道压浆','封锚'],ans:0,exp:'正确答案为A。放张\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n教材规定：先张法施工工序是先张拉预应力筋后浇筑混凝土，待混凝土达到设计强度后放张。"预留孔道"和"孔道压浆"是后张法的工序，"封锚"是后张法完成后的工序。"放张"是先张法特有的工序。'},{id:274,ch:2,type:'single',q:'140吨无粘结预应力筋，检验批数量（）',opts:['1','2','3','4'],ans:2,exp:'正确答案为C。3\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n教材规定：无粘结预应力筋每批重量不大于60t为一个检验批。140吨预应力筋，每60t为一个检验批，140÷60≈2.33，向上取整为3个检验批。'},{id:275,ch:2,type:'single',q:'关于钢丝进场的检验要求，下列说法错误的有（  ）。',opts:['进场时，应对包装、标志进行检验','分批检验，每批重量不大于100t','逐盘进行形状、尺寸和表面检查','检查合格的钢丝中抽取5%，但不少于3盘，进行力学性能试验'],ans:1,exp:'钢丝成批检查和验收，每批钢丝由同一牌号、同一规格、同一加工状态的钢丝组成，每批质量不大于60t。钢丝应逐盘进行形状、尺寸和表面检查。从检查合格的钢丝中抽取5%,但不少于3盘，进行力学性能试验及其他试验。在检查中，如有某一项检查结果不符合产品标准或合同的要求，则该盘不得交货。并从同一批未经试验的钢丝盘中取双倍数量的试样进行该不合格项目的复验(包括该项试验所要求的任一指标),复验结果即使只有一个试样不合格，也不得整批交货，但允许对该批产品逐盘检验，合格产品允许交货。'},{id:276,ch:2,type:'single',q:'预应力钢筋和金属管道在室外存放时，时间不宜超过（  ）',opts:['3个月','4个月','5个月','6个月'],ans:3,exp:'正确答案为D。6个月\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n教材规定：预应力钢筋和金属管道在室外存放时，时间不宜超过6个月（D正确）。3个月、4个月和5个月均较规范规定的6个月期限短，规范允许最长室外存放时间为6个月。超过6个月应重新检验。'},{id:277,ch:2,type:'multi',q:'关于桥梁后张法，说法正确的是（  ）',opts:['一般用于预制构件','先浇筑构件，然后在构件上直接施加预应力','预应力筋必须先穿入套管在浇筑混凝土','混凝土达到强度后，用千斤顶将预应力筋张拉到要求的应力并锚于梁的两端','后张法在现浇连续箱梁和盖梁中采用较多'],ans:[1,3,4],exp:'教材规定：后张法先浇筑构件（B正确），混凝土达到强度后用千斤顶张拉预应力筋并锚固（D正确），后张法在现浇连续箱梁和盖梁中采用较多（E正确）。A错误：后张法一般用于现浇构件而非预制构件。C错误：预应力筋可在浇筑后再穿入套管。'},{id:278,ch:2,type:'multi',q:'下列关于后张法说法正确的是（  ）',opts:['预留管道不得留有压浆孔与溢浆孔','预应力筋安装完毕，方可采取蒸汽养护','曲线预应力筋或长度大于等于25m的直线预应力筋，宜在两端张拉','长度小于25m的直线预应力筋，可在一端张拉','张拉过程中，预应力筋不得断丝、断筋或滑丝'],ans:[2,3,4],exp:'正确答案为C、D、E。曲线预应力筋或长度大于等于25m的直线预应力筋，宜在两端张拉；长度小于25m的直线预应力筋，可在一端张拉；张拉过程中，预应力筋不得断丝、断筋或滑丝\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n管道应留压浆孔与溢浆孔；曲线孔道的波峰部位应留排气孔；在最低部位宜留排水孔。 混凝土采用蒸汽养护时，养护期内不得装入预应力筋。'},{id:279,ch:2,type:'single',q:'关于预应力筋张拉要求的说法，错误的是（ ）',opts:['混凝土强度未达到设计值75%时严禁张拉','长度小于25m的直线预应力筋在一端张拉','张拉后应实测孔道摩阻损失','宜采取分批、分阶段对称张拉方式'],ans:2,exp:'正确答案为C。张拉后应实测孔道摩阻损失\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n张拉前应实测孔道摩阻损失。'},{id:280,ch:2,type:'multi',q:'关于预应力筋张拉的技术要求，正确的有（ ）',opts:['张拉后应拆除限制位移的模板','曲线预应力筋宜在两端张拉','同一截面多束一端张拉时应交错设置张拉端','张拉控制应力值应考虑孔道摩阻损失','张拉过程中允许出现少量断丝现象'],ans:[1,2,3],exp:'正确答案为B、C、D。曲线预应力筋宜在两端张拉；同一截面多束一端张拉时应交错设置张拉端；张拉控制应力值应考虑孔道摩阻损失\n\n📖 教材依据（城市桥梁工程）：采取有效措施防止因地面软化下沉导致构件断裂及损坏。(10)对台座基础应进行沉降验算、控制整体及不均匀沉降量。存梁台座需进行承载力、稳定性和变形计算，其结构变形应满足所存放混凝土梁的技术要求和规定。3.装配式梁(板)的安装1)技术准备(1)编制吊运(吊装、运输)专项方案，并按有关规定进行论证、批准。(2)吊运方案应对各受力部分的设备、杆件进行验算，特别是起重机等机具安全性验算，起吊过程中构件内产生的应力验算必须符合要求。'},{id:281,ch:2,type:'single',q:'关于后张法作业封锚要求，正确的是（  ）',opts:['后张法预应力筋锚固后的外露部分禁止机械切割','凸出或内凹锚具强度等级比预应力结构构件提高一个等级','凸出式锚具封锚应配置钢筋网片','可用收缩防水砂浆封闭保护'],ans:2,exp:'① 后张法预应力筋锚固后的外露部分应采用机械切割工艺切除。预应力筋的外露长度不宜小于其直径的1.5倍，且不应小于30mm。 a.凸出或内凹锚具应采用与预应力结构构件相同强度等级的细石混凝土或无收缩防水砂浆封闭保护。'},{id:282,ch:2,type:'single',q:'关于钢板桩围堰施工要求的说法，错误的是（ ）',opts:['有大漂石的河床不宜使用钢板桩围堰','施打顺序应从下游向上游合龙','黏土中不宜使用射水下沉方法','接长的钢板桩接头应上下错开'],ans:1,exp:'规范要求施打顺序应从上游向下游合龙。'},{id:283,ch:2,type:'multi',q:'关于钢板桩围堰施工的技术要求，正确的有（ ）',opts:['施打前应在围堰一侧上下游设测量观测点','必须配备导向设备保证正确位置','锁口应用止水材料捻缝防漏水','可采用捶击、振动等方法下沉','桩身垂直度偏差可累积至合龙时统一调整'],ans:[1,2,3],exp:'正确答案为B、C、D。必须配备导向设备保证正确位置；锁口应用止水材料捻缝防漏水；可采用捶击、振动等方法下沉\n\n📖 教材依据（城市桥梁工程）：)斜拉桥类型通常分为预应力混凝土斜拉桥、钢斜拉桥、钢混凝土叠合梁斜拉桥、混合梁斜拉桥、吊拉组合斜拉桥等。2)斜拉桥组成斜拉桥由索塔、钢索和主梁构成。2.施工技术要点1)索培施工的技术要求和注意事项(1)工艺流程:扩大基础及塔座施工→劲性骨架施工→第一节主塔施工→安装爬模系统→爬模浇筑节段施工→多次主塔节段施工(横梁施工)。'},{id:284,ch:2,type:'multi',q:'钢筋混凝土板桩制作的技术要求，正确的有（ ）',opts:['应使用刚度较大的模板制作','桩尖斜度宜采用1:2.5～1:1.5','圆形榫口接合性能较好','空心板桩可用钢管作芯模','板桩断面可调整'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。应使用刚度较大的模板制作；桩尖斜度宜采用1:2.5～1:1.5；圆形榫口接合性能较好；空心板桩可用钢管作芯模\n\n📖 教材依据（城市桥梁工程）：O.8~lm设1处支撑装置;弯道部分板厚宜为15~30mm，每O.5~O.8m设1处支撑装置，模板与混凝土接触面及模板顶面应刨光。模板制作偏差应符合规范规定要求。第1篇市政公用工程技术28③模板安装应符合:支模前应核对路面标高、面板分块、胀缝和构造物位置;模板应安装稳固、}I顶直、平整，无扭曲，相邻模板连接应紧密平)帜，不得错位;严禁在基层上挖槽嵌入模板;使用轨道摊铺机应采用专用钢制轨模;模板安装完毕，应进行检验，合格后方可使用;模板安装检验合格后表面应涂脱模剂，接头应粘贴胶带或塑料薄膜等密封。\n\nE选项错误，板桩断面必须符合设计要求。'},{id:285,ch:2,type:'single',q:'关于钢筋混凝土板桩围堰施工要求的说法，错误的是（ ）',opts:['沉入砂砾层的板桩桩头可不做加强处理','榫口接缝应保证顺直、密合','采用中心射水下沉时应预留射水通道','空心板桩多采用圆形空心截面'],ans:0,exp:'正确答案为A。沉入砂砾层的板桩桩头可不做加强处理\n\n📖 教材依据（城市桥梁工程）：如混凝土拌合物从搅拌机出料起至挠筑人模的时间不超过15min时，其明落度可仅在搅拌地点检测。在检测拥落度时，还应观察混凝土拌合物的站聚性和保水性。表2.才-3混凝土最短搅拌时间表混凝土捐落度(mm)搅拌机类型搅拌机容量(L)<3030~70>70混凝土最短搅拌时间(min)三三400才.51.01.0主主才5002.51.5丁5强制式注:①当掺入外加剂时，外加剂应调成适当浓度的溶液再掺入，搅拌时间宜延长。\n\n规范要求沉入砂砾层的板桩桩头应增设加劲钢筋或钢板，故A选项错误。'},{id:286,ch:2,type:'multi',q:'下列属于土石围堰的有（  ）。',opts:['土围堰','土袋围堰','竹篱土围堰','堆石土围堰','钢板桩围堰'],ans:[0,1,2,3],exp:'教材规定：土石围堰包括土围堰、土袋围堰、竹篱土围堰、竹、铁丝笼围堰、堆石土围堰等。E选项"钢板桩围堰"属于板桩围堰类，不属于土石围堰。土石围堰以土石为主要材料，钢板桩围堰以钢板桩为主要挡水结构。'},{id:287,ch:2,type:'single',q:'关于土围堰施工要求，下列表述错误的是（  ）。',opts:['围堰填筑应自上游开始至下游合龙','筑堰材料宜用黏性土、粉质黏土或砂质黏土','可在围堰中心部分填筑黏土及黏性土芯墙','围堰外河床上的淤泥、石块、杂物应筑堰前清除'],ans:2,exp:'教材规定：土围堰筑堰材料宜用黏性土、粉质黏土或砂质黏土（B正确）。C选项错误：土的渗透系数小，在围堰中心部分填筑黏土及黏性土芯墙的做法仅适用于土袋围堰而非土围堰。A选项围堰自上游至下游合龙正确。D选项筑堰前清除淤泥石块正确。'},{id:288,ch:2,type:'multi',q:'围堰施工技术要求中，钢板桩可采用的下沉方法有（  ）。',opts:['捶击','人工钻孔','振动','静压','射水'],ans:[0,2,4],exp:'教材规定：钢板桩可采用捶击（A）、振动（C）和射水（E）等方法下沉。B选项"人工钻孔"和D选项"静压"不是钢板桩常用的下沉方法。捶击法适用广泛，振动法适用于砂土，射水法在密实砂层中作为辅助手段。'},{id:289,ch:2,type:'single',q:'围堰高度应高出施工期内可能出现最高水位（包括浪高）（  ）。',opts:['0.3～0.5m','0.5～0.7m','0.7～1m','1.0～1.5m'],ans:1,exp:'正确答案为B。0.5～0.7m\n\n📖 教材依据（城市桥梁工程）：可视裂纹。城市桥梁下部结构施工2.22.2.1各种围堪施工要求1.围:t~施工的一般要求(1)围垣高度应高出施工期间可能出现的最高水位(包括浪高)O.5~O.7m。(2)围堪应减少对现状河道通航、导流的影响。对河流断面被围堪压缩而引起的冲刷应有防护措施(包括河岸与堪外边坡)。(3)堪内平面尺寸应满足基础施工的需要。\n\n教材规定：围堰高度应高出施工期内可能出现最高水位（包括浪高）0.5～0.7m（B正确）。0.3～0.5m偏低不足以应对浪高和安全富余，0.7～1m和1.0～1.5m偏高不经济。'},{id:290,ch:2,type:'multi',q:'下列土石围堰，能够适用水深2m的有（  ）。',opts:['土围堰','土袋围堰','木桩竹条土围堰','竹篱土围堰','竹、铁丝笼围堰'],ans:[1,2,3,4],exp:'教材规定：土袋围堰适用水深≤3m，木桩竹条土围堰适用水深2～4m，竹篱土围堰适用水深1.5～7m，竹、铁丝笼围堰适用水深5m以内。A选项"土围堰"仅适用于水深≤1.5m，不满足水深2m的要求。B、C、D、E均可适用于水深2m。'},{id:291,ch:2,type:'single',q:'关于双壁钢围堰浮运施工的说法，错误的是（ ）',opts:['浮运宜选择夜间低水位时进行','露出水面高度不应小于1m','水深流急处可设导向船','应验算浮运时的稳定性'],ans:0,exp:'浮运宜选择白昼进行，故A选项错误。'},{id:292,ch:2,type:'multi',q:'双壁钢围堰拼焊施工应满足的要求包括（ ）',opts:['按设计在施工岸边制作','分块大小考虑吊装能力','按顺序对称拼焊','拼焊后需做水密试验','可在现场随意切割修改'],ans:[1,2,3],exp:'A选项错误，按设计在工厂制作。 E选项错误，围堰应按设计要求制作，不得随意修改'},{id:293,ch:2,type:'single',q:'关于双壁钢围堰锚锭系统的要求，正确的是（ ）',opts:['锚绳规格长度应差异明显','边锚预拉力越大越好','锚绳受力应均匀','不需检查水位涨落影响'],ans:2,exp:'正确答案为C。锚绳受力应均匀\n\n📖 教材依据（城市桥梁工程）：两侧设导向船。④在浮运、下沉过程中，围垣露出水面的高度不应小于1m。⑤围堪下沉前初步锚链于墩位上游处。⑥锚链体系的锚绳规格、长度应相差不大。锚绳受力应均匀。边锚的预拉力要适当，避免导向船和钢围堪摆动过大或折断锚绳。⑦就位前应对所有缆绳、锚链、锚链和导向设备进行检查调整，以使围堪落床工作顺利进行，并注意水位涨落对锚链的影响。\n\nA选项错误，锚绳规格长度应相差不大； B选项错误，预拉力应适当； D选项错误，需注意水位影响。'},{id:294,ch:2,type:'multi',q:'双壁钢围堰着床后的施工要求包括（ ）',opts:['对称均衡灌水落床','观测河床冲刷情况','必要时垫填卵石整平','封底前由潜水员检查','允许偏差可忽略不计'],ans:[0,1,2,3],exp:'E选项错误，着床偏差必须符合设计要求。'},{id:295,ch:2,type:'single',q:'在密实的砂土、碎石土、砂砾的土层中，当锤击法和振动沉桩法施工困难时，可采用的辅助沉桩方法是（ ）。',opts:['钻孔埋桩','静力压桩','射水沉桩','爆破沉桩'],ans:2,exp:'教材规定：在密实的砂土、碎石土、砂砾的土层中，当锤击法和振动沉桩法施工困难时，可采用射水沉桩作为辅助方法。钻孔埋桩适用于河床覆土较厚的碎石土地层，静力压桩适用于软黏土（N<20），爆破沉桩用于特殊地层。'},{id:296,ch:2,type:'single',q:'静力压桩最适宜用于下列哪种土层？（ ）',opts:['密实砂土','软黏土（标准贯入度N<20）','风化岩','砾石层'],ans:1,exp:'正确答案为B。软黏土（标准贯入度N<20）\n\n📖 教材依据（城市桥梁工程）：.0m以内，河床难以打桩，流速较大河床渗7.1<性很小，流速运3.0m/s，石块能就地取材深水或深基坑3流速较大的砂类土、委占性土、碎石土及风化岩等坚硬河床。防水性能好，整体刚度较强深7.1<或深基坑，流速较大的砂类土、药性土、碎石土河床。除用于挡7.1<防水外还可作为基础结构的部分3亦可拔除周转使用，能节约大量木材流速运2.0m/s，覆盖层较薄3平坦的岩石河床，埋置不深的水中基础，也可用于修建桩基承台大型河流的深水基础，覆盖层较薄、平坦的岩石河床66第1篇市政公用工程技术3.土围f~施工要求(……\n\n教材规定：静力压桩最适宜用于软黏土（标准贯入度N<20）。密实砂土和砾石层贯入阻力大，风化岩强度更高，均不适合静力压桩。静力压桩通过自重和配重将桩压入土中，对软土效果好。'},{id:297,ch:2,type:'multi',q:'关于沉桩方法的选择，下列说法正确的有（ ）。',opts:['锤击沉桩适用于砂类土和黏性土','振动沉桩适用于密实黏性土和风化岩','射水沉桩可在重要建筑物附近优先使用','钻孔埋桩适用于河床覆土较厚的碎石土','静力压桩适用于标准贯入度N>30的砂土层'],ans:[0,1,3],exp:'C错误：在重要建筑物附近不宜采用射水沉桩"； E错误：静力压桩适用于N<20的软黏土。'},{id:298,ch:2,type:'single',q:'关于沉桩前的准备工作，下列说法错误的是（ ）。',opts:['沉桩前必须处理地上(下)障碍物','城区人员密集场所可以进行沉桩施工','对地质复杂的大桥应进行试桩','预制桩混凝土强度应达到设计要求'],ans:1,exp:'正确答案为B。城区人员密集场所可以进行沉桩施工\n\n📖 教材依据（城市桥梁工程）：(5)钻孔埋桩宜用于教土、砂土、碎石土且河床覆土较厚的情况。2)准备工作(1)沉桩前应掌握工程地质钻探资料、水文资料和打桩资料。(2)沉桩前必须处理地上(下)障碍物，平整场地，地面承载能力应满足沉桩需求。(3)应根据现场环境状况采取降噪措施;城区、居民区等人员密集的场所不得进行沉桩施工。(4)对地质复杂的大桥、特大桥，为检验桩的承载能力和确定沉桩工艺应进行试桩。\n\n城区、居民区等人员密集的场所不得进行沉桩施工。'},{id:299,ch:2,type:'single',q:'对于特大桥和地质复杂的大、中桥，承载能力试桩宜采用（ ）。',opts:['静压试验方法','动载试验法','高应变检测法','低应变检测法'],ans:0,exp:'正确答案为A。静压试验方法\n\n📖 教材依据（城市桥梁工程）：为检验桩的承载能力和确定沉桩工艺应进行试桩。通过工艺试桩确定施工工艺、机具合适性、技术参数等;承载能力试桩方式选择:特大桥和地质复杂的大、中桥宜采用静压试验方法，一般大、中桥可采用静载试验法。(5)贯入度应通过试桩或做沉桩试验后会同监理及设计单位研究确定。(6)用于地下水有侵蚀性的地区或腐蚀性土层的钢桩应按照设计要求做好防腐处理。\n\n教材规定：对于特大桥和地质复杂的大、中桥，承载能力试桩宜采用静压试验方法（即静载试验）。动载试验法、高应变检测法和低应变检测法适用于一般工程或作为静载试验的补充。静载试验最直接可靠。'},{id:300,ch:2,type:'multi',q:'关于沉桩准备工作，下列要求正确的有（ ）。',opts:['应掌握工程地质钻探资料和水文资料','地面承载能力应满足沉桩需求','所有桥梁工程都必须进行静载试验','钢桩在腐蚀性土层需做防腐处理','贯入度由施工单位自行确定'],ans:[0,1,3],exp:'正确答案为A、B、D。应掌握工程地质钻探资料和水文资料；地面承载能力应满足沉桩需求；钢桩在腐蚀性土层需做防腐处理\n\n📖 教材依据（城市桥梁工程）：力压桩宜用于软黠土(标准贯人度N<20)、淤泥质土。(5)钻孔埋桩宜用于教土、砂土、碎石土且河床覆土较厚的情况。2)准备工作(1)沉桩前应掌握工程地质钻探资料、水文资料和打桩资料。(2)沉桩前必须处理地上(下)障碍物，平整场地，地面承载能力应满足沉桩需求。(3)应根据现场环境状况采取降噪措施;城区、居民区等人员密集的场所不得进行沉桩施工。\n\nC错误:一般大、中桥可采用静载试验。； E错误:需会同监理及设计单位确定。'},{id:301,ch:2,type:'multi',q:'下列关于沉入桩沉桩顺序的选项中，说法正确的是（  ）',opts:['宜由一端向另一端进行','密集桩群，自中间向两端(两个方向)或四周对称施打','根据基础的设计标高，宜先浅后深','桩的规格，宜先大后小，先短后长','斜坡地形，应先坡顶后坡脚'],ans:[0,1,4],exp:'教材规定：密集桩群自中间向两端(两个方向)或四周对称施打（B正确）；斜坡地形应先坡顶后坡脚（E正确）；"宜由一端向另一端进行"（A正确）。C错误：根据基础设计标高宜先深后浅。D错误：规格宜先大后小、先长后短。'},{id:302,ch:2,type:'multi',q:'在沉桩过程中发现以下（  ）情况应暂停施工。',opts:['贯入度减小','桩身发生突然倾斜','桩头或桩身破坏','地面隆起','桩身上浮'],ans:[1,2,3,4],exp:'教材规定：沉桩过程中发现桩身发生突然倾斜（B）、桩头或桩身破坏（C）、地面隆起（D）、桩身上浮（E）等情况时应暂停施工。A选项"贯入度减小"属于正常现象，需要继续观测而非暂停施工；贯入度骤增或骤减才需关注。'},{id:303,ch:2,type:'single',q:'下列可采用（  ）作为锤击法辅助手段进行沉桩施工',opts:['振动沉桩','射水沉桩','静力压桩','钻孔埋桩'],ans:1,exp:'正确答案为B。射水沉桩\n\n📖 教材依据（城市桥梁工程）：实教性土、砾石、风化岩。(3)在密实的砂土、碎石土、砂砾的土层中用锤击法、振动沉桩法有困难时，可采用射水作为辅助手段进行沉桩施工。在站性土中应慎用射水沉桩;在重要建筑物附近不宜采用射水沉桩。(4)静力压桩宜用于软黠土(标准贯人度N<20)、淤泥质土。(5)钻孔埋桩宜用于教土、砂土、碎石土且河床覆土较厚的情况。\n\n教材规定：射水沉桩可作为锤击法辅助手段进行沉桩施工。在密实砂土、碎石土中锤击困难时，可用射水冲散土层减小阻力。振动沉桩和静力压桩是独立沉桩方法而非辅助手段，钻孔埋桩也不是锤击的辅助手段。'},{id:304,ch:2,type:'multi',q:'关于锤击沉桩，下列说法正确的是（）',opts:['控制桩锤的冲击能，高锤慢打','当桩入土一定深度后，可按要求的落距和正常锤击频率进行','一般情况以控制桩端设计标高为主，贯入度为辅','桩端位于黏性土或较松软土层时，应以标高控制，贯入度作为校核','桩端位于坚硬土层，应以设计标高控制'],ans:[1,2,3],exp:'锤击沉桩开始时，应控制桩锤的冲击能，低锤慢打，当桩入土一定深度后，可按要求的落距和正常锤击频率进行。桩终止锤击的控制应视桩端土质而定， 一般情况下以控制桩端设计标高为主，贯入度为辅。 ① 桩端位于黏性土或较松软土层时，应以标高控制，贯入度作为校核。 ② 桩端位于坚硬、硬塑的黏土及中密以上的粉土、砂、碎石类土、风化岩时，应以贯入度控制。 ① 桩端位于黏性土或较松软土层 控制方式：以标高控制为主，贯入度作为校核 软土中，贯入度容易突然变小（碰到硬夹层）或突然变大（进入软区），数据不稳定。 只要桩顶打到设计标高，一般认为承载力够了。 校核： 打到标高后，再锤几下，看看贯入度是否在合理范围，防止虚打。 ② 桩端位于坚硬、硬塑黏土及中密以上粉土、砂、碎石、风化岩 控制方式：以贯入度控制为主 土层很硬，可能还没打到标高，桩就打不动了（锤很多下也不下沉）。 此时强行打到标高可能损坏桩身。 只要最后贯入度满足设计要求（比如最后10锤下沉≤30mm），说明桩已打紧，承载力够了，可以不继续打。 软土看“高度”（标高为主），硬土看“力度”（贯入度为主）'},{id:305,ch:2,type:'single',q:'地下水位以下土层的桥梁钻孔灌注桩基础施工，不应采用的成桩设备是（  ）。',opts:['正循环回旋钻','旋挖钻','长螺旋钻机','冲击钻'],ans:2,exp:'正确答案为C。长螺旋钻机\n\n📖 教材依据（城市桥梁工程）：连续箱梁和盖梁中采用较多。3)预应力筋及管道(孔道)(1)预应力筋材料要求①预应力混凝土结构所采用预应力筋的质量应符合《预应力混凝土用钢丝~5223-2014、《预应力混凝土用钢绞线~GB!TGB!T5224-2023、《无粘结预应力钢绞线》JG/T161-2016等规范的规定。每批钢丝、钢绞线、钢筋应由同一牌号、同一规格、同一生产工艺的产品组成。\n\n教材规定：长螺旋钻机为干作业成孔方法，在地下水位以下的土层中无法形成有效孔壁，不应采用。正循环回旋钻、旋挖钻和冲击钻均可用于泥浆护壁成孔（湿作业），适用于地下水位以下土层。'},{id:306,ch:2,type:'multi',q:'下列属于泥浆护壁成孔的有（  ）。',opts:['正循环钻孔灌注桩','冲击钻成孔灌注桩','旋挖成孔灌注桩','钻孔扩底灌注桩','长螺旋钻孔灌注桩'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。正循环钻孔灌注桩；冲击钻成孔灌注桩；旋挖成孔灌注桩；钻孔扩底灌注桩\n\n📖 教材依据（城市桥梁工程）：土质适用条件可参考表2.2-20表2.2-2序号成孔方式正循环钻机反循环钻孔灌注桩反循环钻机泥浆护璧适用土质条件设备正循环钻孔灌注桩冲击钻成孔灌注桩成孔成孔方式与适用条件章占性土、粉砂、细砂、中砂、粗砂z含少量砾石、卵石(含量少于20%)的土、软岩黠性土、砂类土、含少量砾石、卵石(含量少于20%，粒径小子钻杆内径2/3)的土;中抓钻机、冲击钻机辈占性土、粉土、砂土、填土、碎石土及风化岩层旋挖成孔灌注桩旋挖钻机潜水钻成孔灌注桩潜水钻机辈占性土、淤泥、淤泥质土及砂土地下水位以下的填土层、委占性土层、……\n\n教材规定：泥浆护壁成孔包括正循环钻孔灌注桩、冲击钻成孔灌注桩、旋挖成孔灌注桩和钻孔扩底灌注桩。E选项"长螺旋钻孔灌注桩"属于干作业成孔方法，不需泥浆护壁。'},{id:307,ch:2,type:'multi',q:'泥浆设备与护筒埋设，下列说法正确的是（）',opts:['钻孔后应埋设护筒','护筒顶面宜高出施工水位或地下水2m, 并宜高出施工地面0.3m','泥浆宜选用高塑性黏土或膨润土','清孔后的泥浆相对密度应大于1.10','含砂率不得大于2%'],ans:[1,2,4],exp:'正确答案为B、C、E。护筒顶面宜高出施工水位或地下水2m, 并宜高出施工地面0.3m；泥浆宜选用高塑性黏土或膨润土；含砂率不得大于2%\n\n📖 教材依据（城市桥梁工程）：。当使用旋转钻时，护筒内径应比钻头直径大20cm;使用冲击钻机时，护筒内径应比钻头直径大40cm。②护筒顶面宜高出施工水位或地下水位2m且宜高出施工地面O.3m。其高度尚应满足孔内泥浆面高度的要求。③护筒埋设深度:在岸滩上，李占性土、粉土不得小于1m，在j、性土不得小于2m;当表面土层松软时，护筒应埋入密实土层中不小于O.5m;水中筑岛，护筒应埋入河床面以下1m左右;在水中平台上沉入护筒，可根据施工最高水位、流速、冲刷及地质条件等因素确定沉入深度，必要时应沉入不透水层;受冲刷影响的河床，护筒宜沉……\n\n清孔后的泥浆相对密度应小于1.10'},{id:308,ch:2,type:'single',q:'灌注水下混凝土时，导管埋置深度宜控制在（  ）',opts:['1～3m','2～4m','3～5m','2～6m'],ans:3,exp:'正确答案为D。2～6m\n\n📖 教材依据（城市桥梁工程）：、孔深、垂直度进行检查，确认合格后即可进行清孔。(2)清孔时，必须保持孔内水头，防止塌孔。(3)清孔过程中，应不断置换泥浆，直至开始灌注水下混凝土时停止。(4)清孔后应对泥浆试样进行性能指标试验。(5)清孔后的沉渣厚度应符合设计要求;设计无要求时，摩擦桩的沉渣厚度不应大于300mr川端承桩的沉渣厚度不应大于100mm。\n\n教材规定：灌注水下混凝土时，导管埋置深度宜控制在2～6m（D正确）。1～3m埋深过浅易导致导管拔空发生断桩；2～4m和3～5m虽然部分符合要求但不如2～6m完整。最小埋深2m，最大不宜超过6m。'},{id:309,ch:2,type:'multi',q:'灌注桩钢筋笼其接头连接方式（  ）',opts:['焊接','机械连接','法兰连接','螺栓连接','绑扎连接'],ans:[0,1],exp:'正确答案为A、B。焊接；机械连接\n\n📖 教材依据（城市桥梁工程）：绑扎钢筋网的外围两行钢筋交叉点全部用绑丝绑牢，中间部分交叉点可间隔交错扎牢。双向受力的钢筋网，钢筋交叉点全部用绑丝绑牢。钢筋接头宜采用焊接接头或机械连接接头，不得使用闪光对焊。焊接接头应符合《钢筋焊接及验收规程》JGJ18--2012的有关规定。机械连接接头应符合《钢筋机械连接技术规程~JGJ1072016有关规定。\n\n教材规定：灌注桩钢筋笼接头连接方式可采用焊接（A）和机械连接（B）。C选项"法兰连接"和D选项"螺栓连接"非钢筋连接常用方式；E选项"绑扎连接"不适用于灌注桩钢筋笼的纵向受力钢筋连接。'},{id:310,ch:2,type:'multi',q:'灌注桩终孔验收包括（  ）',opts:['沉渣厚度','桩位','孔径','垂直度','泥浆指标'],ans:[1,2,3],exp:'正确答案为B、C、D。桩位；孔径；垂直度\n\n📖 教材依据（城市桥梁工程）：钻斗门连接销子以及钢丝绳的状况，并应清除钻斗上的渣土。④旋挖钻机成孔应采用跳挖方式，并根据钻进速度同步补充泥浆，保持所需的泥浆面高度不变。⑤孔底沉渣厚度控制指标应符合要求。5)干作业成孔(1)长螺旋钻孔①钻机定位后，应进行复检，钻头与桩位点偏差不得大于20mm;开孔时下钻速度应缓慢;钻进过程中，不直反转或提升钻杆。\n\n教材规定：灌注桩终孔验收包括桩位（B）、孔径（C）和垂直度（D）。A选项"沉渣厚度"是清孔后的验收项目而非终孔验收。E选项"泥浆指标"是成孔过程中的控制指标，且在清孔后需检测。'},{id:311,ch:2,type:'multi',q:'关于钻孔扩底下列说法正确的是（  ）',opts:['钻杆应保持垂直稳固，位置准确','防止因钻杆晃动引起孔径扩大','钻孔扩底桩施工扩底孔部分虚土厚度应符合设计要求','第一次应灌到扩底部位，随即振捣密实','灌注桩顶以下5m范围内混凝土时，应随灌注随振动，每次灌注高度不大于2m'],ans:[0,1,2],exp:'正确答案为A、B、C。钻杆应保持垂直稳固，位置准确；防止因钻杆晃动引起孔径扩大；钻孔扩底桩施工扩底孔部分虚土厚度应符合设计要求\n\n📖 教材依据（城市桥梁工程）：之前的泥浆指标应符合要求。(5)旋挖成孔①旋挖钻成孔灌注桩应根据不同的地层情况及地下水位埋深，采用不同的成孔工艺，选用相应的钻头。钻进过程中，钻杆应保持垂直稳固，位置准确，控制钻进速度，避免进尺过快造成塌孔埋钻事故。②泥浆制备的能力应大于钻孔时的泥浆需求量，每台套钻机的泥浆储备量不少于单桩体积。第1篇72市政公用工程技术③成孔前和每次提出钻斗时，应检查钻斗和钻杆连接销子、钻斗门连接销子以及钢丝绳的状况，并应清除钻斗上的渣土。\n\n灌注混凝土时，第一次应灌到扩底部位的顶面，随即振捣密实；灌注桩顶以下5m范围内混凝土时，应随灌注随振动，每次灌注高度不大于1.5m。'},{id:312,ch:2,type:'multi',q:'关于钢筋笼施工要点下列说法正确的是（  ）',opts:['桩身纵向受力钢筋接头应设置在桩身受力较小处','接头位置宜相互错开','主筋与箍筋不得点焊','钢筋笼吊放前，必须清除槽底沉渣','钢筋笼入孔后至浇筑混凝土完毕的时间不超过5h'],ans:[0,1,3],exp:'正确答案为A、B、D。桩身纵向受力钢筋接头应设置在桩身受力较小处；接头位置宜相互错开；钢筋笼吊放前，必须清除槽底沉渣\n\n📖 教材依据（城市桥梁工程）：.2.2中2.6)(5)的要求，应进行第二次清孔，直至符合要求后方可灌注水下混凝土。7)钢筋笼施工要点(1)钢筋笼制作时，主筋连接，桩身纵向受力钢筋的接头应设置在桩身受力较小处;接头位置宜相互错开，且在35d(d为主筋直径)的同一接头连接区段范围内钢筋接头不得超过钢筋数量的50%;主筋与箍筋应点焊。(2)钢筋笼应整体吊装，吊装时不得碰损孔壁。\n\n主筋与箍筋应点焊。 钢筋笼入孔后至浇筑混凝土 完毕的时间不超过4h。'},{id:313,ch:2,type:'single',q:'钻孔灌注桩工艺流程，灌注水下混凝土的紧前工作（  ）',opts:['清孔','安装钢筋笼','安放导管','二次清孔'],ans:3,exp:'正确答案为D。二次清孔\n\n📖 教材依据（城市桥梁工程）：，受波浪影响的水域，尚应考虑浪高的影响。2)工艺流程平整场地→桩位放样→埋设护筒→钻机就位→钻进成孔→成孔检查与验收→清孔→安装钢筋笼→安放导管→二次清孔→灌注水下混凝土→拔出护筒→成桩检查。①在饱和的细、中、粗砂中连续沉桩时，易使流动的砂紧密挤实于桩的周围，妨碍砂中水分沿桩上升，在桩夫下形成水压很大的"水垫使桩产生暂时的极大贯入阻力，休止一定时间之后贯入阻力降低，这种现象称为桩的"假极限"。\n\n教材规定：钻孔灌注桩工艺流程为：成孔→终孔验收→清孔→安装钢筋笼→安放导管→二次清孔→灌注水下混凝土。"安放导管"（C）是灌注水下混凝土的紧前工作，导管安放并完成二次清孔后方可灌注混凝土。'},{id:314,ch:2,type:'multi',q:'钻孔灌注桩施工时，由于孔内泥浆悬浮的砂粒太多导致的问题可能有（  ）。',opts:['桩身混凝土夹渣','断桩','灌注混凝土过程中钢筋骨架上浮','灌注混凝土时堵管','混凝土强度低或离析'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。桩身混凝土夹渣；断桩；灌注混凝土过程中钢筋骨架上浮；灌注混凝土时堵管\n\n📖 教材依据（城市桥梁工程）：)涂层间设置胎体增强材料的施工，宜边涂布边铺胎体;胎体应铺贴平整，排除气泡，并应与涂料粘结牢固。在胎体上涂布涂料时，应使涂料浸透胎体，覆盖完全，不得有胎体外露现象。(6)涂料防水层内设置的胎体增强材料，应)1因桥面行车方向铺贴。铺贴顺序应自最低处开始向高处铺贴并顺桥宽方向搭接，高处胎体增强材料应压在低处胎体增强材料之上。\n\n教材规定：孔内泥浆悬浮砂粒太多可能导致桩身混凝土夹渣（A）、断桩（B）、灌注过程中钢筋骨架上浮（C）和堵管（D）。E选项"混凝土强度低或离析"属于混凝土自身质量问题，与泥浆含砂率过高无直接关系。'},{id:315,ch:2,type:'multi',q:'可能导致灌注桩钢筋骨架上浮的因素包括（ ）。',opts:['混凝土初凝时间过短','泥浆中含砂量过高','钢筋骨架直径过大','混凝土灌注速度过快','导管埋深过小'],ans:[0,1,3],exp:'a. 混凝土初凝和终凝时间太短，使孔内混凝土过早结块，当混凝土面上升至钢筋骨架底时，结块的混凝土托起钢筋骨架。 b. 清孔时孔内泥浆悬浮的砂粒太多，混凝土灌注过程中砂粒回沉在混凝土面上，形成较密实的砂层，并随孔内混凝土逐渐升高，当砂层上升至钢筋骨架底部时托起钢筋骨架。 c. 混凝土灌注至钢筋骨架底部时，灌注速度太快，造成钢筋骨架上浮。'},{id:316,ch:2,type:'single',q:'关于桥梁承台施工错误的是（  ）。',opts:['承台施工前应检查桩基位置','在基坑有水情况下浇筑100mm厚混凝土垫层','分层浇筑时，接缝应按施工缝处理','水中高桩承台可采用套箱法施工'],ans:1,exp:'教材规定：在基坑有水情况下应先进行降水排水，待桩基验收合格后浇筑垫层，垫层应干燥状态下浇筑。B选项"在基坑有水情况下浇筑100mm厚混凝土垫层"错误，有水时直接浇筑垫层会导致混凝土离析、强度不足。A、C、D选项均符合规范要求。'},{id:317,ch:2,type:'multi',q:'关于柱式桥墩施工正确的是（  ）。',opts:['模板、支架稳定计算中应考虑风力影响','墩台柱的混凝土宜一次连续浇筑完成','满足桥柱先浇系梁后浇的原则','V形墩柱混凝土应对称浇筑','采用预制混凝土管做柱身外模'],ans:[0,1,3,4],exp:'教材原文："柱身高度内有系梁连接时，系梁应与柱同步浇筑。"\n\n✅ A正确——模板支架稳定计算中应考虑风力影响。\n✅ B正确——墩台柱混凝土宜一次连续浇筑完成。\n❌ C错误——教材规定系梁应与柱同步浇筑，"先浇系梁后浇柱"或"先浇柱后浇系梁"均不正确。选项本身表述为"桥柱先浇系梁后浇"，系梁在柱之前浇筑，不符合同步浇筑要求。\n✅ D正确——V形墩柱混凝土应对称浇筑（教材原文）。\n✅ E正确——可采用预制混凝土管做柱身外模。'},{id:318,ch:2,type:'single',q:'关于重力式混凝土桥台浇筑施工，说法错误的是（ ）。',opts:['每层浇筑高度宜控制在1.5～2m','接缝应与桥台截面尺寸较大的一边平行','基础混凝土顶面需做凿毛处理','分块接缝应做成企口形'],ans:1,exp:'正确答案为B。接缝应与桥台截面尺寸较大的一边平行\n\n📖 教材依据（城市桥梁工程）：土浇筑前应对基础?昆凝土顶面做凿毛处理，清除锚筋污锈。(2)桥台混凝土宜水平分层浇筑，每层高度宜为1.5~2m。(3)桥台混凝土分块浇筑时，接缝应与桥台截面尺寸较小的一边平行，邻层、分块接缝应错开，接缝宜做成企口形。分块数量:桥台水平截面积在200m内不得超过2222块;在300m以内不得超过3块;每块面积不得小于50m。\n\n教材规定：重力式混凝土桥台浇筑接缝应与桥台截面尺寸较小的一边平行（而非较大的一边，B错误）。A选项每层浇筑高度1.5～2m正确。C选项基础混凝土顶面需凿毛处理正确。D选项分块接缝做成企口形正确。'},{id:319,ch:2,type:'single',q:'关于预制混凝土管柱施工的技术要求，下列说法错误的是（ ）。',opts:['基础面凹槽深度不应小于50mm','管节就位后应采用四根竖方木对称固定','管节接缝可采用沥青材料密封','外模应设置斜撑保证浇筑稳定'],ans:2,exp:'正确答案为C。管节接缝可采用沥青材料密封\n\n📖 教材依据（城市桥梁工程）：坑槽，分层填实至原地面高。(2)填方段内应事先找平，当地面横向坡度陡于1:5时，需修成台阶形式，每层台阶高度不宜大于300mm，宽度不应小于1.0m。(3)根据测量中心线桩和下坡脚桩，分层填土、压实。(4)碾压前检查铺筑土层的宽度、厚度及含水率，合格后即可碾压，碾压遵循"先轻后重"原则，最后碾压应采用不小于12t级的压路机。\n\n管节接缝应采用水泥砂浆等材料密封，而非沥青材料。'},{id:320,ch:2,type:'multi',q:'关于钢管混凝土墩台柱施工的技术要求，下列说法正确的有（ ）。',opts:['应采用补偿收缩混凝土','应分层分段浇筑完成','钢管的焊制应符合设计要求','钢管防腐应符合规范规定','可采用普通硅酸盐混凝土'],ans:[0,2,3],exp:'教材规定：钢管混凝土墩台柱应采用补偿收缩混凝土（A正确），钢管焊制应符合设计要求（C正确），钢管防腐应符合规范规定（D正确）。B错误：应一次浇筑完成而非分层分段。E错误：应采用补偿收缩混凝土而非普通硅酸盐混凝土。'},{id:321,ch:2,type:'single',q:'盖梁施工的技术要求，以下说法正确的是（ ）。',opts:['盖梁支架在任何情况下均可直接支承在承台顶部','城镇交通繁华路段施工盖梁时，应采用整体组装模板和快装组合支架以减少占路时间','悬臂梁盖梁混凝土浇筑应从固定端开始，以确保结构稳定','预应力钢筋混凝土盖梁拆除底模时，只要混凝土强度达到设计强度即可'],ans:1,exp:'A选项错误，支架可直接支承在承台顶部，但前提是其结构受力需满足施工要求，并非“任何情况下”均可。 C选项错误，悬臂梁盖梁混凝土浇筑应从悬臂端开始，而非固定端。 D选项错误，预应力钢筋混凝土盖梁拆除底模时，若设计无要求，孔道压浆强度需达到设计强度后方可拆除，而非仅混凝土强度达标。'},{id:322,ch:2,type:'multi',q:'预制桥墩各节段场内移运，可采用（ ）移运',opts:['滑道式台车','轨道式台车','轮胎式台车','气囊','拖拉'],ans:[0,1,2,3],exp:'预制节段(构件)场内移运时，可采用滑道或轨道式台车进行立式移运，也可 采用轮胎式台车、气囊等方式进行移运；节段的中、下部应设置必要的支撑稳定装置， 下部与台车应固定牢固，确保移运作业安全。移运前，应对节段的支点受力、稳定性等 进行验算。'},{id:323,ch:2,type:'multi',q:'承台顶设置杯口安装，说法正确的是（）',opts:['安装时宜在基座的适当位置设置导向装置','基座槽口四周与预制构件之间空隙宜不小于20mm','预制构件安装就位后，可摘去吊钩','安装后应及时浇筑杯口混凝土，待混凝土硬化后拆除硬楔','杯口混凝土达到设计强度的75%后方可拆除斜撑'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。安装时宜在基座的适当位置设置导向装置；基座槽口四周与预制构件之间空隙宜不小于20mm；安装后应及时浇筑杯口混凝土，待混凝土硬化后拆除硬楔；杯口混凝土达到设计强度的75%后方可拆除斜撑\n\n📖 教材依据（城市桥梁工程）：工程技术78②辅助安装用的调位装置应具有三维(即高程、平面位移、转角)调节功能，其精度应符合设计要求;导向装置、定位装置和锁定装置等应满足快速实施、安装准确的功能要求。(2)承台顶设置杯口安装①预制构件应与承台基座相匹配，宜采用对号安装，安装时宜在基座的适当位置设置导向装置。②安装前，应检查确认各预制构件的尺寸、安装方向以及基座支承面的高程等参数符合设计要求。'},{id:324,ch:2,type:'single',q:'湿接头混凝土的养护时间应不少于 （  ）。',opts:['28d','21d','7d','14d'],ans:3,exp:'正确答案为D。14d\n\n📖 教材依据（城市桥梁工程）：顶，与梁体预留管道的接合处应密封;预应力锚固区预留的张拉齿板应保证其外形尺寸准确且不被损坏。(4)湿接头的混凝土宜在一天中气温相对较低的时段浇筑，且一联中的全部湿接头应一次浇筑完成。湿接头混凝土的养护时间应不少于14d。(5)温接头应按设计要求施加预应力、孔道压浆;浆体达到强度后应立即拆除临时支座，按设计要求的程序完成体系转换。'},{id:325,ch:2,type:'single',q:'桥梁支座的主要功能是（ ）。',opts:['仅传递竖向荷载','仅适应梁体自由伸缩','传递荷载和变形，并适应梁体位移和转动','仅用于桥梁美观设计'],ans:2,exp:'桥梁支座的核心作用是可靠传递上部结构的荷载和变形（位移和转角），同时适应梁体的自由伸缩和转动需求，故C选项正确。A、B选项片面，D选项与功能无关。'},{id:326,ch:2,type:'multi',q:'下列关于支座，说法正确的是（）',opts:['连接桥梁上部结构和下部结构的重要结构部件','位于桥跨结构和盖梁之间','是桥梁的重要支撑装置','支座还应便于安装、养护和维修','永久使用，不宜进行更换'],ans:[0,2,3],exp:'桥梁支座是连接桥梁上部结构和下部结构的重要结构部件，位于桥跨结构和垫石之间，它能将桥梁上部结构承受的荷载和变形(位移和转角)可靠地传递给桥梁下部结构，是桥梁的重要传力装置。 桥梁支座的功能要求：首先支座必须具有足够的承载能力，以保证可靠地传递支座反力(竖向力和水平力);其次支座对桥梁变形的约束尽可能小，以适应梁体自由伸缩和转动的需要；另外支座还应便于安装、养护和维修，必要时可以进行更换。'},{id:327,ch:2,type:'single',q:'关于桥梁支座按变形可能性分类的说法，正确的是（ ）。',opts:['固定支座不允许产生任何方向的位移和转动','单向活动支座仅允许产生竖直方向的位移','多向活动支座允许产生水平方向和竖向的位移及转动','减隔震支座仅用于地震区，不具备常规支座的承载功能'],ans:2,exp:'正确答案为C。多向活动支座允许产生水平方向和竖向的位移及转动\n\n📖 教材依据（城市桥梁工程）：。桥梁支座的功能要求:首先支座必须具有足够的承载能力，以保证可靠地传递支座反力(竖向力和水平力);其次支座对桥梁变形的约束尽可能小，以适应梁体自由伸缩和转动的需要;另外支座还应便于安装、养护和维修，必要时可以进行更换。2.桥梁支座的分类(1)按支座变形可能性分类:固定支座、单向活动支座、多向活动支座、减隔震支座。'},{id:328,ch:2,type:'multi',q:'选取不同的支座，考虑哪些因素（）',opts:['净空高度','结构形式','反力值','车辆荷载','转角变形值'],ans:[1,2,4],exp:'正确答案为B、C、E。结构形式；反力值；转角变形值\n\n📖 教材依据（城市桥梁工程）：的接桩可采用焊接、法兰连接或机械连接，接桩材料工艺应符合规范要求。(2)沉桩顺序:宜由一端向另一端进行;对于密集桩群，自中间向两端(两个方向)或四周对称施打;根据基础的设计标高，宜先深后浅;根据桩的规格，宜先大后小，先长后短;根据斜坡地形，应先坡顶后坡脚。(3)沉桩时，桩帽或送桩帽与桩周围间隙应为5~10mm:桩锤、桩帽或送桩帽应和桩身在同一中心线上;桩身垂直度偏差不得超过0.5%。\n\n桥梁支座可按其跨径、结构形式、反力值、支承处的位移及转角变形值选取不同的支座（跨界范围转变）'},{id:329,ch:2,type:'single',q:'关于桥梁支座安装施工的说法，正确的是（ ）。',opts:['墩台帽上的支座垫石和挡块应与墩台一次浇筑完成','实际支座安装温度与设计要求不同时，应通过计算设置预偏量','活动支座安装前应采用水清洗各相对滑移面','支座安装后，临时固定构件应在结构运营一年后再拆除'],ans:1,exp:'正确答案为B。实际支座安装温度与设计要求不同时，应通过计算设置预偏量\n\n📖 教材依据（城市桥梁工程）：般要求(1)墩台帽、盖梁上的支座垫石和挡块宜二次浇筑，应对其平面位置、顶面高程、平整度、预留地脚螺栓孔和预埋钢垫板等的准确性进行复核检查。垫石混凝土的强度必须符合设计要求。(2)当实际支座安装温度与设计要求不同时，应通过计算设置支座顺桥方向的预偏量。(3)支座安装平面位置和顶面高程必须正确，不得偏斜、脱空、不均匀受力。'},{id:330,ch:2,type:'single',q:'现浇梁盆式橡胶支座安装，说法正确的是（ ）。',opts:['支座安装前应拆除上下钢板临时连接螺栓，以便调整位置','采用焊接连接时，应连续焊接以保证强度，无需考虑温度影响','灌浆材料终凝后，可立即拆除支座的上下钢板临时连接螺栓','支座安装前应清除预留锚栓孔中的杂物和积水'],ans:3,exp:'正确答案为D。支座安装前应清除预留锚栓孔中的杂物和积水\n\n📖 教材依据（城市桥梁工程）：顶预埋钢板下的混凝土宜分两次浇筑，应从一端灌浆，另一端排气，直至从另一端溢出为止，灌浆应连续进行。预埋钢板不得出现空鼓现象。④支座安装前，应清除预留锚栓孔中的杂物和积水，待支座安装就位后安装灌浆用模板，确认支座中心位置及标高符合设计要求后，采用重力方式灌浆。⑤灌浆材料终凝后，拆除模板，检查灌浆是否密实、无漏浆，待箱梁混凝土浇筑完毕后，及时拆除各支座的上下钢板临时连接螺栓。\n\nA选项错误，安装前不得松动临时连接螺栓。 B选项错误，焊接应对称、间断进行，防止高温损坏聚四氟乙烯板。 C选项错误，临时连接螺栓应在箱梁混凝土浇筑完毕后拆除。'},{id:331,ch:2,type:'single',q:'下列不属于装配式梁（板）架设方法的是（  ）。',opts:['起重机架梁法','跨墩龙门吊架梁法','悬臂浇筑','穿巷式架桥机架梁法'],ans:2,exp:'正确答案为C。悬臂浇筑\n\n📖 教材依据（城市桥梁工程）：须预压试验。(7)6级(含)以上大风，禁止移动模架系统。做好移动模架行走状态、立模状态和海凝土浇筑状态应力监控，控制移动模架的变形在合理范围内，确保施工安全和桥梁结构安全。2.悬臂浇筑法悬臂挠筑法是将梁体沿桥梁轴线分成若干段，在桥墩两侧设置工作平台，平衡对称地逐段向跨中悬臂浇筑混凝土梁体，并逐段施加预应力的施工方法。'},{id:332,ch:2,type:'multi',q:'后张法现浇箱梁，预应力张拉前的工作有（）',opts:['封锚','安装内模','拆除侧模','混凝土养护','管道压浆'],ans:[1,2,3],exp:'正确答案为B、C、D。安装内模；拆除侧模；混凝土养护\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……'},{id:333,ch:2,type:'multi',q:'梁、板构件移运时，说法错误有（）',opts:['吊点仅根据计算决定','吊绳与起吊构件的交角45°时，应设置吊架或起吊扁担','吊环垂直受力，采用螺纹钢筋','吊移板式构件时，不得吊错上、下面','支承位置应与吊点位置在同一竖直线上'],ans:[0,2],exp:'正确答案为A、C。吊点仅根据计算决定；吊环垂直受力，采用螺纹钢筋\n\n📖 教材依据（城市桥梁工程）：过程中不得对梁、板产生任何冲击和碰撞。(2)构件运输和堆放时，梁式构件应竖立放置，并应采取斜撑等防止倾覆的措施;板式构件不得倒置。支承位置应与吊点位置在同一竖直线上。(3)梁、板构件移运时的吊点位置应按设计要求;设计无要求时，梁、板构件的吊点应根据计算决定。构件的吊环应顺直。吊绳与起吊构件的交角小于60。'},{id:334,ch:2,type:'single',q:'关于预应力混凝土T形梁和I形梁的施工要求，下列说法正确的是（ ）。',opts:['预应力应单向施加，以提高施工效率','应采用对称、均衡的方式施加预应力，防止梁体侧向弯曲','可使用橡胶充气气囊作为空心梁板的内模','后张法预应力构件张拉时可采用普通张拉设备'],ans:1,exp:'正确答案为B。应采用对称、均衡的方式施加预应力，防止梁体侧向弯曲\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\nA选项错误，预应力应对称、均衡施加。 C选项错误，禁止使用橡胶充气气囊。 D选项错误，张拉应使用数控张拉设备。'},{id:335,ch:2,type:'multi',q:'混凝土构件浇筑的技术要求，正确的有（ ）。',opts:['T形梁应先浇筑扩大断面部分，再浇筑上部腹板','U形梁一次浇筑时，底板和腹板混凝土同时浇筑','采用平卧重叠法施工时，上层构件浇筑前下层构件强度应≥5.0MPa','箱形梁浇筑顺序应为底板→腹板→顶板，并采取措施防止内膜上浮','后张法预应力孔道压浆可采用普通压浆设备'],ans:[0,2,3],exp:'正确答案为A、C、D。T形梁应先浇筑扩大断面部分，再浇筑上部腹板；采用平卧重叠法施工时，上层构件浇筑前下层构件强度应≥5.0MPa；箱形梁浇筑顺序应为底板→腹板→顶板，并采取措施防止内膜上浮\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\nB选项错误，U形梁分两次浇筑时，底板和腹板应分开浇筑。 E选项错误，压浆应使用数控压浆设备。'},{id:336,ch:2,type:'single',q:'关于装配式桥梁构件吊装施工，下列说法正确的是（ ）。',opts:['构件吊装时混凝土强度只要达到设计强度的50%即可','后张法预应力构件吊装时孔道水泥浆强度不应低于20MPa','6级大风天气可继续进行吊装作业','双机抬吊时应设专人指挥，单机按降效25%作业'],ans:3,exp:'正确答案为D。双机抬吊时应设专人指挥，单机按降效25%作业\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\nA选项错误，混凝土强度不应低于设计强度的75%； B选项错误，孔道水泥浆强度不应低于30MPa； C选项错误，6级（含）以上大风应停止吊装作业；'},{id:337,ch:2,type:'multi',q:'现浇预应力混凝土连续梁常用施工方法有（  ）',opts:['支架法','顶推法','移动模架法','悬臂拼装法','悬臂浇筑法'],ans:[0,2,4],exp:'正确答案为A、C、E。支架法；移动模架法；悬臂浇筑法\n\n📖 教材依据（城市桥梁工程）：新进行标定后方能继续投入使用。2.4.2现浇预应力(钢筋)混凝土连续梁施工技术现浇预应力(钢筋)混凝土连续梁常用的施工技术有支(模)架法和悬臂挠筑法。1.支(模)架法1)支架法现浇预应力混凝土连续梁施工工艺流程:施工准备→地基处理→支架搭设→模板系统安装→支架加载预压→钢筋、预应力筋及孔道安装→内模安装→混凝土浇筑→?昆凝土养护→预应力张拉→预应力孔道压浆→落架→拆除支架、模板→清理现场。'},{id:338,ch:2,type:'multi',q:'关于支架法现浇预应力混凝土连续梁的要求，正确的有（  ）。',opts:['地基处理后，方可进行支架安装作业','安装支架时，应根据梁体和支架的弹性、非弹性变形设置预拱度','支架底部应有良好的排水措施，不得被水浸泡','支架安装完毕，立即安装防倾覆措施','有简便可行的落架拆模措施'],ans:[1,2,4],exp:'正确答案为B、C、E。安装支架时，应根据梁体和支架的弹性、非弹性变形设置预拱度；支架底部应有良好的排水措施，不得被水浸泡；有简便可行的落架拆模措施\n\n📖 教材依据（城市桥梁工程）：拱线间的距离;其他形式的桥梁为桥面系的行车道长度。第2章城市桥梁工程49(3)按主要承重结构所用的材料来分，有巧工桥、钢筋混凝土桥、预应力混凝土桥、钢桥、钢一混凝土组合梁桥和木桥等。(4)按上部结构的行车道位置分为上承式桥(桥面结构布置在主要承重结构之上)、下承式桥、中承式桥。2.1.2桥梁结构施工通用施工技术1.模板、支架和拱架的设计、制作、安装与拆除1)模板、支架和拱架的设计与验算(1)模板、支架和拱架应结构简单、制造与装拆方便，有足够的承载能力、刚度和稳定性，并应满足施工过程中的各种工况要……\n\n地基处理后，应做地基承载试验，若沉降量超标，则对地基重新处理，直到满足要求为止。'},{id:339,ch:2,type:'single',q:'关于移动模架，错误的有（  ）。',opts:['浇筑分段工作缝，必须设在弯矩零点附近','移动模架首次拼装后，需做预压加载试验，后续使用无须预压试验','3级(含)以上大风，禁止移动模架系统','模板平面尺寸、高程、预拱度的误差必须控制在容许范围内。'],ans:2,exp:'正确答案为C。3级(含)以上大风，禁止移动模架系统\n\n📖 教材依据（城市桥梁工程）：控制在容许范围内。(5)泪凝土内预应力筋管道、钢筋、预埋件设置应符合规范规定和设计要求。(6)移动模架首次拼装后，需做预压加载试验，后续使用无须预压试验。(7)6级(含)以上大风，禁止移动模架系统。做好移动模架行走状态、立模状态和海凝土浇筑状态应力监控，控制移动模架的变形在合理范围内，确保施工安全和桥梁结构安全。'},{id:340,ch:2,type:'single',q:'悬臂浇筑法施工顺序，下列描述正确的是（ ）',opts:['应先施工边孔支架现浇梁段，再进行0号块施工','主梁跨中合龙段应在所有悬浇梁段完成后施工','0号块两侧悬浇梁段可采用不对称施工以加快进度','墩顶梁段浇筑完成后可直接进行合龙段施工'],ans:1,exp:'正确答案为B。主梁跨中合龙段应在所有悬浇梁段完成后施工\n\n📖 教材依据（城市桥梁工程）：)浇筑段落悬浇梁体一般应分四大部分浇筑:(1)墩顶梁段(0号块)。(2)墩顶梁段(0号块)两侧对称悬浇梁段。(3)边孔支架现浇梁段。(4)主梁跨中合龙段。3)悬浇顺序及要求(1)顺序①在墩顶托架或膺架上浇筑O号段并实施墩梁临时固结。②在O号块段上安装悬臂挂篮，向两侧依次对称分段浇筑主梁至合龙前段。③在支架上浇筑边跨主梁合龙段。'},{id:341,ch:2,type:'multi',q:'悬浇梁体墩顶梁段一般有下列（  ）方法。',opts:['悬臂浇筑','托架法','膺架法','支架法','移动模架法'],ans:[1,2,3],exp:'正确答案为B、C、D。托架法；膺架法；支架法\n\n📖 教材依据（城市桥梁工程）：大风，禁止移动模架系统。做好移动模架行走状态、立模状态和海凝土浇筑状态应力监控，控制移动模架的变形在合理范围内，确保施工安全和桥梁结构安全。2.悬臂浇筑法悬臂挠筑法是将梁体沿桥梁轴线分成若干段，在桥墩两侧设置工作平台，平衡对称地逐段向跨中悬臂浇筑混凝土梁体，并逐段施加预应力的施工方法。连续梁悬臂浇筑流程:施工准备→O号块支架搭设、预压→O号块1昆凝土浇筑→O号块预应力钢束张拉→墩梁临时固结→组拼挂篮→挂篮预压→对称悬臂浇筑1号块→1号块预应力钢束张拉→挂篮前移就位→悬臂浇筑2号块→2号块预应力钢……'},{id:342,ch:2,type:'multi',q:'悬臂浇筑法，合龙段说法正确的是（  ）',opts:['合龙段的长度宜为2m','合龙前，在两端悬臂预加压重，并于浇筑混凝土过程中逐步撤除','合龙宜在一天中气温最高时进行','混凝土强度等级宜提升一级，目的防止开裂','宜采用微膨胀混凝土或纤维混凝土'],ans:[0,1,4],exp:'正确答案为A、B、E。合龙段的长度宜为2m；合龙前，在两端悬臂预加压重，并于浇筑混凝土过程中逐步撤除；宜采用微膨胀混凝土或纤维混凝土\n\n📖 教材依据（城市桥梁工程）：大风，禁止移动模架系统。做好移动模架行走状态、立模状态和海凝土浇筑状态应力监控，控制移动模架的变形在合理范围内，确保施工安全和桥梁结构安全。2.悬臂浇筑法悬臂挠筑法是将梁体沿桥梁轴线分成若干段，在桥墩两侧设置工作平台，平衡对称地逐段向跨中悬臂浇筑混凝土梁体，并逐段施加预应力的施工方法。连续梁悬臂浇筑流程:施工准备→O号块支架搭设、预压→O号块1昆凝土浇筑→O号块预应力钢束张拉→墩梁临时固结→组拼挂篮→挂篮预压→对称悬臂浇筑1号块→1号块预应力钢束张拉→挂篮前移就位→悬臂浇筑2号块→2号块预应力钢……\n\n⑤合龙宜在一天中气温最低时进行。 ⑥ 合龙段的混凝土强度宜提高一级，以尽早施加预应力。 宜采用微膨胀混凝土或纤维混凝土，增加混凝土的抗裂性。'},{id:343,ch:2,type:'multi',q:'悬臂浇筑施工中监测项目有（  ）。',opts:['挂篮前端的垂直变形值','预拱度设置','施工中已浇段的实际标高','温度影响','结构物的变形值'],ans:[0,1,2,4],exp:'预应力混凝土连续梁，悬臂浇筑段前端底板和桥面标高的确定是连续梁施工的关键问题之一，确定悬臂浇筑段前端标高时应考虑：ABCD 施工过程中的监测项目为前三项；必要时，结构物的变形值、应力也应进行监测，保证结构的强度和稳定。'},{id:344,ch:2,type:'multi',q:'钢梁制造企业应向安装企业提供“三证”包括（）',opts:['施工图','拼装简图','产品合格证','质量证明书','检验报告'],ans:[2,3,4],exp:'(3)钢梁制造企业应向安装企业提供下列文件： ①产品合格证。 ②钢材和其他材料质量证明书和检验报告。 ③施工图，拼装简图。 ④工厂高强度螺栓摩擦面抗滑移系数试验报告。 ⑤焊缝无损检验报告和焊缝重大修补记录。 ⑥产品试板的试验报告。 ⑦工厂试拼装记录。 ⑧杆件发运和包装清单。'},{id:345,ch:2,type:'multi',q:'钢梁安装前应对（  ）在不同受力状态下的强度、刚度及稳定性进行验算。',opts:['临时支架','支承','吊机','钢梁结构本身','剪力连接器'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。临时支架；支承；吊机；钢梁结构本身\n\n📖 教材依据（城市桥梁工程）：高程控制点。③临时支架旁有交通通行需要的，一方面要做好交通疏导，设立醒目安全警示标识，另一方面在支架外侧做好防撞墙，防止汽车撞击支架体系。(2)钢梁安装前应对临时支架、支承、吊机等临时结构和钢梁结构本身在不同受力状态下的强度、刚度及稳定性进行验算。(3)应对桥台、墩顶顶面高程、中线及各孔跨径进行复测，误差在允许偏差范围内方可安装。\n\n钢梁安装前应对临时支架、支承、吊机等临时结构和钢梁结构本身在不同受力状态下的强度、刚度及稳定性进行验算。'},{id:346,ch:2,type:'multi',q:'钢梁安装要点，说法正确的是（）',opts:['钢梁整体安装完毕测量其位置、标高和预拱度','焊接顺序宜为纵向从跨中向两端','焊接横向从两侧向中线对称进行','施拧顺序为从板束刚度大、缝隙大处开始','由外向中央拧紧，并应在当天终拧完毕'],ans:[1,3],exp:'(7)钢梁安装过程中，每完成一节段应测量其位置、标高和预拱度，不符合要求应及时校正。 (8)钢梁杆件工地焊缝连接，应按设计顺序进行。无设计顺序时，焊接顺序宜为纵向从跨中向两端、横向从中线向两侧对称进行。 施拧顺序为从板束刚度大、缝隙大处开始，由中央向 外拧紧，并应在当天终拧完毕。施拧时，不得采用冲击拧紧和间断拧紧。'},{id:347,ch:2,type:'single',q:'钢-混凝土组合梁施工要点，说法错误的是（）',opts:['混凝土桥面结构应全断面连续浇筑','顺桥向应自跨中开始向支点处交汇，或由一端开始浇筑','横桥向应先由中间开始向两侧扩展','混凝土桥面板上施工后，另做砂浆找平层'],ans:3,exp:'正确答案为D。混凝土桥面板上施工后，另做砂浆找平层\n\n📖 教材依据（城市桥梁工程）：5)涂装应在天气晴朗、4级(不含)以下风力时进行，夏季应避免阳光直射。涂装时构件表面不应有结露，涂装后4h内应采取防护措施。第2章城市桥梁工程2.4.493钢一混凝土组合梁施工技术1.钢一混凝土组合梁的构成与适用条件(1)钢一混凝土组合梁一般由钢梁和钢筋混凝土桥面板两部分组成:①钢梁由工字形截面或槽形截面构成，钢梁之间设横梁(横隔梁)，有时在横梁之间还设小纵梁。'},{id:348,ch:2,type:'multi',q:'钢-混结合梁，施工支架设计验算应考虑的荷载有（ ）。',opts:['钢梁拼接荷载','混凝土结构荷载','施工荷载','风雪荷载','保温设施荷载'],ans:[0,1,2],exp:'正确答案为A、B、C。钢梁拼接荷载；混凝土结构荷载；施工荷载\n\n📖 教材依据（城市桥梁工程）：(7)节段匹配安装盖梁预制构件时，应采取可靠的临时固定措施，在构件精确就位后对其进行临时固定，未固定之前不得将起重机的吊钩松脱。(8)节段匹配安装时，对接缝处理的施工参见本书2.2.3中3.6)的相关要求。(9)预应力张拉和孔道压浆的施工应符合设计及本书2.1.2中4.的相关要求。(10)安装完成进行体系转换时，应符合设计要求的程序和步骤。'},{id:349,ch:2,type:'multi',q:'拱架种类按材料分为（）',opts:['木拱架','钢拱架','混凝土拱架','竹木混合拱架','钢木组合拱架'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。木拱架；钢拱架；竹木混合拱架；钢木组合拱架\n\n📖 教材依据（城市桥梁工程）：几种施工方法的组合。(2)选用施工方法应根据拱桥的跨度、结构形式、现场施工条件、施工水平等因素，经方案的技术经济比较确定合理的施工方法。3)拱架种类与形式(1)拱架种类按材料分为木拱架、钢拱架、竹拱架、竹木棍合拱架、钢木组合拱回第2章城市桥梁工程95架以及土牛拱胎架。(2)按结构形式分为排架式、撑架式、扇架式、有7架式、组合式、叠析式、斜拉式。'},{id:350,ch:2,type:'single',q:'在拱架上浇筑混凝土拱圈,说法错误的是（）',opts:['跨径小于16m的拱圈混凝土，按拱圈全宽从两端拱脚向拱顶对称、连续浇筑','跨径大于或等于16m的拱圈或拱肋，宜分段浇筑','分段浇筑钢筋混凝土拱圈时，纵向采用通长钢筋','间隔槽，宽度宜为0.5～1m'],ans:2,exp:'正确答案为C。分段浇筑钢筋混凝土拱圈时，纵向采用通长钢筋\n\n📖 教材依据（城市桥梁工程）：度的1/5000;当跨度等于或小于20m时，不得大于4mm。(4)拱圈(拱肋)封拱合龙温度应符合设计要求，设计无要求的，宜在当地年平均温度或5~10"C时进行。2)在拱架上浇筑混凝土拱圈(1)跨径小于16m的拱圈或拱肋泪凝土，应按拱圈全宽从两端拱脚向拱顶对称、连续浇筑，并在拱脚混凝土初凝前全部完成。不能完成时，则应在拱脚预留一个隔缝，最后浇筑隔缝混凝土。'},{id:351,ch:2,type:'multi',q:'装配式桁架拱安装，正确的是（）',opts:['装配式桁架拱可采用卧式预制拱片','大跨径桁式组合拱，应设置拱顶湿接头','湿接头混凝土，和构件混凝土强度等级一致','湿接头混凝土，宜为缓凝混凝土','安装过程中应采用全站仪，对拱肋、拱圈的挠度和等项目进行观测'],ans:[0,1,4],exp:'(1)装配式桁架拱、刚构拱采用卧式预制拱片时，为防止拱片在起吊过程中产生扭折，起吊时必须将全片水平吊起后，再悬空翻身竖立。在拱片悬空翻身整个过程中，各吊点受力应均匀，并始终保持在同一平面内，不得扭转。 (2)大跨径桁式组合拱，拱顶湿接头混凝土，宜采用较构件混凝土强度等级高一级的早强混凝土。'},{id:352,ch:2,type:'single',q:'钢管混凝土拱施工流程正确的是（）',opts:['拱肋加工→拱肋安装→钢管混凝土压注→吊杆安装→桥面系施工','钢管混凝土压注→拱肋加工→拱肋安装→吊杆安装→桥面系施工','拱肋加工→拱肋安装→吊杆安装→钢管混凝土压注→桥面系施工','拱肋加工→拱肋安装→钢管混凝土压注→桥面系施工→吊杆安装'],ans:0,exp:'正确答案为A。拱肋加工→拱肋安装→钢管混凝土压注→吊杆安装→桥面系施工\n\n📖 教材依据（城市桥梁工程）：制宜在每天气温、日照变化不大的时候进行，尽量减少温度变化等不利因素的影响。4.钢管混凝土拱1)工艺流程系梁(加劲梁)施工→钢管拱肋加工、预拼装→拱肋安装、合龙→钢管混凝土压注→吊杆安装→桥面系施工。2)铜管拱肋制作应符合下列要求(1)拱肋钢管的种类、规格应符合设计要求，应在工厂加工，具有产品合格证。(2)钢管拱肋加工的分段长度应根据材料、工艺、运输、吊装等因素确定。\n\n1)工艺流程 系梁(加劲梁)施工→钢管拱肋加工、预拼装→拱肋安装、合龙→钢管混凝土压注→ 吊杆安装→桥面系施工。'},{id:353,ch:2,type:'multi',q:'在钢管拱肋上应设置（）',opts:['混凝土压注孔','倒流截止阀','排水孔','扣点','吊点节点板'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。混凝土压注孔；倒流截止阀；扣点；吊点节点板\n\n📖 教材依据（城市桥梁工程）：)拱肋节段焊接强度不应低于母材强度。所有焊缝均应进行外观检查;对接焊缝应100%进行超声检测，其质量应符合设计要求和现行国家标准规定。(5)在钢管拱肋上应设置1昆凝土压注孔、倒流截止阅、排气孔及扣点、吊点节点板。(6)钢管拱肋外露面应按设计要求做长效防护处理。3)钢管拱肋安装应符合下列要求(1)钢管拱肋成拱过程中，应同时安装横向连系，未安装连系的不得多于一个节段，否则应采取临时横向稳定措施。\n\n在钢管拱肋上应设置混凝土压注孔、倒流截止阀、排气孔及扣点、吊点节点板'},{id:354,ch:2,type:'multi',q:'斜拉桥组成包括（）',opts:['索塔','钢索','主梁','主缆','鞍座'],ans:[0,1,2],exp:'正确答案为A、B、C。斜拉桥由索塔、钢索和主梁三大部分组成。索塔承受主梁通过拉索传递的荷载，钢索（斜拉索）是连接索塔和主梁的关键构件，主梁是承受桥面荷载的主要结构。\n\n📖 教材依据（城市桥梁工程）：斜拉桥由索塔、钢索和主梁构成。'},{id:355,ch:2,type:'multi',q:'悬索桥主要由（）等部分组成',opts:['主缆','锚碇','鞍座','吊索','主梁'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。主缆；锚碇；鞍座；吊索\n\n📖 教材依据（城市桥梁工程）：定测量时间塔、梁、索的变化。2.4.7悬索桥施工技术1.悬索桥组成和各部分作用(1)悬索桥是以承受拉力的缆索或链索作为主要承重构件的桥梁，主要由主缆、加劲梁、主塔、鞍座、锚皖、吊索等部分组成。悬索桥的主要承重构件是悬索，它主要承第1篇市政公用工程技术100受拉力，一般用抗拉强度高的钢材(钢丝、钢缆等)制作。'},{id:356,ch:2,type:'single',q:'（ ）是连系加劲梁和主缆的纽带',opts:['主塔','主缆','锚碇','吊索'],ans:3,exp:'主缆是结构体系中的主要承重构件；通过塔顶索鞍悬挂在主塔上并锚固于两端锚固体中的柔性承重构件。 主塔是悬索桥抵抗竖向荷载的主要承重构件；支承主缆的重要构件。 加劲梁是悬索桥承受风荷载和其他横向水平力的主要构件，防止桥面发生过大的挠曲变形和扭曲变形，主要承受弯曲内力。 锚碇是锚固主缆的结构，它将主缆中的拉力传递给地基。'},{id:357,ch:2,type:'single',q:'桥面防水中，基层要求错误的是（）',opts:['基层混凝土强度应达到设计强度的80%以上，方可进行防水层施工','采用防水卷材时，基层混凝土表面的粗糙度应为1.5～2.0mm','防水材料为卷材及聚氨酯涂料时，基层混凝土的含水率应大于4%','基层混凝土表面粗糙度处理宜采用抛丸打磨'],ans:2,exp:'正确答案为C。防水材料为卷材及聚氨酯涂料时，基层混凝土的含水率应大于4%\n\n📖 教材依据（城市桥梁工程）：103可在环氧树脂上撒布粒径为0.2~0.7mm的石英砂进行处理，同时应将环氧树脂上的浮砂清除干净。(3)混凝土的基层平整度应小于或等于1.67mm/m。(4)当防水材料为卷材及聚氨醋涂料时，基层混凝土的含水率应小于4%。当防水材料为聚合物改性沥青涂料和聚合物水泥涂料时，基层混凝土的含水率应小于10%。'},{id:358,ch:2,type:'single',q:'关于桥梁卷材防水层铺设的说法，正确的是（ ）。',opts:['卷材铺设应先大面积展开，再进行节点、转角等局部处理','铺设防水卷材时，环境气温和卷材温度应高于0℃','任何区域的卷材不得多于3层，搭接接头应错开500mm以上','卷材展开方向应与车辆运行方向垂直'],ans:2,exp:'正确答案为C。任何区域的卷材不得多于3层，搭接接头应错开500mm以上\n\n📖 教材依据（城市桥梁工程）：\'C，基面层的温度必须高于O\'C;当下雨、下雪和风力大于或等于5级时，严禁进行桥面防水层体系的施工。当施工中途下雨时，应做好己铺设卷材周边的防护措施。(3)铺设防水卷材时，任何区域的卷材不得多于3层，搭接接头应错开500mm以上，严禁沿道路宽度方向搭接形成通缝。接头处卷材的搭接宽度沿卷材的长度方向应为150mm，沿卷材的宽度方向应为100mm。'},{id:359,ch:2,type:'multi',q:'关于防水卷材铺设施工技术，正确的有（ ）。',opts:['热熔法施工时，应防止烧熔胎体','热熔法搭接缝部位应将热熔的改性沥青挤压溢出，溢出宽度约20mm','采用热熔胶法时，搭接部位的接缝应涂满热熔胶并辊压牢固','铺设自粘性防水卷材时，可不撕除底面隔离纸直接铺贴','卷材储运保管应按规范规定执行'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。热熔法施工时，应防止烧熔胎体；热熔法搭接缝部位应将热熔的改性沥青挤压溢出，溢出宽度约20mm；采用热熔胶法时，搭接部位的接缝应涂满热熔胶并辊压牢固；卷材储运保管应按规范规定执行\n\n📖 教材依据（城市桥梁工程）：放在工程实践应用;同时在广泛征集各方面意见和建议的基础上，对近几年市政工程应用较多的专业工程、专业技术进行了补充。考虑到读者在施工技术内容学习中的整体性需求，将各专业工程的质量及安全控制要点与施工技术内容整合编写;在法律法规内容中补充了相关的管理规定，以及近几年国家发布的强制性标准中与市政工程专业相关的技术标准和安全标准;项目管理部分增加了工程总承包管理、绿色建造等相应内容。'},{id:360,ch:2,type:'multi',q:'关于桥面防水涂料施工技术，正确的有（ ）。',opts:['风力大于或等于5级时严禁施工','聚合物改性沥青热熔型防水涂料施工环境气温不宜低于-10℃','防水涂料宜多遍涂布，待前一遍干燥成膜后方可涂布后一遍','胎体增强材料应顺桥面行车方向铺贴，自最高处开始向低处铺贴','采用两层胎体增强材料时，搭接缝应错开，间距不应小于幅宽的1/2'],ans:[0,1,2],exp:'正确答案为A、B、C。风力大于或等于5级时严禁施工；聚合物改性沥青热熔型防水涂料施工环境气温不宜低于-10℃；防水涂料宜多遍涂布，待前一遍干燥成膜后方可涂布后一遍\n\n📖 教材依据（城市桥梁工程）：放在工程实践应用;同时在广泛征集各方面意见和建议的基础上，对近几年市政工程应用较多的专业工程、专业技术进行了补充。考虑到读者在施工技术内容学习中的整体性需求，将各专业工程的质量及安全控制要点与施工技术内容整合编写;在法律法规内容中补充了相关的管理规定，以及近几年国家发布的强制性标准中与市政工程专业相关的技术标准和安全标准;项目管理部分增加了工程总承包管理、绿色建造等相应内容。'},{id:361,ch:2,type:'single',q:'城市快速路、主干路桥梁桥面铺装大多数采用 沥青混凝土，一般为（）层',opts:['一','两','三','四'],ans:1,exp:'正确答案为B。两\n\n📖 教材依据（城市桥梁工程）：7-2012在充分考虑道路在城市道路网中的地位、交通功能及对沿线服务功能的基础上，将城镇道路分为快速路、主干路、次干路与支路四个等级。快速路，又称城市快速路，完全为交通功能服务，是解决城市大容量、长距离、快速交通的主要道路。2第才篇市政公用工程技术主干路以交通功能为主，为连接城市各主要分区的干路，是城市道路网的主要骨架。\n\n次干路上的特大桥、大桥，桥面铺装大多数采用沥青混凝土，一般为两层。'},{id:362,ch:2,type:'multi',q:'桥面铺装，上层为细粒式沥青混凝土具有（）',opts:['抗滑','耐磨','密实稳定','传力','承重'],ans:[0,1,2],exp:'正确答案为A、B、C。抗滑；耐磨；密实稳定\n\n📖 教材依据（城市桥梁工程）：全并将荷载传至地基的结构。(3)支座系统:是在桥跨结构与桥墩或桥台的支承处设置的传力装置，不仅要传递很大的荷载，而且要保证桥跨结构能产生一定的变位。(4)附属设施:包括桥面系(桥面铺装、防水排水系统、栏杆或防撞栏杆以及灯光照明等)、伸缩缝、桥头搭板和锥形护坡等。①桥面铺装(或称行车道铺装):铺装的平整性、耐磨性、不翘曲、不渗水是保证行车舒适的关键。'},{id:363,ch:2,type:'multi',q:'桥面铺装水泥混凝土整平层，起到（）作用',opts:['保护桥面板','调整桥面标高','平整并借以敷设桥面防水层的作用','提高承载力','传力荷载作用'],ans:[0,1,2],exp:'正确答案为A、B、C。保护桥面板；调整桥面标高；平整并借以敷设桥面防水层的作用\n\n📖 教材依据（城市桥梁工程）：粒料宜与桥头引道上的沥青面层一致。钢筋混凝土桥的桥面铺装一般在沥青混凝土路面铺装层以下设有水泥混凝土整平层，整平层起到保护桥面板和调整桥面标高、平整并借以敷设桥面防水层的作用。水泥混凝土整平层强度等级不应低于C30，厚度宜为70~100mm，并应配有绑扎钢筋网或焊接钢筋网。当为次干路、支路时，桥梁沥青浪凝土铺装层和水泥混凝土整平层的厚度均不宜小于60mm。'},{id:364,ch:2,type:'single',q:'关于桥梁伸缩装置的说法，正确的是（ ）。',opts:['伸缩装置仅需在平行于桥梁轴线方向自由伸缩','设置伸缩缝处，栏杆与桥面铺装均应断开','伸缩装置只需满足车辆通行要求，无需考虑防水','伸缩缝仅设置在两梁端之间，梁端与桥台之间无需设置'],ans:1,exp:'正确答案为B。设置伸缩缝处，栏杆与桥面铺装均应断开\n\n📖 教材依据（城市桥梁工程）：于桥梁轴线的两个方向均能自由伸缩，牢固、可靠。车辆行驶过时应平}I顶，无突跳与噪声;要能防止雨水和垃圾泥土渗入阻塞;安装、检查、养护、消除污物都要简易、方便。在设置伸缩缝处，栏杆与桥面铺装都要断开。桥梁伸缩装置按传力方式和构造特点可分为:对接式、钢制支承式、组合剪切式(板式)、模数支承式以及弹性装置。'},{id:365,ch:2,type:'multi',q:'关于桥梁伸缩装置性能要求，正确的有（ ）。',opts:['伸缩装置应适应桥梁纵、横两向变形','当伸缩装置产生显著横向错位时，应确定平面转角要求','当伸缩装置产生显著竖向错位时，应确定竖向转角要求','伸缩装置应进行变形性能检测','伸缩装置防水性能应符合注满水12h无渗漏的要求答案：BCD'],ans:[1,2,3],exp:'正确答案为B、C、D。当伸缩装置产生显著横向错位时，应确定平面转角要求；当伸缩装置产生显著竖向错位时，应确定竖向转角要求；伸缩装置应进行变形性能检测\n\n📖 教材依据（城市桥梁工程）：(a)Lυ()路堤边坡(c)图1.1-4路基断面形式图(a)路堤一般断面图;(b)路笙一般断面图;(c)半填半挖路基一般断面图3.路基的功能和性能要求(1)路基既为车辆在道路上行驶提供基础条件，也是道路的支撑结构物，对路面的使用性能有重要影响。路基应稳定、密实、均质，为路面结构提供均匀的支承，即路基在环境和荷载作用下不产生不均匀变形。'},{id:366,ch:2,type:'single',q:'伸缩装置上桥安装前，按照安装时的气温调整安装时的定位值，并应由（  ）检查签字后方可用专用卡具将其固定。',opts:['项目负责人','技术负责人','安装负责人','质量负责人'],ans:2,exp:'正确答案为C。安装负责人\n\n📖 教材依据（城市桥梁工程）：。3)伸缩装置施工安装(1)施工安装前按照设计图纸提供的尺寸，核对梁、板端部及桥台处安装伸缩装置的预留槽尺寸，并检查核对梁、板与桥台间的预埋锚固钢筋的规格、数量及位置。(2)伸缩装置上桥安装前，按照安装时的气温调整安装时的定位值，并应由安装负责人检查签字后方可用专用卡具将其固定。(3)伸缩装置吊装就位前，将预留槽内混凝土凿毛并清扫干净，吊装时应按照厂家标明的吊点位置起吊，必要时做适当加强。'},{id:367,ch:2,type:'single',q:'关于桥梁伸缩装置施工安装的说法，正确的是（ ）。',opts:['伸缩装置安装时的定位值应按设计图纸固定，无需考虑安装时气温','伸缩装置吊装就位前，预留槽内混凝土应凿毛并清扫干净','伸缩装置中心线与桥梁中心线允许有适当偏差','伸缩装置两侧预留槽混凝土初凝后即可开放交通'],ans:1,exp:'正确答案为B。伸缩装置吊装就位前，预留槽内混凝土应凿毛并清扫干净\n\n📖 教材依据（城市桥梁工程）：查核对梁、板与桥台间的预埋锚固钢筋的规格、数量及位置。(2)伸缩装置上桥安装前，按照安装时的气温调整安装时的定位值，并应由安装负责人检查签字后方可用专用卡具将其固定。(3)伸缩装置吊装就位前，将预留槽内混凝土凿毛并清扫干净，吊装时应按照厂家标明的吊点位置起吊，必要时做适当加强。(4)安装时，应保证伸缩装置中心线与桥梁中心线重合，伸缩装置顺桥向应对称放置于伸缩缝的间隙上，然后沿桥面横坡方向测量水平标高，并用水平尺或板尺定位，使其顶面标高与设计及规范要求相吻合后垫平。'},{id:368,ch:2,type:'multi',q:'关于桥梁伸缩装置施工安装技术，正确的有（ ）。',opts:['安装前应核对预埋锚固钢筋的规格、数量及位置','安装前应按安装时气温调整定位值，并用专用卡具固定','吊装时应按厂家标明的吊点位置起吊','伸缩装置锚固钢筋与桥梁预埋钢筋应采用绑扎连接','浇筑预留槽混凝土前，用泡沫塑料填塞伸缩缝间隙'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。安装前应核对预埋锚固钢筋的规格、数量及位置；安装前应按安装时气温调整定位值，并用专用卡具固定；吊装时应按厂家标明的吊点位置起吊；浇筑预留槽混凝土前，用泡沫塑料填塞伸缩缝间隙\n\n📖 教材依据（城市桥梁工程）：触。3)伸缩装置施工安装(1)施工安装前按照设计图纸提供的尺寸，核对梁、板端部及桥台处安装伸缩装置的预留槽尺寸，并检查核对梁、板与桥台间的预埋锚固钢筋的规格、数量及位置。(2)伸缩装置上桥安装前，按照安装时的气温调整安装时的定位值，并应由安装负责人检查签字后方可用专用卡具将其固定。(3)伸缩装置吊装就位前，将预留槽内混凝土凿毛并清扫干净，吊装时应按照厂家标明的吊点位置起吊，必要时做适当加强。'},{id:369,ch:2,type:'multi',q:'关于桥梁防护设施施工技术要求，下列说法正确的有（ ）',opts:['栏杆线形应流畅平顺，伸缩缝应与主梁伸缩缝对应','预制构件安装时可采用M15水泥砂浆','金属栏杆焊接后应及时除锈防腐','防护网宜在桥面铺装前安装','防撞墩应与桥面预埋件连接牢固'],ans:[0,2,4],exp:'正确答案为A、C、E。栏杆线形应流畅平顺，伸缩缝应与主梁伸缩缝对应；金属栏杆焊接后应及时除锈防腐；防撞墩应与桥面预埋件连接牢固\n\n📖 教材依据（城市桥梁工程）：经济综合分析的基础上确定梁、板架设方法，常用的方法有起重机架梁法、跨墩门式起重机架梁法和穿巷式架桥机架梁法。2.装配式梁(板)的预制、场内移运和存放施工技术要求1)构件预制施工技术要求先张法梁(板)预制流程:施工准备→张拉台座施工→穿预应力筋、调整初应力→张拉预应力筋→钢筋骨架制作→安装芯模、立侧模→浇筑混凝土→混凝土养护→拆模→放松预应力筋→场内移运、存放。\n\nB选项错误，应采用M20砂浆； D选项错误，防护网应在铺装后安装。'},{id:370,ch:2,type:'single',q:'关于桥梁隔声障安装的说法，正确的是（ ）。',opts:['隔声障加工模数宜由桥梁全长而定','隔声障在伸缩缝部位应断开，不得连续安装','隔声障安装可在6级大风天气下进行','安装时应在伸缩缝一侧端部设置控制点，依序安装'],ans:3,exp:'正确答案为D。隔声障安装时应选择桥梁伸缩缝一侧的端部为控制点，依序安装。其他选项：A错误，隔声障的加工模数宜由桥梁两伸缩缝之间长度而定；B错误，5级（含）以上大风时不得进行隔声障安装；C错误，隔声障应连续安装，不得留有间隙，在桥梁伸缩缝部位应按设计要求处理。\n\n📖 教材依据（城市桥梁工程）：隔声障应连续安装，不得留有间隙，在桥梁伸缩缝部位应按设计要求处理。安装时应选择桥梁伸缩缝一侧的端部为控制点，依序安装。5级（含）以上大风时不得进行隔声障安装。'},{id:371,ch:2,type:'multi',q:'用作人行通道或车行道的涵洞有（）',opts:['小型断面涵洞','管涵','箱涵','盖板涵','拱形涵'],ans:[2,3,4],exp:'正确答案为C、D、E。箱涵；盖板涵；拱形涵\n\n📖 教材依据（城市桥梁工程）：管涵和箱涵施工管涵施工技术涵洞是城镇道路路基工程重要组成部分，涵洞有管涵、拱形涵、盖板涵、箱涵。小型断面涵洞通常用作排水，一般采用管涵形式。大断面涵洞分为拱形涵、盖板涵、箱涵，用作人行通道或车行道。以下内容主要涉及管涵、拱形涵、盖板涵洞与路基(土方)同步配合施工技术要点，不含道路建成后采用暗挖方法施工的内容。'},{id:372,ch:2,type:'single',q:'管涵施工过程中，应设置沉降缝的位置是（  ）A.管节接缝处',opts:['顶部弧形处','管座处','出水口处'],ans:0,exp:'正确答案为A。顶部弧形处\n\n📖 教材依据（城市桥梁工程）：，应按照设计要求将管底土层芳压密实，并做成与管身弧度密贴的弧形管座，安装管节时应注意保持完整。管底土层承载力不符合设计要求时，应按规范要求进行处理、加固。(4)管涵的沉降缝应设在管节接缝处。(5)管涵进出水口的沟床应整理直}I顶，与上下游导流排水系统连接顺畅、稳固。..,第2章城市桥梁工程111(6)采用预制管埋设的管涵施工，应符合《给水排水管道工程施工及验收规范》GB50268-2008有关规定。'},{id:373,ch:2,type:'single',q:'箱涵顶进施工流程中，顶进设备安装的紧后工艺流程是（  ）。',opts:['既有线加固','箱涵试顶','吃土顶进','监控量测'],ans:0,exp:'箱涵顶进工艺流程：现场调查→工程降水→工作坑开挖→后背制作→滑板制作→铺设润滑隔离层→箱涵制作→顶进设备安装→既有线加固→箱涵试顶进→吃土顶进→监控量测→箱体就位→拆除加固设施→拆除后背及顶进设备→工作坑恢复。'},{id:374,ch:2,type:'single',q:'钢桩制作说法错误的是（  ）。',opts:['严禁露天场地制作钢桩','气割加工周围10m范围内不得堆放易燃易爆物品','操作者必须经专业培训，持证上岗','不得将数层钢板叠在一起剪切和冲裁'],ans:0,exp:'正确答案为A。严禁露天场地制作钢桩\n\n📖 教材依据（城市桥梁工程）：压工件的下部，送料时必须在剪刀、冲刀停止动作后方可作业。c根据焊接与切割安全的基本要求，气割加工现场必须按消防部门的规定配置消防器材，周围10m范围内不得堆放易燃易爆物品;操作者必须经专业培训，持证上岗。d.焊接作业现场应按消防部门的规定配置消防器材，周围10m范围内不得堆放易燃易爆物品。操作者必须经专业培训，持证上岗。'},{id:375,ch:2,type:'multi',q:'沉入桩的吊运、堆放正确的是（  ）。',opts:['吊装应由具有吊装施工经验的信号工主持','吊装作业必须由施工技术人员指挥','混凝土桩支点应与吊点在一条竖直线上','钢桩堆放层数不得超过4层','预制混凝土桩起吊时的强度应符合设计要求，设计无要求时，混凝土应不小于设计强度的75%'],ans:[2,4],exp:'①吊装应由具有吊装施工经验的施工技术人员主持。吊装作业必须由信号工指挥。 ② 预制混凝土桩起吊时的强度应符合设计要求，设计无要求时，混凝土应不小于设计强度的75%。 ③ 桩的吊点位置应符合设计或施工组织设计要求。 ④ 桩的堆放场地应平整、坚实、不积水。混凝土桩支点应与吊点在一条竖直线上，堆放时应上下对准，堆放层数不宜超过4层。钢桩堆放支点应布置合理，防止变形，并 应采取防滚动措施，堆放层数不得超过3层。'},{id:376,ch:2,type:'multi',q:'跨径较大的箱涵加固措施有（  ）。',opts:['调轨梁','轨束梁','横梁加盖','纵横梁加固','工字轨束梁'],ans:[2,3,4],exp:'正确答案为C、D、E。横梁加盖；纵横梁加固；工字轨束梁\n\n📖 教材依据（城市桥梁工程）：符合有关安全规定。2)施工安全保护(1)铁道线路加固方法与措施①小型箱涵，可采用调轨梁或轨束梁的加固法。②大型即跨径较大的箱涵，可用横梁加盖、纵横梁加固、工字轨束梁或钢板脱壳法。③在土质条件差、地基承载力低、开挖面土壤含水率高、铁路列车不允许限速的情况下，可采用低高度施工便梁方法。(2)路基加固方法与措施①采用管棚超前支护和水平旋喷桩超前支护方法，控制路基变形在安全范围内。\n\n小型箱涵，可采用调轨梁或轨束梁的加固法。 大型箱涵，可用横梁加盖、纵横梁加固、工字轨束梁或钢板脱壳法'},{id:377,ch:2,type:'multi',q:'大体积承台混凝土施工时，应采取（  ）等措施优化混凝土配合比。',opts:['优先采用水化热较高的水泥','充分利用混凝土的中后期强度，尽可能提高水泥用量','增大含泥量大','控制好混凝土坍落度，不宜大于180mm','选用合适的缓凝、减水等外加剂'],ans:[3,4],exp:'正确答案为D、E。控制好混凝土坍落度，不宜大于180mm；选用合适的缓凝、减水等外加剂\n\n📖 教材依据（城市桥梁工程）：青粘合剂中添加沸石、氧化蜡、沥青乳液，甚至是水来生产的。这可以显著降低拌合和铺设温度，进而降低石油资源的消耗，释放更少的二氧化碳、气溶胶和蒸汽。施工时可在较低温度摊铺，路面可以更快放行;施工季节放宽，尤其适用于较冷的地区。c.冷拌沥青混合料面层:冷拌沥青?昆合料适用于支路及其以下道路的面层、支路的表面层，以及各级沥青路面的基层、连接层或整平层;冷拌改性沥青?昆合料可用于沥青路面的坑槽、井周冷补。\n\n如果含泥量大的话，不仅会增加混凝土的收缩，而且会引起混凝土抗拉强度的降低，对混凝土抗裂不利'},{id:378,ch:2,type:'single',q:'关于桥梁砌体砌筑施工的说法，正确的是（ ）。',opts:['砌筑用石料应干燥洁净，不得提前湿润','砌筑墩台镶面石应从直线部分开始，按顺序排列','砌体勾缝应在砌筑施工完成并经检验合格后进行','勾缝施工应按从下至上的顺序进行'],ans:2,exp:'正确答案为C。砌体勾缝应在砌筑施工完成并经检验合格后进行\n\n📖 教材依据（城市桥梁工程）：)桥墩分水体镶面石的抗压强度不得低于设计要求。(6)砌体的外露面应进行句缝，宜采用凸缝或平缝;对于较规则的砌块，可采用凹缝。句缝应在砌体砌筑施工完成并经检验合格后进行。勾缝前应对勾缝位置清理干净、充分温润，按从上至下的顺序进行。2.32.3.1桥梁支座施工支座类型才.桥梁支座的作用桥梁支座是连接桥梁上部结构和下部结构的重要结构部件，位于桥跨结构和垫石之间，它能将桥梁上部结构承受的荷载和变形(位移和转角)可靠地传递给桥梁下部结构，是桥梁的重要传力装置。'},{id:379,ch:2,type:'multi',q:'关于桥梁支座安装施工技术，正确的有（ ）。',opts:['支座垫石混凝土的强度必须符合设计要求','支座安装后不得偏斜、脱空、不均匀受力','活动支座滑移面上的聚四氟乙烯滑板和不锈钢板可有轻微划痕','支座就位后，垫石和支座上的纵横向中心十字线应对准','调整支座顶面高程时，应采用钢垫片支垫，空隙用环氧树脂砂浆填充密实'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。支座垫石混凝土的强度必须符合设计要求；支座安装后不得偏斜、脱空、不均匀受力；支座就位后，垫石和支座上的纵横向中心十字线应对准；调整支座顶面高程时，应采用钢垫片支垫，空隙用环氧树脂砂浆填充密实\n\n📖 教材依据（城市桥梁工程）：放在工程实践应用;同时在广泛征集各方面意见和建议的基础上，对近几年市政工程应用较多的专业工程、专业技术进行了补充。考虑到读者在施工技术内容学习中的整体性需求，将各专业工程的质量及安全控制要点与施工技术内容整合编写;在法律法规内容中补充了相关的管理规定，以及近几年国家发布的强制性标准中与市政工程专业相关的技术标准和安全标准;项目管理部分增加了工程总承包管理、绿色建造等相应内容。'},{id:380,ch:3,type:'single',q:'在城市软弱围岩地层中，采用浅埋暗挖法施工时，下列（ ）措施是控制地表沉降的关键？',opts:['采用大型挖掘机快速开挖','按照“管超前、严注浆、短开挖、强支护、快封闭、勤量测”的方针施工','增加爆破作业频率以提高效率','采用敞口放坡明挖法减少支护'],ans:1,exp:'正确答案为B。按照“管超前、严注浆、短开挖、强支护、快封闭、勤量测”的方针施工\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:381,ch:3,type:'multi',q:'TBM法作业过程包括（）',opts:['岩石破碎','出渣','支护','钻孔','爆破'],ans:[0,1,2],exp:'正确答案为A、B、C。岩石破碎；出渣；支护\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:382,ch:3,type:'multi',q:'关于城市隧道施工方法，下列描述正确的有（ ）。',opts:['明挖法为埋深较浅、地质条件较差的首选方法','盾构法适用于各种水文地质条件，包括软土、硬岩及地下水丰富的土层','TBM法适用于全断面岩石隧道掘进，具有连续作业、机械化程度高的特点','钻爆法仅适用于无地下水且围岩稳定的隧道施工','浅埋暗挖法初期支护通常采用钢筋格栅和喷射混凝土'],ans:[1,2,4],exp:'正确答案为B、C、E。盾构法适用于各种水文地质条件，包括软土、硬岩及地下水丰富的土层；TBM法适用于全断面岩石隧道掘进，具有连续作业、机械化程度高的特点；浅埋暗挖法初期支护通常采用钢筋格栅和喷射混凝土\n\n📖 教材依据（城市隧道工程与轨道交通）：....….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…........................2173.8城市隧道工程与城市轨道交通工程安全质量控制….......……........……..............……224第4章城市给水排水处理厂站工程........………….……\n\nA错误：明挖法适用于埋深较浅、场地开阔的工程，但地质条件较差时需加强支护，并非首选。 D错误：钻爆法可通过降水等措施用于有地下水的地层。'},{id:383,ch:3,type:'single',q:'在浅埋暗挖法施工中，关于初期支护的主要作用，下列描述正确的是（ ）。',opts:['主要用于装饰隧道内表面，提高美观性','加固围岩，控制围岩变形，防止松动失稳','仅用于支撑模板台车，方便二次衬砌施工','替代防水层，防止地下水渗入隧道'],ans:1,exp:'正确答案为B。加固围岩，控制围岩变形，防止松动失稳\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:384,ch:3,type:'multi',q:'关于浅埋暗挖法隧道施工的复合式衬砌结构，下列说法正确的有（ ）。',opts:['初期支护通常由钢格栅、喷射混凝土等组成，需与围岩密贴','二次衬砌施工应在初期支护变形完全停止后进行','防水层应设置在初期支护与二次衬砌之间','超前支护可采用管棚或小导管注浆加固地层','二次衬砌模板一般采用移动式模板台车，以提高施工效率'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。初期支护通常由钢格栅、喷射混凝土等组成，需与围岩密贴；防水层应设置在初期支护与二次衬砌之间；超前支护可采用管棚或小导管注浆加固地层；二次衬砌模板一般采用移动式模板台车，以提高施工效率\n\n📖 教材依据（城市隧道工程与轨道交通）：..........….............….........……......…..………….........…1533.4浅埋暗挖法隧道施工..............................…..............………..............….........….........…3.5钻爆法隧道施工…-….......….......….......…......................…..............…….........……......……\n\nB错误：二次衬砌应在初期支护变形基本稳定（而非完全停止）且防水验收合格后进行。'},{id:385,ch:3,type:'multi',q:'城市隧道结构由（）四部分组成',opts:['围岩','支护','洞门','附属设施','车站'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。围岩；支护；洞门；附属设施\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:386,ch:3,type:'multi',q:'复合式衬砌结构包括（）',opts:['初期支护','防水层','二次衬砌','预支护','预加固'],ans:[0,1,2],exp:'正确答案为A、B、C。初期支护；防水层；二次衬砌\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:387,ch:3,type:'multi',q:'地铁车站结构横断面，下列说法正确的是（）',opts:['矩形','卵形','拱形','圆形','椭圆形'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。矩形；拱形；圆形；椭圆形\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:388,ch:3,type:'single',q:'关于地铁车站的组成，下列说法正确的是（ ）。',opts:['车站主体包括站台和站厅，不包括设备用房','出入口及通道的主要功能是提供列车停靠和检修','通风道及地面通风亭的作用是维持车站空气质量','冷却塔属于车站主体的一部分'],ans:2,exp:'正确答案为C。通风道及地面通风亭的作用是维持车站空气质量\n\n📖 教材依据（城市隧道工程与轨道交通）：施工;深水河流中必须搭设水上作业平台，作业平台应根据施工荷载、水深、水流、工程地质状况进行施工设计，其顶面高程应比施工期间的最高水位高1.0m以上。(2)钻孔施工①施工场地应平整、坚实;非施工人员禁止进入作业区。②不得在高压线线路下施工。施工现场附近有电力架空线路时，施工中应设专人监护，确认钻机的安全距离在任何状态下均符合表2.7-1的要求。\n\nA错误：车站主体包括站台、站厅、设备用房和生活用房。 B错误：出入口及通道是供乘客进出车站的建筑设施，而非列车停靠或检修。 D错误：冷却塔属于附属建筑物，而非车站主体。'},{id:389,ch:3,type:'multi',q:'关于地铁车站的功能分区，下列说法正确的有（ ）。',opts:['站台是供乘客候车、上下车的场所','通风道及风亭属于车站主体的一部分','设备用房主要用于设置运营设备和办理运营业务','出入口及通道包括人行天桥，供乘客进出车站','冷却塔通常设置在车站主体内部'],ans:[0,2,3],exp:'正确答案为A、C、D。站台是供乘客候车、上下车的场所；设备用房主要用于设置运营设备和办理运营业务；出入口及通道包括人行天桥，供乘客进出车站\n\n📖 教材依据（城市隧道工程与轨道交通）：邻区域内人文景观保护要求、工程地质情况及基础设施管线分布情况，制定相应保护措施，并应报请相关方核准。(4)节约用地应符合下列规定:①施工总平面根据功能分区集中布置。②应在经批准的临时用地范围内组织施工。③应根据现场条件，合理设计场内交通道路。④施工现场临时道路布置应与原有道路及永久道路兼顾考虑，并应充分利用拟建道路为施工服务。\n\nB错误：通风道及风亭属于附属建筑物，而非车站主体。 E错误：冷却塔属于附属建筑物，通常设置在地面，而非车站主体内部。'},{id:390,ch:3,type:'single',q:'交通不能中断且必须确保一定交通流量的情况下，可选用（）施工',opts:['浅埋暗挖','盾构法','盖挖法','明挖法'],ans:2,exp:'正确答案为C。盖挖法\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:391,ch:3,type:'multi',q:'关于地铁施工方法的选择，说法正确的是（）',opts:['明挖法施工速度快且造价较低，适合场地开阔、建筑物稀少的区域','盖挖法适用于城市交通繁忙且不能中断的地段','浅埋暗挖法对地层适应性较弱，仅适用于地质条件良好的区域','浅埋暗挖法适用于地面建筑物密集、对地面沉降要求严格的地区','盾构法在所有地质条件下都是最优的地铁施工方案'],ans:[0,1,3],exp:'正确答案为A、B、D。明挖法施工速度快且造价较低，适合场地开阔、建筑物稀少的区域；盖挖法适用于城市交通繁忙且不能中断的地段；浅埋暗挖法适用于地面建筑物密集、对地面沉降要求严格的地区\n\n📖 教材依据（城市隧道工程与轨道交通）：..........….............….........……......…..………….........…1533.4浅埋暗挖法隧道施工..............................…..............………..............….........….........…3.5钻爆法隧道施工…-….......….......….......…......................…..............…….........……......……\n\nC错误：浅埋暗挖法对地层适应性较强而非较弱； E错误：盾构法并非在所有地质条件下都是最优方案，需根据具体情况选择。'},{id:392,ch:3,type:'single',q:'关于盖挖顺作法的施工特点，说法正确的是（ ）。',opts:['施工过程中完全不需要临时路面结构','围护结构只能采用地下连续墙','主体结构施工顺序是从下至上施作底板、边墙和顶板','可以使用大型机械进行土方开挖'],ans:2,exp:'正确答案为C。主体结构施工顺序是从下至上施作底板、边墙和顶板\n\n📖 教材依据（城市隧道工程与轨道交通）：)抛石挤淤。(5)路基打石灰桩挤密土方固化土方处理。(6)路基堆载预压和加强压实。1.2.3城镇道路路基施工技术1.路基施工特点与程序1)施工特点(1)城市道路路基工程施工处于露天作业，受自然条件影响大;在工程施工区域内的专业类型多、结构物多、各专业管线纵横交错;专业之间及社会之间配合工作多、干扰多，导致施工变化多。\n\nA错误：盖挖顺作法需要设置临时路面结构维持交通； B错误：围护结构可根据条件选择灌注桩或地下连续墙； D错误：受盖板限制无法使用大型机械。'},{id:393,ch:3,type:'multi',q:'关于盖挖顺作法的施工技术要点，下列描述正确的有（ ）。',opts:['临时路面一般由型钢纵、横梁和路面板组成','在饱和软弱地层中，地下连续墙是首选的围护结构','围护结构常作为主体结构边墙的一部分或全部','施工过程中可以完全避免对地面交通的影响','土方开挖需采用特殊的小型、高效机具'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。临时路面一般由型钢纵、横梁和路面板组成；在饱和软弱地层中，地下连续墙是首选的围护结构；围护结构常作为主体结构边墙的一部分或全部；土方开挖需采用特殊的小型、高效机具\n\n📖 教材依据（城市隧道工程与轨道交通）：移运能力确定。(3)双壁钢围垣各节、块拼焊时，应按预先安排的顺序对称进行。拼焊后应进行焊接质量检验及水密性试验。(4)钢围堪浮运定位施工技术要点如下:①应对浮运、就位和灌水着床时的围堪稳定性进行验算。②浮运宜选择自昼，尽量安排在低水位或水流平稳、无风或小风时进行，保证浮运平稳顺利。③在水深或水急处浮运时，可在围堪两侧设导向船。\n\nD错误：施工仍会对交通造成一定影响，只是通过临时路面减小影响'},{id:394,ch:3,type:'multi',q:'关于联络通道，下列说法错误的（  ）',opts:['两条单线区间隧道应设联络通道','相邻两个联络通道之间的距离不应大于500m','联络通道内应设并列反向开启的甲级防火门','联络通道长度一般为10m','在区间线路最低点处设置废水泵房(集水井)'],ans:[1,3],exp:'正确答案为B、D。相邻两个联络通道之间的距离不应大于500m；联络通道长度一般为10m\n\n📖 教材依据（城市隧道工程与轨道交通）：口，vl一对侧门铜管片第3章城市隧道工程与城市轨道交通工程143《地铁设计规范~GB50157-2013第28.2.4条规定:两条单线区间隧道应设联络通道，相邻两个联络通道之间的距离不应大于600m，联络通道内应设并列反向开启的甲级防火门，门扇的开启不得侵入限界。根据线路纵断面设计及区间隧道防、排水要求，在区间线路最低点处设置废水泵房(集水井)，一般情况下，废水泵房与该处联络通道合建，即联络通道内设置废水泵房以及废水抽排和人员检修的管道、管道井。\n\n相邻两个联络通道之间的距离不应大于600m 联络通道长度一般为5～9m'},{id:395,ch:3,type:'multi',q:'关于集水明排，下列说法正确的是（  ）',opts:['当基坑、沟槽开挖较浅，涌水量不大时采用','集水明排法应用不是很广泛，主要是小基坑','是最简单、经济的方法','必须在基坑、沟槽的两侧设置排水明沟','每隔30～50m设置集水井'],ans:[0,2],exp:'正确答案为A、C。当基坑、沟槽开挖较浅，涌水量不大时采用；是最简单、经济的方法\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:396,ch:3,type:'multi',q:'降水深度18m，可选择（  ）方法',opts:['真空井点','喷射井点','管井','电渗井','辐射井'],ans:[1,2,4],exp:'正确答案为B、C、E。喷射井点；管井；辐射井\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:397,ch:3,type:'single',q:'土质类别淤泥质黏土，可采用（ ）降水方法。',opts:['真空井点','喷射井点','管井','电渗井'],ans:3,exp:'正确答案为D。电渗井\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:398,ch:3,type:'multi',q:'隔水帷幕按布置方式分为（  ）',opts:['悬挂式竖向隔水帷幕','落底式竖向隔水帷幕','水平向隔水帷幕','独立式隔水帷幕','嵌入式隔水帷幕'],ans:[0,1,2],exp:'正确答案为A、B、C。悬挂式竖向隔水帷幕；落底式竖向隔水帷幕；水平向隔水帷幕\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:399,ch:3,type:'multi',q:'隔水帷幕按施工方法可采用（  ）。',opts:['水泥土搅拌桩隔水帷幕','地下连续墙隔水帷幕','咬合式排桩隔水帷幕','钻孔灌注桩隔水帷幕','钢板桩隔水帷幕'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。水泥土搅拌桩隔水帷幕；地下连续墙隔水帷幕；咬合式排桩隔水帷幕；钢板桩隔水帷幕\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:400,ch:3,type:'multi',q:'地连墙隔水帷幕，说法正确的（  ）。',opts:['适用于除岩溶外的各类岩土','施工技术简单易行','造价高','泥浆不易造成现场污染','安全性差'],ans:[0,2],exp:'正确答案为A、C。适用于除岩溶外的各类岩土；造价高\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:401,ch:3,type:'multi',q:'地下水回灌宜采用（  ）方法',opts:['管井回灌','大口井回灌','重力回灌','真空回灌','压力回灌'],ans:[0,1],exp:'正确答案为A、B。管井回灌；大口井回灌\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:402,ch:3,type:'multi',q:'地下水回灌的技术要求，下列描述正确的有（ ）',opts:['降水工程影响周边环境安全时可进行回灌','回灌首选同层地下水回灌','非同层回灌时水质不应低于目标含水层水质','回灌必须采取防止恶化地下水水质的措施','回灌水源水质必须达到饮用水标准才能进行回灌'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。降水工程影响周边环境安全时可进行回灌；回灌首选同层地下水回灌；非同层回灌时水质不应低于目标含水层水质；回灌必须采取防止恶化地下水水质的措施\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:403,ch:3,type:'single',q:'降水系统布设，说法正确的（  ）。',opts:['面状降水工程，降水井点宜沿降水区域周边呈封闭状均匀布置，距开挖上口边线不宜小于1m','线状、条状降水工程，降水井宜采用单排或双排布置，降水井与基坑边缘齐平','在运土通道出口两侧应减少降水井','当降水区域远离补给边界，地下水流速较小时，降水井点宜加密布置'],ans:0,exp:'1)降水系统布设 (1)降水系统平面布置应根据工程的平面形状、场地条件及建筑条件确定，并应 符合下列要求： ① 面状降水工程，降水井点宜沿降水区域周边呈封闭状均匀布置，距开挖上口边线不宜小于1m。 ② 线状、条状降水工程，降水井宜采用单排或双排布置，两端应外延布置降水井，外延长度为条状或线状降水井点围合区域宽度的1～2倍。 ③ 降水井点围合区域宽度大于单井降水影响半径或采用隔水帷幕的工程，应在围合区域内增设降水井或疏干井。 ④ 在运土通道出口两侧应增设降水井。 ⑤ 当降水区域远离补给边界，地下水流速较小时，降水井点宜等间距布置，当邻近补给边界，地下水流速较大时，在地下水补给方向的降水井点间距可适当减小。 ⑥ 对于多层含水层降水宜分层布置降水井点，当确定上层含水层地下水不会造成 下层含水层地下水污染时，可利用一个井点降低多层地下水水位。'},{id:404,ch:3,type:'multi',q:'关于集水明排说法正确的是（  ）',opts:['明沟宜布置在拟建工程基础边0.3m以外','沟边缘离开边坡坡脚应不小于0.4m','明沟的底面应比挖土面低0.3～0.4m','集水井底面应比沟底面低0.5m以上','明沟的坡度不宜小于3%'],ans:[2,3],exp:'(1)明沟宜布置在拟建工程基础边0.5m以外， 沟边缘离开边坡坡脚应不小于0.3m。 明沟的底面应比挖土面低0.3～0.4m， 集水井底面应比沟底面低0.5m以上，并随基坑的 挖深而加深，以保持水流畅通。 明沟的坡度不宜小于0.3%,沟底应采取防渗措施。'},{id:405,ch:3,type:'multi',q:'真空井点布设，说法正确的（  ）。',opts:['降水深度不超过6.0m时宜采用单级真空井点','降水深度大于6.0m，采用多级真空井点降水','多级井点上下级高差宜取6.0m','井点间距宜为0.8～2.0m, 距开挖上口线的距离不应小于1.0m','降水区域四角位置井点宜加密'],ans:[0,3,4],exp:'① 当真空井点孔口至设计降水水位的深度不超过6.0m时宜采用单级真空井点；当大于6.0m且场地条件允许时，可采用多级真空井点降水，多级井点上下级高差宜取4.0～5.0m。 ③ 井点间距宜为0.8～2.0m, 距开挖上口线的距离不应小于1.0m; 集水总管宜沿抽水水流方向布设，坡度宜为0.25%～0.5%。 ④降水区域四角位置井点宜加密。'},{id:406,ch:3,type:'multi',q:'关于水平或倾斜井点的适用条件，下列描述正确的有（ ）。',opts:['适用于降水区域场地狭小的情况','适用于涵洞工程施工降水','适用于地下暗挖工程降水','适用于水下降水工程','适用于所有类型的地下水降水工程'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。适用于降水区域场地狭小的情况；适用于涵洞工程施工降水；适用于地下暗挖工程降水；适用于水下降水工程\n\n📖 教材依据（城市隧道工程与轨道交通）：的构筑物，其主体结构宜在枯水期施工。在地表水水体中或岸边施工时，应采取防汛、防冲刷、防漂浮物、防冰凌的措施以及对防洪堤的保护措施。(3)基坑施工降水排水，应对其影响范围内的原有建(构)筑物进行沉降观测，必要时采取保护措施。(4)当处理地基施工采用振动或挤土方法施工时，应采取开挖隔震沟、施工隔离桩等措施控制振动和侧向挤压对邻近建(构)筑物及周边环境产生有害影响。\n\n⑤ 降水区域场地狭小或遇有涵洞工程、地下暗挖工程、水下降水工程时，可布设 水平、倾斜井点。'},{id:407,ch:3,type:'multi',q:'压力注浆法帷幕,说法错误的是（  ）。',opts:['注浆宜按隔一孔或多孔的顺序进行','地下水流速较大时，应从水头高的一端开始注浆','渗透系数变化较小的地层，应先注浆封顶，后自上而下注浆','浆液宜采用普通硅酸盐水泥','对先序注浆孔采取定压注浆，对后续注浆孔采取定量注浆'],ans:[2,4],exp:'(2)对渗透系数变化较小的地层，应先注浆封顶，后自下而上注浆，防止浆液上冒； 对渗透系数随深度加深而增大的地层，则应自下而上注浆；对互层地层，应先对渗透系数或孔隙率大的地层注浆。 (3)注浆用水pH值不得小于4,浆液宜采用普通硅酸盐水泥，可掺入速凝剂、防析水剂、水玻璃等进行多液注浆。 (4)采用定量、定压结合方式注浆，对先序注浆孔采取定量注浆，对后续注浆孔 采取定压注浆。 (5)双液注浆时应使用单向阀的浆液混合器，严禁采用三通阀门；注浆结束时应先停水玻璃浆液泵，后停水泥浆液泵。'},{id:408,ch:3,type:'multi',q:'井点系统的平面布置包括（  ）。',opts:['环形','U形','L形','单排','双排'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。环形；U形；单排；双排\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:409,ch:3,type:'single',q:'管井施工下列要求错误的是（  ）。',opts:['管井施工可根据地层条件选用冲击钻成孔','井管宜高出地表200mm以上','单井完成后应及时洗井，洗井后应安装水泵进行单井试抽','单井、排水管网安装完成后，方可投入正式降水运行'],ans:3,exp:'正确答案为D。单井、排水管网安装完成后，方可投入正式降水运行\n\n📖 教材依据（城市隧道工程与轨道交通）：时洗井，洗井后应安装水泵进行单井试抽。抽水时应做好工作压力、水位、抽水量的记录，当抽水量及水位降值与设计不符时，应及时调整降水方案。④单井、排水管网安装完成后应及时进行联网试运行，试运行合格后方可投入正式降水运行。(7)渗井施工应符合下列要求①可采用螺旋钻进、回转钻进或人工成井的方法施工，对易缩孔、塌孔的地层应采用套管法成孔。\n\n单井、排水管网安装完成后应及时进行联网试运行，试运行合格后方可投入正式降水运行。'},{id:410,ch:3,type:'multi',q:'地下水控制工程，监测包括（ ）。',opts:['地下水位监测','出水量','含砂量监测','水温监测','水质监测'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。地下水位监测；出水量；含砂量监测；水质监测\n\n📖 教材依据（城市隧道工程与轨道交通）：料:①地下水控制范围、深度、起止时间等。②地下工程开挖与支护设计施工方案，拟建建(构)筑物基础埋深、地面高程等。③场地与相邻地区的工程勘察等资料，当地地下水控制工程经验。④周围建(构)筑物、地下管线分布状况和平面位置、基础结构和埋设方式等工程环境情况。⑤地下水控制工程施工的供水、供电、道路、排水及有无障碍物等现场施工条件。\n\n监测主要包括：地下水位监测、出水量和含砂量监测、水质监测、变形监测、巡视检查等内容。'},{id:411,ch:3,type:'single',q:'关于基坑放坡，说法错误的是（）',opts:['边坡土体中剪应力小于土体的抗剪强度时，边坡就会失稳坍塌','放坡设计与施工时应考虑雨水的不利影响','应优先采取坡率法控制边坡的高度和坡度','边坡可分为一级放坡和分级放坡两种形式'],ans:0,exp:'正确答案为D。基坑放坡时，当基坑边坡土体中的剪应力大于土体的抗剪强度时，边坡就会失稳坍塌。D选项说"剪应力小于抗剪强度时边坡失稳"表述错误。\n\n📖 教材依据（城市隧道工程与轨道交通）：当基坑边坡土体中的剪应力大于土体的抗剪强度时，边坡就会失稳坍塌。一旦边坡坍塌，不但地基受到扰动，影响承载力，而且也影响周围地下管线、地面建筑物、交通和人身安全。'},{id:412,ch:3,type:'multi',q:'关于分级放坡，说法错误的是（）',opts:['宜设置分级过渡平台','分级过渡平台的宽度应根据土(岩)质条件、放坡高度及施工场地条件确定','过渡平台的宽度，岩石边坡不宜小于0.5m','过渡平台的宽度，土质边坡不宜小于0.8m','上级放坡坡度宜缓于下级放坡坡度'],ans:[3,4],exp:'正确答案为D、E。过渡平台的宽度，土质边坡不宜小于0.8m；上级放坡坡度宜缓于下级放坡坡度\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:413,ch:3,type:'multi',q:'当边坡有失稳迹象时，有效措施包括（ ）。',opts:['停止降水','削坡','坡顶加载','坡脚压载','土体置换'],ans:[1,3],exp:'正确答案为B、D。削坡；坡脚压载\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:414,ch:3,type:'multi',q:'放坡开挖对坡脚、坡面常用的防护措施有（ ）。',opts:['叠放砂包或土袋','水泥砂浆或细石混凝土抹面','施作围护结构','锚杆喷射混凝土护面','土工织物覆盖坡面'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。叠放砂包或土袋；水泥砂浆或细石混凝土抹面；锚杆喷射混凝土护面；土工织物覆盖坡面\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:415,ch:3,type:'single',q:'坡高小于5m的坚硬黏性土，坡率允许值是（ ）。',opts:['1:0.35～1:0.50','1:0.50～1:0.75','1:0.75～1:1.00','1:1.00～1:1.25'],ans:2,exp:'正确答案为C。1:0.75～1:1.00\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:416,ch:3,type:'single',q:'土钉墙支护，说法错误的是（）',opts:['土钉墙是一种经济、简便、施工快速、无须大型施工设备的基坑支护形式','适应于地下水位以上或降水的非软土基坑','基坑潜在滑动面内有建筑物、重要地下管线时，不可采用土钉墙','基坑较深、土的抗剪强度较低时，宜取较大坡比'],ans:3,exp:'正确答案为D。基坑较深、土的抗剪强度较低时，宜取较大坡比\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:417,ch:3,type:'multi',q:'成孔注浆型钢筋土钉构造，下列错误的有（ ）。',opts:['成孔直径宜取70～120mm','土钉钢筋直径宜取16～32mm','应沿土钉全长设置对中定位支架','土钉孔注浆材料必须采用水泥浆','土钉孔注浆材料水泥浆，其强度不宜低于15MPa'],ans:[3,4],exp:'(2)成孔注浆型钢筋土钉的构造应符合下列要求 ①成孔直径宜取70～120mm。 ②土钉钢筋直径宜取16～32mm。 ③应沿土钉全长设置对中定位支架，其间距宜取 1.5～2.5m, 土钉钢筋保护层厚度不宜小于20mm。 ④土钉孔注浆材料可采用水泥浆或水泥砂浆，其强度不宜低于20MPa。'},{id:418,ch:3,type:'multi',q:'用预应力锚杆复合土钉墙时，说法错误的是（）',opts:['宜采用钢绞线锚杆','预应力锚杆应设置自由段','自由段长度不应超过土钉墙坡体的潜在滑动面','锚杆与喷射混凝土面层之间设置冠梁连接','注浆时将注浆管插至孔底并由孔底注浆'],ans:[2,3],exp:'(3)采用预应力锚杆复合土钉墙时，预应力锚杆符合下列要求 ①宜采用钢绞线锚杆。 ②预应力锚杆应设置自由段，自由段长度应超过土钉墙坡体的潜在滑动面。 ③锚杆与喷射混凝土面层之间设置腰梁连接，腰梁与喷射混凝土面层应紧密接触。 ④注浆时将注浆管插至孔底并由孔底注浆，且注浆管端部至孔底的距离不宜大于200mm; 注浆及拔管时，注浆管出浆口应始终埋入注浆液面内，应在新鲜浆液从孔口溢出后停止注浆；注浆后，当浆液液面下降时，应进行补浆。'},{id:419,ch:3,type:'multi',q:'关于地铁车站长条形基坑纵向放坡的施工要求，下列说法正确的是（ ）',opts:['纵向边坡是动态变化的，施工中容易被忽视','纵向边坡坍塌可能导致基坑整体失稳','软土地区降雨会使土坡安全系数显著降低','边坡越陡，坑外地表差异沉降越小','对于需要保护的邻近管线或建筑，应减缓该处坡度'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。纵向边坡是动态变化的，施工中容易被忽视；纵向边坡坍塌可能导致基坑整体失稳；软土地区降雨会使土坡安全系数显著降低；对于需要保护的邻近管线或建筑，应减缓该处坡度\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:420,ch:3,type:'single',q:'关于预制混凝土板桩的特点，下列错误的是（ ）',opts:['施工对机械要求较高','桩间接缝效果较差','存在挤土现象','不适合大深度基坑'],ans:1,exp:'正确答案为B。桩间接缝效果较差\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:421,ch:3,type:'single',q:'关于钢板桩的特点，下列（ ）正确的是',opts:['刚度大，变形小，适合单独使用','施工过程完全无噪声污染','在软弱土层中需与多道支撑结合使用','使用过程中无需考虑防水问题'],ans:2,exp:'正确答案为C。在软弱土层中需与多道支撑结合使用\n\n📖 教材依据（城市隧道工程与轨道交通）：高强度螺栓连接前，应按出厂批号，每批抽验不小于8套扭矩系数。高强度螺栓穿入孔内应顺畅，不得强行敲入。穿入方向应全桥一致。施拧顺序为从板束刚度大、缝隙大处开始，由中央向外拧紧，并应在当天终拧完毕。施拧时，不得采用冲击拧紧和间断拧紧。(10)高强度螺栓终拧完毕必须当班检查。每栓群应抽查总数的5%，且不得少于2套。\n\nA错误：刚度小，变形大； B错误：施工噪声较大； D错误：如有漏水现象，需增加防水措施。'},{id:422,ch:3,type:'multi',q:'关于SMW工法桩的技术特点，说法正确的是（ ）',opts:['桩体结构强度较高','具有良好的防水止水性能','型钢构件可回收利用','特别适合在坚硬岩层中使用','在软土地层应用时需注意控制变形'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。桩体结构强度较高；具有良好的防水止水性能；型钢构件可回收利用；在软土地层应用时需注意控制变形\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:423,ch:3,type:'multi',q:'关于SMW工法桩，说法正确的有（  ）。',opts:['一种劲性复合围护结构','软弱的土中，水泥用量宜适当减少','在砂性土中搅拌桩施工宜外加膨润土','单根型钢中焊接接头不宜超过一个','焊接接头的位置应避免设在支撑位置'],ans:[0,2,4],exp:'正确答案为A、C、E。一种劲性复合围护结构；在砂性土中搅拌桩施工宜外加膨润土；焊接接头的位置应避免设在支撑位置\n\n📖 教材依据（城市隧道工程与轨道交通）：SMW工法桩(型钢水泥土搅拌墙):SMW工法桩围护墙是利用搅拌设备就地切削土体，并注入水泥类混合液搅拌形成均匀的水泥土搅拌墙，然后在墙中插入型钢，形成一种劲性复合围护结构，具体施工工艺流程见图3.3-3。制作试块残土处理设置导向框架和悬挂梁经纬仪测斜、纠偏图3.3-3SMW工法桩工艺流程图型钢水泥土搅拌墙中水泥土搅拌桩的直径宜采用650mm、850mm、1000mm;内插的型钢宜采用H型钢。\n\n在填土、淤泥质土等特别软弱的土中以及在较硬的砂性土、砂砾土中，钻进速度较慢时，水泥用量宜适当提高。在砂性土中搅拌桩施工宜外加膨润土。'},{id:424,ch:3,type:'multi',q:'下列符合围护结构咬合桩的是（）',opts:['配筋率较低','受力整体性好','施工灵活','需有防水措施相配合','不能做止水帷幕'],ans:[0,1,2],exp:'正确答案为A、B、C。配筋率较低；受力整体性好；施工灵活\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:425,ch:3,type:'multi',q:'常用钢筋混凝土板桩截面的形式有（）',opts:['矩形','T形','工字形','口字形','H形'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。矩形；T形；工字形；口字形\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:426,ch:3,type:'multi',q:'下列地铁基坑围护结构中，止水性好的有（  ）。',opts:['拉森钢板桩','SMW工法桩','灌注桩','地下连续墙','水泥土搅拌桩挡墙'],ans:[0,1,3,4],exp:'选项A：钢板桩强度高，桩与桩之间的连接紧密，隔水效果好。板桩的形式有多种，拉森型是最常用的； 选项B：SMW工法桩强度大，止水性好； 选项C：灌注桩需降水或和止水措施配合使用； 选项D：地下连续墙强度大，变位小，隔水性好，同时可兼作主体结构的一部分； 选项E：水泥土搅拌桩挡墙无支撑，墙体止水性好，造价低'},{id:427,ch:3,type:'single',q:'地下连续墙作业，泥浆的作用（  ）',opts:['控制挖槽精度','提高导墙承载力','保证槽壁的稳定','阻挡水土压力'],ans:2,exp:'正确答案为C。保证槽壁的稳定\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:428,ch:3,type:'multi',q:'地连墙作业，泥浆（  ）性能指标进行检验',opts:['相对密度','黏度','含砂率','pH值','胶体率'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。相对密度；黏度；含砂率；pH值\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:429,ch:3,type:'multi',q:'地下连续墙作为主体地下结构外墙，且需要形成整体墙体时，地下连续墙的槽段接头宜采用（  ）',opts:['一字形穿孔钢板接头','十字形穿孔钢板接头','圆形锁口管接头','工字形钢接头','钢筋承插式接头'],ans:[0,1,4],exp:'正确答案为A、B、E。一字形穿孔钢板接头；十字形穿孔钢板接头；钢筋承插式接头\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:430,ch:3,type:'multi',q:'下列地铁基坑围护结构中，刚度大的有（  ）。',opts:['钢板桩','板式钢管桩','灌注桩','地下连续墙','SMW工法桩'],ans:[2,3],exp:'正确答案为C、D。灌注桩；地下连续墙\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:431,ch:3,type:'single',q:'地连墙导墙的主要作用，下列不正确的是（ ）',opts:['作为挖槽机械轨道的支承结构','维持槽内泥浆液面高于地下水位1m','永久承担地下连续墙的土压力荷载','作为测量挖槽精度和标高的基准'],ans:2,exp:'正确答案为C。永久承担地下连续墙的土压力荷载\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:432,ch:3,type:'multi',q:'地连墙导墙的功能，下列正确的是（ ）',opts:['必须建在坚实的地基上','需要具备挡土和基准功能','要能够存蓄泥浆并稳定液面','一般采用预制混凝土结构','需满足挖槽机械的施工要求'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。必须建在坚实的地基上；需要具备挡土和基准功能；要能够存蓄泥浆并稳定液面；需满足挖槽机械的施工要求\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:433,ch:3,type:'single',q:'现浇钢筋混凝土支撑特点的说法，正确的是（ ）。',opts:['混凝土支撑刚度小，变形大，适用于变形控制要求低的基坑','混凝土支撑浇筑后无需养护，可立即进行下一步开挖','混凝土支撑施工工期长，拆除较困难','混凝土支撑在软土地区无需对被动区进行加固处理'],ans:2,exp:'正确答案为C。混凝土支撑施工工期长，拆除较困难\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:434,ch:3,type:'multi',q:'现浇钢筋混凝土支撑的特点是（  ）。',opts:['刚度大，变形小','混凝土硬化后强度安全，可靠性强','可周转使用','施工工期短','拆除方便'],ans:[0,1],exp:'正确答案为A、B。刚度大，变形小；混凝土硬化后强度安全，可靠性强\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:435,ch:3,type:'multi',q:'钢结构支撑体系，平面布置有（  ）',opts:['水平撑','斜撑','对撑','井字撑','角撑'],ans:[2,3,4],exp:'正确答案为C、D、E。对撑；井字撑；角撑\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:436,ch:3,type:'single',q:'水泥土搅拌法地基加固适用于（  ）。',opts:['障碍物较多的杂填土','欠固结的淤泥质土','饱和黏性土','密实的砂类土'],ans:2,exp:'水泥土搅拌法适用于加固淤泥、淤泥质土、素填土、黏性土（软塑和可塑）、粉土（稍密、中密）、粉细砂（稍密、中密）、中粗砂（松散、稍密）、饱和黄土等土层，不适用于含有大孤石或障碍物较多且不易清除的杂填土、欠固结的淤泥和淤泥质土、硬塑及坚硬的黏性土、密实的砂类土，以及地下水影响成桩质量的土层。'},{id:437,ch:3,type:'multi',q:'内支撑体系的施工，正确的有（  ）',opts:['内支撑结构的施工与拆除顺序应与设计一致','必须坚持先开挖后支撑的原则','围檩与围护结构之间紧密接触，不得留有缝隙','钢支撑应按设计要求施加预压力','预加压力出现损失时，应拆除重新施加预压力'],ans:[0,2,3],exp:'正确答案为A、C、D。内支撑结构的施工与拆除顺序应与设计一致；围檩与围护结构之间紧密接触，不得留有缝隙；钢支撑应按设计要求施加预压力\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:438,ch:3,type:'multi',q:'基坑内加固的目的主要是（  ）。',opts:['提升土体的强度和土体的侧向抗力','减少围护结构承受的主动土压力','减少围护结构位移','防止坑底土体隆起破坏','防止坑底土体渗流破坏'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。提升土体的强度和土体的侧向抗力；减少围护结构位移；防止坑底土体隆起破坏；防止坑底土体渗流破坏\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:439,ch:3,type:'multi',q:'下列（）异常情况时，应立即停止开挖',opts:['支护结构的内力超过其设计值','围护结构或止水帷幕出现渗漏','基坑出现流土、管涌现象','围护结构发生异常声响','周围环境复杂'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。支护结构的内力超过其设计值；围护结构或止水帷幕出现渗漏；基坑出现流土、管涌现象；围护结构发生异常声响\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:440,ch:3,type:'single',q:'关于地铁车站长条形基坑的开挖原则，下列描述正确的是（ ）',opts:['应遵循"由下而上、先开挖后支撑"的原则','兼作盾构始发井时应从中间向两端开挖','必须遵循"分段分层、由上而下、先支撑后开挖"的原则','端头井土方应平行于斜撑方向一次性开挖完成'],ans:2,exp:'正确答案为C。必须遵循"分段分层、由上而下、先支撑后开挖"的原则\n\n📖 教材依据（城市隧道工程与轨道交通）：附属构筑物施工和保护①地下管线、涵洞(管)等构筑物是城镇道路路基工程中必不可少的组成部分。涵洞(管)等构筑物可与路基(土方)同时进行，但新建的地下管线施工必须遵循"先地下、后地上""先深后浅"的原则。②既有地下管线等构筑物的拆改、加固保护。③修筑地表水和地下水的排除设施，为后续的土、石方工程施工创造条件。\n\nA错误：与正确原则完全相反； B错误：应从两端或一端向中间开挖； D错误：应垂直于斜撑方向分层分段开挖。'},{id:441,ch:3,type:'single',q:'基坑变形特征不包括（  ）。',opts:['土体变形','水位下降','围护结构水平变形','地表沉降'],ans:1,exp:'正确答案为B。水位下降\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:442,ch:3,type:'single',q:'下图属于哪种加固形式（  ）',opts:['墩式加固','裙边加固','抽条加固','格栅式加固'],ans:3,exp:'正确答案为D。格栅式加固\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:443,ch:3,type:'multi',q:'基坑的土方开挖方法包括（ ）',opts:['表层土方开挖','浅层土方开挖','深层土方开挖','全断面开挖','台阶法开挖'],ans:[1,2],exp:'正确答案为B、C。浅层土方开挖；深层土方开挖\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:444,ch:3,type:'multi',q:'造成围护结构竖向变位的原因有（  ）。',opts:['因清孔不净有沉渣','未设支撑','开挖卸荷','围护结构下方有顶管穿越','围护结构下方有盾构穿越'],ans:[0,3,4],exp:'正确答案为A、D、E。因清孔不净有沉渣；围护结构下方有顶管穿越；围护结构下方有盾构穿越\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:445,ch:3,type:'single',q:'适用于较浅基坑的加固处理法（  ）。',opts:['水泥土搅拌','高压喷射注浆','对地基掺入一定量的固化剂','换填材料'],ans:3,exp:'正确答案为D。换填材料\n\n📖 教材依据（城市隧道工程与轨道交通）：..…………..............….......……...............................…..............2103.7TBM法隧道施工..........………..................……….......….......….......…...'},{id:446,ch:3,type:'multi',q:'地基加固采用注浆法，外加剂通常有（  ）。',opts:['固化剂','催化剂','速凝剂','缓凝剂','膨胀剂'],ans:[0,1,2,3],exp:'注浆法所用的浆液是由主剂(原材料)、溶剂(水或其他溶剂)及各种外加剂混合而成。通常所提的注浆材料是指浆液中所用的主剂。外加剂可根据在浆液中起的作用，分为固化剂、催化剂、速凝剂、缓凝剂和悬浮剂等。注浆材料有很多，其中，水泥 浆是以水泥为主的浆液，适用于岩土加固，是常用的浆液。'},{id:447,ch:3,type:'multi',q:'适用于深基坑的加固处理法（  ）。',opts:['水泥土搅拌','高压
