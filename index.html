  const pc = state.settings.practiceCount || 25;
  const qs = getRandomQuestions(pc);
  if(!qs.length) return showToast('题库为空');
  startQuiz(qs, 'practice', '🎲 随机练习（'+pc+'题）');
}

function startWrongOnly(){
  const qs = getWrongQuestions();
  if(!qs.length) return showToast('暂无错题');
  startQuiz(qs, 'wrong', '📕 错题重练（'+qs.length+'题）');
}

function startByChapter(chId){
  if(chId === -1){document.getElementById('chapterGrid').scrollIntoView({behavior:'smooth'});return;}
  const qs = getQuestionsByChapter(chId, 50);
  if(!qs.length) return showToast('该章节暂无题目');
  const chName = CHAPTERS.find(c=>c.id===chId)?.name||'';
  startQuiz(qs, 'practice', '📚 '+chName+'（'+qs.length+'题）');
}

function startExam(){
  const qs = getRandomQuestions(30);
  if(!qs.length) return showToast('题库为空');
  startQuiz(qs, 'exam', '⏱️ 模拟考试（30题）');
  quiz.timeLeft = state.settings.examTime * 60;
  startTimer();
}

function startQuiz(qs, mode, title){
  quiz.questions = qs;
  quiz.current = 0;
  quiz.mode = mode;
  quiz.answers = qs.map(() => -1);
  document.getElementById('practiceTitle').textContent = title;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-practice').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  renderQuestion();
}

function renderQuestion(){
  const qs = quiz.questions;
  const idx = quiz.current;
  if(idx >= qs.length){finishQuiz();return;}
  const q = qs[idx];
  const total = qs.length;
  document.getElementById('progressInfo').textContent = (idx+1)+'/'+total + (quiz.mode==='exam'&&quiz.timer?' | '+Math.floor(quiz.timeLeft/60)+':'+(quiz.timeLeft%60<10?'0':'')+quiz.timeLeft%60:'');
  document.getElementById('progressFill').style.width = ((idx+1)/total*100)+'%';
  const area = document.getElementById('questionArea');
  const typeLabel = q.type==='single'?'单选题':'多选题';
  const chName = CHAPTERS.find(c=>c.id===q.ch)?.name||'';
  const tags = ['A','B','C','D','E','F'];
  let ans = quiz.answers[idx];
  const isSingle = q.type === 'single';
  let selected = isSingle ? (ans===-1?[]:[ans]) : (Array.isArray(ans)?ans:[]);
  let html = '<div class="q-card"><div class="q-meta"><span class="q-num">第'+(idx+1)+'题</span><span class="q-type">'+typeLabel+' · '+chName+'</span></div><div class="q-text">'+q.q+'</div><div class="options">';
  q.opts.forEach((opt,i)=>{
    const sel = selected.includes(i)?' selected':'';
    html += '<div class="option'+sel+'" data-idx="'+i+'" onclick="selectOpt('+i+')"><div class="tag">'+tags[i]+'</div><div class="text">'+opt+'</div></div>';
  });
  html += '</div>';
  html += '<div class="q-actions"><button class="btn-primary" onclick="confirmAnswer()">'+((quiz.mode==='exam')?'确认答案':'提交')+'</button><button class="btn-outline" onclick="skipQuestion()">跳过</button></div>';
  if(idx>0) html += '<div style="text-align:center;margin-top:10px"><button class="btn-outline" onclick="prevQuestion()" style="flex:none;padding:8px 20px;font-size:13px">← 上一题</button></div>';
  area.innerHTML = html;
}

function selectOpt(i){
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  if(q.type==='single'){
    quiz.answers[idx] = i;
  } else {
    let cur = Array.isArray(quiz.answers[idx])?[...quiz.answers[idx]]:[];
    if(cur.includes(i)) cur = cur.filter(x=>x!==i);
    else cur.push(i);
    quiz.answers[idx] = cur;
  }
  renderQuestion();
}

function getCorrectAnswer(q){return q.ans;}

function formatAnswer(q){
  if(q.type==='single') return 'ABCDEF'[q.ans];
  if(Array.isArray(q.ans)) return q.ans.map(a=>'ABCDEF'[a]).join('');
  return '';
}

function arraysEqual(a,b){
  if(!a||!b||a.length!==b.length) return false;
  return [...a].sort().join()===[...b].sort().join();
}

function confirmAnswer(){
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  const ans = quiz.answers[idx];
  const correct = getCorrectAnswer(q);
  const isSingle = q.type==='single';
  let isCorrect;
  if(isSingle){
    if(ans===-1) return showToast('请先选择一个选项');
    isCorrect = ans===correct;
  } else {
    if(!Array.isArray(ans)||!ans.length) return showToast('请选择至少一个选项');
    isCorrect = arraysEqual(ans,correct);
  }
  if(!state.progress[q.id]) state.progress[q.id]={correct:0,wrongCount:0,answered:0};
  state.progress[q.id].answered++;
  if(isCorrect) state.progress[q.id].correct++;
  else {
    state.progress[q.id].wrongCount++;
    if(!state.wrongIds.includes(q.id)) state.wrongIds.unshift(q.id);
    else {state.wrongIds=state.wrongIds.filter(x=>x!==q.id);state.wrongIds.unshift(q.id);}
  }
  saveState();
  
  const area = document.querySelector('#questionArea .options');
  if(area){
    area.querySelectorAll('.option').forEach(el=>{
      el.classList.add('disabled');
      const oi=parseInt(el.dataset.idx);
      if(isSingle){if(oi===correct)el.classList.add('correct');else if(oi===ans&&ans!==correct)el.classList.add('wrong');}
      else{if(correct.includes(oi))el.classList.add('correct');else if(Array.isArray(ans)&&ans.includes(oi))el.classList.add('wrong');}
    });
  }
  
  const fb = document.createElement('div');
  fb.className='feedback show '+(isCorrect?'correct':'wrong');
  const expText = q.exp ? '<div style="margin-top:8px;padding:10px 12px;background:#fff3e0;border-radius:8px;font-size:13px;line-height:1.7;border-left:3px solid #ff9800"><div style="font-weight:600;color:#e65100;margin-bottom:4px">📖 解析</div>'+q.exp+'</div>' : '';
  fb.innerHTML='<div class="fb-title">'+(isCorrect?'✅ 回答正确':'❌ 回答错误')+'</div><div style="margin-bottom:6px">正确答案：'+formatAnswer(q)+'</div>'+expText;
  document.querySelector('.q-card .q-actions').before(fb);
  document.querySelector('.q-actions').innerHTML='<button class="btn-primary" onclick="nextQuestion()" style="flex:1">下一题 →</button>';
}

function nextQuestion(){quiz.current++;renderQuestion();}
function prevQuestion(){if(quiz.current>0)quiz.current--;renderQuestion();}
function skipQuestion(){quiz.current++;renderQuestion();}

function finishQuiz(){
  const total=quiz.questions.length;
  let correct=0;
  quiz.questions.forEach((q,i)=>{const a=quiz.answers[i];if(a===-1)return;if(q.type==='single'?a===getCorrectAnswer(q):arraysEqual(a,getCorrectAnswer(q)))correct++;});
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('questionArea').innerHTML='<div class="q-card" style="text-align:center;padding:30px"><div style="font-size:36px;margin-bottom:12px">'+(pct>=80?'🎉':pct>=60?'💪':'📚')+'</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">练习完成！</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px">共 '+total+' 题</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px">答对 '+correct+' 题</div><div style="font-size:28px;font-weight:800;color:'+(pct>=80?'var(--success)':pct>=60?'#e37400':'var(--danger)')+'">'+pct+'%</div><div style="margin-top:20px;display:flex;gap:10px;justify-content:center"><button class="btn-primary" onclick="backToHome()" style="padding:12px 24px">返回首页</button><button class="btn-outline" onclick="startWrongOnly()" style="padding:12px 24px">错题重练</button></div></div>';
  stopTimer();
}

function backToHome(){
  stopTimer();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-home').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="home"]').classList.add('active');
  updateStats();
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    const name=this.dataset.tab;
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    if(name==='home')updateStats();
    if(name==='wrong')renderWrongList();
  });
});

function startTimer(){
  stopTimer();
  quiz.timer=setInterval(()=>{
    quiz.timeLeft--;
    if(quiz.timeLeft<=0){stopTimer();showToast('⏰ 时间到！');finishQuiz();return;}
    renderQuestion();
  },1000);
}
function stopTimer(){if(quiz.timer){clearInterval(quiz.timer);quiz.timer=null;}}

function renderWrongList(){
  const list=document.getElementById('wrongList');
  const empty=document.getElementById('wrongEmpty');
  if(!state.wrongIds.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  let html='<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text2)">共 '+state.wrongIds.length+' 道错题</span><button onclick="startWrongOnly()" style="padding:8px 16px;font-size:13px;border-radius:8px;border:none;color:#fff;background:var(--primary);cursor:pointer">开始重练</button></div>';
  state.wrongIds.forEach(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    if(!q)return;
    const ch=CHAPTERS.find(c=>c.id===q.ch);
    html+='<div class="wrong-item" onclick="startQuiz([QUESTIONS.find(x=>x.id==='+id+')],\'wrong\',\'📕 错题回顾\')"><div class="ch">📖 '+(ch?ch.name:'')+' · '+(q.type==='single'?'单选':'多选')+'</div><div class="q">'+q.q+'</div><span class="tag-w">❌ 答错'+(state.progress[q.id]?.wrongCount||1)+'次</span></div>';
  });
  list.innerHTML=html;
}

function updateStats(){
  const total=QUESTIONS.length;
  const done=Object.keys(state.progress).length;
  let correctCount=0,totalAttempts=0;
  Object.values(state.progress).forEach(p=>{correctCount+=p.correct;totalAttempts+=p.answered;});
  const rate=totalAttempts>0?Math.round(correctCount/totalAttempts*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statRate').textContent=rate+'%';
  document.getElementById('statWrong').textContent=state.wrongIds.length;
}

function renderChapterGrid(){
  const grid=document.getElementById('chapterGrid');
  let html='';
  CHAPTERS.forEach(ch=>{
    const cnt=QUESTIONS.filter(q=>q.ch===ch.id).length;
    html+='<div class="chapter-btn" onclick="startByChapter('+ch.id+')"><div><div class="name">第'+ch.id+'章 '+ch.name+'</div><div class="count">'+cnt+'题</div></div><span class="arrow">→</span></div>';
  });
  grid.innerHTML=html;
}

function toggleSetting(key){
  state.settings[key]=!state.settings[key];
  document.getElementById('toggle'+key.charAt(0).toUpperCase()+key.slice(1)).classList.toggle('on',state.settings[key]);
  saveState();
}

function adjExamTime(delta){
  let t=state.settings.examTime+delta;
  if(t<10)t=10;if(t>120)t=120;
  state.settings.examTime=t;
  document.getElementById('examTimeDisplay').textContent=t;
  saveState();
}

function adjPracticeCount(delta){
  let t=(state.settings.practiceCount||25)+delta;
  if(t<5)t=5;if(t>90)t=90;
  state.settings.practiceCount=t;
  document.getElementById('practiceCountSetting').textContent=t;
  document.getElementById('practiceCountDisplay').textContent=t;
  saveState();
}

function clearAllProgress(){
  if(!confirm('确定清除所有练习进度和错题记录吗？'))return;
  state.progress={};state.wrongIds=[];
  saveState();updateStats();renderWrongList();showToast('已清除所有进度');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadState();
document.getElementById('toggleShowAnswer').classList.toggle('on', state.settings.showAnswer);
document.getElementById('toggleShuffleOpts').classList.toggle('on', state.settings.shuffleOpts);
document.getElementById('examTimeDisplay').textContent = state.settings.examTime;
document.getElementById('practiceCountSetting').textContent = state.settings.practiceCount || 25;
document.getElementById('practiceCountDisplay').textContent = state.settings.practiceCount || 25;
document.getElementById('versionDisplay').textContent = state.APP_VERSION;
updateStats();
renderChapterGrid();
</script>
</body>
</html>
