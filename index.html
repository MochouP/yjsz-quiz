'二氧化硫','氮氧化物','氯化氢'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。颗粒物；二氧化硫；氮氧化物；氯化氢\n\n📖 教材依据（施工监测）：国家环境保护总局令第28号发布，该部门现称中华人民共和国生态环境部)等规定执行并定期校对。在线监测结果应采用电子显示板进行公示并与当地环保行政主管部门和行业行政主管部门监控中心联网。烟气在线监测指标应至少包括烟气中一氧化碳、颗粒物、二氧化硫、氮氧化物和氯化氢。7.3建筑垃圾资源化利用建筑垃圾是工程渣土、工程泥浆、工程垃圾、拆除垃坡和装修垃坡等的总称。'},{id:625,ch:8,type:'single',q:'下列不属于海绵城市储存与调节设施的是（  ）',opts:['湿塘','调节池','渗透塘','蓄水池'],ans:2,exp:'正确答案为C。渗透塘\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:626,ch:8,type:'multi',q:'下列各项中，属于海绵城市建设技术设施类型的是（  ）。',opts:['渗透设施','存储与调节设施','传输设施','储能灌溉设施','截污净化设施'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。渗透设施；存储与调节设施；传输设施；截污净化设施\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:627,ch:8,type:'multi',q:'常用的渗透设施主要包括有（  ）',opts:['透水铺装','下沉式绿地','湿塘','渗透塘','生物滞留设施'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。透水铺装；下沉式绿地；渗透塘；生物滞留设施\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:628,ch:8,type:'multi',q:'市政工程中常用的截污净化设施有（  ）',opts:['植被缓冲带','初期雨水弃流设施','植草沟','人工土壤渗滤设施','调节池'],ans:[0,1,3],exp:'正确答案为A、B、D。植被缓冲带；初期雨水弃流设施；人工土壤渗滤设施\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:629,ch:8,type:'single',q:'下沉式绿地下沉深度根据土壤渗透性能确定，一般为（  ）mm',opts:['100-200','150-250','200-300','500'],ans:0,exp:'正确答案为A。100-200\n\n📖 教材依据（海绵城市建设）：艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。④应合理设置绿化和围墙。⑤可利用建筑物合理布局，阻隔声波传播，高噪声源应在厂区中央尽量远离敏感点。\n\n下沉式绿地应低于周边铺砌地面或道路，下沉深度根据土壤渗透性能确定，一般为100--200mm'},{id:630,ch:8,type:'single',q:'城市雨水管渠系统较难改造时，选择存储与调节设施，可选用（  ）',opts:['调节池','雨水湿地','调节塘','地下式蓄水池'],ans:0,exp:'有绿化、道路喷洒、景观补水等雨水回用需求的小区、城市绿地等，宜根据雨水回用用途及用量设置蓄水池。蓄水池宜采用露天的景观水池或水体，在用地紧张时可采用地下式蓄水池。 建筑与小区、城市绿地等具有一定空间条件的区域，宜设置调节塘。城市雨水管渠系统较难改造时，可采用调节池。'},{id:631,ch:8,type:'single',q:'在水体有自然净化需求的区域，选择存储与调节设施时，宜设置（  ）。',opts:['湿塘','雨水湿地','调节塘','地下式蓄水池'],ans:1,exp:'正确答案为B。雨水湿地\n\n📖 教材依据（海绵城市建设）：进入城市管网中的径流量和污染物总量，同时提高城市内涝防治标准和雨水资源化回用率。雨水源头控制利用技术有雨水下渗、净化和收集回用几种;末端集中控制技术包括雨水湿地、塘体及多功能调蓄等。对于新型合流制排水系统，雨水源头控制利用可有效减少合流制溢流频率、溢流水量和溢流污染物总量;通过在合流干管上设置储存池或调蓄池，实现合流制污水的完全处理，合流制溢流首先进入储存池，待雨后送到污水处理厂处理。\n\n建筑与小区、城市道路、城市绿地、滨水带等区域内的地势较低的地带或水体有自然净化需求的区域，宜设置雨水湿地。'},{id:632,ch:8,type:'multi',q:'小型车的停车场进行透水铺装时可采用（  ）。',opts:['植草砖','透水混凝土','鹅卵石','透水沥青','碎拼'],ans:[0,1,3],exp:'渗透设施选择 透水铺装 场合 透水砖、透水混凝土、透水沥青 道路人行道、人行广场、建筑小区人行道等荷载较小的区域 植草砖、透水混凝土、透水沥青 小型车的停车场 鹅卵石、碎石、碎拼、踏步石 园林绿地 下沉式绿地 道路、广场、其他硬化铺装区及周边绿地 渗透塘 汇水面积大于1公顷、地势较低'},{id:633,ch:8,type:'multi',q:'宜采用渗透塘作为渗透设施的条件是（  ）',opts:['汇水面积大于一公顷','水深达0.5米','年降水量超400mm','地势较低的低洼地带','不便于铺设透水砖区域'],ans:[0,3],exp:'正确答案为A、D。汇水面积大于一公顷；地势较低的低洼地带\n\n📖 教材依据（海绵城市建设）：地应优先考虑采用下沉式绿地。下沉式绿地应低于周边铺砌地面或道路，下沉深度应根据土壤渗透性能确定，一般为100~200mm。汇水面积大于1公顷、地势较低的低洼地带等具有一定空间条件的区域，宜采用渗透塘。2.存储与调节的选择建筑小区、城市绿地、广场等区域的低洼水塘或其他具有空间条件的场地，宜设置湿塘。建筑与小区、城市道路、城市绿地、滨水带等区域内的地势较低的地带或水体有自然净化需求的区域，宜设置雨水湿地。\n\n汇水面积大于1公顷、地势较低的低洼地带等具有一定空间条件的区域，宜采用渗透塘。'},{id:634,ch:8,type:'single',q:'透水路面自上而下通常是设置（  ）。',opts:['透水面层、透水找平层、透水垫层','透水面层、透水基层、透水垫层','透水面层、透水找平层、透水基层','透水面层，透水基层、透水找平层'],ans:2,exp:'正确答案为C。透水面层、透水找平层、透水基层\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:635,ch:8,type:'single',q:'下沉式绿地施工，以下说法正确的一项是（  ）',opts:['地下水位较高的地区，应在绿地高处设置出流口','道路红线内外绿地的高程一般高于路面并与道路景观相结合','绿地内表层土壤入渗能力不够时，可另设置渗透设施','应尽量采用本地的、耐淹、耐旱、耐污种类的植物，宜采用木本植物'],ans:2,exp:'正确答案为C。绿地内表层土壤入渗能力不够时，可另设置渗透设施\n\n📖 教材依据（海绵城市建设）：艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。④应合理设置绿化和围墙。⑤可利用建筑物合理布局，阻隔声波传播，高噪声源应在厂区中央尽量远离敏感点。\n\nA选项错误；在地下水位较高的地区，应在绿地低洼处设置出流口 B选项错误；道路红线内外绿地的高程一般低于路面并与道路景观相结合 D选项错误；应尽量采用本地的、耐淹、耐旱、耐污种类的植物，宜采用草本植物'},{id:636,ch:8,type:'multi',q:'构成市政工程”海绵体”的主要技术可以归纳为（  ）。',opts:['雨水渗透技术','雨水存储与调节技术','雨水传输技术','雨水回灌与区域输送技术','雨水截污与净化技术'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。雨水渗透技术；雨水存储与调节技术；雨水传输技术；雨水截污与净化技术\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:637,ch:8,type:'multi',q:'生物滞留设施可以分为（  ）。',opts:['简易型生物滞留设施','多用途型生物滞留设施','全天候型生物滞留设施','复杂型生物滞留设施','增强型生物滞留设施'],ans:[0,3],exp:'正确答案为A、D。简易型生物滞留设施；复杂型生物滞留设施\n\n📖 教材依据（海绵城市建设）：海绵城市建设技术设施类型主要有渗透设施、存储与调节设施、转输设施、截污净化设施。1.渗透设施市政公用工程中常用的渗透设施主要有透水铺装、下沉式绿地、生物滞留设施、渗透塘(见图8.1-1~图8.1-4)。透水面层60~80透水找平层20~30透水基层lOO~150透水底基层150~200土基_...-.;:..••••_tw.;...ζ·ζ.•_.,.....;--••.;.ζ.~•.•••_;..;-;.ζ.;-;:.w.;-ζ·ζ·，~.~-!-~.~.~也~.~.~~.~..~..~.~.~……\n\n生物滞留设施分为简易型生物滞留设施和复杂型生物滞留设施，由植物层、土壤层、过滤层（或排水层）、蓄水层构成。按应用位置不同又称作雨水花园、生物滞留带、高位花坛、生态树池等。'},{id:638,ch:8,type:'multi',q:'为了去除大颗粒污染物并减缓流速，渗透塘应采用的预处理设施主要有（  ）。',opts:['沉砂池','弃流','前置塘','巴氏槽','三角堰'],ans:[0,2],exp:'正确答案为A、C。沉砂池；前置塘\n\n📖 教材依据（海绵城市建设）：园、生物滞留带、高位花坛、生态树池等。1)一般要求(1)对于污染严重的汇水区应选用植草沟、植被缓冲带或沉淀池等对径流雨水进行预处理，去除大颗粒的污染物并减缓流速;应按设计要求设置弃流措施防止石油类高浓度污染物侵害植物。(2)生物滞留设施应用于道路绿化带时，道路纵坡不应大于设计要求;设施靠近路基部分应按设计要求进行防渗处理。\n\n渗透塘前应设置沉砂池、前置塘等预处理设施，去除大颗粒的污染物并减缓流速；降雪后应采取弃流、排盐等措施防止融雪剂侵害植物。'},{id:639,ch:8,type:'multi',q:'蓄水池具有雨水储存功能，同时也具有消减峰值流量的作用，它的构造形式主要有（  ）。',opts:['钢筋混凝土构造','砖、石砌筑构造','钢板拼接式','塑料蓄水模块拼装式','筏板式'],ans:[0,1,3],exp:'正确答案为A、B、D。钢筋混凝土构造；砖、石砌筑构造；塑料蓄水模块拼装式\n\n📖 教材依据（海绵城市建设）：温度的作用，水深一般为0.8~1.2m，出水池容积约为总容积(不含调节池容积)的10%。2.蓄水池蓄水池指具有雨水储存功能的集蓄利用设施，同时也具有消减峰值流量的作用，主要包括钢筋混凝土蓄水池，砖、石砌筑蓄水池及塑料蓄水模块拼装式蓄水池，用地紧张的城市大多采用地下封闭式蓄水池。1)一般要求(1)蓄水池施工前应根据设计要求，复核与蓄水池连接的有关管道、控制点和水准点。\n\n蓄水池指具有雨水储存功能的集蓄利用设施，同时也具有消减峰值流量的作用主要包括钢筋混凝土蓄水池，砖、石砌筑蓄水池及塑料蓄水模块拼装式蓄水池，用地紧张的城市大多采用地下封闭式蓄水池。'},{id:640,ch:8,type:'single',q:'渗透管渠具有渗透雨水，下列不属于渗透管渠组成材料的是（  ）。',opts:['穿孔塑料管','无砂混凝土管','砾石','无缝钢管'],ans:3,exp:'正确答案为D。无缝钢管\n\n📖 教材依据（海绵城市建设）：防水层施工为防水控制的重点。(3)小导管常用设计参数:铜管直径40~50mm，长度应大于循环进尺的2倍，宜为3~5m，焊接铜管或无缝钢管;铜管安设注浆孔间距为100~150mm，铜管沿拱的环向布置问距为300~500mm，铜管沿拱的环向外插角为50~150，小导管是受力杆件，因此两排IJ、导管在纵向应有一定搭接长度，钢管沿隧道纵向的搭接长度一般不小于1m。\n\n渗透管渠指具有渗透功能的雨水管渠，可采用穿孔塑料管、无砂混凝土管和砾（碎）石等材料组合而成。'},{id:641,ch:8,type:'multi',q:'植草沟一般可以分为（  ）。',opts:['传输型','接收型','干式','湿式','潮式'],ans:[0,2,3],exp:'正确答案为A、C、D。传输型；干式；湿式\n\n📖 教材依据（海绵城市建设）：物和土壤截留、净化雨水径流，可用于衔接其他各单项设施、城市雨水管渠系统和超标雨水径流排放系统。(1)植草沟草种应耐旱、耐淹。植草沟一般分为传输型、干式、湿式植草沟。(2)植草沟总高度不宜大于600mm，上顶宽度应根据汇水面积确定，宜为600~2400mm，底部宽度宜为300~1500mm。(3)植草沟断面边坡坡度不宜大于1:3，采取相关措施保证雨水能以较低流速在植草沟内流动，防止边坡侵蚀。\n\n植草沟草种应耐旱、耐淹。植草沟一般分为传输型、干式、湿式植草沟。'},{id:642,ch:8,type:'multi',q:'下列植被缓冲带说法正确的是（ ）。',opts:['植物缓冲带为坡度较大的植被区','植被缓冲带坡度一般为2%～6%','坡度大于8%时需根据实际情况另外设置消能设施','植被缓冲带适用于道路等不透水面周边','植物选择根系发达，长势强的耐盐、耐旱、耐水湿的乡土植物品种'],ans:[1,3,4],exp:'植物缓冲带为坡度较缓的植被区，经植被拦截及土壤下渗作用减缓地表径流流速，并去除径流中的部分污染物。 (1)植被缓冲带前应设置碎石消能，植被缓冲带坡度一般为2%～6%,宽度一般不宜小于2m,当坡度大于6%时需根据实际情况另外设置消能设施。 (2)植被缓冲带适用于道路等不透水面周边，可作为生物滞留设施等低影响开发设施的预处理，也可作为城市水系的滨水绿化带。 (3)植被缓冲带断面形式、土质、植被材料应符合设计要求。 (4)植物应选择根系发达，长势强的耐盐、耐旱、耐水湿的乡土植物品种。'},{id:643,ch:8,type:'multi',q:'人工土壤渗滤体由（  ）等材料组成。',opts:['石英石','矿石','活性炭','塑料膜','营养物质'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。石英石；矿石；活性炭；营养物质\n\n📖 教材依据（海绵城市建设）：般要求(1)人工士壤渗滤一般由蓄水层、渗滤体、防渗膜、溢流井、渗管、排水管等构成。(2)材料要求:渗滤体由石英砂、少量矿石和活性炭及营养物质等材料组成，不得含有草根、树叶、塑料袋等有机杂物及垃圾，矿石泥沙量不得超过3%，材料配合比应符合设计要求。采用生物填料的原料、材料密度、有效堆积生物膜表面面积、堆积密度应符合设计要求。\n\n渗滤体由石英砂、少量矿石和活性炭及营养物质等材料组成，不得含有草根、树叶、塑料袋等有机杂物及垃圾。'},{id:644,ch:8,type:'single',q:'下列初期雨水弃流设施说法错误的是（ ）。',opts:['初期雨水弃流装置宜采用人工控制方式','雨水弃流排入污水管道','初期径流弃流池，雨水进水口应按设计要求设置格栅','格栅的设置应便于清理，且不得影响雨水进水口通水能力'],ans:0,exp:'正确答案为A。初期雨水弃流装置宜采用人工控制方式\n\n📖 教材依据（海绵城市建设）：生量相适应。(10)再生处理工艺噪声控制应符合下列规定:①应优选选用噪声值低的建筑垃圾处理设备，同时应在设备处设置隔声设施，设施内宜采用多孔吸声材料。②固定式处理主要破碎设备可采用下沉式设计。第1篇市政公用工程技术346③封闭车间宜采用少窗结构，所用门窗宜选用双层或多层隔声门窗，内壁表面宜装饰吸声材料。'},{id:645,ch:9,type:'multi',q:'下列沥青路面病害包括（  ）。',opts:['拱胀及错台','壅包','车辙','沉陷、翻浆','裂缝'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。壅包；车辙；沉陷、翻浆；裂缝\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:646,ch:8,type:'single',q:'路面出现缝宽为8mm的裂缝，且缝内较潮湿，则该缝隙应采用（  ）封缝。',opts:['道路石油沥青','乳化沥青','煤沥青','改性沥青'],ans:1,exp:'正确答案为B。乳化沥青\n\n📖 教材依据（海绵城市建设）：但尚未硬化的情况下喷洒，洒布透层油后，应封闭交通。透层油1西布后的养护时间应根据透层油的品种和气候条件由试验确定。液体沥青中的稀释剂全部挥发或乳化沥青水分蒸发后，应及时铺筑沥青混合料面层。b.粘层。在既有结构和路缘石、检查井等构筑物与沥青泪合料层的连接面应喷洒粘层油。为加强路面沥青层之间，沥青层与水泥混凝土路面之间的粘结而洒布的沥青材料薄层。\n\n缝宽在10mm及以内的，应采用专用灌缝材料或热沥青灌缝，缝内潮湿时应采用乳化沥青灌缝。'},{id:647,ch:9,type:'multi',q:'旧路罩面包括（  ）',opts:['微表处工艺','(含砂)雾封层','碎石封层','薄层热拌沥青混凝土','水泥混凝土'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。微表处工艺；(含砂)雾封层；碎石封层；薄层热拌沥青混凝土\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:648,ch:9,type:'single',q:'用于微表处的沥青是（  ）。',opts:['乳化沥青','改性乳化沥青','石油沥青','煤沥青'],ans:1,exp:'正确答案为B。改性乳化沥青\n\n📖 教材依据（城市基础设施更新工程）：i昆凝土和砌块路面以及人行步道、绿化照明、附属设施、交通标志等，还包括沥青路面材料的再生利用。9.1.2道路改造施工技术1.沥青路面病害及微表处理才)病害处理(1)裂缝处理缝宽在lOmm及以内的，应采用专用灌缝(封缝)材料或热沥青灌缝，缝内潮温时应采用乳化沥青灌缝。缝宽在10mm以上时，应按本书9.1.2中1.1)(6)的要求进行修补。\n\n微表处采用机械设备将改性乳化沥青、粗细集料、填料、水和添加剂等按照设计配合比拌合成稀浆混合料并摊铺到原路面上的薄层。'},{id:649,ch:9,type:'single',q:'微表处施工，下列不符合要求的是（  ）。',opts:['常温施工可采用半幅施工，施工期间不中断行车','摊铺速度1.5～3.0km/h','不需碾压成型','不需要安排试验段'],ans:3,exp:'c.常温施工可采用半幅施工，施工期间不中断行车。 d.采用专用摊铺机具摊铺稀浆混合料，摊铺速度1.5～3.0km/h。 e.不需碾压成型，摊铺找平后必须立即进行初期养护，禁止一切车辆和行人通行。 f.通常，气温25～30℃时养护30min 满足设计要求后，即可开放交通。 g.微表处理施工前应安排试验段，长度不小于200m,以便确定施工参数。'},{id:650,ch:9,type:'single',q:'有关雾封层施工技术要求，以下正确的是（  ）',opts:['施工时路面温度应大于10℃','环境湿度宜大于或等于80%','雨天进行雾封层施工时，应加大沥青喷洒量','雾封层干涸后即可开放交通'],ans:3,exp:'正确答案为D。雾封层干涸后即可开放交通\n\n📖 教材依据（城市基础设施更新工程）：碎石的缝隙情况撒布嵌缝料。③控制碾压速度，碾压至轮迹不大于5mm，表面平整、坚实。基层压实后至面层施工前适量洒水。④未铺装上层前不得开放交通。3.土工合成材料的应用1)土工合成材料土工合成材料是以人工合成的聚合物为原料制成的各类型产品，是城镇道路岩土工程中应用的一种新型工程材料的总称。(1)分类土工合成材料可分为土工织物、土工膜、土工复合材料和土工特种材料等类型。\n\nA选项说法错误；雾封层施工时路面温度应大于或等于15℃ B选项说法错误；环境湿度宜小于或等于80% C选项说法错误；雨天不得进行雾封层施工'},{id:651,ch:9,type:'multi',q:'混凝土路板边和板角修补，以下正确的是（  ）',opts:['板边存在轻度剥落时，快速路和主干路的养护不得采用沥青混合料修补','宜采用早强补偿收缩混凝土','凿除破损部分时，原有钢筋应剔除','凿除破损部分时，没有钢筋时应植入钢筋','新旧板面间应涂刷界面剂'],ans:[0,1,3,4],exp:'正确答案为A、B、D、E。板边存在轻度剥落时，快速路和主干路的养护不得采用沥青混合料修补；宜采用早强补偿收缩混凝土；凿除破损部分时，没有钢筋时应植入钢筋；新旧板面间应涂刷界面剂\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:652,ch:9,type:'single',q:'面板脱空、唧浆处理，不符合要求的是（  ）',opts:['检测路面板的脱空可采用弯沉仪','检测路面板的脱空可采用探地雷达','当板边实测弯沉值在0.20～1.00mm时，应钻孔注浆处理','当板边实测弯沉值大于1.00mm，应采用适当材料修补'],ans:3,exp:'正确答案为D。当板边实测弯沉值大于1.00mm，应采用适当材料修补\n\n📖 教材依据（城市基础设施更新工程）：1%。6)面板脱空、DRP浆处理采用弯沉仪或探地雷达等设备检测水泥混凝土路面板的脱空，并应根据检测结果确定修补方案，修补方案应符合下列规定:当板边实测弯沉值在O.20~1.00mm时，应钻孔注浆处理注浆后两相邻板间弯沉差宜控制在O.06mm以内。当板边实测弯沉值大于l.OOmm或整块水泥混凝土面板破碎时，应拆除原有破损混凝土面板，重新铺筑。\n\n当板边实测弯沉值大于1.00mm或整块水泥混凝土面板破碎时，应拆除原有破损混凝土面板，重新铺筑。'},{id:653,ch:9,type:'multi',q:'有关旧水泥混凝土路开挖式基底处理方法，以下说法有误的是（  ）。',opts:['该处理方法工艺简单，修复彻底','对交通影响较小','适用于车流量较少的路段','处理过程中需要重新浇筑混凝土','处理过程中需要进行注浆地基处理'],ans:[1,4],exp:'正确答案为B、E。对交通影响较小；处理过程中需要进行注浆地基处理\n\n📖 教材依据（城市基础设施更新工程）：)路面结构组成路面结构自下至上由垫层、基层、面层组成(见图1.1-3)。(1)垫层垫层是介于基层和路基之间的层位，主要设置在温度和湿度状况不良的路段上，以改善路面结构的使用性能。在季节性冰冻地区路面结构厚度小于最小防冻厚度要求时，设置防冻垫层可以使路面结构免除或减轻冻胀和翻浆病害。以下路段按设计要求设置垫层:①季节性冰冻地区的中湿或潮湿路段。\n\nB选项，开挖式基底处理对交通影响较大 E选项，进行注浆地基处理是非开挖基底处理'},{id:654,ch:9,type:'multi',q:'用于裂缝防治的玻纤网和土工织物需要满足的技术要求主要有（  ）。',opts:['抗拉强度','网孔尺寸','单位面积质量','透水率','最大负荷延伸率'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。抗拉强度；网孔尺寸；单位面积质量；最大负荷延伸率\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:655,ch:9,type:'multi',q:'沥青路面再生包括（  ）。',opts:['厂拌热再生','厂拌温再生','现场热再生','现场温再生','现场冷再生'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。厂拌热再生；厂拌温再生；现场热再生；现场冷再生\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:656,ch:9,type:'multi',q:'现场热再生工序包括（  ）。',opts:['加热','铣刨','耙松','破碎','筛分'],ans:[0,1,2],exp:'正确答案为A、B、C。加热；铣刨；耙松\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:657,ch:9,type:'single',q:'对城市桥梁的一般性损坏进行修理属于（  ）',opts:['保养小修','中修工程','大修工程','加固工程'],ans:1,exp:'正确答案为B。中修工程\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:658,ch:9,type:'single',q:'对桥梁结构采取补强、修复、调整内力属于（  ）',opts:['保养小修','中修工程','大修工程','加固工程'],ans:3,exp:'桥梁的养护 保养小修 对管辖范围内的城市桥梁进行日常维护和小修作业。 中修工程 对城市桥梁的一般性损坏进行修理，恢复原有技术水平和标准的工程。 大修工程 对城市桥梁的较大的损坏进行综合治理，全面恢复到原有技术水平和标准的工程及对桥梁结构维修改造的。 加固工程 对桥梁结构采取补强、修复、调整内力等措施，从而满足结构承载力及设计要求的工程。 改扩建工程 不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提高其运行能力的工程。'},{id:659,ch:9,type:'multi',q:'桥梁扩建必须与（  ）同步完成。',opts:['路基','路面拼接','互通','附属设施改造','伸缩装置'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。路基；路面拼接；互通；附属设施改造\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:660,ch:9,type:'multi',q:'新、旧桥梁的上部结构连接方式有（  ）。',opts:['湿接头连接','匹配胶','伸缩装置连接','植筋连接','湿接缝连接'],ans:[3,4],exp:'正确答案为D、E。植筋连接；湿接缝连接\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:661,ch:9,type:'multi',q:'下列可用铰接连接的是（  ）。',opts:['钢筋混凝土实心板桥','预应力混凝土空心板桥','新、旧板梁之间的拼接','预应力混凝土T形梁','连续箱梁桥'],ans:[0,1,2,4],exp:'根据桥梁上部结构不同类型一般采用以下的拼接连接方式： (1)钢筋混凝土实心板和预应力混凝土空心板桥，新、旧板梁之间的拼接宜采用铰接或近似于铰接连接。 (2)预应力混凝土T形梁或组合T形梁桥，新、旧T形梁之间的拼接宜采用刚性连接。 (3)连续箱梁桥，新、旧箱梁之间的拼接宜采用铰接连接。'},{id:662,ch:10,type:'multi',q:'城市管道现场检测，检测手段包括（  ）等方法及仪器设备。',opts:['超声检测','声呐','传统检查','管道潜望镜','水准仪'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。超声检测；声呐；传统检查；管道潜望镜\n\n📖 教材依据（施工测量）：量应以中误差作为衡量测绘精度的标准，并应以2倍中误差作为极限误差。10.1.2常用仪器市政公用工程常用的施工测量仪器主要有:全站仪、经纬仪、水准仪、平板仪、测距仪、激光准直(指向)仪、卫星定位仪器(如GPS、BDS)及其配套器具、陀螺全站仪、激光铅锤仪等。1.全站仪及经纬仪(1)全站仪是一种采用红外线自动数字显示距离和角度的测量仪器，主要由接收筒、发射筒、照准头、振荡器、混频器、控制箱、电池、反射棱镜及专用三脚架等组成。\n\n管道现场检测可采用电视检测（CCTV）、声呐与超声检测、管道潜望镜检测和传统检查方法，必要时可组合采用多种方法。'},{id:663,ch:9,type:'multi',q:'电视检测(CCTV)说法正确的是（ ） 。',opts:['主要用于管道内水位较低状态下的检测','管内水位不宜大于管道直径的50%','能够全面检查管道的结构和功能状况','应用不是很广泛','适用于直径50～2000mm的管道检测'],ans:[0,2,4],exp:'电视检测(CCTV)也称为闭路电视检测，摄像机固定在自行或电动拖车上，摄像机和拖车的动力由地面主控制台通过电缆提供，并传输图像和控制信号。主要用于管道内水位较低状态下的检测，管内水位不宜大于管道直径的20%。该设备能够全面检查 管道的结构和功能状况，对管道破损、龟裂、堵塞、树根侵入等现象进行检测和记录，应用广泛，适用于直径50～2000mm的管道检测。'},{id:664,ch:9,type:'multi',q:'声呐与超声检测说法正确的是（ ） 。',opts:['只能用于水下积泥、异物检测','对结构性缺陷检测有限','不宜作为准确判断缺陷类型和修复方法的依据','是在管道口进行快速检测','适用于较短的管线'],ans:[0,1,2],exp:'正确答案为A、B、C。只能用于水下积泥、异物检测；对结构性缺陷检测有限；不宜作为准确判断缺陷类型和修复方法的依据\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:665,ch:9,type:'single',q:'不属于给水排水管道全断面修复的方法是（  ）',opts:['爆管法','缠绕法','内衬法','喷涂法'],ans:0,exp:'正确答案为A。爆管法\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:666,ch:9,type:'single',q:'以下各管道非开挖修复更新方法中，需要进行注浆的方法是（  ）。',opts:['碎管法','管片内衬法','缩径内衬法','折叠内衬法'],ans:1,exp:'正确答案为B。管片内衬法\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:667,ch:9,type:'multi',q:'喷涂法进行管道修复，主要的施工方法有（  ）',opts:['机械离心喷涂','高压气体旋喷','人工喷涂','低压雾化喷涂','静电喷涂'],ans:[0,1,2],exp:'正确答案为A、B、C。机械离心喷涂；高压气体旋喷；人工喷涂\n\n📖 教材依据（城市基础设施更新工程）：优点是可以长距离施工，施工速度快，适应大曲率半径的弯管和管径的变化。第9章城市基础设施更新工程377(8)喷涂法喷涂法是通过机械离心喷涂、人工喷涂、高压气体旋喷等方法，将水泥砂浆、环氧树脂等内衬浆液喷涂到管道内壁，形成内衬层的管道修复方法。喷涂法主要用于管道的防腐处理。其优点是过流断面损失小，可适应管径、断面形状及弯曲度的变化。\n\n喷涂法是通过机械离心喷涂、人工喷涂、高压气体旋喷等方法，将水泥砂浆、环氧树脂等内衬浆液喷涂到管道内壁，形成内衬层的管道修复方法。'},{id:668,ch:9,type:'multi',q:'破管外挤按照爆管工具的不同可分为（  ）',opts:['气动爆管','高压爆管','焊接爆管','液动爆管','切割爆管'],ans:[0,3,4],exp:'正确答案为A、D、E。气动爆管；液动爆管；切割爆管\n\n📖 教材依据（城市基础设施更新工程）：。(5)改扩建工程一一城市桥梁因不适应现有的交通量、载重量增长的需要，需提高技术等级标准，显著提升其运行能力的工程;以及桥梁结构严重损坏，需恢复技术等级标准，拆除重建的工程。2.桥梁加固施工技术分类1)一般要求(1)桥梁加固可根据实际情况采用动态设计、动态施工的原则。368第1篇市政公用工程技术(2)桥梁加固不得损伤原结构。'},{id:669,ch:9,type:'multi',q:'下列破管顶进说法正确的是（  ）',opts:['适用直径100～900mm','适用长度500m以内','对地表和土层无干扰','不适用含水层','需开挖两个工作井'],ans:[0,2,4],exp:'破管顶进法主要用于直径100～900mm、长度200m以内、埋深较大(一般大于4m)的陶土管、混凝土管或钢筋混凝土管，新管为球墨铸铁管、玻璃钢管、混凝土管或陶土管。该法的优点是对地表和土层无干扰；可在复杂的土层中施工，尤其是含水层；能够更换管线的走向和坡度已偏离的管道；基本不受地质条件限制。其缺点是需开挖两个工作井，地表需有足够大的工作空间。 第十章 施工测量'},{id:670,ch:10,type:'single',q:'施工平面控制网测量时，用于水平角度测量的仪器为（  ）。',opts:['水准仪','全站仪','激光准直仪','激光测距仪'],ans:1,exp:'正确答案为B。全站仪\n\n📖 教材依据（施工测量）：获准的施工方案向施工人员进行技术安全交底，强调工程难点、技术要点、安全措施。使作业人员掌握要点，明确责任。③对已知的测量控制点进行闭合加密，建立测量控制网，再进行施工控制桩放线测量，恢复中线，补钉转角桩、路两侧外边桩等。④施工前，应根据工程地质勘察报告，对路基土进行天然含水率、液限、塑限、标准击实、CBR试验，必要时应做颗粒分析、有机质含量、易溶盐含量、冻膨胀和膨胀量等试验。\n\n全站仪主要应用于施工平面控制网线的测量及施工过程中控制点坐标测量（包含水平角观测、垂直角观测和距离观测）。在没有条件使用水准仪进行水准测量时，还可考虑利用全站仪进行精密三角高程测量以代替水准测量。'},{id:671,ch:10,type:'multi',q:'关于桥梁施工测量的说法，正确的有（  ）。',opts:['桥梁工程的各类控制桩包括：中桩及墩台的中心桩和定位桩等','施工前应测桥梁中线和各墩台的纵轴与横轴线定位桩，作为施工控制依据','支座（垫石）和梁（板）定位应以桥梁中线和盖梁中轴线为基准','采用跨河水准测量方法校核水准路线时，视线离水面的高度不小于3m','支座（垫石）和梁的高程以其顶部高程进行控制'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。桥梁工程的各类控制桩包括：中桩及墩台的中心桩和定位桩等；施工前应测桥梁中线和各墩台的纵轴与横轴线定位桩，作为施工控制依据；支座（垫石）和梁（板）定位应以桥梁中线和盖梁中轴线为基准；支座（垫石）和梁的高程以其顶部高程进行控制\n\n📖 教材依据（施工测量）：计纵、横坡线控制。(7)高填方或软土地基应按照设计要求进行沉降观测，并依据测量结果安排上部结构施工。2.城市桥梁施工测量(1)依据现场条件设置桥梁工程的各类控制桩，包括桥梁中线桩及墩台的中心桩和定位桩等。(2)桥梁放线应根据桥梁的形式、跨径、设计要求的施工精度及现场环境条件确定实施方法，以及是否需要重新布设或加密控制网点。\n\n此题考核城市桥梁施工测量。选项D错误，正确的是：当水准路线跨越河、湖等水体时，应采用跨河水准测量方法校核。视线离水面的高度不小于2m。'},{id:672,ch:10,type:'multi',q:'关于管道施工测量的说法，正确的有（  ）。',opts:['井室附属构筑物控制点高程测量应采用附合水准测量','排水管道高程应以管外底高程作为施工控制基准','检查井应以井内底高程作为控制基准','管道铺设或砌筑构筑物前，应校测管道与构筑物中心及高程','圆形井平面位置放线应以井底圆心为基准放线'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。井室附属构筑物控制点高程测量应采用附合水准测量；检查井应以井内底高程作为控制基准；管道铺设或砌筑构筑物前，应校测管道与构筑物中心及高程；圆形井平面位置放线应以井底圆心为基准放线\n\n📖 教材依据（施工测量）：管道工程高程应以管内底高程作为施工控制基准，给水等压力管道工程应以管道中心线高程作为施工控制基准。井室等附属构筑物应以内底高程作为控制基准，控制点高程测量应采用附合水准测量，明开管线沟槽一般采用坡度板法控制中心与高程。(4)在挖槽见底前、施工砂石(1昆凝土)基础前、管道铺设或砌筑构筑物前，应校测管道及构筑物中心与高程。\n\n排水管道工程高程应以管内底高程作为施工控制基准。给水等压力管道工程应以管道中心线高程作为施工控制基准。'},{id:673,ch:10,type:'single',q:'市政公用工程施工中，每一个单位（子单位）工程完成后，应进行（  ）测量。',opts:['竣工','复核','校核','放灰线'],ans:0,exp:'正确答案为A。竣工\n\n📖 教材依据（施工测量）：网的测量以及施工过程中测点间水平距离、水平角度的测量;在没有条件使用水准仪进行水准测量时，还可考虑利用全站仪进行三角高程测量来代替水准测量;在特定条件下，市政公用工程施工选用全站仪进行三角高程测量和三维坐标的测量。全站仪按照测角精度可分为0.5"、1"、2"等几个等级。(2)常用的经纬仪主要有光学经纬仪和电子经纬仪，一般用来测量水平角和竖直角，目前常用的经纬仪精度一般为2"。\n\n施工过程中，在每一个单位（体）工程完成后应进行竣工测量，并提出其竣工测量成果。 第十一章施工监测'},{id:674,ch:11,type:'single',q:'以下可以不实施基坑监测的情况是（  ）',opts:['设计安全等级为二级的基坑','开挖深度为3米，现场地质情况极为复杂','开挖深度为6米，基坑地质条件为完整硬岩','上部为土体，下部为极破碎的软岩的基坑'],ans:2,exp:'当开挖基坑为以下情况时，需实施基坑监测： 1、基坑设计安全等级为一、二级的基坑。 2、开挖深度大于或等于5m的下列基坑：土质基坑、极软岩基坑、破碎的软岩基坑、极破碎的岩体基坑;上部为土体，下部为极软岩、破碎的软岩、极破碎的岩体构成的土岩组合基坑。 3、开挖深度小于5m但现场地质情况和周围环境较复杂的基坑。 C选项虽然深度为6米，但是基坑地质条件好，故可以不监测'},{id:675,ch:11,type:'multi',q:'以下各工况的基坑，需要进行专家论证的是（  ）。',opts:['工程地质，水文地质条件复杂的基坑','采用“四新”的三级基坑','临近重要天然气管道的基坑','发生过重大事故，重新组织施工的基坑','基坑所在区域地下水位较高的基坑'],ans:[0,2,3],exp:'当基坑工程的监测方案存在变形量接近预警值情况时，需进行专项论证： 1、邻近重要建筑、设施、管线等破坏后果很严重的基坑工程。 2、工程地质、水文地质条件复杂的基坑工程 3、已发生严重事故，重新组织施工的基坑工程。 4、采用新技术、新工艺、新材料、新设备的一、二级基坑工程。 5、其他需要论证的基坑工程。'},{id:676,ch:11,type:'multi',q:'监测报告应标明事项包括（  ）',opts:['工程名称','监控量测单位名称及其公章','报告的起止日期','报告编号','项目负责人、审核人、审批人盖章'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。工程名称；监控量测单位名称及其公章；报告的起止日期；报告编号\n\n📖 教材依据（施工监测）：据施工工况、地质条件和环境条件分析监测数据的变化原因和变化规律，预测其发展趋势，发现影响工程及周边环境安全的异常情况时，必须立即报告。监测报告应标明工程名称、监测单位、报告的起止日期、报告编号，还应有监测单位用章及项目负责人、审核人、审批人签字。监测报告主要内容包括:1)日报(1)工程施工概况。(2)现场巡查信息:巡查照片、记录等。\n\n监测报告应标明工程名称、监控量测单位、报告的起止日期、报告编号，并应有监控量测单位用章及项目负责人、审核人、审批人签字。'},{id:677,ch:11,type:'multi',q:'监测报告的主要内容包括（  ）。',opts:['里程碑事件','日报','警情快报','阶段性报告','总结报告'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。日报；警情快报；阶段性报告；总结报告\n\n📖 教材依据（施工监测）：、非弹性变形，设置预拱度。(5)支架基础周围应有良好的排水措施，不得被水浸泡。(6)浇筑混凝土时应采取措施，避免支架产生不均匀沉降。(7)支架施工前，应编制专项施工方案，内容包括支架平、立、剖面图，支架细第2章城市桥梁工程87部结构详图、支架基础详图，并对支架的整体稳定性、支架的刚度、构件的强度和变形进行验算，按规定做好评审、审批工作。'},{id:678,ch:12,type:'multi',q:'施工单位因施工需要占用挖掘时，需经（  ）批准。',opts:['项目监理部门','市政工程行政主管部门','公安交通管理部门','城市环卫部门','道路所在街道办'],ans:[1,2],exp:'正确答案为B、C。市政工程行政主管部门；公安交通管理部门\n\n📖 教材依据（相关法规）：与城市道路发展规划和年度建设计划相协调，坚持先地下、后地上的施工原则，与城市道路同步建设。(2)依附于城市道路建设的各种管线、杆线等设施，应当经市政工程行政主管部门批准，方可建设。12.2.2相关城市道路管理的规定(1)未经市政工程行政主管部门和公安交通管理部门批准，任何单位或者个人不得占用或者挖掘城市道路。\n\n未经市政工程行政主管部门和公安交通管理部门批准，任何单位或者个人不得占用或者挖掘城市道路。'},{id:679,ch:12,type:'single',q:'城镇排水与污水处理设施建设工程，在竣工验收合格之日起（  ）天内，将竣工验收报告及相关资料报城镇排水主管部门备案。',opts:['15','21','7','30'],ans:0,exp:'正确答案为A。15\n\n📖 教材依据（相关法规）：批准占用或者挖掘城市道路的，应当按照批准的位置、面积、期限占用或者挖掘。需要移动位置、扩大面积、延长时间的，应当提前办理变更审批手续。12.3城镇排水和污水处理管理的有关规定《城镇排水与污水处理条例~(由中华人民共和国国务院令第641号发布)。第才2章中目关法规12.3.1399建设原则(1)国家鼓励城镇污水处理再生利用，工业生产、城市绿化、道路清扫、车辆冲洗、建筑施工以及生态景观等应当优先使用再生水。'},{id:680,ch:12,type:'single',q:'污水、雨污水合流管道及湿陷土、膨胀土、流沙地区的雨水管道，必须经（  ）合格后方可投入使用。',opts:['水压试验','严密性试验','无损探测','气压试验'],ans:1,exp:'正确答案为B。严密性试验\n\n📖 教材依据（相关法规）：内。5.浅埋暗挖法详见本书3.4中相关内容。5.1.3给水排水管道功能性试验给水排水管道功能性试验包括压力管道的水压试验、无压管道的严密性试验。给水管道应进行水压试验，并网运行前进行冲洗与消毒，经检验水质达到标准后，方可允许并网通水投入运行。排水管道进行严密性试验，分为闭水和闭气试验两种。湿陷性黄土及膨胀士、流砂地区的雨水管道需要进行严密性试验，污水管必须经严密性试验合格后方可投入运行。'},{id:681,ch:12,type:'single',q:'水泥混凝土路面开放交通的前提条件是（  ）。',opts:['抗压强度合格，路面拉毛完成','抗弯拉强度合格，路面填缝完成','抗弯拉强度合格，路面切缝完成','抗压强度合格，路面填缝完成'],ans:1,exp:'正确答案为B。水泥混凝土路面在面层混凝土弯拉强度达到设计强度，且填缝完成前，不得开放交通。即开放交通的前提条件是：抗弯拉强度合格（达到设计强度）且路面填缝完成。\n\n📖 教材依据（城镇道路工程）：在面层混凝土弯拉强度达到设计强度，且填缝完成前，不得开放交通。'},{id:682,ch:12,type:'single',q:'《燃气工程项目规范》GB55009-2021规定，燃气管道通过人行道时，最小覆土深度不小于（ ）米',opts:['0.9','1.5','1.0','0.6'],ans:3,exp:'正确答案为D。0.6\n\n📖 教材依据（相关法规）：地区雨水管渠及其附属构筑物应经严密性试验合格后方可投入运行。(4)工程建设施工降水不应排人市政污水管道。(5)污水管道及其附属构筑物应经严密性试验合格后方可投人运行。4.<<燃气工程项目规范))GB55009-202才有关规定(1)埋地输配管道应根据冻土层、路面荷载等条件确定其埋设深度。车行道下输配管道的最小直埋深度不应小于O.9m，人行道及田地下输配管道的最小直埋深度不应小于O.6m。'},{id:683,ch:9,type:'single',q:'根据《城市桥梁工程施工与质量验收规范》（CJJ2—2008）的有关规定，对涉及结构安全和使用功能的分部工程应进行（  ）检测。',opts:['见证取样','抽样','巡视','平行'],ans:1,exp:'正确答案为B。抽样\n\n📖 教材依据（城市基础设施更新工程）：00mm，1昆凝土要通过导管送入模内，导管出料口距离浇筑面高度运2m，防止混凝土在落料时离析，影响墙身混凝土质量。大体积1昆凝土施工要符合《城市桥梁工程施工与质量验收规范》CJJ2--2008中7.10条的要求。冬期1昆凝土施工要符合《城市桥梁工程施工与质量验收规范~CJJ2--2008中7.11条的要求。\n\n监理应按规定对涉及结构安全的试块、试件、有关材料和现场检测项目，进行平行检测、见证取样检测并确认合格。 对涉及结构安全和使用功能的分部工程应进行抽样检测。 第3篇 市政公用工程 项目管理实务'},{id:684,ch:14,type:'multi',q:'绿色施工措施“四节一环保”包括（ ）。',opts:['节人与人工利用','节材与材料利用','节机与机具利用','节水与水资源利用','节能与能源利用'],ans:[1,3,4],exp:'a.节材与材料利用。 b.节水与水资源利用。 c.节能与能源利用。 d.节地与土地资源利用。 e. 施工现场环境保护：扬尘控制措施、有害气体排放控制措施、水土污染控制措 施、噪声污染控制措施、光污染控制措施、建筑垃圾控制措施等。'},{id:685,ch:14,type:'multi',q:'施工组织设计的施工保证措施包括（ ）。',opts:['进度保证措施','质量保证措施','安全保证措施','材料保证措施','应急措施'],ans:[0,1,2,4],exp:'正确答案为A、B、C、E。进度保证措施；质量保证措施；安全保证措施；应急措施\n\n📖 教材依据（项目管理实务）：.…-….........………...............………………..405第3篇[E市政公用工程项目管理实务第1耳章一市政态南工程歪亚资商写施工组织….................………………....4114.1市政公用工程企业资质...............……......………….'},{id:686,ch:14,type:'multi',q:'危险性较大的分部分项工程范围包括（ ）。',opts:['开挖深度超过3m的基坑工程','开挖深度2m，周围地下管线复杂的基坑工程','搭设高度4m的支撑工程','定向钻机施工燃气管道工程','水下作业工程'],ans:[0,1,4],exp:'正确答案为A、B、E。开挖深度超过3m的基坑工程；开挖深度2m，周围地下管线复杂的基坑工程；水下作业工程\n\n📖 教材依据（项目管理实务）：.…-….........………...............………………..405第3篇[E市政公用工程项目管理实务第1耳章一市政态南工程歪亚资商写施工组织….................………………....4114.1市政公用工程企业资质...............……......………….'},{id:687,ch:14,type:'multi',q:'超危大工程的专家组构成正确的是（ ）。',opts:['专家库中选取','符合专业要求','人数不得少于5人以上的单数','本专业专家不少于2/3','施工单位技术负责人可以专家身份参加论证会'],ans:[0,1],exp:'正确答案为A、B。专家库中选取；符合专业要求\n\n📖 教材依据（项目管理实务）：.…-….........………...............………………..405第3篇[E市政公用工程项目管理实务第1耳章一市政态南工程歪亚资商写施工组织….................………………....4114.1市政公用工程企业资质...............……......………….'},{id:688,ch:14,type:'single',q:'向社会公示中标候选人，公示期（ ）。',opts:['不得少于3d','不得少于5d','不得少于7d','不得少于15d'],ans:0,exp:'正确答案为A。不得少于3d\n\n📖 教材依据（项目管理实务）：.…-….........………...............………………..405第3篇[E市政公用工程项目管理实务第1耳章一市政态南工程歪亚资商写施工组织….................………………....4114.1市政公用工程企业资质...............……......………….'},{id:689,ch:14,type:'multi',q:'施工进度计划在实施过程中进行的必要调整，调整的内容应包括（ ）。',opts:['施工内容','工程预算','起止时间','持续时间','资源供应'],ans:[0,2,3,4],exp:'正确答案为A、C、D、E。施工内容；起止时间；持续时间；资源供应\n\n📖 教材依据（项目管理实务）：线路和超过计划工期的非关键线路上的有关工作。这些工作又是持续时间可被压缩的工作，这种调整方法通常可以在网络图上直接进行。2.施工进度调整的内容施工进度计划在实施过程中进行的必要调整必须依据施工进度计划检查审核结果进行。调整的内容应包括:施工内容、工程量、起止时间、持续时间、工作关系、资源供应等。调整方式包括:单纯调整工期;资源有限一工期最短调整;工期固定一资源均衡调整;工期一成本调整。\n\n施工进度计划在实施过程中进行的必要调整必须依据施工进度计划检查审核结果 进行。调整的内容应包括：施工内容、工程量、起止时间、持续时间、工作关系、资源 供应等。'},{id:690,ch:12,type:'single',q:'建设单位必须在竣工验收（ ）将验收的时间、地点及验收组名单书面通知负责监督该工程的监督管理部门。',opts:['3个工作日前','5个工作日前','7个工作日前','15个工作日前'],ans:2,exp:'正确答案为C。7个工作日前\n\n📖 教材依据（相关法规）：预验收，预验收合格后应编制工程质量评估报告，按规定程序审批后向建设单位提交。⑤建设单位应在竣工预验收合格后组织监理、施工、设计、勘察等相关单位项目负责人进行工程竣工验收。⑥建设单位必须在竣工验收7个工作日前将验收的时间、地点及验收组名单书面通知负责监督该工程的监督管理部门。⑦建设单位应当自建设工程竣工验收合格之日起15d内，向工程所在地的县级以上人民政府建设主管部门(备案机关)备案。'},{id:691,ch:14,type:'multi',q:'成本分析的方法包括（ ）。',opts:['表格核算法','比较法','因素分析法','差额计算法','比率法'],ans:[1,2,3,4],exp:'正确答案为B、C、D、E。比较法；因素分析法；差额计算法；比率法\n\n📖 教材依据（项目管理实务）：.…-….........………...............………………..405第3篇[E市政公用工程项目管理实务第1耳章一市政态南工程歪亚资商写施工组织….................………………....4114.1市政公用工程企业资质...............……......………….'},{id:692,ch:14,type:'single',q:'我国将职业伤害事故分成（ ）类。',opts:['17','18','19','20'],ans:3,exp:'正确答案为D。20\n\n📖 教材依据（项目管理实务）：.…-….........………...............………………..405第3篇[E市政公用工程项目管理实务第1耳章一市政态南工程歪亚资商写施工组织….................………………....4114.1市政公用工程企业资质...............……......………….'},{id:693,ch:14,type:'multi',q:'市政工程最常见的职业伤害事故包括（ ）。',opts:['高处坠落','中毒和窒息','火灾','起重伤害','爆炸'],ans:[0,1,2,3],exp:'正确答案为A、B、C、D。高处坠落；中毒和窒息；火灾；起重伤害\n\n📖 教材依据（项目管理实务）：安全事故及预防19.1.1常见施工安全事故类型按照《企业职工伤亡事故分类~GB6441一1986，我国将职业伤害事故分成20类，其中高处坠落、触电、物体打击、起重伤害、机械伤害、胡塌、第19章看本章精讲课做本章自测题中毒和窒息、火灾是市政公用工程施工项目中常见的职业伤害事故。(1)高处坠落是在高处作业过程中人员坠落而造成的伤害。\n\n其中高处坠落、触电、物体打击、起重伤害、机械伤害、坍塌、中毒和窒息、火灾是市政公用工程施工项目中最常见的职业伤害事故。'}];;

const CHAPTERS = [{id:1,name:'城镇道路工程'},{id:2,name:'城市桥梁工程'},{id:3,name:'城市隧道工程与轨道交通'},{id:4,name:'给水排水厂站工程'},{id:5,name:'城市管道工程'},{id:6,name:'城市综合管廊工程'},{id:7,name:'垃圾处理工程'},{id:8,name:'海绵城市建设'},{id:9,name:'城市基础设施更新工程'},{id:10,name:'施工测量'},{id:11,name:'施工监测'},{id:12,name:'相关法规'},{id:13,name:'相关标准'},{id:14,name:'项目管理实务'}];

let state = {
  APP_VERSION:'v2.0-dong (642题)',
  settings: {showAnswer: true, shuffleOpts: false, examTime: 30, practiceCount: 25},
  progress: {},
  wrongIds: []
};

function loadState(){
  try{
    const s = localStorage.getItem('yjsz_state');
    if(s) Object.assign(state, JSON.parse(s));
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem('yjsz_state', JSON.stringify(state));}catch(e){}
}

function checkUpdate(){
  const status = document.getElementById('updateStatus');
  status.innerHTML = '📲 请对我说 <strong>"小艺，更新题库"</strong><br><span style="font-size:12px;color:var(--text2)">我会把最新版本发到你的手机上</span>';
  status.style.color = 'var(--text2)';
}

function shuffleArray(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getQuestionsByChapter(chId, count){
  let pool = QUESTIONS.filter(q => q.ch === chId);
  shuffleArray(pool);
  return pool.slice(0, Math.min(count||50, pool.length));
}

function getRandomQuestions(count){
  let pool = [...QUESTIONS];
  shuffleArray(pool);
  return pool.slice(0, Math.min(count||25, pool.length));
}

function getWrongQuestions(){
  let pool = QUESTIONS.filter(q => state.wrongIds.includes(q.id));
  shuffleArray(pool);
  return pool;
}

let quiz = {questions:[], current:0, answers:[], mode:'practice', timer:null, timeLeft:0};

function startRandom(){
  const pc = state.settings.practiceCount || 25;
  const qs = getRandomQuestions(pc);
  if(!qs.length) return showToast('题库为空');
  startQuiz(qs, 'practice', '🎲 随机练习（'+pc+'题）');
}

function startWrongOnly(){
  const qs = getWrongQuestions();
  if(!qs.length) return showToast('暂无错题');
  startQuiz(qs, 'wrong', '📕 错题重练（'+qs.length+'题）');
}

function startByChapter(chId){
  if(chId === -1){document.getElementById('chapterGrid').scrollIntoView({behavior:'smooth'});return;}
  const qs = getQuestionsByChapter(chId, 50);
  if(!qs.length) return showToast('该章节暂无题目');
  const chName = CHAPTERS.find(c=>c.id===chId)?.name||'';
  startQuiz(qs, 'practice', '📚 '+chName+'（'+qs.length+'题）');
}

function startExam(){
  const qs = getRandomQuestions(30);
  if(!qs.length) return showToast('题库为空');
  startQuiz(qs, 'exam', '⏱️ 模拟考试（30题）');
  quiz.timeLeft = state.settings.examTime * 60;
  startTimer();
}

function startQuiz(qs, mode, title){
  quiz.questions = qs;
  quiz.current = 0;
  quiz.mode = mode;
  quiz.answers = qs.map(() => -1);
  document.getElementById('practiceTitle').textContent = title;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-practice').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  renderQuestion();
}

function renderQuestion(){
  const qs = quiz.questions;
  const idx = quiz.current;
  if(idx >= qs.length){finishQuiz();return;}
  const q = qs[idx];
  const total = qs.length;
  document.getElementById('progressInfo').textContent = (idx+1)+'/'+total + (quiz.mode==='exam'&&quiz.timer?' | '+Math.floor(quiz.timeLeft/60)+':'+(quiz.timeLeft%60<10?'0':'')+quiz.timeLeft%60:'');
  document.getElementById('progressFill').style.width = ((idx+1)/total*100)+'%';
  const area = document.getElementById('questionArea');
  const typeLabel = q.type==='single'?'单选题':'多选题';
  const chName = CHAPTERS.find(c=>c.id===q.ch)?.name||'';
  const tags = ['A','B','C','D','E','F'];
  let ans = quiz.answers[idx];
  const isSingle = q.type === 'single';
  let selected = isSingle ? (ans===-1?[]:[ans]) : (Array.isArray(ans)?ans:[]);
  let html = '<div class="q-card"><div class="q-meta"><span class="q-num">第'+(idx+1)+'题</span><span class="q-type">'+typeLabel+' · '+chName+'</span></div><div class="q-text">'+q.q+'</div><div class="options">';
  q.opts.forEach((opt,i)=>{
    const sel = selected.includes(i)?' selected':'';
    html += '<div class="option'+sel+'" data-idx="'+i+'" onclick="selectOpt('+i+')"><div class="tag">'+tags[i]+'</div><div class="text">'+opt+'</div></div>';
  });
  html += '</div>';
  html += '<div class="q-actions"><button class="btn-primary" onclick="confirmAnswer()">'+((quiz.mode==='exam')?'确认答案':'提交')+'</button><button class="btn-outline" onclick="skipQuestion()">跳过</button></div>';
  if(idx>0) html += '<div style="text-align:center;margin-top:10px"><button class="btn-outline" onclick="prevQuestion()" style="flex:none;padding:8px 20px;font-size:13px">← 上一题</button></div>';
  area.innerHTML = html;
}

function selectOpt(i){
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  if(q.type==='single'){
    quiz.answers[idx] = i;
  } else {
    let cur = Array.isArray(quiz.answers[idx])?[...quiz.answers[idx]]:[];
    if(cur.includes(i)) cur = cur.filter(x=>x!==i);
    else cur.push(i);
    quiz.answers[idx] = cur;
  }
  renderQuestion();
}

function getCorrectAnswer(q){return q.ans;}

function formatAnswer(q){
  if(q.type==='single') return 'ABCDEF'[q.ans];
  if(Array.isArray(q.ans)) return q.ans.map(a=>'ABCDEF'[a]).join('');
  return '';
}

function arraysEqual(a,b){
  if(!a||!b||a.length!==b.length) return false;
  return [...a].sort().join()===[...b].sort().join();
}

function confirmAnswer(){
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  const ans = quiz.answers[idx];
  const correct = getCorrectAnswer(q);
  const isSingle = q.type==='single';
  let isCorrect;
  if(isSingle){
    if(ans===-1) return showToast('请先选择一个选项');
    isCorrect = ans===correct;
  } else {
    if(!Array.isArray(ans)||!ans.length) return showToast('请选择至少一个选项');
    isCorrect = arraysEqual(ans,correct);
  }
  if(!state.progress[q.id]) state.progress[q.id]={correct:0,wrongCount:0,answered:0};
  state.progress[q.id].answered++;
  if(isCorrect) state.progress[q.id].correct++;
  else {
    state.progress[q.id].wrongCount++;
    if(!state.wrongIds.includes(q.id)) state.wrongIds.unshift(q.id);
    else {state.wrongIds=state.wrongIds.filter(x=>x!==q.id);state.wrongIds.unshift(q.id);}
  }
  saveState();
  
  const area = document.querySelector('#questionArea .options');
  if(area){
    area.querySelectorAll('.option').forEach(el=>{
      el.classList.add('disabled');
      const oi=parseInt(el.dataset.idx);
      if(isSingle){if(oi===correct)el.classList.add('correct');else if(oi===ans&&ans!==correct)el.classList.add('wrong');}
      else{if(correct.includes(oi))el.classList.add('correct');else if(Array.isArray(ans)&&ans.includes(oi))el.classList.add('wrong');}
    });
  }
  
  const fb = document.createElement('div');
  fb.className='feedback show '+(isCorrect?'correct':'wrong');
  const expText = q.exp ? '<div style="margin-top:8px;padding:10px 12px;background:#fff3e0;border-radius:8px;font-size:13px;line-height:1.7;border-left:3px solid #ff9800"><div style="font-weight:600;color:#e65100;margin-bottom:4px">📖 解析</div>'+q.exp+'</div>' : '';
  fb.innerHTML='<div class="fb-title">'+(isCorrect?'✅ 回答正确':'❌ 回答错误')+'</div><div style="margin-bottom:6px">正确答案：'+formatAnswer(q)+'</div>'+expText;
  document.querySelector('.q-card .q-actions').before(fb);
  document.querySelector('.q-actions').innerHTML='<button class="btn-primary" onclick="nextQuestion()" style="flex:1">下一题 →</button>';
}

function nextQuestion(){quiz.current++;renderQuestion();}
function prevQuestion(){if(quiz.current>0)quiz.current--;renderQuestion();}
function skipQuestion(){quiz.current++;renderQuestion();}

function finishQuiz(){
  const total=quiz.questions.length;
  let correct=0;
  quiz.questions.forEach((q,i)=>{const a=quiz.answers[i];if(a===-1)return;if(q.type==='single'?a===getCorrectAnswer(q):arraysEqual(a,getCorrectAnswer(q)))correct++;});
  const pct=total>0?Math.round(correct/total*100):0;
  document.getElementById('questionArea').innerHTML='<div class="q-card" style="text-align:center;padding:30px"><div style="font-size:36px;margin-bottom:12px">'+(pct>=80?'🎉':pct>=60?'💪':'📚')+'</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">练习完成！</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px">共 '+total+' 题</div><div style="font-size:14px;color:var(--text2);margin-bottom:4px">答对 '+correct+' 题</div><div style="font-size:28px;font-weight:800;color:'+(pct>=80?'var(--success)':pct>=60?'#e37400':'var(--danger)')+'">'+pct+'%</div><div style="margin-top:20px;display:flex;gap:10px;justify-content:center"><button class="btn-primary" onclick="backToHome()" style="padding:12px 24px">返回首页</button><button class="btn-outline" onclick="startWrongOnly()" style="padding:12px 24px">错题重练</button></div></div>';
  stopTimer();
}

function backToHome(){
  stopTimer();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-home').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="home"]').classList.add('active');
  updateStats();
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    const name=this.dataset.tab;
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    if(name==='home')updateStats();
    if(name==='wrong')renderWrongList();
  });
});

function startTimer(){
  stopTimer();
  quiz.timer=setInterval(()=>{
    quiz.timeLeft--;
    if(quiz.timeLeft<=0){stopTimer();showToast('⏰ 时间到！');finishQuiz();return;}
    renderQuestion();
  },1000);
}
function stopTimer(){if(quiz.timer){clearInterval(quiz.timer);quiz.timer=null;}}

function renderWrongList(){
  const list=document.getElementById('wrongList');
  const empty=document.getElementById('wrongEmpty');
  if(!state.wrongIds.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  let html='<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--text2)">共 '+state.wrongIds.length+' 道错题</span><button onclick="startWrongOnly()" style="padding:8px 16px;font-size:13px;border-radius:8px;border:none;color:#fff;background:var(--primary);cursor:pointer">开始重练</button></div>';
  state.wrongIds.forEach(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    if(!q)return;
    const ch=CHAPTERS.find(c=>c.id===q.ch);
    html+='<div class="wrong-item" onclick="startQuiz([QUESTIONS.find(x=>x.id==='+id+')],\'wrong\',\'📕 错题回顾\')"><div class="ch">📖 '+(ch?ch.name:'')+' · '+(q.type==='single'?'单选':'多选')+'</div><div class="q">'+q.q+'</div><span class="tag-w">❌ 答错'+(state.progress[q.id]?.wrongCount||1)+'次</span></div>';
  });
  list.innerHTML=html;
}

function updateStats(){
  const total=QUESTIONS.length;
  const done=Object.keys(state.progress).length;
  let correctCount=0,totalAttempts=0;
  Object.values(state.progress).forEach(p=>{correctCount+=p.correct;totalAttempts+=p.answered;});
  const rate=totalAttempts>0?Math.round(correctCount/totalAttempts*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statRate').textContent=rate+'%';
  document.getElementById('statWrong').textContent=state.wrongIds.length;
}

function renderChapterGrid(){
  const grid=document.getElementById('chapterGrid');
  let html='';
  CHAPTERS.forEach(ch=>{
    const cnt=QUESTIONS.filter(q=>q.ch===ch.id).length;
    html+='<div class="chapter-btn" onclick="startByChapter('+ch.id+')"><div><div class="name">第'+ch.id+'章 '+ch.name+'</div><div class="count">'+cnt+'题</div></div><span class="arrow">→</span></div>';
  });
  grid.innerHTML=html;
}

function toggleSetting(key){
  state.settings[key]=!state.settings[key];
  document.getElementById('toggle'+key.charAt(0).toUpperCase()+key.slice(1)).classList.toggle('on',state.settings[key]);
  saveState();
}

function adjExamTime(delta){
  let t=state.settings.examTime+delta;
  if(t<10)t=10;if(t>120)t=120;
  state.settings.examTime=t;
  document.getElementById('examTimeDisplay').textContent=t;
  saveState();
}

function adjPracticeCount(delta){
  let t=(state.settings.practiceCount||25)+delta;
  if(t<5)t=5;if(t>90)t=90;
  state.settings.practiceCount=t;
  document.getElementById('practiceCountSetting').textContent=t;
  document.getElementById('practiceCountDisplay').textContent=t;
  saveState();
}

function clearAllProgress(){
  if(!confirm('确定清除所有练习进度和错题记录吗？'))return;
  state.progress={};state.wrongIds=[];
  saveState();updateStats();renderWrongList();showToast('已清除所有进度');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadState();
document.getElementById('toggleShowAnswer').classList.toggle('on', state.settings.showAnswer);
document.getElementById('toggleShuffleOpts').classList.toggle('on', state.settings.shuffleOpts);
document.getElementById('examTimeDisplay').textContent = state.settings.examTime;
document.getElementById('practiceCountSetting').textContent = state.settings.practiceCount || 25;
document.getElementById('practiceCountDisplay').textContent = state.settings.practiceCount || 25;
document.getElementById('versionDisplay').textContent = state.APP_VERSION;
updateStats();
renderChapterGrid();
</script>
</body>
</html>
